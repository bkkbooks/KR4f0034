body:
  text: 張文貞集巻七大學士張玉書撰侍直恭紀上謂大學士等曰性理大全所言三分益一徑一圍三之法爾等以為可行否明時人有論樂律之書前令熊賜履看閲昨賜履閲畢進呈其意仍以蔡元定之說為主朕問蔡元定之說果脗合乎賜履曰似亦相近以朕觀之徑一圍三之法推算必不能相符若用之治厯必多違舛今試以此法算日月交食其錯繆可立見矣又有為宻率乗除之說者徑一則圍三有竒徑七則圍當二十有二逓推之皆用此法然止可算少不可算多少則所差微𣺌積至於多而所差或什伯或千萬矣即九方分之說其法似乎少宻然亦未能悉合明末有鄭世子載堉辨論樂律極言三分損益隔八相生之非但其說亦不能無弊搃之算法明顯易見不容毫釐有差試之於事皆可立騐雖不諳文義之人亦能辨其是非欲以空言取勝不可得也王熙張玉書奏曰凡事必求實騐況算法争在銖黍膠執成說空言支餙何補於用歴代論歳差所重亦只在算法上又諭曰近日有江南人梅姓者聞其通算學曽遣人試之所言測景全然未合從來測景之法某日某時太陽到某度其辨甚微此人立表至短曽不踰寸一寸中差一杪至尺則差一分至丈即差一寸彼因算法不宻故測景用短表以欺人不見耳今人所講算法其始亦各有原本止因不能窮究故一切踈漏如熊賜履言算法皆踵襲宋人舊說不自知其非是且人縱知徑一圍三之誤若以此語人必羣起而非之以為宋人既主此論不可不從究竟試諸實用一無所騐爾等第依其法試之當自了然也熙等奏曰前人所言豈能盡當徑一圍三之法推算不符雖蔡元定之言何可從也皇上洞悉律數究極精微真足超越千古臣等踈陋得聞所未聞不勝欣幸紀平定江南事順治元年五月既定燕京七月招撫山東河南侍郎王鰲永宻奏江南情形言南中擁立福王改元𢎞光史可法為閣部劉澤清東平侯劉良佐廣昌伯黄得功靖國公髙傑興平伯分踞四鎮攝政王多爾衮遺書可法諭之降可法旋報書語多不屈十月丁卯上御皇極門晉多羅豫郡王多鐸為和碩豫親王旋拜定國大將軍偕多羅承澤郡王碩塞及恭順王孔有德懐順王耿仲明智順王尚可喜續順公沈志祥等將師下江南中道聞流寇西遁師自孟津濟河趨潼闗二年正月西安下二月提戈南伐收降所過州縣投誠總兵許定國以計誘殺髙傑四月克揚州可法死于軍五月師抵南京明福王朱由松率其奸相馬士英及諸太監聞風潛遁官吏軍民開門降時在城者公則魏國保國侯則隆平臨淮懐寧靈璧安逺永康定逺伯則忻城太興寧晉南和東寧安城洛平成安駙馬則齊贊元内閣大學士則王鐸翰林則程正揆張居六卿則有朱之臣梁雲構李綽給事中則林有本陸朗王之晉徐方來莊則敬等其劉良佐及髙傑子元炤并提督總兵官先後來歸者凡二十三員馬步兵合計二十三萬八千三百有竒越十日六月已未㨗音至京師上御殿受朝賀是日祭告天地宗廟社稷福王走蕪湖大師追及之逆戰大敗黄得功中流矢死餘衆奔潰總兵田雄馬得功乃以計縶福王及其妃來獻于軍於是江南北郡縣相繼歸附文武將吏先後悉繳符印豫親王各給劄令仍領舊職惟六部衙門停給禁𢎞光錢開鼔鑄設鹽運司于揚州裁各衛所官仍留衛兵裁南京鳳泗各陵衛兵留守陵太監用軍中户部司印遣官督諸路稅課逃官員缺俱就軍前委補滁和間有杜陽王者梗命移師擊之旋就擒事聞頒詔蠲赦閏六月命大學士洪承疇以原銜總督軍務招撫江南各省地方九卿科道集議南中設官事宜人持一牘不啻聚訟有議部院科道全設如行在例者有議六部各留侍郎一員量裁司官者有議設都督府以親王領之歳一更代者更有云我朝定鼎北京當以南為陪京者陪京之名於義無當而一時建論張官置吏悉同輦轂必欲踵襲留都故事悖謬滋甚吏部侍郎陳名夏謂國家建鼎神京居北制南必不當如前并稱都會宜去京之名存設官之實議自北差户兵工侍郎及各司官如餉司分司例操江及江防巡城巡江巡倉俱併都察院作大差國子監官六自北差餘悉應裁疏入詔改南京為江南省設官事宜應如各省例行其諸司職掌俟總督大學士到日酌妥具聞嗣洪承疇覆奏一如各省例惟戸兵工三部料理兵馬錢糧船隻從北京差滿漢侍郎各一員戸部司官六員兵工各四員皆𨽻銜北部略與名夏議同七月命貝勒勒克德渾為平南大將軍與承疇等同駐防江南代豫親王多鐸實授豫親王委署官三百七十三員是月劉澤清同石城島總兵馬登洪降十月舉江南鄉試豫親王既定江南旋下兩浙前明潞王據杭州開門降惠王自紹興降師還上親迓之越日晉封和碩德豫親王隨征諸王分賚金銀鞍馬是月平南大將軍遣師擊前明魯藩兵時魯藩竊據浙東馬士英等引兵渡錢塘去前明翰林金聲以兵犯徽州洪承疇擒斬之三年正月前明唐藩兵復冦徽州敗之擒其閣部黄道周旋伏法時唐藩建立于福建閣部則道周及李永茂總督則何騰蛟偽官則楊廷麟劉同升萬元吉掲重熈等瑞昌王潞安王率兵三萬犯江寧復大敗之四月平南大將軍班師師下湖廣進彛陵口偽侯三十餘員及李孜等降獻受命于天既夀永昌玉璽孜自成弟尋誅前明廢藩宗姓獻地投誠者免罪入京師六月馬士英就擒于太湖伏誅紀滅闖獻二賊事順治元年四月和碩睿親王多爾衮奉命將師抵山海闗與流賊軍遇一戰敗賊軍二十餘萬賊狼狽却走比師抵燕京賊首李自成倉皇不知所出盡焚前明宫闕載輜重而西官兵追擊於真定之慶都復兩敗之賊棄輜重竄入秦九月車駕至京師十月朔即位頒詔中外加封諸王越日命和碩英親王阿濟格為定逺大將軍征流冦英親王紆道邊外從土黙特鄂爾多斯部取駝馬復轉入邊二年二月抵西安時和碩豫親王多鐸已移南征之師以正月二日克自成兵于潼闗矣英親王師既至豫親王轉旝南下英親王乃建大將軍鼔旗躡賊後追之時賊自西安收敗卒出藍田分道鼠竄繇西而南豫楚之間所至皆賊而獨不得自成所在會諜者言河南鄧州賊兵甚衆噶布什賢噶喇額真席忒庫率兵薄其城城潰乃賊餘黨也斬抗敵者數十人餘悉就撫時聞自成養子蔣鼐者擁兵五千衛賊家口據湖廣承天府于是大將軍令固山額真譚泰為帥同貝子滿達海薄何託吞齊哈暨諸將急擊之席忒庫仍為前鋒比師至鼐業分賊兵水陸兩道遁去我兵亦兩道躡擊譚泰等以水路進滿達海等以陸路進而自成復從間道潛走荆州大師疾趨荆自成又遁去大師由荆州循江而東乏舟不得濟至湖口獲賊艦二百餘濟江自承天至荆兩道擒斬賊衆及陣獲駝馬輜重約以數千計而興國州黄州德安皆有偏師往所獲稱是自成走武昌纛章京哈寧噶將兵圍武昌城數匝賊將偽劉侯田侯引兵五千人出城迎敵大敗之自成復遁去哈寧噶乗勝躡擊至富池口偵知賊營旋簡精銳直逼自成廬帳自成勢蹙投其妾三人于江潛越富池口而遁是日生擒賊總兵知府推官各一人知縣四人守備千把總五人獲馬匹船艦無算自成走九江大將軍令譚泰率大師乗舟追之距九江四十里許遇賊軍陣斬賊將四十餘人截獲賊艦三百有竒賊復自焚其艦二百餘遁去自是賊無戰艦矣譚泰乃令諸將分道偵賊時賊勢大潰我兵無不以一當百峩内巴圖魯諾一坤將親丁十餘人敗賊後隊約數百人塔思虎力充固巴圗魯將騎兵百餘人遮擊賊軍約三千人賊軍師宋獻䇿亦以是日就擒固山額真覺羅巴哈納等追及谷口會賊方環山而陣旋以精騎突入疾趨賊寢自成擁殘卒踉蹌登山我兵亦躡之而登賊各鳥獸駭散自成復遁去翌日巴哈納將左翼鰲拜巴圗魯將右翼甲喇章京顧禄將中路分道合擊之賊潰奔九公山大師薄山下直摧中堅入賊壘賊兵俛首就殱生擒自成妻妾及賊侯某獨索自成不得有降卒言自成敗走時領步兵纔二十人路為鄉民所困自縊而死遣人往視其屍朽不可辨自成生死終未有實據云後傳聞自成遁走江西有諭讓英是役也大小戰凡十餘合所過下河南湖廣江南江西六十三城收降賊衆二十餘萬獲槖駝百隻馬驘六千四百匹頭有竒船三千一百餘艘黄金一萬四千五百餘兩白金五萬九千七百餘兩東珠二百七十餘顆珍珠一百八十餘觔金王器飾皮幣衣服無筭方大師之過德安也會固山額真祖澤潤輓紅衣砲至聞南中總兵毛某持檄至楚招撫流冦隨移師擊之生擒毛總兵及副參將敗其兵四千人獲馬千匹師次九江明總督袁繼咸御史黄㴻司道李猶龍寧南侯左良玉子夢庚總兵十二員馬步兵十萬人俱艤舟江中悉招降之獲其船四萬餘艘閏六月壬午英親王阿濟格馳𠞰冦㨗音至並奏以聞辛卯告祭郊廟社稷上御殿受朝賀八月師還行間功多者貝子則滿達海博和托吞齊喀固山額真則譚泰杜雷呉賚巴忒馬覺羅巴哈納纛章京則鰲拜巴圗魯哈寧噶蘇拜希爾根查塔噶達渾阿喇哈徳爾得黒薩克巴圗魯峩内巴圗魯梅勒章京則譚拜阿喇善索爾果性鼐西特庫希佛宗室呉達海噶布什賢噶喇額真則席忒庫俱先後論功封賞英親王坐枉道緩師并有他罪降爵為郡王譚泰鰲拜牽連得罪解譚泰固山額真任降為昻邦章京鰲拜罰銀俱削軍功不録順治二年冬賊張獻忠據四川未下朝命西安駐防内大臣何洛會為定西大將軍會𠞰四川而遣固山額真巴顏等鎮西安何洛會未及入蜀而逆冦孫守法趙榮貴賀珍等勾結賊兵數千人犯西安圍其城時駐防兵單不能支勢甚危急會巴顏等率禁旅至内外互擊圍始解守法等俱遁去明年春正月復命和碩肅親王豪格為靖逺大將軍偕多羅衍禧郡王羅洛宏多羅貝勒尼堪貝子滿達海暨諸將征四川兼𠞰西安一路賊孽召何洛會還三月守法伏誅十一月復興安州大敗珍衆秦省底定方是時王師在秦日久絶口不言下西川事獻忠亦不虞王師之即西也志素驕百里外皆不設偹大將軍宻與諸將計宜乘其懈擊之遂以是月統大師由漢中府急趨蜀比抵南部縣境有前鋒擒賊生口至具言獻忠方列營順慶之西充縣急擊之可就擒于是令昻邦章京鰲拜巴圗魯固山額真凖塔巴圗魯同噶布什賢及八旂擺牙喇為前茅毎牛录各簡精銳一人為後勁大將軍親將滿州䝉古阿禮哈兵居中馭之銜枚疾驅一晝夜行三百里黎明抵西充之鳯凰觀會大霧晝晦勒軍登山賊諜者知之馳白獻忠曰王師至矣獻忠堅卧不為動曰豈真從天而降耶或秦督孟喬芳兵至耳一戰當立敗矣頃之王師逼賊營獻忠方在廐閱馬聞急大驚倉皇麾所部馬步賊兵迎敵自乗所愛馬馳走不及擐甲有禆將某馳射之貫其胷獻忠負創還營鰲拜凖塔等鼔勇力擊大破賊衆遂擒獻忠斬于軍士民飲恨獻忠者争往斫其尸于軍門外不移時骨肉俱盡大將軍分遣諸將四出搜𠞰凡破賊一百三十餘寨斬首數萬級收獲馬驘一萬一千二百匹頭有竒金珠皮幣等物無算十二月㨗聞四年春告祭郊廟社稷免朝五年正月師還二月上御太和殿宴勞之在事有功將士下所司叙賚鰲拜巴圗魯固山額真覺羅巴哈納纛章京車爾布學士蘇納海等皆坐纛章京希爾根軍中争功失察停賞肅親王亦坐他罪不録功順治十三年九月固山額真朱馬喇請追叙肅親王平蜀功詔追封為武肅親王建碑致祭衍禧郡王羅洛宏先以病卒于軍鳴呼以流冦逆焰之張也至于簒竊神器傾覆明祚而王師既下則百萬巨冦曽不足以當一旅豈非天哉初郡盜蠭起張獻忠實稱渠帥李自成方依闖王髙氏與諸闖將伍未為劇冦也及獻賊據房竹山中自成往依焉獻賊謀殺之自成遁入蜀歳已卯自蜀潜入豫破洛陽始稱闖王辛已朱仙鎮明兵失利而後闖勢益熾壬午遂决河灌汴自是蘄黄諸冦皆争附闖而楚省諸郡以次告陷矣甲申之變距其稱闖王甫六年而明之亡也忽焉自古盜賊之禍人國未有若斯之酷者也睿親王提師入闗一戰而破賊衆二十餘萬賊膽落不能復支倉皇西遁復為豫親王所敗嗣後計無所出展轉于秦楚豫章之間而英親王又率兵躡其後轉戰襲擊凡六閱月而賊衆盡殱嗚呼非天威何以及此獻賊之滅後自成一年論者謂生民多難致使逋誅遺冦復逞其毁肢折骸之慘而肅親王指戈壓境賊旋授首視自成之滅為倍易今諸親藩建旄之烈行間將士戮力之勲具在國史回視前明君臣以全盛中原早夜圗賊而卒無救于覆亡之禍國運去而人事之顛倒隨之可為三嘆語云天之所滅不戰而自屈諸臣應景運而興驅除逆天之冦雖智勇過人亦憑藉朝廷威力者厚歟紀三路進師下雲南事世祖章皇帝既定天下十有五年山陬海澨悉𨽻土版獨偽晉王李定國擁偽永厯竊踞雲南久未歸命是年秋朝命多羅信郡王多尼為安逺大將軍平西王呉三桂為征西大將軍固山額真趙布太為征南將軍協師往征之王等抵貴州平越府議黔蜀皆入滇之路而黔之貴陽都勻蜀之遵義皆敵門户非分兵三路擊之不可於是定議信郡王自貴陽入呉三桂自遵義入趙布太自都勻入期以十二月會師雲南省城信郡王師至安莊衛偽將劉某率兵逆戰一戰斬其將餘衆奔潰追擊至盤江敵從鐵索橋渡江遁去既渡即縱火焚其橋我師不能濟先鋒白爾克圗及提督總兵張勇作浮橋濟師至七星闗偽鞏昌王白文選擁兵二萬餘扼險抗拒信郡王命諸將士分數道夾擊大敗之斬闗而入遂趨滇呉三桂師抵七星闗知文選拒守不能即下議出竒兵攻敵不偹於是由水西間道度闗襲擊其後文選方與信郡王軍相持聞平西軍忽襲其後大駭擁衆却步師入烏撒所過土司俱就撫固山額真趙布太師次羅顏渡敵兵方據羅顏盡沉渡口船以阻我師會思誠土司知府岑繼禄為鄉道乗夜取所沉船於下流十里外濟師既明敵乃知我師得渡一軍驚潰抵雙河口偽晉王李定國據山而陣全師皆在焉趙布太督諸將登山㧞其營山勢峻險為敵要害地既為我軍所奪進退無倚定國親率敵衆環列象陣四面仰攻我師合力擊之敵不能登盡獲其象敵退軍陸格樹柵以守凡三十餘營趙布太部署諸將令分三隊夾擊之敵三戰三敗力不能支㧞營而走我軍躡其後追北四十餘里斬獲無算定國遁去陸格之戰纛章京石漢巴圖魯梅勒章京多婆羅功居多時聞敵兵方據鐵鎖橋趙布太乃率大師取道普安州入滇十二月二十七日三路師俱集雲南省城外板橋十六年正月三日同入雲南府定國文選與偽永厯俱奔永昌三路師克永昌復奔騰越師渡瀘江大敗之遂克騰越追過南甸至孟村偽永厯等從三宣六慰路遁去㨗聞以地方需人詔今年秋再行會試三月命呉三桂移駐雲南六月頒賜三路兵八月丁邜以滇黔底定祭告天地太廟社稷十七年五月命以前明沐國公莊田分給平藩下壯丁人口七月復頒衣服鞍馬賜諸將士八月命内大臣公愛星阿為定西將軍征李定國十月調馬寧沈應時王輔臣楊武張國柱閻鎮張勇王永祚狄三品陳德為雲南各鎮總兵十二月増設平藩下副都統六貟十八年正月信郡王多尼薨行間貝勒尚善鎮國公巴漢俱獲罪降爵有差趙布太功為諸將冠以噶喇昻邦等敗北罪削職為民紀平水西事水西古羅甸鬼國在殷髙宗時為鬼方地傳襲歳久至漢寖大歴唐宋元明日益以蕃遂雄長諸蠻奄有數千里之土其地與滇黔蜀三省按壤其物産寳玉金貝其人皆猓蠻強悍善鬬歴代叛服無常前明天啟間蠻長安拜彥狡馬搆禍困黔一載至黔人相殺為食入滇道阻滇人不得已請間道于西粤用兵凡二十年卒未能克順治十五年王師既下貴州水西宣慰使安坤讋服天威俛首輸貢初實無叛志有大定總兵劉之福者誅求未遂心銜之會其國有喪其國俗皆被甲之福遣人責問水西大忿遂殺來使之福因白平西王呉三桂言猓猓有反狀三桂具疏請征以康熙元年秋進兵會貴州十二寨苗人反圍普安州之安籠守禦所於是我師先抵安籠冬月安籠平二年春入水西安坤年少國公車噶喇專政坤欲引罪出降車噶喇不聽遂偕坤走宜那噶我師深入叢林深箐綿亘數百里仰不見曰所賫僅一月粮軍士食且盡三桂大悔然勢不能復出乃令士卒分道擒生猓猓不畏刀鋸用炮烙刑逼取其粮糗又不繼則掘地大索隨所獲以支軍食相持一年始擒斬車噶喇于邁永底安坤走烏䝉烏䝉坤妻家所居地也三桂由烏撒率軍追擊之至烏䝉索坤不得坤復走水西行至深箐中與援𠞰總兵馬寧兵遇遂就擒其妻多智善變聞坤擒復走匿烏䝉㨗聞磔安坤于軍其族姓凡四十八支兵四十八萬俱分别收撫以隴胯的都垜你阿架四則溪為一府建府治于比喇改名平逺法戈火著木胯架勒四則溪為一府建府治于大方改名大定則窩以著雄所三則溪為一府建府治于水西城改名黔西又設威寧一府俱領以流官知府通判經歴各一𨽻貴州布政使司四府人民共一萬六千一百四十七戸田十萬二千三百九十七畝有竒地六萬六千四百十畝有竒徴米三萬七千一十九石有竒荍五千三百一十二石有竒平大黔三府稅銀八百五十六兩有竒黔省經制舊載有水西宣慰司報効米三千石烏撒土知府報効荍三百石畢節衛附征烏撒水田糧一百七十石有竒俱入新編粮額紀陜西官民殉闖難事前明崇禎十六年癸未流冦勢日猖獗時孫尚書傅庭總督三邊授尚方劍許便宜行事傅庭才具揮霍顧操下急失將士心是年冬率兵擊冦遇於河南之郟縣三戰三北賊兵乗勝西下遂破潼闗傅庭死於軍監軍道喬遷髙同及于難遷髙初由鞏昌守題補監軍事傅庭之鄉人也潼闗既破省城軍民駭亂開門降巡撫馮師孔按察使黄絅巡道周維新俱自縊長安知縣呉從義命家人某盡殺其妻孥衣冠望闕拜赴井而死其家人亦自刎咸陽副將劉元山賊至不屈接戰數日力不支死之至是賊勢益張合郡縣皆望風迎順賊乃僭號改元分遣賊將襲榆林寧夏甘肅寧夏最先降賊軍道經慶陽守道段復興山東人嬰城固守比破盡焚其家屬親提刀巷戰手刃十數賊力竭自刎賊至榆林總兵李昌齡凉州鎮番生員改習武以功陞總兵鏖戰數日軍食盡外援不繼城破率城中人乗夜走邊外賊躡其後一戰被獲賊迫之降且誘為前鋒冦北京許以封侯昌齡曰有人臣引賊而攻其君國者乎真天不覆地不載矣賊怒竟磔死甘州總兵馬爌山西代州人先以傅庭令馳詣軍前援𠞰比至而會城已陷爌孤軍不能自立於是勒兵還鎮過鞏昌召副將歐陽滚議曰今與君暫歸河西調遣士卒嚴守臯蘭保䕶肅邸可以徐圖恢復滚如約即携眷屬偕爌赴甘州是時人心惶惑爌飛檄調諸路兵無一應者及抵甘州距城不百里巡撫林日瑞福建人疑爌已附賊閉門不納爌遣使賫符印送日瑞因對諸將大慟曰爌今進退無路獨有一死耳汝等皆去吾不能復保汝矣爌哭衆軍皆哭日瑞聞之馳騎迎爌入商固守之䇿未幾賊將賀三風子者兵薄甘州峽口爌與日瑞堅壁誓死令副將郭天吉榆林人武進士偕滚率兵迎擊以逰擊哈維新都司萬峘為之䇿應賊遺書誘天吉降不聽與賊遇於新河灘初戰勝負未决越數日賊兵益増勢不能敵棄賊走甘州城意欲調集畨兵再戰乃援未至而副將崔某以夜半援賊兵登城而甘州失矣爌聞城破舉火焚家屬自帶佩刀見賊抗手上坐叛將崔某在側爌指之大罵曰負國賊世受國恩何忍至此賀賊語爌曰今日何以奉教於先生爌解佩刀與之曰以此教汝殺我須用吾刀因顧謂日瑞我等皆國家大臣除一死更復何言隨拂衣起北向再拜趣賊曰速殺我賊竟取所與佩刀殺爌并殺日瑞繼賊見天吉笑問之曰峽口之戰汝耶今日奈何天吉罵不絶口與峘俱被磔維新及都司髙登科同知藍臺通判鄭安國俱自刎滚闔室自焚其時同與難者流寓則原任肅州道劉佳貞在籍則通判陳嘉績知縣段自宏陸一桂俱至死罵不絶聲總兵王汝金趙官羅俊傑副將劉國柱劉國棟叅將哈俊游擊李如璋趙用彬任汝威吕承宫張應舉楊威都司守備曹爾謙趙宗祀景桂芳陳一魁賀圖麟王嘉官蕭榮華蔡俊世職指揮千百戸鄭世夀傅宏祚毛國泰趙應魁汪世爵皆各擁家丁血戰而死生員呉伯延童士楷義民梁進徳節婦董氏等皆以不屈盡節時癸未十二月二十七日也順治三年甘撫黄公圖安曾列名請䘏而未悉其事實余友何君獻瑞言李公馬公被難状較詳因㨿所聞書之如此嗚呼明之亡也文吏以僕𨽻視將帥朝士以秦越人視封疆之臣羽書旁午閴然無一應卒致烏合之勢如燎原之不可撲滅可悲也夫潼闗敗衂八郡望風而靡河西孤墉逺寄邊鄙其不能以一木攴大厦諸將士寧不知之然而登陴固守臨難恊心迄乎力窮就縳抗手唾罵剖肝屠腸略無怖色豈歐陽氏所謂忠義之氣獨出於武夫戰卒者欤及今三十年而其英烈炎炎如嚴霜皦日真可與顔段張許争不朽於青史矣紀順治間錢糧數目從來創業之主亨有勝國之資不煩征歛而國用滋富漢之承秦唐之承隋明之承元皆是道也惟宋當五代紛争之後海内衰耗差遜漢唐而左藏之庫積金如山則猶有餘蓄馬前明之末粃政厲民始以軍興旁午議加遼餉繼以民貧盜起復加𠞰餉繼以各邊抽練復加練餉催科無藝中外蕭然迄國家以仁義之師入闗靖冦而中原赤子業已析骸齩骨於百戰之餘其所謂内庫之帑藏又已盡罹賊刼蓋實遺我一空虚之國也世祖章皇帝既定大業袵席疲民下詔首除三餉如拯焚溺繼定賦役全書一準前明萬厯中年舊額稅斂亦綦薄矣獨是多方未靖虎旅四征今年下兩浙明年定八閩又明年克楚蜀克兩粤輦金輸粟相望於道方順治八九年間歳入額賦一千四百八十五萬九千有竒而諸路兵餉歳需一千三百餘萬加以各項經費二百餘萬計歳出至一千五百七十三萬四千有竒出浮於入者凡八十七萬五千有竒至十三年以後又増餉至二千萬嗣又増至二千四百萬時額賦所入除存留項欵外僅一千九百六十萬餉額缺至四百萬而各項經費猶不與焉國用之匱乏蓋視前代為獨甚而我先皇帝愛民如子必不忍為苟且目前之計於額賦外少加毫末汰冗員抑繁費躬行儉約為天下先自親政以後在宥十年术嘗興一不急之工採一玩好之物軍需浩穰悉取給於節省之餘而發帑金以振凶荒賜田租以甦疾困數歳之中詔書屢降自古開創之主寛仁恭儉未有若斯之盛者也謹録十七年歳入之數如左後之覽者仰惟先皇帝忠厚開基損上益下其經營締造之難如此庶幾聖子神孫席履豐盛而益務息民重農减征寛賦其司國計者壹意以禀法師儉輔導聖明則祖宗撙節愛養之物力不致委棄於土木甲兵而人殷物阜可與成康比隆也已元年鹽課制錢共銀二十二萬零六百三十七兩一錢九分一厘二年鹽課制錢共銀一百萬零六十二兩三錢九分四厘三年鹽課制錢共銀二百十四萬二千九百五十五兩一錢一分一厘四年鹽課制錢共銀三百零九萬八千七百四十六兩二錢八分四厘五年鹽課制錢共銀三百二十九萬九千九百五十五兩二錢五分七厘六年鹽課制銀共銀三百九十五萬一千九百零七兩八錢五分四厘七年鹽課制錢共銀七百八十五萬七千零十七兩一錢六分四厘七年以前可考者鹽課制錢而已其餘錢糧未經奏銷無可稽考八年直𨽻福建河南江西湖廣山西廣東有地丁銀米數江南陜西浙江山東有銀米數無地丁數廣西初定八年分銀米數彚入九年四川雲南貴州未闢計丁田二項並雜稅鹽錢共實征銀二千一百一十萬一百四十二兩有竒九年江南有銀米地丁數廣西有銀米數無地丁數餘同八年計丁田二項並雜稅鹽錢實征銀二千一百二十六萬一千三百八十三兩五錢有竒十年四川有銀米地丁數餘同九年計丁田二項並雜稅鹽錢實征銀二千一百二十八萬七千二百八十八兩四錢十一年各省有無數目同十年計丁田二項並雜稅鹽錢共實征銀二千一百六十八萬五千五百三十四兩九錢有竒十二年廣西銀米蠲免餘同十一年計丁田二項並雜稅鹽錢共實征銀二千二百萬五千九百五十四兩有竒十三年各省有無數目同十二年計丁田二項并雜稅鹽錢共實征銀二千二百八萬九千六百九十六兩三錢有竒十四年浙江有銀米地丁數陜西廣西有銀米數無地丁數餘同十三年計丁田二項并雜稅鹽錢共實征銀二千四百三十六萬六千三百六十五兩七錢有竒十五年貴州有銀米數無地丁數餘同十四年計丁田二項并雜稅鹽錢共實征銀二千四百五十八萬四千五百二十六兩四錢有竒十六年雲南有地丁銀米數餘同十五年十七年同十六年計丁田二項并雜稅鹽錢共實征銀二千五百六十六萬四千二百二十三兩二錢有竒紀順治間戸口數目古者司民掌登萬民之數自生齒以上皆書於版歳登下其死生三年大比而民數上於天府則王者拜而受之其重民如此戸口之有算賦非古也有田則稅有身則役未有既役之復稅之者也公家之事國中自七尺以及六十野自六尺以及六十有五皆征之其貴者賢者能者服公事者老者病者皆舎亦以歳時上其書是則生齒之數與力役之數當各有籍而非以賦役之多寡為生齒之贏絀也自西漢初有口錢算賦而戸口之賦以起歴代相沿未變獨所紀戸口登耗之差不知自生齒以上悉紀之歟抑收口錢算賦然後列於丁男之數歟如以口錢算賦為紀則民間漏籍不可勝指而即据此以為贏絀可歟隋制男女三歳以下為黄十歳以下為小十七歳以下為中十八歳以上為丁六十為老唐制始生為黄四歳為小十六為中二十一為丁六十為老不知隋唐所紀戸口抑自黄口以上悉紀之否歟我國家戸口冊仍前明黄冊之制分舊管新收開除實在四則以田土從戸口分豁上中下三等立軍民匠竈等籍而役之輕重凖焉顧西北土滿人稀隠避恒寡東南則有田然後有丁其載諸冊籍者皆實輸丁糧之人而一戸之中生齒雖盛所籍丁口率自其髙曽所遺非析産不増丁則入丁籍者常不過數人而已其在仕籍及舉貢監生員與身𨽻營伍者皆例得優免而傭保奴𨽻又皆不列於丁則所謂戸口登耗之數於生齒之贏絀総無與也夫丁之不能無隠避者勢也東南之賦繁役重極矣欲審丁以増賦雖奸無所容而民益不堪命是虐政也按黄册載某户丁幾名於某丁下注男婦若干口而捴數專載實在當差丁若干名似宜變通昔人之法分為二冊一載實在當差丁共若干名一載不當差人口共若干名以為毎嵗登耗之騐其輸丁糧者俾日増月盛不至有流移轉徙之患而不輸丁糧者亦生息蕃衍有登而無耗則民氣盛而國勢強庶幾乎王政矣頃康熈九年以省無益之費議令罷造黄冊夫毎縣造冊煩費罷之良是然而各省布政使司彚造簡明冊開列人丁戸口總數上之天府以示重民事之義倘亦古人存餼羊之遺意乎兹紀順治間戸口數如左我國家幅員以次開拓自十六年雲貴下而後輿地盡入版圗故户口亦歳有増益而世祖章皇帝休養疲氓勝殘去殺仁漸義育者十八年然後兵燹孑遺之民得悉宥於成周太和之治則夫奕葉而後所以保有元元者可無慎歟順治元年至七年人丁戸口無可考八年實在當差人丁户口一千六十三萬三千三百二十六丁九年實在當差人丁戸口一千四百四十八萬三千八百五十八丁内審増五萬五千五百九十二丁十年實在當差人丁戸口一千三百九十一萬六千五百九十八丁内審増五萬四百七十丁十一年實在當差人丁户口一千四百五萬七千二百五丁内審増二十二萬四千七百五十四丁十二年實在當差人丁戸口一千四百三萬三千九百丁内審增二十六萬九千三百百一十丁十三年實在當差人丁戸口一千五百四十一萬二千七百七十六丁内審増二十五萬六千三百一十五丁十四年實在當差人丁戸口一千八百六十三萬二千八百八十一丁内審増九萬四千三百四十四丁十五年實在當差人丁戸口一千八百六十三萬二千八百八十一丁内審増九萬四千三百四十四丁十六年實在當差人丁戸口一千九百萬八十九百一十三丁内審増二十五萬五千九百一十八丁十七年實在當差人丁戸口一千九百八萬七千五百七十二丁内審増一十一萬二千七百二十丁張文貞集巻七
