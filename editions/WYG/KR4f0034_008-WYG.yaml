body:
  text: 張文貞集巻八大學士張玉書撰紀昭代樂章順治元年八月世祖章皇帝車駕至燕京九月朔即皇帝位將以十月告祭天地宗廟社稷時樂章未定大學士臣銓臣承疇臣陞上言郊廟社稷樂章前代皆各取佳名以昭一代之制漢魏曲名各别不可枚舉梁用雅北齊及隋用夏唐用和宋用安金用寧元郊社用成宗廟用寧明用和今我朝削平寇亂以有天下有與萬邦黎獻共享太平之義樂名宜更用平其節則郊社九奏社稷七奏宗廟六奏制可爰命翰林諸臣分撰樂章撰定命太常寺頒示樂舞諸生以時肄習焉今考各壇廟樂章其辭明肅簡穆取乎達將享之忱洽幽明之德而非靈芝宛馬白麟赤蛟諸歌誇竒瑞於天神人鬼之前者可比此所謂古樂之遺音宫懸之雅奏也臣玉書謹案廟樂始于三頌詩序所謂美盛德之形容以其成功告於神明者也商頌自有娀及契以迄成湯武丁周頌自后稷太王以迄文武成康皆發揚其文德武功之盛以達于詩歌藏于太府漢郊廟詩樂不及祖宗之事則班固譏焉晉泰始中傅𤣥製登歌七章分祀七廟自是歴代相沿皆各有廟室之樂蓋禮不忘其本樂樂其所自生古之義也洪惟我太祖高皇帝肇造丕基臣服之國三十有二太宗文皇帝益纘而光大之迄世祖章皇帝底定方夏混一寰區文德武功皆前代所未及謂宜各製廟樂發皇盛治庶幾祖宗艱難創垂之烈得以昭示來兹而徒取籩豆祼享之辭徹諸神聴得毋于形容盛美之誼猶有闕焉者與謹按典制元㑹樂作于殿上名曰莽式所陳皆昭代故事率以滿洲舊臣充其選有旌旄弓矢躍馬涖陣之容有屈伸進反俯仰疾徐之節特以歌辭無漢音未遑頒之太常俾樂工肄習竊以為應命儒臣援据其事撰譯歌詩為高廟樂文廟樂而更益以入中原靖羣寇諸舞為世廟樂聲容悉備事實而律諧則太和洋溢之氣塞于宇宙而國運之寖昌寖熾可以預卜矣冬至大祀天于圜丘迎神奏始平之章敬承純祐兮於昭有容時維永清兮四海攸同輸忱元祀兮從律調風穆將景福兮鏡履㣲功淵思高厚兮恐負洪則聿章􅃔序兮夙夜宣通雲軿鸞輅兮忽降中壇翠旗紛裊兮列缺豐隆肅始和暢兮慶洽陶匏百靈祗衛兮齋明辟工恭仰德徽兮神來燕喜協昭慈恵兮逖鑒予衷奠玉帛奏景平之章靈旂爰止兮捧玉筵執事有恪兮駿奔前有美珪璧兮薦𤣥纎經緯䕶理兮耀瑚璉來格洋洋兮思儼然孔忱翼翼兮告中䖍進俎奏咸平之章昇餚珍錯兮列豆籩吉蠲為饎兮格重𤣥九州美味兮薦膏鮮特牲潔敬兮苾芬筵願垂降鑒兮駐雲軿錫嘉福兮億萬斯年初獻奏夀平武功舞之章玉斚肅陳兮明光桂漿初醖兮信芳臣心迪恵兮捧觴醴齊載德兮馨香靈慈嶶眷兮矞皇勤仰止兮斯徜徉亞獻奏嘉平文德舞之章考鐘拂舞兮再進瑤觴翼翼昭事兮次第肅將睟顔容與兮蒼几煇煌穆穆居歆兮和氣洋洋生民望澤兮仰睨玉房榮泉瑞露兮慶無疆終獻奏雍平文德舞之章終獻兮玉斚清肅秬鬯兮薦㣲忱磬管鏘鏘兮協氣升盈盈旨酒兮勿替思成尚其醉止兮懐嘉生八龍蜿蜒兮穆羽和鳴徹饌奏熈平之章盥薦畢兮精白申虞嬿媟兮勞我神百辟肅雍兮傾罍樽福施下逮兮宜佑人民送神奏太平之章嘉德夙成兮晻藹壇塲穆思迴盼兮雲駕洋洋山河日月兮孔明深高青龍按節兮白虎低昂靈鈞滌蕩兮妖孽潛消吾求時恵兮感慮馨香鳴玉鏗金兮肅若有望紫壇嶻嶪兮􅁮􅁮煌煌臣乗寳厯兮載須我輔願䝉博産兮河岳鍾良天施地育兮不可殫究殖我嘉師兮沐浴休光望燎奏安平之章雷車電邁兮飛逺揚有䖍秉火兮􅌊越芳繁㑹賁鏞兮奮龍旂畀爾昌熾兮降蕭光烝民歌福兮富夀康予獲疇祉兮萬億斯皇順治五年冬至郊奉太祖武皇帝配享十四年奉太祖太宗並配正月上辛祈榖于上帝迎神奏中平之章惟帝勤民兮求莫匪舒小民何依兮黍稷與與元日有事兮百辟趨為民請命兮口食咸需遙瞻龍駕兮歴紫虚日臨黄道兮東風徐臣深昭事兮遑寧居願垂嘉恵兮大有書奠玉帛奏肅平之章民天惟食兮農事先粒我烝民兮賴重𤣥風霆流形兮雨澤霑實穎實栗兮氣化全玉帛祗奏兮禮祀䖍仰祈寰宇兮享豐年進俎奏咸平之章鼎烹兮苾芬嘉薦兮無文奉雕俎兮大武羶薌達兮氣干雲昭普存兮民力惟明德兮馨聞初獻奏夀平武功舞之章初獻兮𤣥酒盈著誠致潔兮犠尊盛儼對越兮在上惟昭明兮有融瑟黄流兮玉瓚帝心歆假兮賫嘉禎亞獻奏景平文徳舞之章著尊啟兮告䖍清酤次第兮舉前禮再獻兮肅拜列瑤觴兮秩斯筵神悦懌兮如在恵我嘉生兮福便便終獻奏永平文德舞之章終獻兮太尊移苾芬嘉㫖兮圭瓚交馳神既醉只兮錫祉禮成於三兮陳詞願洒餘瀝兮沐羣黎臣拜手兮望雲霓徹饌奏凝平之章俎豆具陳兮庶品齊舉荷昭鑒兮靡或遺饌告徹兮玉几登歌洋溢兮式禮無違肅㣲忱兮告終事上帝居歆兮錫純禧送神奏清平之章祗奉天威兮弗敢康小心翼翼兮昭穹蒼雲垂九天兮露瀼瀼翠旗羽節兮歸何鄉臣拜下風兮意徬徨願沛汪澤兮時其雨暘望燎奏太平之章翹首兮天閶邈被雲海兮何蒼茫􅌊蕭束帛兮薦馨香精誠感格兮降福穰四時順敘兮百榖以昌臣同兆姓兮感荷恩光順治十四年正月祈榖奉太祖配十五年奉太祖太宗並配是日以太常音樂錯亂嚴飭之祈榖禮舊行於大享殿至十七年諭孟春於大享殿行合祀禮因改祈榖於圜丘合祭配祀共十二壇十八年後罷合祀仍祈榖於大享殿順治十四年二月又命建享殿於禁城内祀上帝亦奉祖宗並配康熈初罷夏至祀地於方澤迎神奏中平之章吉蠲兮玉宇開薰風兮自南來鳯馭紛兮後先岳瀆藹兮徘徊肅展禮兮報功沛靈澤兮九垓奠玉帛奏廣平之章神州吉土兮中壇毖我元祀兮孔嚴辟工趨蹌兮潔蠲考鐘伐鼓兮肆筵黄琮纎縞兮陳列雲光下燭兮誠悃宣進俎奏咸平之章玉俎金奏兮未央嘉餚有踐兮大房牲牷告歆兮惟恪民力普存兮肅將厚載資生兮無外几筵俯鑒兮洋洋初獻奏夀平武功舞之章匏尊泛齊兮朝踐揚博碩升庖兮鼎方清風穆穆兮靈旗張神明和樂兮舉初觴洽百禮兮禋祀罄九土兮平襄亞獻奏安平文德舞之章江茆兮縮漿山罍雲羃兮馨香介黍稷兮芳㫖再展㣲誠兮趨蹌樂成八變兮樂只儼皇祗兮悦康終獻奏時平文德舞之章方壇兮豐薦盈㫖酒思柔兮中和平陟降從容兮駐雲軿禮成三獻兮捧玉觥含𢎞光大兮德厚靈佑丕基兮永清徹饌奏貞平之章樽俎畢兮誠未虧黄琮告徹兮儀景輝晏隂定兮邀靈錫南訛秩兮徧薰時肅惟昭明兮孔邇覃博厚兮載羣黎送神奏寧平之章靈旂兮雲際屯飛龍兮逝駸駸隂儀粹兮體親眷四海兮無塵配𤣥穹兮化宣綏百祿兮烝民望燎瘞重舉送神順治十四年三月壬子奉太祖太宗並配方澤詔赦天下春分朝日迎神奏寅曦之章於昭兮旭輪浴虞淵兮初升春已融兮交泰循典禮兮惟馨焫蕭艾兮祗肅神其聼兮和平奠玉帛奏朝曦之章神來格兮太乙東統萬國兮玉帛同肅将享兮承筐篚盥以薦兮孚有顒初獻奏清曦武功舞之章御景風兮神式臨酌清酤兮椒其馨爵方舉兮歌且舞憑龍勺兮吹鳯笙亞獻奏咸曦文徳舞之章再舉奠兮鬱金香嘉樂合兮舞洋洋神飲食兮意徜徉容貌舒兮和以康終獻奏純曦文徳舞之章式禮未竭兮還升終以告䖍兮醁醽願神且留兮鑒茹以侑以勸兮至誠徹饌奏延曦之章儀既成兮物已饗神欲􅁸兮運靈夾徹不敢遲兮慎趨蹌照臨下土兮常朗朗送神奏歸曦之章雲車征兮風馬翔驅馳千仭兮臨萬方再拜稽首兮稱送神振轡兮當陽中天麗兮徹隐普天戴兮恩光敷和煦兮成物錫萬寳兮永康報神功兮時享祈神祐兮悠乆無疆秋分夕月迎神奏迎光之章猗與太陰兮御望舒式遵九道兮遊清虚伏惟姊兮從兄車今之夕兮來享予奠玉帛初獻奏升光之章有來雍雍幣帛在陳琮璜以加明徳惟馨式舉黄流兮挹犧尊籩豆静嘉兮肴核芬亞獻奏瑤光之章二齊載升維以告䖍歌管煌煌奉神之懽荷亘古兮麗天報之徳兮几筵終獻奏瑞光之章一敬畢伸三舉願釂誠信潔齊天下有道鼓鐘簡兮聲容並茂象大徳兮厥光皓皓徹饌奏函光之章其香既歆對越告成儐爾登豆敬受駿奔神恱懌兮意欣欣予翼慎兮安以寧送神奏保光之章駕彩霞兮􅆖景星御和風兮躡慶雲神欲起兮不冄停瞻天衢兮拜雲程影蹁躚兮光澄清饗予祀兮意殷勤予所祝兮世太平偃武脩文兮萬世長春順治八年以前日月從祀天壇裁春秋二祭八年六月允禮部請於從祀外仍行朝日夕月禮如舊典春秋二丁日祀先師孔子迎神奏咸平之章大哉至聖峻徳元功敷文衍化百王是崇典則有常昭兹璧雍有䖍簠簋有嚴鼓鐘奠帛初獻奏寧平之章覺我生民陶鑄前聖巍巍泰山實予景行禮備樂和豆籩惟静抒頌六經爰斟三正亞獻奏安平之章至哉聖師天授明徳木鐸萬年式是羣辟清酒維醑言觀秉翟太和常流英才斯殖終獻奏景平之章猗歟素王示予物軌瞻之在前神其寧止酌彼金罍惟清且㫖登獻惟終弗遐有喜徹饌奏咸平之章辟水淵淵崇牙嶪嶪既歆宣聖亦儀十哲聲金振玉告兹將徹鬷假有成羮牆靡愒送神奏咸平之章煌煌學宫四方來宗甄陶胄子暨予㣲躬思皇多士敷奏厥功佐予永清三五是隆順治二年正月從祭酒李若琳請更先師孔子神牌為大成至聖文宣先師孔子十四年三月復為至聖先師孔子九年九月辛夘上幸太學釋奠十七年正月復以文廟工成親祭春秋二戊日祀太社太稷迎神奏保平之章猗歟土榖兮功化隆烝民立命兮九域同壇壝儼肅兮風露通新邑翼翼兮俎豆豐望烟駕兮驂鸞龍秉圭植璧兮予親躬初獻奏夀平之章隂祀黝牲兮元郊同清酤既載兮臨齊宫朝踐初舉兮予𠂻洋洋在上兮錫福洪亞獻奏嘉平之章樂具入奏兮聲煌煌兕觥其捄兮恭再揚厚德配地兮佑家邦屢豐年兮兆庶康終獻奏雍平之章方壇北宇兮神中央盈庭帗舞兮時低昂酌醑三爵兮綠醑香新􅃇邦兮命溥將徹饌奏熈平之章籩豆大房兮儼成行歆此吉蠲兮猶迴翔椒漿瑤席兮徒芬芳黍稷非馨兮悦且康送神奏成平之章孔蓋翠旌兮隨風颺龍輈容與兮指天閶咫尺神靈兮隔穹蒼流景祚兮卜世昌望燎奏安平之章牲玉陳兮延景光百禮既洽兮終瘞藏願神聴兮時予匡四海攸同兮恵無疆春秋二仲祀歴代帝王迎神奏雍平之章乗時運兮極隆造經綸兮顯融搃古今兮一揆貽大寳兮㣲躬仰徽猷兮有嚴閟宫儀羣帝兮後先予稽首兮下風奠帛初獻奏安平之章靈之來兮儼若盈予仰止兮在庭承筐篚兮既登偃靈葢兮結翠旌鑒予情兮忻享薦芳馨兮肅成景行兮六龍嘉氣兮曈曈奠犧樽兮以笙以鏞羣工肅兮屏營恵我懿則兮允中亞獻奏中平之章二觴兮酒行諸帝熙和兮悦成念昔致治兮永清瞻龍衮兮自天紹錫兮嘉平終獻奏肅平之章瑤爵兮獻終萬舞洋洋兮沐清風龍鸞徐整兮企予嗣㣲音兮何從盼雲車兮緩移示周行兮迪予衷徹饌奏凝平之章饁餚蒸兮畢升五音㑹兮滿盈禮將徹兮䖍告鑒孔忱兮載翼載登送神奏夀平之章旛幢繚繞兮動回風和鸞並馭兮歸天宫五雲擁兮高馳翔願迴靈盼兮錫年豐望燎奏清平之章羣龍驂駕兮一氣中焄蒿芬烈兮實㝠通望神光兮遙燭惟終古兮是崇順治二年議歴代帝王廟祀禮臣言宋曾納貢於大遼稱姪於大金則宋之天下乃遼金分統南北之天下也廟祀不得獨遺至元世祖之有天下功因太祖未有世祖入廟而太祖不入者亦應追祀詔從之於是祀伏羲神農黄帝少昊顓頊高陽高辛唐堯虞舜夏禹商湯周武王漢高祖光武唐太宗宋太祖遼太祖金太祖世宗元太祖世祖明太祖共二十二帝其從祀功臣則風后力牧臯陶龍伯夷䕫伯益伊尹傅説周公旦召公奭太公望召穆公虎方叔張良蕭何曹參陳平周勃鄧禹馮異諸葛亮房𤣥齡杜如晦李靖李晟郭子儀張巡許逺曹彬潘美韓世忠張浚岳飛赫嚕尼堪斡里雅布穆呼哩巴延徐達劉基共四十一人十七年六月御史顧如華請奉守成賢君入廟下禮臣議商中宗高宗周成王康王漢文帝宋仁宗明孝宗皆屬賢君但帝王廟止祭創業之君不及守成應否入廟候㫖酌定詔奉七君入廟其遼太祖金太祖元太祖原未混一天下且行事不及諸帝王令罷祀從祀功臣罷宋潘美張浚亦允如華請也順治十四年二月丁酉上親祀帝王仲春祀先農迎神奏永豐之章勾芒秉令土牛是驅天下一人蒼龍駕車念彼田疇民命所需生成有德尚式臨諸奠帛奏登豐之章先農神哉耒耜教民田祖靈哉稼穡是親功德深厚天地同仁肅將幣帛肇舉明禋初獻奏時豐之章厥初生民萬彚莫辨神錫之庥嘉種乃誕執兹醴齊濯功益見玉瓚椒醑肅雍舉奠亞獻奏咸豐之章上原下隰百榖盈止福我烝黎秀良興起樂舞具備吹豳稱兕再躋以獻肴馨酒㫖終獻奏大豐之章糜芑秬秠維神所貽以神饗神曰子將之秉耒三推東作允宜五風十雨率土何私徹饌奏屢豐之章於皇農事自古為烈莫敢不承令兹忻悦籩豆既豐簠簋云潔神視井疆執事告徹送神奏報豐之章麻麥芃芃秔稻連阡縱横萬里皆神所贍人歌鼓腹史載有年嵗有常典茀祿綿延望燎奏慶豐之章玉版蒼幣來鑒來歆敬之重之藏於厚深典禮由古予行自今樂樂利利國以永寧順治十年五月丙辰時享太廟迎神奏貞平之章皇輿啟圖世德欽崇粤庇𦕈躬率土攸同冀州維宅爰止自東太室既尊萬國朝宗翼翼孝孫對越新宫維神格思皇靈顯融初獻奏夀平之章於皇祖考克配上天越文武功四方維宣孝孫受命達志重𤣥永錫純祐億萬斯年亞獻奏嘉平之章毖祀精忱洋洋如生有融昭明陟降于庭僾然有容愾然有聲孝孫䖍只顒若中情終獻奏雍平之章越祖宗之德肇兹天厯敢曰予小子享有成績欲報其德昊天罔極慇懃三獻我心悦懌徹饌奏熙平之章儀肅樂成神燕以娛告成于祖亦佑皇妣敬徹不遲用終祀禮介福綏祿永錫祚祉還宫奏成平之章盈溢肅雍神運無迹寢祐静淵恍兮安適厥靈在天厥主在室於萬斯年孝思無歝嵗暮祫祭太廟迎神奏貞平之章承眷命兮撫萬邦嗣丕基兮祖徳昌溯謨烈兮弗敢忘䖍嵗祀兮舉舊章瀝悃誠兮迓休光祈來格兮意徬徨奠帛行初獻禮奏夀平之章紛葳㽔兮神畢臨儼對越兮抒素忱陳纎縞兮有壬林酌醇酤兮薦德馨恪溥將兮俶來歆錫嘉祉兮祐斯民亞獻奏嘉平之章維􅒊祥兮德配天垂燕翼兮祚萬年潔豆籩兮秩斯筵載陳醴兮介牲牷協笙鏞兮遶雲軿肅駿奔兮中彌䖍終獻奏雍平之章椒飶芬兮神留俞節三奏兮㫖清醑萬羽干兮樂孔都禮明備兮罔敢渝既醉止兮咸樂胥永啟佑兮披皇圖徹饌奏熈平之章典儀敘兮神格思樽俎將兮享靡遺悦且康兮徹弗遲鑒精禋兮茀祿綏還宫奏清平之章孝思展兮禮告成神言歸兮陟在庭萃龍馭兮返穆清主肅將兮式丹楹瞻列聖兮僾容聲迴靈盼兮佑丕承維神聴兮和且平繼序皇兮亶休徵順治十六年禮部議允副都御史袁懋功請以嵗暮祫享太廟十七年三月詔每嵗萬夀元旦俱奉四祖神主合祭於奉先殿位次如太廟祫祭奉先殿初建於十四年更建於十七年九廟除夾室外增建敞殿九間孟春歳暮祀太嵗月將之神迎神奏保平之章吉日良辰祀典孔殷於維太嵗月將諸神乗時秉德輔國佑民遙遙龍馭頓轡九閽壇壝蠲潔延佇來臨奠帛初獻奏安平之章維神至止螭駕雲旂洋洋在上元景延禧束帛承筐展我誠斯神示昭鑒尚其勿遺神兮弭節薦馨敢後祀事方初陳饋捧酧晨光熹㣲嘉祥承候百禮不愆樂具入奏亞獻奏中平之章以我齊明率禮攸行載拜稽首㫖酒斯盈牲牷肥腯交彼神明樽罍上下奏駿思成終獻奏肅平之章執事有嚴品物斯備非馨黍稷用宣誠意朱絃登歌絲衣揚觶予胥樂兮神錫爾類徹饌奏雍平之章春祈秋報嵗省惟勤含醇飲德孰匪明神惟神臨御肸蠁逡巡獻酬云畢誠敬斯申送神奏宣平之章出令明堂神爽卒度報功迎氣崇祀其作神人以和既康且樂瞻望景光邈彼寥廓外國紀自昔幅員之廣臣服之衆漢與元為最盛漢自置越嶲諸郡通使大夏而西極逺蠻咸相繼引領内鄉然而師老財匱叛服靡常則黷武之禍論者譏焉元祖滅國四十次平西夏武功之赫極矣獨是諸國既滅其地遂虚今考元史所載邊沙以外嵗時輸貢者未之聞也惟我國家肇迹東陲誕膺天眷太祖高皇帝以神武懾服羣雄太宗文皇帝以寛仁懐柔與國時外藩君長擁衆部居廬帳相望者不啻數什計而兩聖相承貳執服舍師行所至往往稱天以臨而絶無利其土地私其民人之意以故諸藩服畏威戴德大則刑牲約誓小則納欵貢珍二十餘年間接踵稱臣惟恐以後至膺逆天之罰嗚呼何其盛也迨世祖章皇帝建鼎燕都版章益廓維是逋誅遺寇尚煩干戈其他傒后之民則詔書所至無不稽首嚮順者末年大告武成聲教四訖於是山海諸部皆不煩鞭箠遣使而至闕下矣至于外藩䝉古則嵗加宴賚廣示推恩親親之誼柔逺之仁十八年如一日焉今紀諸國及諸部落名目間據見聞以其事附紀於下東極於使鹿使犬西極於厄内忒黑土魯畨北極於喀爾喀俄羅斯南極於琉球暹羅其為道里不可以數計而皆以德服而不以威取則自漢以來所未有也頃我皇上仰纘祖宗謨烈招徠逺人化洽中外安南黎莫搆兵廷議欲致師聲討而廟算遣兩使臣馳傳往諭不煩一旅而交夷帖息聖德廣大齊於覆載嗣是以往當更有前代未臣之地陸讋水慓奔走而來賔者矣薩哈連部落卦爾察部落薩哈爾察部落索倫部落東方格克里部落東方巴牙喇部落東果瓦爾喀部落虎爾哈部落虎什喀里等八姓以上俱滿洲屬部科爾沁國自天命以來與我世為婚姻之國其最著者為土謝圖親王卓禮克圖親王郭爾羅斯部落扎穆蘇鄂爾多斯部落在陜西邊外順治八年多爾濟等入寇固山額真噶達洪等大破之于賀蘭山等處康熈十四年榆林寇亂多羅温郡王古禄遣都統扎木素等統兵擊賊貝子達爾禮又遣台吉二十六員同榆林官兵恢復龍州進靖二堡寧夏花馬池定邊寇亂貝勒索柰遣發各台吉都統回寧夏提督官兵圍困花馬池擊敗定邊賊兵有七旗殺虎口外至靖邊莊浪等處皆是與厄魯得相接杜爾伯特部落以下皆在科爾沁之後扎賴忒部落吳喇忒部落杜稜楮冲赫毛竒塔撻綽爾濟喀喇齊領楊古兒烏朱穆秦部落秉圖王車臣王俱王號此部與喀爾喀相接與蒿齊特近以上俱天命間附察哈爾國元之後即所謂察罕也天聰間附其王曰阿布鼐尚主為和碩額駙後得罪禁錮盛京命其子布爾尼嗣爵康熙十四年布爾尼謀反舉兵入犯命大將軍副將軍率兵討逆盡滅之布爾尼遁走為科爾沁國所執獻馘于京師上念為公主所生詔免懸首土黙特部落土黙特喀爾喀喀喇沁皆察哈爾國屬部前明時封為順寧王天聰間附順治八年以法古穆隨其父舉國來歸屢立戰功授鎮國公在張家口外又有歸化城土黙特别為一部扎魯忒部落噶爾瑪塞望顧穆翁牛忒部落阿蘇忒部落扎魯忒三部為土黙特屬部喀爾喀部落極北其族有五部其人物著者為顧雷汗扎薩克圖汗土謝圖汗車臣汗畢習勒圖汗那穆齊衛徵那顔楮魯睦諾爾含津喀爾哈台吉汗等嵗時貢馬不絶于道特其人桀驁時闌入邊境掠我巴林屢降諭嚴飭令贖罪通好順治十年命安郡王岳樂為宣威大將軍駐防庫黑城亦禦喀爾喀兵也十二年七月命安郡王同喀爾喀使臣于宗人府約誓修睦十七年定例土謝圖汗車臣汗畢習勒圖汗每嵗入貢一次白馬八匹白駝一隻管固山汗貝勒及為首台吉大臣喇嘛等許至京師餘俱停止喀爾喀貢使較他部獨多八年八月多至八百餘人奈曼部落按元史元太祖與乃蠻部凡數十戰其音相似豈其苗裔耶其人物著者則有綽博恵搜塞阿林沖額爾得尼温冲敖漢部落桑噶爾額林臣墨勒根克西克騰部落台吉雲敦沙里四子部落順治三年追𠞰蘇尼忒部有功蘇爾尼部落喀喇徹里克部落喀喇徹里克又奈曼所屬也喀喇沁部落扎薩克圖顧祿世希在喜峰口外即朶顔三衛其部長即前明時都督都指揮也伊蘇忒部落伊蘇忒為喀喇沁屬部阿霸垓部落固倫公主下嫁噶爾瑪索訥木又有嫩阿霸垓嫩河名蒿齊特部落順治七年有台吉噶爾篤撒望楚虎爾率所部千餘人來歸夜黑部落即前明時所謂北闗也四部舊俱屬科爾沁哈達部落南闗兀喇部落輝發部落使鹿部落極東過索倫東南即老察東北即使鹿使犬使犬部落極東厄魯得部落在西北其主為顧實汗崇奉達賴喇嘛順治九年九月詔遺承澤親王賫書迎達賴喇嘛來都十二月達賴至十年歸國詔封顧實為遵行文義敏慧顧實汗達賴為西天大善自在佛掌天下佛教普通瓦赤喇呾喇達賴喇嘛俱賜冊印湯古忒部落在西南即所謂小西天者是也其俗尊喇嘛喇嘛有二種以㡌為别達賴黄帽大寳法王紅帽二寳法王花帽三寳法王黑帽湯古忒汗尊大寳二寳三寳法王厄魯得顧實汗尊達賴顧實汗憾湯古忒汗不遵達賴之教因逐其汗并逐大寳二寳三寳法王於是大寳二寳兩法王自雲南來歸於我今大寳法王復從達賴之教二寳法王仍在雲南湯古忒及厄内忒黑圖白忒俱厄魯得所屬厄内忒黑部落極西大西天圖白忒部落賜達賴冊文用圖白忒部落字即湯古忒以上俱天聰間附蘇尼忒部落沙克查騰機思奔巴世希騰機忒順治三年五月騰機思叛命和碩徳豫親王多鐸為掦威大將軍同承澤郡王碩塞等征之斬首千級俘獲八百餘人騰機思兄弟俱就擒八月班師出師未及三月凡畧地四千餘里朝鮮朝鮮自天命中通貢累世獲罪於我明毛文龍又密邇其地竊據海島招納我叛人天聰元年正月丙子命大貝勒阿敏貝勒岳託濟爾哈朗阿濟格杜度往征之壬午克義州殺其府尹李筦是夜分兵取鐵山鐵山毛文龍所居地也文龍聞師至遁入海島癸未克定州執收使金搢乙酉克郭山之漢山城執郡守朴由健等丙戌渡嘉山江丁亥克安州殺郡守張燉副使金尚毅縣令宋圖南癸巳趨平壤為朝鮮王舊居巡撫搃兵等官及軍民皆自潰棄城遁走是日渡大同江甲午師次中和朝鮮王遣使致書請退師隨以書責之令速遣使議和二月壬寅至黄州甲辰至平山朝鮮王李倧携妻子遁入江華島其長子􅓭奔泉州其臣進昌君者來謁致詞引罪言城中府庫財物亂離之際俱已蕩然願以所産者悉索以獻不聴是日遣副將劉興祚入海島説倧令其遣子弟入質兼議嵗幣倧曰城下之盟春秋恥之請退兵議和興祚不允倧遂遣族弟原昌君覺并侍郎一員來平山城議和許之遂復遣興祚及庫爾纒等往三月辛未興祚等與朝鮮王李倧誓天地議和乙酉班師至平壤復與李覺及其侍郎約誓夏四月辛亥師還五月遣李覺歸國厚賚之并賜其王李倧致書結兄弟之好仍約兩國之民有越境私逃者察送毋隠是年秋以義州復還朝鮮撤守兵以上俱崇德間附俄羅斯部落在西北其地最逺行三年而後達京師順治十二十三年兩有使至俱以不知拜跪遣還十七年復至表文稱一千一百六十三年上寛朝議應仍逐其使宥之命禮部諭以不遜之罪其部衆每從邊外渡黑龍江來侵我老察地方老察距寧古塔相近我國貂皮等物多取給於此順治間因其來寇曾欲加兵㑹上憐廷議令朝鮮供芻糗師之費遂罷康熈八年秋朝鮮國小不能給大廷復來寇凍時彼不能返可襲擊之議乗江朝廷以路逺勞民而止九年四月俄羅斯遣使奉表投誠表文字畫不可識字體自下而上類道家符篆因召其來使譯文以進十五年來貢黑狐紫貂皮哆囉呢玻璃鏡魚牙魚牙大與象牙等其國人面白㣲紅高凖類西洋人紅氊帽油靴有髮有髭暹羅順治間入貢用真金葉鑿成表文字皆鳥跡蟲書其貢使謂之握坤即華言使人也握坤冠金盔盔以有花紋者為尊秩從人蓬髪不冠貌黧黑通事揭諦典言其國有水火兩刑火刑令罪人過火坑命僧持㕨於旁理直者輒得度肢體無恙不則以鐵义納置坑底水刑令罪人沒深水中以罪輕重為時久暫亦令僧㕨於其上理直者亦得不死語頗近誕又言其國中一切物用俱取給於國王每數日國王親給衣食殊不勝其勞康熙七年貢孔雀象龜各一象高六尺六寸龜重三十觔力能負人有帳幔一具繪淫像詔却之十二年復來貢請封部議遣使禮部因議照上以風濤險阻察例以勅給其使賫還前明封古里例付勅貢使宴賚而遣之國王名森烈拍臘照古龍拍獵馬嘑按㑹典載貢物六十件自七年來貢止三十九件疏言國小而貧貨物多産於别國難與㑹典相符部詔免之議令補貢荷蘭即紅毛也由厦門出大洋行一月至吕宋吕宋陸路行一月至噶喇巴再出海口行一月至荷蘭順治十三年來貢國王黑投為也甲必丹物馬綏掘表文極工麗定貢期八年一次其國人面白高凖髮黄眼綠官尊者戴黑圓帽執紅棍衣紅哆囉呢餘衣青綠著未屐前高後低琉球勅諭十順治八年九月賜琉球國子尚質朝貢使至年六月琉球國中山王世繳前明勅印十一年七月遣給事中張學禮行人王垓賫勅印往封為王以舟艦未具留閩四載十五年六月撤還十八年以出使稽遲奪學禮等職康熈元年復命學禮等以原官往封三年七月使還康熈九年琉球遣使嗎􅀈吻􅀈喇噠㘃等表貢方物國王像圖金珀書箱珊瑚樹大玻璃鏡各一按琉球為東海小國四面皆濵海南北約三千餘里所産惟蕉布硫磺其刀扇漆器等物皆販自日本王府供米麥民皆食畨茹狀類薯蕷宴㑹簡朴士大夫家多蓄書四書唐詩通鑑俱有翻板旁譯國語人名有四五字者阿彌多夜弗蘇二名居多他如金曰額膩銀曰喀難大曰倭捕煞小曰彌煞父母曰倭牙男曰㑹耕噶女曰㑹南宫飯曰安班酒曰薩几俱不可通曉自唐宋至元其王之長子應襲爵者俱遣至中國入國子監俟其父薨始歸國受封至明洪熈時憫其往來風波驚險不測特免之賜三十六姓人教三十六島世襲通使之職習中國語言文字至今請封謝恩朝貢皆諸姓後有姓名可通土官則有名無姓也取士舉賢良方正由秀才歴法司法嚴峻不徇私情即職官之父兄子弟不少寛貸道不拾遺夜不閉户饒有古風男女婚嫁後束一髻于額簮小如意以金銀分差等衣服敞袖長袍皮鞋腰繫錦緞長丈餘冠用紙胎以綾絹布圍裹分差等樂有走馬舞劍刺鎗踘毬諸戲重陽節競渡龍潭金鼔震地他如石筍巖勒馬巖龍岡虎萃長虹橋曼湖松嶺俱稱名勝通使船形如梭用鐵力木凡三層闊二丈二尺長十八丈高二丈三尺桅高十八丈裹以鐵船尾設戰臺鋪石列砲所經海道由閩安鎮歴猴嶼梅花所出海口由白洋入大洋有白水一線横亘南北為分水洋又歴糖洋尤家埠那壩港入中山伊藍埠至温鎮抵琉球境從王城此給諫張君等所經之道風濤變幻棲泊無定所使回時復與前所經之道不同西洋國按西洋總名歐邏巴在中國極西故謂之大西以海而言則又謂之大西洋距中國計程九萬里自大西行六萬餘里至小西天竺國登岸晝夜浮海風順者半載可達又有過大浪山不得達小西者冬月必泊黑人國越二年始抵小西自小西又一年可抵中國海舶高六七重廣亦如之度可容千人所需五榖六畜等物俱載焉西洋土宜五榖日用以麥為主類中國北方之俗造室用磚石不施板築宫殿用石板或銅板幣帛則有鎖袱多羅絨金銀絲縀精者直逾百金布以利渃草為之視棉更堅潔既敝則搗爛為紙巾帽方圓各有式民間尚短衣以便操作樂器如西琴編簫為最工琴用鐵絲五十絃機動成響編簫大者千管中者數百小者數十撫法與琴畧同水器利灌溉火器利戰鬬銅鐵玻璃等器皆工巧適用字用二十三字母以二十三筆互配成文凡諸國語音及風雨鳥獸之聲皆可繪之於字分醫學教學法學道學為四學前明萬厯中西洋人利瑪竇與其徒湯若望羅􅶉谷等奉其所謂天主教者來中國所事之像曰耶蘇即天主也手執一圓象曰天主之母名曰瑪利亞言天主生于哂漢哀帝元夀二年庚申荒誕不經為儒者所獨勾股法精密厯家多宗之其國治厯不一家而多祿某亞而封所歌白泥第谷四人為尤著若望等皆尊師之順治二年仲秋朔日食若望先期進時刻分杪起復方位至期命大學士公同測驗諸法俱舛而新法獨合於是命若望用新法修時憲厯康熈三年七月歙縣民楊光先控若望等邪黨惑衆包藏禍心禮部密奏命同吏部㑹審若望得罪革職四年四月以光先為監副尋陞監正西法遂中廢嗣有西洋人南懐仁復其疏訟寃詔革光先職以懐仁為監正而西法復行按西法有不可不辨者五凡一時有八刻而合之夜子時四刻則為百刻西洋法謂正初各四刻則十二時當得九十六刻因減百刻為九十六不知亥子二時為隂陽之交亥氣已盡子時初交此時既不屬亥亦未屬子昔人以亥餘二刻及子初二刻别名之曰夜子時以示隂陽相交二氣接續凡天行之進退嵗差之餘積皆從此起西洋不用此四刻則數無零積何以定節氣又何以有嵗差且既不用百刻又何以造厯用夜子時不亦自相矛盾乎此九十六刻不可行者一二十八宿以木金土日月火水為次雖宿度多寡不同而位次從無改易西洋法西方七宿以觜火列參水之後豈東南北皆火先水後獨西方火後水先乎觜三星鼎足極小步位極狹雖侵入參位而距星所起觜自在先參星雖大自觜後今以度半之觜與十一度之參顛倒錯置可乎且觜部諸星並無侵入參部者參兩肩與觜相侵雙足三心斜入向井又玉井軍井屏星俱在參右天厠在參左闊狹了然豈容臆説哉此參星不當居觜先者一羅為天首計為地尾俱有氣無形然五行經行計羅獨緯轉惟月食時能辨其色象羅者火之餘色赤而淡計者土之餘色黑而紫月之食日在地下月在天上地心居中地心即與日同宫之羅計日與地心所在之宫射對宫之月赤淡色者為羅蝕黑紫色者為計蝕凡在所食之宮確有可驗况五星對行甚遲與五星單行者不同倒置一羅不得不倒置一計將五星二十八宿之生克制化從何推論乎此羅計不可更換者一炁為木之餘孛為水之餘羅為火之餘計為土之餘謂之四餘惟金主剛主殺上天好生故金無餘合日月五星謂之十一曜不聞名十曜也西法獨置炁不用是三餘矣炁孛羅計皆有名無象如以其無象而去之又何用孛羅計而獨不用炁乎且星象有變炁之變色白如盤盂尾亘天孛之變白如長虹尾有短有長其占皆係兵變人事吉凶興亡之驗豈占孛彗獨不占紫炁耶又占候云紫炁一名福德箭所臨之方車駕臨幸錫福極速是占候亦不可無炁也此木炁不可不用者一自古有厯法以來各宫所占之宿有三皆以長短接筭如女一在丑女二在子危十一在子危十二在亥皆就天度𤓰分至本宫各有占宫之正宿如子宫以虚日為正者子屬䑕以虚日䑕為正宿丑屬牛以牛金牛為正宿餘皆類此統天厯以女二度九十五分九杪入子宫開禧厯以女二度九十二分九十三杪入子宫㑹天厯以女二度九十二分八杪入子宫授時厯以女二度六分三十八杪入子宫雖分杪之數不同總不外女二度入子諸如各宫各宿次序界限皆大同小異總之嵗差之積數日與天㑹月與日㑹之常度不同故分杪少異而占宫之宿則萬古不能易也今厯竟以牛金度入子宫是必子屬牛而後可且必各宫俱改常度各屬俱改所屬如丑屬虎寅屬兎而後可豈理也哉夫二十八宿與天同運以辨昏旦萬古不移星紀析木之宫名亦萬古不易今乃創為異説謂前代漢唐宋以來之法舉不足信將誰欺乎此二十八宿必不可移者一兵部員外郎周于漆辨甚核姑識其梗概如此土魯畨漢車師前王地晉属高昌郡唐為交河縣在火州西百里元成吉思汗次子察哈台受封此地明永樂初封畨僧為國師後復授其長為都督指揮等官朝貢不絶成化初土魯畨阿力始强劫掠哈密遂據其城並擾赤斤蒙古諸衛侵掠甘肅嘉靖初招撫之復歸哈密其地去哈密千五百里中經黑風川水草俱乏難以逺據而在前明時自阿力以後皆挾哈密以徼利隆慶後始稍戢不朝貢者一百八十餘年我朝順治三年來貢方物十三年復來貢自是定例五年一貢西馬四匹䝉古馬十匹以其國有亂至康熈十二年其王瑪黑忒賽伊忒韓遣使再貢表稱一千八十三年聞之河西人云土畨添巴于西海􅂜西海􅂜添巴于回回國添巴猶言進貢也天方國在哈密西北與回族近不属于回語言類回人而性情各别順治二年來朝貢玉石等物回回國回回與畏兀兒哈喇灰俱為哈密屬部哈喇灰語言嗜好皆與回等畏兀兒則飲酒食肉與回差别哈密即回回之都㑹也陜自西凉州五百里至甘州甘州五百里至肅州肅州西六十里即嘉峪闗嘉峪七百里至陽闗陽闗千里至玉門闗由嘉峪行約二十日至哈密前明永樂初置七衛在嘉峪關西哈密又在六衛西東至肅州西至土魯畨俱約千五百里回回人精于鳥鎗順治二年同天方國人入貢赤斤䝉古周西戎戰國月支漢武帝取為酒泉燉煌二郡晉屬高昌郡唐屬𤓰州後沒于吐畨宋入西夏元仍屬𤓰州明永樂間設衛及土魯畨陷哈密侵掠赤斤其部人散朝走塞下衛遂虚我督永柱與畏兀都督帖木順治四年赤斤都兒卜喇等詣撫臣張尚言入貢于明遭亂寄居肅州願効忠納貢尚以聞是後未聞有再貢者費牙喀部落順治十六年來貢自是定例貢物送至寧古塔宴賚而遣之以上順治間附傅爾都嘉利雅等處國王阿豐肅係西國極逺之地康熙九年遣大臣嗎訥􅐰爾達聶具本貢方物本内稱巍巍至能大清國皇帝安南國王黎氏與其臣莫氏為世仇自前明萬厯中莫氏即據高平本朝初負固不服時招納逃亡侵入内地順治十六年粤西既下莫敬耀怵禍來歸賫繳印朝冊督撫臣以聞統使敬耀未受職卒子元清命授為安南都嗣仍世守高平地十七年安南國王黎維禔來歸亦未受封卒弟維禧立康熈三年遣翰林院編修吳光禮部司務朱志逺諭祭維禔五年遣翰林院侍讀學士程芳朝禮部郎中張易賁冊封維禧六年秋維禧復修舊郄以兵奪高平地元清竄入滇七年春雲南奏其廷事爭請用師討黎氏擅奪之罪議上不忍遽加之兵特遣内院侍讀李仙根兵部主事楊兆傑以一品服賫勅往諭維禧令還高平故土維禧奉如故其國在詔還高平一府四州元清為都統使富良江西後三峯山左安子山右屬十三道五十二府二百一十九州縣吕明德先生傳前明南京兵部尚書新安吕明德先生以崇禎十四年殉寇難於洛陽清忠大節事具前史越二十一年為皇清順治辛丑先生子兆琳與玉書同舉進士又三年家大人視學中州以洛陽為先生授命之地檄有司建耑祠春秋奉祀購先生遺書得所著孝經本義大全若干巻又越十三年兆琳以治行異等由陜西西鄉縣行取來京師以先生年譜四巻示書俾書傳先生行事以示後書不敢辭先生諱維祺字介孺别字豫石系出宋文穆公後七嵗就塾師受孝經即知謹子弟之節父仁孝公異之年十六作知非箴自儆私淑邑先輩孟公化鯉洛陽尤公時熈自是討論伊洛之學以天下事為巳任萬厯癸丑舉進士為兖州府推官宗室某凌轢官吏白晝攫民金按實出罪不少鯁避每讞獄虚公平反雖黠盜不施榜掠輒得其情擢吏部主事晉員外郎㑹光宗崩廷臣請入見嗣君為閹寺所阻先生謁政府抗聲曰梓宫在殯人心危疑奈何輙阻諸臣之請以滋異議偕百官詣慈慶宫門謁畢方退越日聞中官導駕幸小南城又詣政府責以保䕶聖躬抑止游燕事遂寢退而疏言殿下一身為二祖列宗之所付托百官萬民之所繫望起居宜慎飲食宜節左右不得嘻笑於側侍御不得雜進於前閣部大臣宜不時召見商確大禮顧問政事親近内侍宜擇老成愿恪之人謹備使令勿預國政疏末論移宫事與楊忠烈議同忌者銜之辛酉天啟改元乞假省親歸新安持祖母喪盡哀手疏孝經以謹身厲行開示來學與馮少墟從吾李緝敬日宣㑹講芝泉無虚嵗屏居四載逆璫竊枋勢益熏灼里人議為璫建祠叱止之璫恚甚甲子冬起補考功郎不用將中以竒禍㑹璫敗而止崇禎戊辰起尚寳司卿旋晉太常寺少卿提督四譯館明年抗疏陳防㣲八漸指斥時政而言謹晏游寡嗜欲摧折言官厭疑臣下尤切直疏入留中疑禍且不測忽一日中官捧温㫖至私第曰上得公疏置御榻每一省覽徘徊殿廷咨嗟良久先生常舉此事謂天聴如環惜臣下無實心開導廣益聖聰為可媿也庚午陞南京户部右侍郎總督糧儲時朝廷以外臣不稱任使分遣中官王應朝張彞憲等監視户工九邊兵馬錢糧絡繹四出廷臣相顧眙愕不敢言先生疏曰皇上初元廓清閹䜿焦勞治理海内稱快邇者羣下積習未除奉行失職致使廟堂積疑生厭積厭生怒不得已遣左右近侍以察之此皆諸臣罪也然而先機識㣲之士鰓鰓過計謂易曰履霜堅冰至又童牛之牿元吉思漸遏萌其道宜豫且熹宗已事皇上手自釐革豈未及三載而遽忘之閣臣延儒體仁宗達皆受特簡知遇之恩曾未及片辭爭執臣不得不以弼違陳力之義督過諸臣矣疏入南北部寺相繼執奏竟得罷遣先是南庾嵗入二十三萬額支至四十餘萬出浮於入者十九萬有竒北部借支南糧又積至二百六十餘萬以故本折均絀京軍虧餉動以嵗計先生鉤考逋賦建議酌留各項税銀及新餉十餘萬填補缺額而用鼔鑄餘息轉抵北部越兩載㑹有餘儲超拜南京兵部尚書㕘贊機務南樞經費不貲釐侵欺汰冗冒兼請鑄局踵行已試之效而軍食不匱先生之論錢法也謂圜府為國息之本衡輕重之等權子母之利其流如泉舍是而言生財則掊斂而巳其法官錢重一錢為率自九分以下官令改鑄禁民間不得私收則奸人竊利者自止兩厰需費七萬二千遞减至二萬餘僅三之一耳而嵗終獲息一萬六千五百兩有奇視舊息增至十倍先生所謂行之十年不獨南庾牣積即北部亦可代支者確然其有明驗矣又曾議行鈔法以吳綾為質織龍文方廣如舊制與金銀錯用鈔居十之二議極明悉未果行當是時軍興煩棘民困轉輸無藝之征等於竭澤而先生持籌經畫惟用鼓鑄為紓國之長策以恤民則請罷加賦矣以恤商則請罷蕪税矣夫豈不知尺寸之利可以佐軍儲贍國用而惓惓以寛物力固根本為言此先生謀國之忠鑿然原本經術而不肯出於一切補苴之計者也乃朝議卒以此側目百計傾軋乙亥寇陷鳯陽先生合諸道軍轉戰逆擊賊西遁六百里而忌者竟議調遣逾期用大計落職比先生歸而時事潰壊益不可為矣戊寅已夘之交賊勢蔓延膠結出沒河洛間以數十萬計督臣熊文燦力不能支輒主撫議先生目擊憂憤積書力爭洛西數百里不至遘房榖之禍者先生之功也辛已賊薄洛陽先生免仁孝公喪適居洛登陴誓衆括家財以饗軍比圍益急猶麾所募健勇縋出城西北隅格殺數十人而叛將王紹禹乗夜援賊陷城遂被執道遇福藩先生從容言曰名義至重萬不可屈節為宗社辱及見賊罵不絶口竟遇害方先生自留樞謝政歸賊從潼闗敗遁逆焰未甚熾也使先生不去或更假節鉞以辦賊賊能遽收殘卒豕突東下為中原患耶夫天禍人國讒人高張先生之才未嘗不見用用未嘗不結主知呼號咷泗冀吾謀之一用而百口之謠諑己隨其後先生雖不去庸有濟乎至於峩冠就刃持孤忠以入地而老臣之鞠躬盡瘁以報國家者無遺力矣嗚乎先生死生之際世變係焉豈偶然之故哉先生著書數十巻闕里議詮部太常南庾南樞奏議考功記清蕪記慎獨堂文集存古篇最後出者為孝經本義大全或問凡三十三巻兆琳為書言曰先大夫留精孝經者二十餘年訂諸家聚訟之訛字疏句析篤志力行所至設講㑹芝泉伊洛豐􅉮豫簪先後從學不下數百人所以倡導其門人子弟者率以孝為根本生平立身服官日用造次不離乎是嘗謂新建之學言良知而不求致良知故久而滋弊以孝為本而以臨深履薄慎獨戒懼為學推極於天明地察通神明光四海舉而措之裕如也嗚呼先生學有原本如此書淺識薄殖烏足以知之敬紀兆琳之言詮次行事之大者以為先生傳贊曰昔蘇軾論賈誼惜其志大而量小謂宜深交絳灌使天子不疑大臣不忌然後得行其志愚嘗讀其説而疑之士君子大節不立而使當世脂韋曲學之士得以借口謂能自用其才可為篤論乎且軾當熙寧紹聖間所自處者何如而欲以深交絳灌責􅁩甚矣其言之過也及讀明德先生所為賈董論謂大臣以道事君不可則止亦以軾言為未當觀先生之論而三十年立朝梗概亦畧可覩矣嗚呼自高顧楊左諸君子之後先生頎然為正人魁宿幸不罹於璫禍而得以其讜言危行搘柱國是乃卒不幸而以節義見人之云亡邦國殄瘁百世而下聞之猶為三太息也何崇源舅翁像贊崇源舅翁為十二外祖玉涵公之冢嗣弱冠為邑諸生有聲庠序玉書幼習舉子業實與舅翁先後及君勅卞先生之門舅翁每出一藝同學皆傳寫奉為模楷屢試有司不得志遂棄去究心先世岐黄之業方明洪宣間有彦澄公以醫顯于朝三楊先生皆折節敬禮嗣是代有聞人至明末仁源繼充兩公名益重仁源即舅翁之大父而繼充其世父也舅翁盡發累世之藏書精研于隂陽表裏虚實補㵼之法于是醫學大進所至輒有竒效四方延請者嵗無虚日而舅翁又謂藥物所以療病非所以養生日取參同契悟真篇諸書詳證其奥義復手訂冲虚子金丹直論往往有心悟獨得之解為前人所未發平居靜穆澹適喜愠不形每言境過輒忘胸中不留一物蓋天資近道如此至于一門以内怡怡然壎箎翕和琴瑟調叶子若孫舒雁行列有詩禮之容而無浮囂凌競之氣觀圖中所載亦可畧覩有道之梗概矣敬拜手濡筆而為贊曰有軒有几有圖有書有泉一泓有樹百株巾舄嫻雅道氣充腴以觴以讌閨門秩如託興于林卉棲心於元虚窺翁之跡者以為工越人之術識翁之㣲者直比肩于列仙之儒太子少師平逆將軍議政大臣都統諡恪僖畢公像讚天篤佐命英畧奮庸三朝戮力萬里折衝初定平壤繼克松杏公隨王師應手鋤梗入闗蕩寇出塞招徠靡逺不服靡堅不摧肅將天威迅掃滇海逼緬阿堝折首奏凱巋然宿望命領禁軍屬討秦逆無踰老臣逆亂既平振旅還闕抗章乞閒有功不伐四十七載聲施爛然遺鏃在骨忠勇悉全帝旌乃勞哀榮禮備名勒豐碑澤延奕嗣我瞻遺像標格嶙嶙鷹揚虎視威容如神猗歟偉人為國楨幹炳矣丹青光熒雲漢丙午科浙江鄉試策問五道問帝王一代肇興必有一代之治法而治隆法備每待之繼體守成之主忠厚立國周之治也成康纘其法而光大之馴至刑措稱極盛焉漢文景恪循恭儉唐貞觀力行仁義史褒其治謂庶幾王道之遺其他或純任綜核或政尚紛更雖規模粗具而良法美意亦寖衰矣我皇上恭巳勵精逺承太祖太宗億萬祀之鴻基近紹世祖十八年之駿業五載以内綱舉目張政教翔洽海宇衽席遐裔貢珍治績之盛軼漢唐而踵成周則自今以始皆與民休息時矣滌煩祛弊而躋一世于仁夀寧無其道歟夫寛猛緩急之際治術所由辨也水弱火烈偏用之則二者均弊豈非寛與猛必宜互濟歟抑聞之治不得其道則法令繁多而奸不止得其道雖禁網疎闊而百職就理蘇軾亦云不擾獄市不害為摘姦然則致治本原固不視乎寛猛緩急而在立法之當否歟董生之喻政曰琴瑟不調必解而更張之乃若更張之而不調復將安恃儻亦圖治當慮始不宜數變以滋擾歟兹欲凖今時酌成憲權衡于畫一之規經緯以寛大之意俾垂永久偕民寡過何道而可問儒者之學盡人以達天不根極于性命則其學徒枝葉而已源流分合之際可勿講歟孔子之繫易曰繼善子思之作中庸曰未發未發之中與繼善有二㫖歟存心之説子輿氏首發之而操存舍亡孔子則嘗言之矣心固能統乎性者歟性譬則榖也心其萌芽之發端者歟嗣後濂洛闗閩益闡其説而理與氣之辨甚密正䝉太和篇曰由太虚有天之名是以太虚為一氣之聚散矣夫萬物之氣散則歸太虚所謂水凝為冰冰釋仍為水也而謂太虚無理以主之歟程子曰以形體謂之天以主宰謂之帝以性情謂之乾夫于太虚之中求所謂主宰性情宜孰從而指之正䝉又謂合虚與氣有性之名合性與知覺有心之名皇極經世書曰心為太極又曰道為太極然則人之氣與天之氣固同出於太虚而其理則同歸於太極者歟學者舍盡性何以達天舍存心何以盡性心之存亡出入至逸而不可制制心之功其要安在濂溪之學曰立誠二程之學曰居敬横渠之學曰無忝匪解紫陽之學曰格物致知其功雖異其理固一致歟諸士務窮其源流以對問禮與刑相輔而行者也周禮大司徒以五禮防民之偽而教之中書曰刑期于無刑民協于中故因天秩而制五禮即因天討而作五刑明示以出禮即入刑也夫禮曰教中刑曰協中禮與刑固有同原者歟子産鑄刑書而叔向非之謂先王議事以制不為刑辟劉廙著先刑後禮論而陸遜斥之謂禮之長於刑久矣倘與孔子有恥無恥之論有合歟禮者所以辨上下而定民志也刑者一成而不可變者也乃説者曰刑則一日不可弛禮必百年而後興一日之内固不可無刑也而百年以前遂可以無禮歟夫安上治民莫善於禮一日無禮則傲慢凌僭之端生焉迨至風俗日漓民情滋偽蕩閑踰檢犯上亡等然後大刑大獄起而治之盍若治於未然者之為逸歟今古殊趨時勢各别三代已有質文之異尚賞罰先後之不同宜何所適從歟我國家制作度越前代儀文服物秩然有等而又更定律例勒為一代之令俾貴賤尊畢循守罔斁誠以禮教先天下而兢兢慮其入於刑也其間所為輕重損益納民于中道者有可得而指歟尚詳陳弼教之義焉問史書助國家賞罰一日之是非定則千古法戒昭焉事不綦重歟皇上頃以明史尚闕命禮臣搜遺編詞臣開史館校譯實錄刻日告竣或編年或紀傳將蔚然覩一代成書矣獨是二百七十餘年之事有當時未暇定論今日實待折衷者欲成信史可勿豫講歟試舉其大端與諸士質之金川之役釁起削國而稱兵易位必謂事當㣲辭歟監國之際誤在易儲而奪門復辟必謂功宜上賞歟興獻之禮異於濮議是也乃别廟稱帝盈廷聚訟何説歟國本之爭力阻並封是也乃語侵宫禁附㑹成疑何説歟三案迭興羅織滋蔓東林黨議水火紛淆所謂小人者信權姦所謂君子者信忠藎歟若乃綜其治亂之故當初盛則重紀綱及中衰則尚議論迨末造則紀綱議論兩弊而均失之何前後貿理歟二正之多故何以宜亡而不亡神熹之廢弛倒置何以宜覆而不覆晩季正氣衰靡或追論靖難摧殘之過甚然歟否歟夫洪永創業貽謀宣孝守成紹烈其所由致治之原亦可得而標指歟諸士仰體勿顧忌諱條晰敷陳義欲歸正論欲持平將上之史館焉問從來招攜懐逺梯航來歸至治之效也然投戈既衆則綏輯維艱考之於漢閩越初開嘗盡遷其民於江淮之間而虚其地豈昔之東南土滿今之東南人滿歟往亦有弄兵潢池化刀劍為牛犢者以一郡守治之而帖如豈一隅與四應撫綏固各有術歟今我皇上聲教誕敷無逺不服吳越閩廣聞風向化不啻數十萬計其為首屬者固已予之爵祿悉從優敘矣彼率從之衆將欲聚而兵之汰老弱簡精鋭藉為海徼之長城似也然各省綠旗方將覈其冗耗增兵益餉其議可行於今日歟即欲解胄離伍散而農之而授廛分畝固可行於沿海諸郡歟有謂中原川陜尚多曠土以此雲集之旅倣古屯田之制使之比廬而耕既可墾荒復堪衛國是歟否歟抑或詳稽原籍畢令歸農俾海濵效順者盡為版圖之赤子歟爾多士盱衡時事何道而能使聚不病國散不病民既足安新附之心復不滋土著之擾其必有成算于中矣詳著于篇以為柔逺之碩畫辛未科㑹試策問五道問國家承平日乆則忠厚淳龎之氣積於人心而形於風俗倡率於士大夫而下被於草野猗歟盛世休明之象也我皇上宵旰勵精茂臻至治大小諸司助流德化者罔敢不凛凛奉厥職矣顧人臣服官之道其大者在法廉交儆寮宷協恭漢儒有言皇皇求財利常恐匱乏者庶人之意也皇皇求仁義常恐不能化民者大夫之意也又曰衆臣和於朝則萬物和於野豈非人臣宜勵素絲正直之節而奉公上者尤務以協恭為百職倡歟夫異同化然後持議不偏恩怨忘然後秉心無競誠欲通于野之志渙有邱之羣消同異之形泯恩怨之迹自非精白一心公忠體國庸克濟與方今大澤汪濊協氣旁流葢成周太和洋溢時也聖明在上殷殷以寛大和平嘉與臣下其何以仰承德意偕適於無偏無黨之路與抑正學問端心術謹行誼尤靖獻之本也多士將釋褐為國家用矣所以立身立朝者其預籌之問我皇上崇正學敦實行所以風勸天下甚至士生斯世幸矣不患無秀異之才應運興起然或陵躐高逺汨沒於浮華靡蕩之中顧以倫物日用為庸近則於崇學敦行之意奚有當焉古之學者其始重小學之教習六甲五方書計之事室家長幼之節自孝弟禮讓之始基達於致逺通方之實用習俗美而材賢衆焉行能茂而政理隆焉遐哉盛巳粤稽其制上老庶老教之學里胥鄰長教之耕右塾左塾别其地在野在邑異其候其詳可悉指與班固曰八嵗入小學十五入大學尚書大傳曰十五入小學十八入大學其説互異何與紫陽采輯羣言為小學一書垂訓於世此其義豈有異於古之為教者與程子謂洒掃應對是形而上者朱子又謂今人既無小學之功當以敬為本是小學之重本末兼該精粗一致不可易也皇上於經史百家罔弗綜貫而又取朱子此編時勤乙覽多士其以素所服習者精言其義將觀所學而獻於朝焉問宋儒之學至今日而表章稱極盛矣皇上躬天亶之至德綜道術之源流以周程張邵朱子有功性學御書學達性天頒額褒美用俾海内之士咸曉然于嚮學入德之門意至切也顧諸儒之書標指同異約有數端試畧舉其義以相質可乎周子太極圖説廣大精密性學之原也程子親受其圖而卒不以示人其故何歟氣質之性自程子言之或以為本於太極圖説然歟否歟邵子先天圖為功於易至矣其皇極經世亦先天之學也程子謂數學至康節始及於理而究不學康節之數及作易傳又不採其説何歟易傳言理不言數朱子所深服膺及朱子作本義又主卜筮而不盡從易傳豈其理有殊致也横渠西銘明理一而分殊程門以之開示學者而於正䝉則謂其言有過正䝉西銘純疵之别安在所言太和太虚亦與太極之㫖有合焉否歟周程張邵絶紹學之緒朱子集諸儒之成諸士其折衷於朱子之説而考其同異求其要歸以著於篇問記曰聲音之道與政通又曰凡音之起由人心生則審音辨律固性情之事儒者所宜亟講也夫先王因天地隂陽之氣定十有二辰即十有二辰生十有二律所謂隔八相生三分損益其理與數可悉指歟十二律始於黄鐘五聲始於宫八音始於土皆所以求中聲也而聲之清濁高下操何術以辨之後人欲定黄鐘之管而莫適為準或求之累黍或証之古尺或參之金石聚訟紛如宜何所折衷與凡律空圍九分至蔡邕始有徑三分之説孟康諸儒主之胡瑗疑其管狹復為九方分之説蔡元定律吕新書主之而胡蔡之書所言圍徑之數細求之又不能無差或參用截管迭吹之意以密率定其法而以累黍驗其實庶幾辨律為有據歟夫黄鐘定而後中聲正中聲正而後律吕叶我皇上中和建極神人允諧考鏡源流至精且晰諸士服習今古亦嘗研究其端委乎盍一一指陳以備採擇問教養為經世大務古者大司徒頒十有二職施十有二教於民其時家有蓋藏人鮮窳行豈盡其俗之醇歟無亦奉行德意者之克殫乃職也我皇上子育元元數年之中賜租減賦累數千萬水旱蠲貸猶不與焉比又厪念民間曠費罔知生計特頒誡諭命講儲蓄之法酌撙節之宜所以為民謀者恩澤至厚今里井編氓已皆仰喻上指力農桑偫囷積可馴致家給人足之盛歟夫豳風七月與噫嘻臣工諸詩相為表裏豳詩述養老慈幼燕饗之事至纎且悉而豳頌多責成於臣工則勸耕積粟使閭閻不至憂匱乏者非良有司責歟瘠土思勞沃土思逸民之情也靡侈之無節蕩佚之無紀以至爭訟迭興非僻時作觸法抵禁往往而有皇上如天覆物憫其愚而矜全之者嵗不絶書為長吏者誠敬體好生之仁竭誠而化導之何患民氣之不靜而俗之不底於醇也爾多士異日皆為國家教養斯民者也尚攄所藴獻之當宁焉巳酉科順天武鄉試策問二道問將才難將德尤難故司馬法以仁愛為制國治軍之本方今海宇寧謐雈苻不驚此師武臣衅甲時矣其各要害地專閫駐防以為民衛也乃重鎮碁布刁斗嚴明者固多市肆驛騷者亦復不少郡縣有司因文武職分至不敢呵一悍卒則兵不且為民困歟夫兵囂而不戢是謂無威聴其厲民而不制是為無法毋乃非國家命將設防之至意歟古名將多讀書曉大義故人爭愛其德羊叔子杜元凱其流也意偏裨以才勝大將以仁勝制敵以才勝坐鎮以仁勝歟抑文經武緯才德兼備斯兵民胥利而不病歟其悉籌之問人才宜及鋒而用文與武無二道也武臣封疆攸寄尤資技勇英鋭以備折衝我朝自設武科來取士稱極盛矣獨是聴選需次淹抑多年精力就衰始授一職國家奚賴焉議者謂樞臣典選應核年力嚴甄汰是亦疏通之一法歟科目而外其途太濫流品雜而營競生或尚有可澄别者歟在外鎮將以下庸耄曠職豈曰無人前者車駕所至曾親加罷斥矣或應責提鎮臣不時劾奏以清賢路歟古有由部曲拔為上將者所以待奇技異勇也或别置一格以示奬厲可歟既疏積壅之弊復收軼羣之才多士盍借箸焉張文貞集巻八
