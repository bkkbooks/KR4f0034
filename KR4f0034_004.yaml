body:
  text: 張文貞集卷四大學士張玉書撰御定全唐詩録後序臣嘗讀詩傳見漢鄭氏所為詩譜指述數百年之世系及其詩之次第而正變之源流風化之得失較然著明可以為後世序詩者之法三百篇而後歷代皆有詩而唐稱極盛蓋五七言今體創始于唐其古體承漢魏六朝之遺亦别出機軸不相沿襲於時功令以詩造士自公卿以至韋布童丱以至白首無不朝夕講習以求合于古之作者而貞觀開元之間又有御製篇什倡一代正始之音為臣下標準故詩之盛必以唐為歸而其世次及其詩之屢變亦可考而知也當初盛之際以工鍊閎麗力矯陳隋之輕靡而李杜之激宕竒肆渾涵汪茫鎔鑄風雅者特傑出于其間逮至中晚或以幽清或以繁艷或以奧博或以古崛峭厲如分塗别陌之不可强合而于三百篇六義之旨皆能各得其遺意是以代無今古體無正變必發乎情止乎禮義而後可以言詩不如是則絺章繪句雖工不傳裒全唐人集比類而觀之斯得失見矣我皇上天縱聖明研精經史凡有評論皆闡千古所未發萬幾餘暇著為歌詩無不苞蘊二儀彌綸治道確然示中外臣民以中和之極而猶以詩必宗唐宜旁采以成巨觀因命校刋全唐詩集乙酉春翰林侍讀徐倬迎駕于吳門復進所編全唐詩録百卷時經事緯而詩系焉上覽而嘉之以其勘訂精審賜金授梓仍進倬官為侍郎此曠世之希遇也刻既竣御製序于卷端用垂不朽將使稱詩者循唐人之津梁究三百篇之奧窔而又先自治其喜怒哀樂之節以務協于興觀羣怨之宜則所謂發乎情止乎禮義者不獨見于聲詩而即形為風化庶可仰答皇上漸摩樂育之至教于萬一也矣臣奉命敬跋編末竊于兹有深望焉御製清文鑑後序粵自羲皇觀河圖畫卦開文字之源而黃帝命倉頡作字肇六書之始蓋造物菁華之所苞蘊必發於開天首出之一人前聖後聖其道同也臣等恭奉御製清文鑑全書並御筆硃書槀本七函敬偕廷臣依次展繹誠歡誠忭揚言于末簡欽惟我皇上躬膺圖厯道協中和文教矞皇武功燀赫遐邇蕩平而五兵習而不試陰陽協應而七德備以遐宣既奠生民于衽席之安旋被一世以詩書之澤蓋自宥密單心以迄方州巡歷才罷封章旋臨典册睿製麗於三辰御藻光於八體洋洋乎𢎞謨盛業巍煥難名而經傳史鑑諸書有關於治理世教者又悉經宸衷評斷鋟梓渙頒業已布四海而垂奕祀矣兹以本朝國書所係至巨追溯列祖創制清文以來肇啓宇宙之經綸廣訖中外之聲教允為庶績之所標準百世之所率循顧㸃畫具存而大義未析音聲咸備而疑似或多以此嵗久流傳漸滋訛舛耆舊衰謝莫與參稽及今不為修明恐日後益難釐正皇上仰承祖烈特製鴻文命儒臣日進一編御筆親加裁定上稽穹昊下矚垓埏旁羅日月星辰兼舉五行四序精極于性命道德博洽乎禮樂兵農人事物類之繁日用飲食之節靡不條分類聚該貫于其中焉總之聖無弗通故義窮今古明無不察故辨晰微芒出話成經復引經以徵事考言制事更援事以證文觀于綸綍敷宣每發一言而如見萬里軍機旁午輒馳片札而如在目前譯之皆典謨訓誥之辭推之盡逺近幽深之理惟國書施行至要辨析研求用意至精粵自始編以迄竣事凡極數年之工力不憚五夜之勤劬雖在師行及當巡省靡日或輟乃告成書繇是昭代典制聿彰咸知可法而可守羣倫聽聞皆一用以是訓而是行爰錫嘉名曰御製清文鑑自兹列聖之精意悉宏闡無遺而天下之文章洵莫大乎是矣至于書後别有提綱若干卷提綱之旨本於字母字母則變化無窮提綱則廣大悉備總彚篇目共二十有五卷臣等竊幸職親丹地覩盛美于石渠天祿之間復得名挂青編近光華于玉軸瑶函之內利用溥而誦習靡涯含藴深而形容莫罄惟千百國共戴同文之治億萬斯年永欽有道之長臣等曷勝䖍惕欣仰之至刑書纂要序自漢以後刑律代更至隋開皇中定笞杖徒流死為五刑而其法遂不可易唐律篇目一仍隋舊惟疏義為獨詳宋與明實捃托而損益之嘗考唐律所載律條與今異者八十有竒其大同者四百一十有竒而今之律文與唐律合者亦什居三四蓋其所從來者舊矣顧律文古質簡奧難以猝讀而經生家又輒視為法律之書不肯深䆒迄身為刑官乃勉强檢按取辦一時無惑乎學士大夫之能精于律者鮮也比奉詔旨審定律例書無似忝預總修因念律無訓釋易滋法吏舞文之弊特為章分句析鉤索其隱深之旨而别其辭之介于疑似者要歸于平允寬恕以期仰副廟堂如天好生至意于時纂修諸君皆一時人望而臨汾文青徐君為之眉目文青自為諸生時即嗜讀律瀾翻背誦雖專門名家不逮既舉孝亷官中翰所至必以律自隨及遷西曹郎據律斷事益伸其志其同修律例也每樹一議設一難或援彼以喻此或沿流以討源無不疏通證明折衷至當余與澤州嘉禾兩公相倚如左右手焉文青修律之暇復著纂要若干篇出以示余余讀而喟然興曰記云今之聽獄者求所以殺之古之聽獄者求所以生之夫聽獄者求人之生即一人之獄以讞決其輕重者也若疏解律義而求人之生則如衡持平如隄防溢務令銖黍毫髮無畸輕畸重之失然後刑與罪相準使刑與罪稍有銖黍毫髮之不準則罪名不當名不當即不得輒以其罪坐之而其間可矜可原可減可纍減之故更為之反覆辨其情實而可生之路出矣審于律有可生之路而人之得遂其生者寧有既乎因是而嘆九章之律成于漢初唐律及疏義成于貞觀永徽之際乃其後酷吏卒不絶于世彼其人非敢蕩然盡舉成法而變易之也特用意憯酷故引律皆刻深耳文青是編晰異闡微俾律無遺義所以解聽獄者之惑而激發其怵惕惻隱之心者不啻錞于申之是雖有刻深之吏亦當幡然省矣仁人之言其利溥其斯之謂歟謹書卷端以質諸當世之知律者鄭寶水先生易搜序自漢以後治六經者人各創一師說白首而不敢變其說愈紛其義愈賾京房氏以陰陽灾變解易而䜟緯之學祖之王輔嗣以清談解易而虛寂之學祖之管公明以算數解易而竒遁之學祖之符䜟算數儒者所不道惟弼注為近世所宗然弼善學老氏者也性命之學流為老莊老莊之學流為申韓支分𣲖别屢變而失其傳極其害不至於賊天下不止嗚呼曾聖人之教而支離若是乎易之為書彌綸六合包孕萬象凡後世諸儒假托傅㑹牽引穿鑿者大抵皆易象中所有但欲執此以求符契于聖人之旨則不啻眇者牖中窺日而已聖人以易為日用飲食而後人務為新竒可喜以愚惑天下之耳目此其所以蔽也從來汲學嗜古之士史傳所載指不勝屈而踐履篤實者什不能得一或身負天下重名一旦臨大事顛倒瞀亂猝然而有折足僨轅之敗非其才不厚力不裕不善學易故也夫學易而不稟於道不獨無適於用且喪其身世之履壯搆險出處不慎而卒踵京房之禍者亦豈鮮哉繫辭傳曰危者使平易者使傾懼以終始其要無咎吾夫子之說易也吁盡之矣程朱傳義反覆象占研理深而攝教廣故其書至今不廢帖括家錮陋暗䀜傭耳剽目習而弗知寶水鄭先生痛之網羅舊聞折衷大義著易搜若干卷立論精微切實祖伊川而禰考亭其餘諸家緒說旁托博取如裔耳之竊附焉而皆不悖於聖人知危知懼之旨其為經傳羽翼何疑夫六經同一旨也不以鑿纍質不以巧汨實不以紈綺醲艷而厭布帛菽粟後生小子辨途而趨庶幾無岐路矣乎張秋紹孝經小學口義序潛庵湯公撫吳兩載念江左民秀而俗偷惄然傷之凡所條教措施孳孳以仰副諭旨崇實返朴為務自月吉讀法而外輒舉孝經小學二書為吳士民勸又延禮名儒有學行者為之疏解以暢釋奧旨錫山秋紹張君實應公辟主講席今年春孝經講甫竣㑹公膺特召爰屬秋紹輯所講口義重加訂正授梓人廣其傳蓋公所以教民敦本之旨至勤且懇矣在昔治孝經者漢長孫氏以下無慮百家今文古文同異若聚訟而大旨炳如並存不廢兹編序次一遵今文獨存閨門一章以仍古文之舊其闡繹經義切近深微穿貫朗晰而尤以敬之一言蔽孝之終始余受而讀之三嘆而興曰是誠可云知孝矣乎經之義理一而分殊體約而用博推之極于天明地察通神明光四海而約之則曰身體髮膚不敢毁傷夫下堂而傷足毁傷之小者也辱身隕名烖及于親毁傷之大者也曾子之論以事君涖官交友居處戰陳不盡其道皆謂之不孝而其生平臨深履薄之意直至啓手足之時然後知免由斯以觀孝莫大於敬身敬身則不辱不辱則不傷其親不能敬身者反是言不軌道行不軌法位驕祿侈服竒志淫惑溺於異端馳逐於功利一矢口一跬步之間其身蹈于不孝而貿然不自知者多矣可不懼哉或曰經之言理備矣其節目次第奚所取則焉曰湯公以小學與孝經並講豈無義乎小學者萃曲禮少儀內則祭統諸篇而區别其義類者也記舉其詳小學舉其要擇善而蹈孫志而篤行之孝弟之念油然而生矣化民成俗直指諸掌耳秋紹曰是則公之志也遂書為序蕭長源奏疏序長源蕭公受先皇帝知遇以順治十七年擢侍御史今上御極之七年秋用臺班宿望簡入卿二竊覩公立朝本末毅然以天下事為已任中外想聞丰采者亦以公輔之望屬之不僅以文章著也夫奏對之言與著述異廣川家令而後惟陸敬輿奏劄通達治體曲中事幾不求工於文而文傳焉曾魯公亦云張安道論事人主前數語立決皆燦然成文可書而誦嗚呼文章經濟具見于是矣蕭公九年來抗章纍百自密奏外裒其藁得若干篇余讀之而歎公得君之盛也公事章皇帝未久甫入臺即以敦教化之說進今皇帝萬幾在御公益厲謇諤展布腹心凡所條列有朝奏而夕報可者有補牘再三部議中格卒得俞旨從公請者如警星變恤災荒稽覆奏定紛更核督撫嚴考察澄銓選革那解朝常國紀吏治民瘼無不條分縷析朗若列眉至於屯墾事宜區畫尤晰先後牘凡五上卒行其議而後止何其偉歟歐陽永叔謂天下大計獨宰相可行諫官可言夫兵刑錢榖問而不答相臣之體也然使諸司有一事不受成於宰相則為失職言官於天下事無專屬假令平日未嘗留心利弊一旦身任建白不得已以一言塞責辭漫漶而無據事迂濶而多舛章下諸司一加奏駁則其說立沮矣即如屯墾之法歷代有成效我朝二十年來軍興供億訾算疊增而此法屢議屢罷言事者無成畫而任事者多籍口讀公之疏其亦可愾然興起矣乎夫敬輿早年得君風議切諫常在密勿建梁之地然而木螙蟲生中遭沮抑猶且不卒用以是益嘆公之忠誠能上結主知而又歎我先皇帝與我皇上之從諫如流真不啻千載一時也是編出使讀者知士君子遭逢不諱之朝不可以苟且緘默遺天下議豈獨其文傳也哉褒忠録序國家軍興七載禁旅碁布仰賴聖天子廟算決勝次第削平凡文武將吏竭忠誠以扞疆圍者往往詔旨嘉歎至於再三賚豫遷擢悉踰常格以是載之簡策用紀國恩示激勸豈小補歟張君式似舊守鳳翔刻褒忠録成屬豫為序豫讀之而喟然太息往者固原之變秦州繼陷全陜震驚時君自神木令攝守州事倉卒為清水叛民所執賊愛其才弗殺也責令饋餉與十人者俱君緣道散遣其衆乘夜南遁為邏者所獲又以計跳身脫間關至鳳翔列賊形勢白於諸大帥謂賊軍方屯漢中距秦州千有餘里今堅氷積雪騎無所逞道逺失援此天贊我也宜急出間道潛軍襲之諸軍從君言復秦州固原之勢益孤賊遂大挫夫秦州為故成紀地乃自古秦蜀必爭之樞東連關中西接臨洮北扼延慶平涼南通漢中接巴蜀西漢末為隗囂所據三國時魏人置戍晋以後劉石苻姚以迄拓跋宇文皆畫地固守金源置鎮逺軍宋數出師爭之蓋其地憑險四達如此方事之殷也秦州失則隴蜀連衡賊得併力東向鳳翔必危又河西五郡隔絶軍後使延慶之冦疾馳潼關雖智者不能代為謀矣君之保秦州非獨一州之烈實三秦得失向背之所繫也或曰君瀕險得脫屬有天幸設賊終困君於秦州或中道被縶計無復出君當奈何噫君之得脫於險天也天之不厄君於險惟君之忠誠有以格豚魚而涉坎窞故雖險而不及於難當賊利誘害怵百端撼君屹不為動卒出萬死不顧一生之計孤踪繭足完節自歸而且設竒建策力遏賊鋒以奏成績誠而智忠而有謀天相之矣豈區區徼幸萬一所可同日語哉今君奉新命改守濟南濟南亦南北之脊也水陸輸挽適介其衝頻年師命促數水旱不時正賢者痗心疾首之日而君以盤錯既試之效便宜施設其幹濟必度越尋常百倍異日天子旌能奬勞風示民牧載筆之臣將大書特書不一而足也而又何待於余言寧逺祖氏譜序國家肇造區夏英傑景從遼左世勳宿將攀龍麟而附鳳翼者實與滿洲諸老臣並起於風雲遘㑹之際而寧逺祖氏尤為諸望族之冠曩余扈從至陪京過明東協副總戎公墓道駐馬肅入撫碑拂蘚則其子大將軍兄弟之名在焉因慨然欷歎曰明時稱邊將戰陳有勇一日而禦九門之兵者其此公歟緬想風烈低徊者久之比載筆與修國史獲覩天聰崇德間拔取大淩河及克錦州遺事淩河之役將軍乘夜入御營已約降矣而復不果退守錦州孤城十餘年然後識時嚮順太宗皇帝仁聖大度不責前事而益朂以黽勉建功於時將軍感激垂涕頓顙于旌門之外且策厲諸子弟共竭忠貞以矢報稱而祖氏世業之昌光耀之逺實始基於此竊按祖之先為商祖已之裔晉以後世居范陽至鎮西將軍逖之少子始流寓於滁歷數十傳而至明初有自滁從戎度遼者纍功授寧逺衛指揮世職遂家於寧逺迄今十有餘世門閥日啓瓜瓞日繁而族系未有專譜副都統心標先生瞿然念之顧滁陽代逺傳聞異辭即明初度遼以來事蹟湮失者亦概從缺略於是追闡前烈斷自八世始其十世則為大將軍兄弟十一世以下或開制府或統禁軍或躋藩臬或秉學憲一門列顯秩者凡八九人而心標先生之治閩也威愛互行軍民戴德不啻鎮西之在豫州其他子姓繩繩濟美復如朝陽之旭方熾而未艾可不謂極盛矣乎先生譜成以學憲起凡為先大夫乙未所得士余辱在世講知家世為詳介弟協領燮公又適駐京口乃不棄固陋問序於豫豫既据所見聞書于首簡因嘆先生之勤勤於此譜也將使後人展而讀者上念國恩逺紹祖德油油然發其敦本睦族之心而益奮厲于竭忠貞以矢報稱之誼則先生之用意為至深而垂訓為至逺且大矣傳有之葛藟能庇其本根言乎枝葉之茂即本根所倚以為固也又曰公侯之子孫必復其始言乎族大齒蕃保之以令德而繼世當復為公侯也吾於祖氏之子孫卜之矣養生微言序養生之學儒者所不廢稟氣之厚薄命數之延促造物者主之雖父子不相賜也而疾疫災眚之或消或長四體百骸之或榮或哀譬樹藝然鹵莽滅裂與辛苦灌溉者人自食其報耳造物何與焉故曰知命者必重養生雖然方士迂怪之術每哆口言神仙其事既荒誕而不可信即所云餌丹砂服金石亦皆以身試藥而一利不能勝百害者也理之最切近易效者無如呼吸吐納人生天地間惟氣盛液行坎離相濟可以有延年却病之道外此皆魔妄耳而好竒者每以淺易忽之昔東坡晚年精養生學其自言得力處則曰老生常談即是妙訣咽津納息積久自效不須求新竒也可謂至言不煩㑹稽章子究心日久手疏微言一編以切近工夫指示來學而真實妙義具備於中有志者力行之而不止方知其事之有實驗而東坡之論初不為英雄欺人語也抑余更有聞者人之至樂莫若身無病而心無憂假使利害毁譽聲塵愛憎日轆轤於方寸之中而徒欲以區區導引吞咽補其缺陷本既先撥而枝葉豈能復榮縱日講養生之學何救於萬一哉夫外輕而內適則心無憂矣息恚怒抑躁競節言語平忮刻淡泊寧靜以守其真而後肆力於滋息培養庶幾其有得乎則願以一言蔽之曰善養生者自飬心始此章子未發之藴也謹揭之以書於卷端送李侍讀楊職方同使安南序國家懷柔逺人東西日出入之鄉罔不率俾而安南視他屬國為近自奉正朔以來賜恤賜封使者冠蓋相望於道恩澤至厚今年夏四月滇南奏安南國王黎維禧以兵脅安南都統使莫元清襲髙平地元清竄入滇而粵西撫臣亦奏維禧賫牒來訴以黎莫世郤為辭詔下諸王大臣議僉曰蠢爾蠻邦不奉朝命輒肆侵奪無人臣禮請亟移師聲其罪或易王封或置郡分五管如前代故事而聖天子不忍也兵部臣因請降敕粵西守土臣馳檄諭維禧令即歸元清故地不則移師未晚天子又慮尺一之詔不能盡布德意命慎擇中朝臣具才望善辭令者乘傳宣諭於是院臣部臣咸推轂侍讀李公仙根職方主事楊公兆傑制曰可二公既聞命趣裝就道朝士大夫羣餞於國門外或私相語曰交人自漢以來叛亂相尋屢煩師旅今謂兩使臣至能即率命否乎豫曰必率命無疑也夫黎氏以莫氏世郤為言其辭遁矣我國家既開西南道元清歸命實先朝命授元清都統使是即天子命臣也敕元清仍世長髙平地是即天子分土也黎氏嚮順在莫氏後國家不責其既往錫以真封謂宜與莫氏各守外圉恪共臣職今維禧甘為戎首蔑王制復私讐一舉而三失焉誰為黎畫此謀者吾聞交南歡演人頗嚮學夫豈不知略地之非而乃謬以春秋大復仇文飾其說其亦悚然有悔心乎兩使臣引擅兵爭奪之罪與後嗣不敵怨之義從容諭之必有能俯首聽命者或曰彼獷悍善變難以理屈所懾者利與􅊣耳夫即為黎計滅莫氏非黎福也昔陳氏王安南百餘年而黎滅之陳之憾黎視黎憾莫孰甚其外壤西鄰老撾南鄰占城皆曽受黎虐欲得而甘心者也獨黎受中朝封爵倚藉天威可長恃以無恐一旦為中朝罪人則起而復九世仇者將環列而踵至黎尚得安枕卧乎既陳說以大義復曉譬以利􅊣猶不幡然悔罪趨還莫氏故土是速禍也黎雖愚必不出此嗟乎以我國家全盛之力遣一旅斬關聲罪如摧枯拉朽耳今不即煩貔虎之師戈船下瀨之士而儼然璽書慰諭國恩深厚不啻覆載兩使臣以立談銷甲兵上揚天子威靈下救交人生齒數百萬以視前代征南諸將之功豈不更偉哉是可為二公劵也或曰子之言然盍志之因書為序施匪莪嘯閣文集序兼才之難自昔已然不獨理學經術政事文章若分河飲水不能相及也即如文章一道詩歌詞賦和聲叶律之文與所謂古文辭經經緯史者判然二矣而詩之為古體為今體文之為叙事為論斷又往往各有師承區疆畫陌於是操觚之士不得已而窮老盡氣專精於一業庶幾有所托以立名如三唐人以詩應制舉而自一二大家而外輒用一體擅長或單詞傳世則其他可知已泗上施君匪莪博極羣書陶鑄百氏其見於論著獨能易古人之所難嘯閣集詩多至數百首結撰之工巧掇拾之敏給為傅長虞王介甫諸公所不及暇日又出所為文若干卷示余余受而讀之如金舂石戛如劍花星芒如百川之潨流如五兵之森列窮形極態無物不有竊謂嘯閣詩集古人已成之句千腋為裘有目共覩而文則比事按義無規橅古人之迹而名章俊語絡繹奔㑹非寢食涵濡於兩漢八家者不能世之學者未之或知也集中所載若字學醫理以及形家之言皆别有篇目而余反覆賦鏡録一編嘆君經術政事可以維挽吏治潤澤生民不當斤斤以文章著乃跡其十年來宦游所歷由廣文稍遷為令僅得一小邑比及報最復入為司城縱簿領不煩而浮沉俯仰不獲大見設施於世亦可謂嗇於遇矣而君坦懷寄傲處之泊如散衙以後把卷洛誦儼如後門寒素客至則一茗一蔬相對竟夕其恬適曠逺之致全體晉人宜乎其才日裕學日充而著書日益富也夫長安輪蹄馺遝士大夫爭以脂韋相尚目簡默為疏庸鄙詩書為迂濶君位卑職散卓然有嶽立千仭之槩雖未嘗侈口理學而清修介氣歷久不渝真所謂行已不愧聖賢者推而經術政事皆其資深逢原者矣區區文章云乎哉張又南詩文序關中又南張公吾宗之望也公從大理卿奉命涖八閩提督軍事旋纘襄壯公舊服位列徹侯威望益重越今六載而環海無刁斗之警貢舶市䑩相屬不絶軍民浹和閩稱大治先是戊辰冬公乘傳來朝特被溫諭命三嵗一入覲迄辛未秋届期陳請天子俞其奏冬十月馳至都下陛見之日慰勞有加賚豫稠叠比行過余言别曰僕本以儒臣謬典軍旅幸無隕越顧宿嗜未忘間從事于書史嵗月既久得詩文若干願為我叙之余讀之喟然而興曰國家太平文德之盛勳臣保障安輯之功具見於此矣惟閩襟山帶海夙稱奧區異時賊寇奸宄展轉遘亂文武將吏相呼尋于干戈戰陳之事者四十餘年自廟謨耆定以後郡縣及於島外絃誦徹于荒徼疆圉晏堵文恬而武嬉由是為將帥者得以餘閒修郊射之容講雅歌之節自澤其身于詩書六藝之中而使一時兜鍪跗注盡脫其剽悍不戢之氣以相與扞衛其人民而約束于軍律於戲豈非休遇哉雖然有其遇矣而非得公之才與學則亦不能至焉昔襄壯公之鎮西陲也久畨部嵗時欵塞不敢馳介馬入牧於境上於時邊鄙不聳幕府無事因而延致宿學負文譽之士如李天生王山史諸君偕公昆仲游搜討經史鏃礪詩古文辭穿穴貫通學殖日富而公天資踔絶其才力尤足以副之今集中所載詩出入三唐格律工穩而時溢竒氣文具磊落英邁之概不名一家即書疏酬答亦為海內所珍重藏弆何體備衆妙一至是耶夫文章事功古難兼擅公方垂勳名于琬琰竹帛之上而孶孳焉揚扢文事如此豈不以遭時休明雅化翔洽將帥之臣公侯之子孫必能折節嚮學不矜其功伐而後可長享福祿令名於無窮則是集也公寧獨以博洽雄視一世凡所為紹襄壯公之光烈而保世滋大者悉于兹寓焉是用書以為序楊瀣仙心廬集序子之報其親也三年之喪而已乎詩曰哀哀父母生我劬勞又曰欲報之德昊天罔極焄蒿悲愴之意至於白首沒齒而其哀未有已者人子之心也聖人制禮準乎情酌乎義以為其勢不得不有所止故親喪之服斷以三年而自虞祭以內寢苫枕凷閲小祥大祥菜果醯醬食各有節逮入禪而始淡其淡也所謂制禮不敢過也人子之心豈其有淡於親也哉至於居廬之制初喪則君為廬宫之大夫士䄠之既葬而柱楣塗廬君大夫士皆宫之其義倚木為廬在中門外東墻之下蓋古人之居廬皆廬於其家而所謂廬於墓者無明文也雖然禮特為君大夫士言耳生長貧賤席門穴牖其井臼牀銼雜陳於一室之內安所得廬而倚之即不然古者大夫三月而葬士踰月而葬葬之距朝夕奠未幾也因不忍造次離於親側於是築室墓旁以風餐露宿終其無已之痛雖記無明文謂之知禮誰曰不宜瀣仙楊子天性淳孝嘗刲臂以療親疾及罹大故日以一溢米倚哭於屋之東偏既葬而糊口四方不得遂廬墓之志乃鈎考古今人得行其志者自漢申屠子龍而下若干人旁托其事而繫之以詩題曰心廬集此與皇甫士安作高士傳以自况者不同而其用意則良苦矣記曰視無形聽無聲方親之生存耳目視聽常在形聲聞見之外及親既殁而衣裳杯棬觸物思痛固不必身在墓側然後悲哀發於胸臆也且不嘗讀曾子之遺書乎險塗隘巷不求先焉以愛其身是以跬步不忘父母也出言以鄂鄂行身以戰戰一言行不忘父母也見利思辱見惡思詬嗜欲思耻忿怒思患一發慮不忘父母也繇斯以推楊子之為倚廬也多矣以視夫風餐露宿於墟墓之間者儻所謂其事則異其志則同者也嗚呼世風漓而孝道衰衰絰之中婚姻燕饗浸淫成俗恬不知怪縉紳士大夫則有非金革之事而訟言奪情者矣又其甚者託辭令甲謂以私家持三年之喪而三月六月以後服官視事輕肥出入無復有哀毁見於顔色噫吾願以心廬之義告之北海集序學士遇羲鄂公既沒之九年其子中舍賽君出公所著北海詩集若干卷示豫且屬豫為序豫縮恧愧汗敬謝不敏比啓牘則洪文襄之序在焉公與文襄共事吳楚間者久文襄知公為深其序公集也簡而質信而有徴後生末學聞見黔陋豈復能道揚萬一為公重哉嗚呼我祖宗朝纍葉作人生材不盡崇德中頻舉制科得人尤盛方公領鄉試第一胸中已穿貫經史巋然負大人宿儒之望矣世祖章皇帝既定天下公即槖筆官禁近回翔館閣十有八年洊躋翰林學士兼少宗伯之職先皇帝雅重公文學固亟欲公秉鈞贊元日夕獻替於㫋厦之上而自初元入關以後命公佐籌師中者迄無虛嵗國家大征伐如定三秦下吳越克八閩平荆楚靖滇黔或以親藩仗鉞或以重將握符而公皆預參帷幄定策決勝蓋自古軍旅之事必資通經術崇信義之人秩然示三軍以禮而後其衆為可用被廬之搜趙衰讓於卻縠謂說禮樂而敦詩書惟縠為可嗚呼先皇帝之久煩公於征鼙戍鼓問者意其在斯乎集中所載大率使車瀏覽感時紀事之作為多昔人謂單門寒素足不踰井閈雖藻思綺才淩轢顔謝終難免於醯雞之誚公馬首所至幾於九土游其八矣山川之瑰異風物之變遷悉有以激發其磊落吞吐之氣豈區區郊寒島瘦所能倣佛其萬一者乎至於鋪陳軍容張皇天討直與車攻吉日江漢常武諸篇後先競響今讀之而鐃音凱奏與大將軍躍馬涖陳處歷歷可指也所謂進風於雅而以史兼詩者惟公有焉使天假以大年獲觀今天子休明黼黻之盛則公之詩當更有埒於卷阿既醉之什為國家鼓吹郅治者而惜乎其止於此也讀竟留連久之敬題末柬以歸中舍非敢曰序公之詩也葉星期西南草序星期與余别十二年矣性不耐為吏經嵗而拂衣俯仰侘傺無以申寫其孤憤鬱邑之氣而一寓之于詩頃歸自嶺南顧余于堊廬留連信宿出示西南行草屐齒所歷既極登臨覽觀之盛其所與酬唱往還又多海內倜儻磊落不羈之士而詩之竒皆足以發之余讀競驚伏顧謂星期曰近人稱詩者多矣而傾吐懷抱大放厥辭排哭奡兀不名一家未有與子頡頏者也請子述所以工詩之旨可乎於是星期抵掌語余曰放廢十載屏除俗慮盡發篋衍所藏唐宋元明人詩探索其源流考鏡其正變蓋詩為心聲不膠一轍揆其旨趣約以三語蔽之曰情曰事曰理自雅頌詩人以來莫之或易也三者具備而縱其氣之所如上摩青旻下窮物象或笑或啼或歌或罷如泉流風激如霆迅電掣觸類賦形騁態極變以才御氣而法自寓焉世之縳律為法者才薾而氣荏徒為古人傭𨽻而已烏足以語此余聞之撫几而嘆旨哉斯言足以砭俗學之膏肓破拘攣之痼疾矣遂與促席品次古人之詩星期持論齗齗多否而少可謂千餘年間惟少陵昌黎眉山三家髙山喬嶽拔地聳峙所謂豪傑特立之士餘子不足擬也余因三復星期諸作而求其比似則鋪陳排比頓挫激昻類少陵詰屈離竒陳言刋落類昌黎吐納衆有涌泉萬斛類眉山緣情繪事妙入至理而自嫻古法其才氣之縱軼寧或涉于頺放怪誕為世所詬姗而必不肯為局縮依傍之態甚矣星期之學能不愧于其言而卓然自成為一家之詩者也兹游語溪將偕孟舉吳子為宋元詩選且謂選詩既竣即肆力于古文辭以求合乎先正作者夫詩與文道一而已以星期之才日進而不止更十年後東南稱文章巨手為後起領袖者舍星期其誰與歸余雖學殖荒落願俟星期集成援筆而序之畿輔志序維我國家誕受景命中外效職文軌畢同燕京定鼎雖踵前代舊迹而經營締造百度聿新三十餘年以來德澤漸濡建置周密洵足淩軼往古昭示來兹固不恃區區形勢之勝稱天府都㑹之雄已也在易觀之象曰先王以省方觀民設教古巡狩方嶽十二年一舉而畿內甸服則有春秋時巡之典列國諸侯貢詩於王朝爰頒政令以變易民俗而王畿尤為風化之首自風詩既廢所可徴者者志乘而已志乘具則美惡昭法戒備此在列服猶不可缺而况京師首善之地乎方嵗壬子詔允閣臣請命各省分輯志書督撫臣上之史館彚萃編次用紀大一統之盛屬以軍興未遑蕆事頃者海宇謐寧文字翔洽各省志次第成帙而畿輔通志亦繕藁報竣㑹某奉命填撫八郡獲受而卒業考其條目綜其義例疆分理析部列族居粵自山川扼塞土田賦稅以及關津郵傳城郭堡戍之沿襲與夫宦遊土著名賢碩彥之遺蹟方土物宜禽魚卉木之産植凡屬職方訓方之所掌道川師邍師之所頒辨皎若眉列原委爛如以是上備聖天子體國經野之資下禆大小官司承流敷化之助信所謂綱舉目張班班可考者矣于是申檄所司授工鋟梓裝演讐校計若干卷某幸例得厠名卷端撰序始末竊因是有憬然滋懼者焉燕之建都邑也遼為南京金為中都元為大都路明改建北京數百年間歷朝規制按籍可考田野何以瘠何以腴軍實何以堅何以脆户口何以贏何以縮風俗何以淳何以漓軍吏雜糅莠良錯處或控御失術奸宄蘖芽或劑燮適宜獄市不擾雖古今殊勢而治忽一理某與諸君子恪秉簡書撫河山之遼闊軫民庶之殷繁屬兹守土與有均責一或失當即隕越隨之是則某所執卷三復如涉淵冰者也是書也始于康熙十九年之七月成于二十一年之四月總裁官前巡撫僉都御史于公成龍監臨提調官參議董君秉忠僉事吳君元萊董理官保定府知府紀君宏謨總修翰林院侍講郭君棻自餘分纂諸執事俱詳書别簡云辛未科㑹試録序欽惟皇上聖神文武光被海宇三十年於兹綱紀修明教化翔洽殊方絶域之衆咸畏威戴德稽首嚮順於荒遐萬里之外而庶司百職事之凜凜效職者皆恪守尺度以奉行朝廷德意將使薄海內外無匹夫匹婦不獲其所而一時為士子者無不蒸蒸興起思驤首於聖世以自踴躍於功名之路蓋大澤之霑濡久矣必世後仁斯其時也民生日以厚民俗日以醇而其昭融昌熾之象尤先見於士氣則遭際盛時而以文章藻黻至治豈非儒生之厚幸歟嵗在辛未天下貢士待試於禮部者二千五百人有竒届期禮臣以考官請上命臣玉書偕臣廷敬臣光地臣士禎同往典試事臣學術黯陋文質無所底仰䝉皇上不次拔擢回翔禁近入直講筵洊歷部務進參機密荷恩深重不克展報尺寸臣奉職無狀如此而皇上猶不斥其駑下輒加驅䇿兹復委以掄才重任臣益切大懼矣臣惟主司之所憑者士子一日之文而已其文合於度則録之不合於度則黜之雖其人宿負文譽而為主司者因其一日之短黜而不録即怨謗滋起不能恤也且既已糊名易書而或以好名懼謗之故欲稍存一揣摩物色之見以冀幸於一旦名曰憐才其私一耳臣誓與諸臣力戒之言者心之聲也帖括之文雖以應制舉而其精神心術之所在或正或邪或誠或僞未嘗不發露於議論離合之間第衡文者不深察耳夫鬷明堂下一言叔向猶聞聲而知其人况三試其文乎臣願與諸臣力勉之自丙戌以來文體凡屢變矣皇上加意右文人才蔚起一時英雋之士翹翹焉欲去時文軟熟膚淺之病以古學相尚而不善學者至以脫繩墨為髙雜稗乘為博兀奡而不馴汗漫而無當其弊將流為蕩間軼矩之歸而且浸淫有離經背傳之患臣至愚鰓鰓慮之夫文有理焉有法焉有辭焉理必依傳注法必宗先正辭必本六經如水之有坊農之有畔不容越也初試之日即以此意傳示諸士比至校藝則寧質毋縟寧實毋浮寧簡毋冗寧易毋僻其為支離謬悠之說得以詭遇而幸獲者抑已罕矣而又於再試三試之文觀其該洽今古之學則諸士中亦遂能分條晰縷於人品之純駁吏治之緩急道術之源流律吕之條理歷歷指陳其端而疏通證明其義於是臣與諸臣執卷相慶謂天下沐浴教澤之久而實學有本不諧流俗之士出於其中故其文多卓然可觀如此人才關乎氣運詎不盛歟校閲凡二十晝夜得卷一百五十有六今録其雅正者二十篇進呈睿覽臣謹揚言簡端進多士而朂之曰國家今日之甄録諸士惟其文也異日畀之政事而登用之惟其人也以為科目不足得人耶姑無論往代即本朝五十年間由科目致身而姓名焜耀於簡册者項背相望矣以為盡得人耶彼列上第躋華膴一旦隕墜至於身名俱辱者亦指不勝數矣然而用人之法終不得不重科目誠使一科之內得一二人者樹功立名於不朽則於朝廷設科取士之意已自無負但為士子者身受國恩宜人人思有以自見顧安得借一二人之樹立以自逭其責也臣願諸士各踐其先資之言本經明行修以達於規為措注之際所謂實學有本不諧流俗者不獨見於文字而持身服官亦由是焉記有之曰毁方而瓦合言能與物同也曰砥礪廉隅言不刓方以為圓也既言與物同而又言不刓方者何也以廉隅為體以瓦合為用特立獨行與推賢讓能二者交盡庶幾儒行備而有禆於治理乎宋臣李沆論為治之道亦謂勿用浮薄新進喜事之人夫浮薄喜事之人皆其不能特立獨行推賢讓能者也諸士自勉為經明行修而耻出於浮薄則所以為科目重者在此所以報國恩者即在此而臣等孜孜焉因言考行期仰副皇上鄭重掄才之心以成國家昭融昌熾之象者亦可藉是以答休命矣諸士其朂之哉吳江縣志序皇上御極之二十有二年直省大吏各奉詔旨上所修通志於史館玉書承乏為禮官得次第檢閲而府州縣志藏諸有司無寓目者知吳江縣事郭君屬邑紳葉君星期修縣志成特郵書京邸問序于余余受而卒業見其發凡起例綱舉目張視明莫正學徐給事二志之舊損益各半蔚稱定本遂不辭弇陋而為之序曰縣之有志通志之權輿也通志紀要縣志紀詳故辭宜該事宜博雖然義例不具持擇不嚴雖該且博無取焉大凡物足以贍財賄利器用事足以厚風俗備董勸則雖草木蟲魚畜牧孶息之數搏埴輪斫良窳工拙之藝與夫井陌耕饁委巷纖悉之務孤嫠孝婦幽憂煩寃之隱皆不厭瑣賾籍而記之以是為盡心民瘼者之所有事若乃琳宫梵剎倐創倐湮園林墟壠或存或沒以及諛墓頌德之文遊宴贈處之什一無繫於得失而沾沾載諸簡䇿是亦可謂不知類矣郭君之輯志也義例秩如寧嚴勿濫不獨資考索抑以寓政事焉松陵邑稱繁劇地瘵以疲其當務之急無如水利賦稅三江五湖世食其澤而害亦因之積潦不泄沮洳彌望則農事病矣疆域延袤四百餘里嵗輸五十餘萬版籍既定賦不容減則民力憊矣是編裒集羣議條列便宜俾前有可稽後有可效所謂勤恤疾苦為一邑規久逺之利者莫踰于此至于辨星野之躔次正疆域之鱗錯以及搜考藝文證据軼事訂舊志之訛而補葺其缺漏蓋兢兢乎慎之而於人物貞義節烈之蹟品量論核收録尤嚴夫昔人作史稍徇愛憎輒有曲希時旨猥釋私憾之譏兹于一邑之乘不妄毁譽進退如此豈不可為良史之軌範而志乘之標準矣乎郭君治邑五載潔已而惠下鋤莠而殖良其侃侃砥節不愆于職之義悉于志見其端故曰以志寓政郭君有焉星期穿貫諸史多聞而善斷能成郭君之美而傳信于其鄉之後人是則可並書也謹序張文貞集卷四
