body:
  text: 張文貞集卷二大學士張玉書撰請復國學積分之法疏題為請復積分之法以嚴考課以昭廣勵事竊惟國家設立太學教育人材自三代以來未之有改而士氣盛衰禮教興替往往有古今不相及之嘆豈真人才不逮古人良由教導之法未詳激勵之方未備故日就頽敝而不知所鼓勸也考臣衙門舊制原有號舍一百七十餘間以栖止諸生兼有日給廪餼令肄業其中以講習學行而為之師長者亦得嵗時漸摩各施其教此實唐人限通一經宋人歷遷三舍之遺意今學舍久荒廪餼未設值此錢糧匱乏時豈容再議興復但考課之法有不得不申舉者見在各項監生隸名六堂不下二千餘人然每以資斧艱難道里遼逺或請假依親或遊學他省以致季考月課應試寥寥至新例援納又竟附本省州縣身未登倫紀之堂目不覩辟雍之盛而裒然衣頂側名國學於是從前六館諸生益復觀望效尤甘自怠棄此時欲大加整頓則勢有所難行若一任其曠弛又重負於職掌臣等再四思維非復積分之法不可所謂積分者計月積纍由半分一分積至八分為合格其合格者恩拔貢生改稱貢舉援納監生改稱監貢監貢又積滿分數改稱貢舉並得送部從優試用與尋常監滿咨部考授佐二者不同世祖章皇帝時舉行甚久至順治十七年因事例未開到監人少暫行停止後科臣吳國龍嚴沆條奏請復積分部議未經覆允竊念鼓勸士子振興文教未有過於此法者人多固宜修復人少更應舉行目前應試寥寥乃在監肄業者少非隸名國學者少也若不懸優格以示勞來則諸生無所鼓舞不設嚴課以定殿最則新進無所觀摩至于考課之法遵照舊例兼試策論古文以考驗其實學仍糊名公閲寧嚴毋濫是在臣等與六堂諸臣共矢公慎以仰副國家敷教之盛典也夫成均為首善之地教育乃出治之原此法一行庶幾人才蔚起化澤覃敷名器不致濫竽而學校益以增重矣臣等職掌所關謬陳管見仰祈皇上俯鑒敕部議覆施行請行選拔疏題為請行選拔以廣教育事宋儒朱熹有言古之太學主於教人而因以取士是國學之設原欲網羅天下英雋以備國家異日之用非徒具文而已考國子監生舊有四途曰舉監曰貢監曰官監曰例監舉監之法本朝未行貢監一項有副榜入監者有嵗貢生廷試後入監讀書者合計不過一二百人至官廕監生為數既少監期復淺入仕之念速嚮學之念輕獨例監一途比年以來頗稱濟濟以彼數千百人之中豈盡無英才異質然篤學潛修逺大自命者亦僅百之一二餘皆竊胄監之虛名為梯榮之捷徑非真有文章品行卓然可以名世者也近因軍興繁費又有尅期進勦及捐鎗運米等項名目愈多流品愈雜有年不滿數嵗目未識一丁者雖欲遵照監規嚴行考課勢實不能臣等備員教鐸坐視因循寧不大曠厥職上負朝廷設官作人之至意乎竊思入監各途惟貢監中選拔一項最為良法查順治八年十二年兩經舉行康熙十年皇上復俞臣衙門滿漢諸臣之請令直省學臣選取生員文行兼優者起送赴監一時多士連茹可謂極盛如壬子乙卯二科鄉試中式頗多其見在臣衙門取充八旗教習者亦能約束諸生盡心講肄成效既彰理宜續舉伏請皇上敕下禮部詳察往例酌定成規每遇鄉試後令直省學臣舉行一次或於廩膳生員內或于科嵗考優等生員內考取文學優長品行素著者每學一人貢入國學如堪貢無人寧虛毋濫其起送到監者臣等仍嚴加校試倘有文理荒疏品行陋劣即照往例駁回本籍如此行之數年將見六館諸生彬彬郁郁皆經明行修之士即各項捐納者亦知觀感砥礪不肯以區區升斗重自菲薄矣夫國學者鄉學之權輿也國學之人才鄉學人才之標準也不收天下之人才於國學則無以風示生徒敦崇教化選拔之法誠為目前奬厲人才之計臣等忝厠成均敬攄一得仰祈皇上俯鑒敕部議覆施行請開言路疏題為請飭部院大臣不時條奏職掌兼舉召對之典以備採擇事臣伏覩皇上軫念民生求言若渴此真堯舜禹湯懸鞀之盛心也竊惟民生視乎吏治吏治統於部院大臣任斯職者凡民生利害制度因革無時不宜留心考究逐事敷陳原不待詔下求言然後獻納如銓政某事宜更改某事宜復舊某官稱職應擢用某官不稱職應罷黜錢糧某項應節省某項應改折兵餉應作何核實撥給應作何清查以至樞臣握兵馬之數某處冗兵宜裁某處冗將宜省憲臣司風紀之總某省督撫賢宜留某省督撫不肖宜劾推之别部各有事宜倘諸臣不時悉心訪問確有見聞即據實條奏我皇上從諫如流定邀採納如近日吏部議改寄憑都察院議停認工皆奉俞旨矣諸臣但患所言不當何患言之難行若平時瞻徇推諉必待奉上諭而後循例條陳臣竊慮其晚也至于條陳事宜其詳細委曲或有不能盡列于章奏者考前代令主每有召見羣臣面詢得失之事我世祖章皇帝亦嘗于萬幾清暇虛懷召對不厭娓娓瀆聽臣望皇上再舉此典或於啓奏時隨事面質或不時召對滿漢廷臣詢問職掌並各直省民生利病既有以周知疾苦兼可覘在廷諸臣果否實盡職掌留意民生庶臣工知所鼓勵而治安可期矣請核兵餉疏題為請核給兵米豆實價以清冒支事竊臣見各省過往及駐防官兵有别省協濟錢糧有本地支銷錢糧報部米價每石作銀一兩二三錢不等豆價每石作銀一兩四五錢不等此在米豆價貴時則然近年臣鄉江南米豆時價極多不過一兩聞浙省楚省亦然而各省支銷錢糧多至一兩以外計每石浮用三四錢不等縱內部屢駁核減而藩司轉詳督撫督撫轉咨內部仍不改其原報數目也夫該督撫藩司明知該地方米豆價賤決無照報部價多給與兵之理此每石所餘三四錢之銀不過節扣使費上下分肥當此兵餉浩繁之日曾無一實心為國之臣清核給兵徒恣中飽殊可痛也臣請敕下户部詳查各省每年奏銷兵餉錢糧册米每石作銀幾何豆每石作銀幾何而兵丁所得米豆實數幾何便知此中浮冒侵漁弊竇矣自今以後合無請敕下該督撫每嵗撥給兵餉務一一核實注册報部如有虛冒以少作多聽科道官摘參庶幾餉無漏巵而兵得宿飽矣如果臣言可採伏乞敕部酌議施行請杜設法名色疏題為請飭部臣永杜設法名色以清濫征之源以蘇民生事方今民窮財盡多因有司私𣲖在廷諸臣人人能言之而有司敢行私𣲖無所顧忌者每借口督撫之憲檄與內部之咨文蓋每年正供賦額各有抵銷遇有别項費用部臣輒請敕該督撫酌量設法不得動用正項錢糧在部臣之意原以各省事難遙度須本地方官從長商𣙜庶無貽纍小民法非不善但百姓除正供糧稅外别無餘物可以設法名為設法實則加𣲖而巳夫額外因事量增原應一時不得巳之用獨是部文一下貪婪官吏借端侵漁本應設處者十之一而私𣲖者已及十之五百姓但見奉部文轉行不敢復向有司問多寡之數而有司之申詳督撫督撫之轉報內部者與科斂小民之額多不相符百姓不得知內部亦不得知也取敲骨吸髓之金錢填官吏無窮之溪壑豈不重可惜哉臣請敕下部臣凡遇正項外一切别項費用應作何那辦者須酌量妥確行文該督撫遵照奉行仍請敕該督撫嚴飭州縣有司不得事外借端科𣲖庶幾各省貪吏朘削之害可以少止矣請編次樂律算數書疏題為聖學洞理數之原宸訓發精微之藴恭請御製成編垂示永久事康熙三十一年正月初四日仰蒙聖恩以嵗首機務餘暇欲以理數樂律之學牖誨諸臣特召臣等至乾清門環侍御座之側皇上檢閲性理披圖指示因而究論算數綜考律吕辨徑一圍三之非窮隔八相生之實俾臣等見所未見聞所未聞退而相顧驚喜深愧從前學識淺陋錮守陳言而不自知其迷惑也夫徑一圍三之説前人以粗疏約略未經密算之法筆之于書後人習而不察遂亦以其説為是膠守而不知辨皇上取方圓諸圖參互試之乃知每徑一尺圍當三尺一寸四分一釐有竒若止於圍三則竒零不盡之數無所歸著每徑一尺即差一寸四分有竒尋丈以上其差彌甚聖諭謂徑一圍三止可算六角而不可算圍圓誠不易之至理也事最明顯具在目前而律吕新書諸説未究及此所以徒為空言而未嘗求驗諸實用固無往而不見其訛舛耳至于十二律隔八相生宋儒載其圖具其説而其自然之理與所以然之故未有能實指之者皇上命樂工以笛和瑟審其聲音七音髙下次第相生至第八聲復還其始所謂隔八相生之法其本原實在乎是從來論樂者皆未之及蓋千古未發之祕自我皇上今日發之非聖心神悟本于天授何由得此皇上又諭從來尺制不同十二律之長短以尺定管不足為據必當以天地度數為主大哉聖言中和位育之理悉具于中矣夫萬物之用皆起於數律度量衡悉從此出而數不離於理不能窮不易之理必不能究不易之數惟我皇上以天縱之資極格物之學凡立一法定一制務期試諸實用見之明效然後斷然無疑以此法而測晷景辨分杪計嵗差驗交食量度高深審定音律隨所施用無不吻合蓋至理得而至數畢符所謂近之不遺于日用而推之直可通于造化者也顧樂律算數之學失傳已久承訛襲舛莫摘其非奧義微機莫探其藴在臣等躬聆訓誨猶且一時省悟而覆算迷蒙中外臣民何由共喻臣等仰祈皇上特賜裁定編次成書頒示四方共相講習正歷來積算之差訛垂萬世和聲之善法學術政事均有禆益臣民幸甚後世幸甚喀爾喀內附請上尊號疏題為皇仁被于殊域聖武訖于遐陬允應誕膺尊號以愜敷天忭悃事欽惟皇上量同天地明並日月舉中外之大人民之衆咸欲豫以生全登諸衽席雖在荒裔不忍遐遺所以梗化弗率則臨之以兵威嚮義來朝則綏之以恩澤蓋自五帝所未臣三王所未服罔不重譯頓顙奉表諭誠此皆我皇上睿斷神謀深仁盛德之所致也惟喀爾喀曩在蒙古素稱不馴當太祖太宗世祖皇帝時屢勤征伐順逆靡常雖貢獻之使不絶于道而伊汗等恃有七旗部族人民數十萬衆未嘗躬修臣節今仰戴天威感懷聖德咸傾心臣服願列屬藩皇上又念喀爾喀素無統紀罔知禮法其間安輯機宜賞罰次第非車駕親臨裁決不能盡善於是六龍時邁刻期會同喀爾喀土謝圖汗扎薩克圖汗之弟及車陳汗率諸濟農諾顔並台吉等皆伏地迎謁會朝如儀皇上察其誠懇錫宴頒賚極其優渥爰為編立旗分與我四十九旗等惟土謝圖汗車陳汗名目暫令如舊餘則或易王爵或畀貝勒貝子公台吉各銜量功授秩各有差等其他悉詔所司分别區處禮成又特降諭旨重申訓誡明示以守法謹度則福及子孫悖道恣行則身罹禁網既恤其困窮復謀其生計既使之樂育復令其保終興滅繼絶懷柔逺人之道至斯極矣臣等幸際昌期欣逢盛事竊惟數十年憑陵之衆戴德歸心數十萬新附之人歡呼匝地仁莫尚焉威莫加焉赫聲濯靈洋溢邊徼普天率土罔敢不臣千萬年太平基業自兹永奠歷稽前史古帝王功德未有如我皇上之隆盛者也用是昭告九廟可仰慰列聖在天之靈宣布多方可衆識異域來王之義我皇上神聖文武嫓美勳華中外歡欣揄揚莫殫允宜誕膺尊號式昭巨典丕洽輿情並請將喀爾喀臣服本末編入方略垂示萬祀臣等不勝慶忭顒望之至其應行典禮伏乞敕下該部察例施行再上尊號疏題為聖主應崇顯號輿情顒望至殷謹冒昧瀆陳懇祈鑒允事欽惟皇上聖德神功光被四表深仁厚澤咸和萬民考之史册所載歷代賢君哲后之懿軌總未有比隆於今日者臣等欣逢堯舜之主公請崇上尊號以垂示來兹顧屢次奏陳未蒙俞允臣等踧踖無已比日以來三復前所奉諭旨仰見皇上宵旰勤勞惟以民生休戚為念逺爾安靜為本舉凡慶雲景星諸瑞無關于黔黎者總無關于聖心而且以取一時之虛名為聖心所不悅大哉聖人之言非識超今古道徹天人不能明訓及此即此諭旨敷行固已逺駕歷代帝王之上足以流光萬祀矣伏念臣等請上尊稱正欲敷揚四十餘年之實心實政絶非僅以虛名頌美君父此不獨在廷諸臣及輦轂士民之諄請實中外臣民之公願亦天下萬世之公言也從來有非常之大德者宜膺非常之顯號祖宗之朝具有故事皇上纘承前烈允行盛典式愜輿情向年臣等曾以虞書之稱帝堯者擬進尊號為聖神文武大德廣運皇帝今再四尋繹惟此二語形容與天合撰之德庶幾允協伏祈皇上曲從衆請特賜舉行廷臣幸甚天下臣民幸甚請停止本年秋審疏題為請旨事切惟皇上至德𢎞慈同符天地每嵗特遣大臣會同法司清理刑獄赦過宥罪曲賜矜全以故犴狴之中絶無寃抑頃復恩綸大霈仁澤旁敷凡有稍可寬貸之門無不豫以格外更生之路誠自古帝王未有之盛事也自頒赦以後現在監禁者俱十惡等重犯合計內外為數無多此皆我皇上睿慮哀矜再三欽恤求其生而不得故置之囹圄以待秋審然當普天被澤之時而獨此身繫法網者不能邀鴻恩於堯舜之世情實堪憫伏祈特賜諭旨將本年內外秋審暫行停止俟明年照例舉行使已赦者既霑浩蕩之仁在獄者亦得延旦夕之命則恩法兩全天人胥悅恭候命下之日通行直𨽻各省遵行請修平定朔漠方略疏題為天威震乎遐荒聖武超乎前代請宣付史臣纂輯以昭偉績事竊惟我皇上膺圖御宇咸五登三文德覃敷湛恩汪濊聲教所訖萬國來同幅員倍於前朝勳業隆于上古如天覆育罔不率俾廟算折衝崇績懋昭固巳紹兩階干羽之化誰復有自外于生成以干天討者而乃有噶爾丹冥頑自棄致皇上赫然震怒親董六師虎旅宣威龍韜制勝摧枯拉朽電捲星馳蓋自出蹕以迄回鑾跋涉數千里往還三閲月而大功底定天心顯應百物效靈凱捷之日萬姓歡呼童叟頂祝自古以來未有震疊神速功德隆盛如今日者也臣等考之前史每有征討不過命將出師閫外成功初未嘗稟受方略然猶推原主德勒石銘勳傳之汗青昭示來許況今者皇上以萬乘之尊掃清漠北刻期翦滅立致蕩平偉伐無前振古罕覯臣請宣付史館將皇上躬擐甲胄直搗賊巢噶爾丹仰怖天威立時殄滅以至撫慰士卒鼓勵將帥種種恩威并聖駕經過之地凡道里之逺近險易以及塞外風雲草木之情形條分縷析瞭如指掌庶知天山瀚海皆得仰日月之光華而控制遐方愈以服樽俎之勝算矣至于用兵方略悉出宸衷尤宜詳示史臣令其紀述布之中外傳之無窮使天下後世咸知皇上之文武聖神為從古帝王所未有臣等遭逢景運歌咏隆平亦為從古臣子所不易得之盛事也伏祈睿鑒施行張文貞集卷二
