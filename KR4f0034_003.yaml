body:
  text: 張文貞集卷三大學士張玉書撰恭謝天恩疏奏為恭謝天恩事竊臣自前月聞臣父誥封通議大夫內閣學士兼禮部侍郎臣張九徴訃哀號苫塊五內摧傷於本月初三日恭䝉皇上頒賜茶酒特遣內閣學士臣王鴻緒至臣私寓酹於臣父之靈復以茶酒賜臣兄弟子姪均霑聖澤臣感痛跪伏泣下如雨隨率子弟望闕叩頭並乞天使轉奏愚悃訖伏念臣才學疏庸備員禁近趨承講幄前後六年宸翰叠頒金貂特賜屢叨宫宴再扈鑾輿邀知遇之殊常愧纎毫之未效方勤部務忽覯父艱臣父九徵舉順治乙酉江南鄉試第一中丁亥進士歷官河南提學僉事卓異候補恭遇康熙二十年覃恩封內閣學士兼禮部侍郎生荷崇階殁膺異數既光流於奕葉復寵被於重泉臣父子一介寒微仰沐皇上錫類之仁恤下之誼至于如此臣雖捐糜頂踵何能報稱今遄奔子舍日逺闕廷翹首瞻天私心戀主但使此身一日不填溝壑即一日矢竭涓埃執筆涕零銜恩無極臣不勝激切哀感之至謝恩疏奏為恩恤寵頒感悚無極恭陳愚悃仰謝皇仁事竊臣自康熙二十三年八月於京邸聞臣父張九徵喪䝉皇上特頒茶酒至臣私寓曠典隆施榮哀備至比臣銜恩南返恭遇聖駕巡省風俗駐蹕揚州臣趨詣御艦前叩請萬安伏荷聖慈特賜召見憫臣體貌羸瘠溫諭加意調理又命侍講學士臣髙士奇傳旨以臣家有大故諭免逺送隨頒賜御前餅餌三器聖恩深重垂恤臣私如此臣聞命感泣叩辭道左歸捧賜食薦于臣父之靈復與臣母共飫天㕑珍味北望九叩惟有涕零兹康熙二十四年二月初四日分守江常鎮道參議臣劉梅頒到諭祭臣父文一道親至臣家具品致祭禮文隆渥賁及幽泉閭巷聚觀歎為希遇臣謹率舉族子姓望闕叩頭痛念臣父九徵歷官監司貤封學士自謂衰齡無補每以效力朂臣惟臣仰負國恩俯虧子職方慚叨冒敢兾殊榮乃荷聖朝教孝之深仁曲慰臣子顯親之私願髙厚之施巳極捐糜之報何時誓畢餘生上酬洪造瞻望闕廷不勝激切感悚之至恭謝天恩疏奏為恭謝天恩事竊䝉聖恩頒賜諸臣日講易經解義臣以守制在籍謹循例遣家人赴京恭領兹於八月二十日齎到江南臣隨設香案叩首祗領望闕稱謝伏念臣經學荒陋才識踈庸仰荷皇上拔擢殊恩獲親講幄每念進講時臣等管見敷陳曽無毫末足採欽惟皇上睿思淵識觸䫫引伸如於豐亨則宏闡謙受之理於折獄則注想刑措之風慨歷代朋黨之紛爭君子不免嘆臣下偏私之未化心術難知講學無取乎虛名論事宜符於實行煌煌典訓炳若日星載在簡編不能縷述臣兹拜捧賜書不勝瞻仰感悚之至為此具本謹具奏聞謝恩疏奏為天恩曲軫臣私俯瀝微忱恭謝事竊臣本以疏庸叨與侍從仰䝉皇上格外拔擢洊歷政府八載以來曽無涓埃尺寸之效自念母老在籍分宜引退歸養惟是聖恩深重同于覆載不敢輒以私情再三奏請去年冬聞臣母抱疾飲食頓減臣心切􅋏懼因于十二月內冒瀆宸聽乞假省視隨荷皇上如天之仁允假三月特以御書金剛經五部頒賜臣母又賜天㕑鹿尾一函俾供甘旨臣手捧涕零拜恩就道於嵗除日抵臣私家恭設香案扶臣母望闕叩頭祗受一時閭巷聚觀親知交賀羣歎為千載希遇今入春三日臣母飲食漸增病勢稍愈自此得有起色皆賴聖慈錫福下逮微臣所致臣母子欣忭頂感無有涯極至于淮揚一路水勢悉平大江以南瑞雪霑被所見父老子弟仰九重宵旰之勤誦三征蕩平之烈無不戴聖銜恩瞻天望幸臣謹瀝忱繕疏遣家人張忠賫投通政司奏謝臣不勝感激惶悚之至謝恩疏奏為恭謝天恩事竊臣至庸極陋仰荷皇上髙天厚地之恩破格優遇無所不至昨年冬因臣母誥封一品太夫人何氏年踰八十在籍患病臣冒懇歸省䝉皇上俯鑒犬馬私情特允暫假自臣抵里母疾旋愈今春三月臣母趣臣遄行詣闕又因不忍逺離自以輕舟兼程北上舟中恭捧恩賜御書經卷朝夕諷誦仍每日手録十數行以申䖍敬至四月杪到邸寓母子聚首頂感聖仁益勉臣兄弟專心供職以圖報稱不意六月初旬忽發脾疾年耄氣衰醫藥罔效遂以十八日溘然病逝此皆繇臣罪深孽重所致臣方愧君親兩負忠孝並虧苫塊哀號無以自立於人世乃二十日早恭䝉皇上天心曲軫特遣內閣學士臣布泰徐嘉炎同頒內廷茶酒至臣私寓酹于臣母柩前復遍賜臣等俾均霑天澤臣伏地悲泣痛不能止隨率臣弟詹事府主簿臣張玊禾户部貴州司郎中臣張恕可臣男舉人張思默等望闕叩頭鳴謝並布微忱乞天使轉奏訖伏念臣父子兄弟世受國恩臣父殁時曽膺異數今母病逝又被鴻慈存殁邀榮無踰于臣者臣雖捐糜頂踵安能仰酬萬一顧草土餘年瞻天何日惟生生世世永矢銜結而已臣不勝激切哀感之至謝恩疏奏為諭祭寵頒敬陳謝悃事竊臣於康熙三十七年七月二十八日匍匐內廷奏辭南下銜恩載道感激涕零回籍以後恭聞聖駕東巡展謁山陵歷覽邊境奬厲將士蠲免農租所至兵民無不敬仰欣戴頃届冬寒鑾輿返蹕臣逺伏草土不能恭請萬安惟有引領瞻天私心祝頌而已兹十二月初四日分守江常鎮道臣施朝輔頒諭祭文一道親至臣家致祭臣母誥封一品太夫人何氏於御書松蔭堂內方寶額之初懸適寵光之下賁几筵燦設珍品錯陳君賜及門里巷嘆為希遇宸章申命庭闈叠被殊榮微臣仰邀髙厚之仁施俯報劬勞之母德闔室哀感難罄名言即日率子姓等詣香案前叩頭謝恩激切下誠不能自已敬遣家人張忠齎本陳謝遙望闕廷儼若咫尺臣不勝悚息依戀之至謝恩疏奏為恭請萬安並謝天恩事仰惟皇上厪念東南要地特行巡省而聖慈軫切尤重河防自入淮境以後即親閲歸仁堤髙家堰等處詳審河流曲直之勢指授河臣挑築之方因令盡閉滚水諸閘使東淮敵黃逼黃趨海宸謀睿斷洞晰源流此工告成則運道民生百世永賴不獨下河七州縣長享耕鑿之利已也至于翠華臨幸自江而浙循察民依周恤商囷屢次頒發德音截漕留糶二十萬石蠲逋減稅至一百餘萬有奇且旌亷奬能赦過宥罪咨訪父老延見高年激勸軍士則行閲武之典廣勵人才則增進取之額所至官吏將卒以及士農工賈罔不霑濡聖澤仰戴皇恩又若御製祭文親酹明太祖陵寢復大書治隆唐宋扁額特命郡王率滿閣臣伊桑阿阿蘭泰及臣玉書捧安陵殿以四字之褒揚定千秋之史論典優禮渥自昔稀聞載諸簡冊允光奕䙫伏念微臣以守制在籍之人恭迎聖駕獲覩盛事自愧叨與扈從尺寸未效乃䝉皇上髙天厚地之恩格外優遇駐蹕江天寺頒賜御書恭儉為德扁額並金山月夜詩一幅對句一聮淵鑑齊法帖一部耕織圖一冊又御書浮翠樓澄懷日新二扁對句一聮留題江天寺者並以賜臣及次揚州又頒賜御用綴東珠涼帽一頂縀袍銀鼠皮褂各一領靴一雙比至鄭家口奏辭又䝉天語溫諭賜哈密瓜乾等三器臣荷恩深重伏地感泣不能自己奎章在望燭蓬蓽以增榮賜服被身顧頂踵而滋懼惟有鏤刻寸心矢報沒齒而已臣以前月盡回籍恭聞聖駕于五月十七日還宫謹繕疏奏請萬安並布微忱鳴謝臣過高郵時適高邵江都一路水勢甚大府尹臣徐廷璽正在料理宣泄並此奏聞伏祈宸鑒臣不勝感仰瞻依之至謝恩疏奏為恭承寵命仰謝天恩事竊臣於康熙三十八年五月內從山東道中奏辭回籍感戴皇上格外隆恩朝夕欽仰如在咫尺今嵗入夏以來臣因疾疴時作未得早赴闕廷叩請萬安頃聞聖駕自塞外回鑾德威遐被下情益切欣戀于十月二十日接江南江西總督臣阿山咨開本月初七日吏部為請旨事奉旨張玉書著前來照舊辦事欽此合行移㑹等因到臣臣聞命惶悚隨設香案叩頭謝恩伏念臣由講官出入禁廷洊預機務凡二十有餘載仰䝉皇上天髙地厚眷遇逾涯而臣才識疏庸毫髮無補矧今年已六十允宜投棄山林乃復上荷天慈更加録用君恩愈重臣愧愈深惟圖勉竭涓埃庶幾少逭愆咎臣於十一月初即束裝起程先具疏陳謝令臣弟户部河南司郎中臣張恕可代赴通政司投進臣不勝感激悚息之至謝恩疏奏為天章溥錫恩出非常謹合詞陳謝永識盛典事康熙四十一年五月二十五日吏部尚書臣陳廷敬都察院左副都御史臣勵杜訥翰林院編修臣查升傳旨召漢大學士學士九卿詹事府宗人府府丞順天府府尹府丞太常寺光祿寺太僕寺鴻臚寺卿少卿國子監祭酒司業翰林院編修檢討以上科道掌印不掌印等官齊集於保和殿侍衛海青伍什常壽馬武伍格捧示御書諭旨云尋章摘句華麗詞藻非帝王之所本朕四十餘年惟日兢兢未嘗刻晷少釋萬幾自警有始無終之誚念兹在兹也政事稍暇頗好書射歷年以來所積臨摹字幅賜卿等觀看欽此諭旨大書三幅賜臣玉書臣琠臣賜履各一其綾絹紙大小幅御書分賜臣等一百五十員人各一幅或書御製詩章或臨摹舊蹟天章炳煥宸翰淋漓輝映古今昭回日月前波後偃鳯翥鸞翔洵乎化工之筆非自古帝王名臣之善書者所能髣佛萬一者也至于御製篇什軫念民依則德音洋溢訓勉臣下則義藴精深覽古興懷常抒性奧靜觀自得時見天心即觸景詠物之微言皆內聖外王之至道臣等欽惟皇上躬理萬幾勵精宵旰四十餘年如一日內寧外戢手致太平擇吏安民勤求治理嵗有蠲除之賦日聞矜恤之刑所以勞心政事者至矣而幾務稍暇即博觀書史留意翰墨數年以內臨池所積遂逾數千幅之多前命滿洲諸大臣較射既畢隨各賜御書一幅滿漢內閣部院諸臣求賜堂額及衙門扁額並訓飭士子文者俱邀聖慈一一頒發而禁近諸臣咸叠䝉恩賜今又荷此溥賜殊恩尤屬格外曠典侍衛臣捧出之頃羣情歡躍聲洽殿陛自有載籍以來實為希覯臣等幸獲至寶摹勒珍藏永垂不朽奎光咫尺朝夕拜瞻矢報高厚無有紀極謹此合疏鳴謝伏乞睿鑒臣等不勝感激欣忭之至謝恩公疏奏為聖主屢沛宏仁安徽特䝉大澤臣鄰喜溢兆姓歡騰謹瀝羣情合詞恭謝事仰惟皇上怙冒如天休和被世海隅日出之地含生負氣之倫莫不普沐皇仁均霑樂利而聖心宵旰慈軫惟以善政莫先於養民而惠民莫切于蠲賦數年以前曽計天府撙節之餘蓄為各省大霈之恩膏自畿輔以迄遐陬次第賜田租一年稽之前史實為希覯至於江南一省被德尤深蠲歷年之積逋減商賈之額稅不啻數百萬有奇而留漕貯粟發帑治河更以百餘萬計今年江蘇等屬地方再邀特恩蠲免正賦兹奉上諭將安徽巡撫所屬七府三州康熙四十二年地丁錢糧乂通行免徵皇上念上下兩江財賦重地而特加恩優恤以培養小民有餘之力真至殷且渥矣德音一下萬口歡呼咸謂江南通省頻嵗叨䝉聖澤比屋盈寧所有應輸之正供原屬小民之常分而非常鴻仁出于格外且先期豫免俾人悉周知胥吏之侵蝕既除則閭井之霑濡皆遍自是一嵗之內獲裕蓋藏將見千里之遙無非樂土凡士庶商旅在輦轂之下者既皆頌聲溢路而在籍之紳襟百姓尤日夕引領以冀翠華之臨幸共抒嵩呼萬壽之忱臣等忝列班聯久糜祿養深愧無涓埃尺寸可以仰答萬一惟率同父老子弟共鼓舞于堯天舜日之下而已謹繕公疏踴躍上陳伏祈睿鑒臣等不勝感激惶悚之至禘祭議題為聖朝禮無不備大典當議修舉請乞敕部詳議永垂則效事臣等綜考禮制言禘者不一有謂虞夏禘黃帝殷周禘帝嚳皆配祭昊天於圜丘者有謂祖之所自出為感生帝而祭之於南郊者有謂圜丘方澤宗廟為三禘者先儒皆辨其非而言宗廟之禘又不一說有謂禘祭止及毁廟不及親廟者有謂長發之詩為殷之禘雍之詩為周之禘而親廟毁廟兼祭者惟唐趙匡陸淳皆以為禘異於祫不兼羣廟王者既立始祖所自出之帝而以始祖配之故名為禘至于三年一祫五年一禘經無明文其說始於漢儒而後之議禮者咸宗之漢唐宋所行禘禮並莫考始祖之所自出止於五嵗之中合羣廟之王行一祫一禘兩大祭於其宗廟而已大抵夏商以前有禘之祭而其制未詳漢唐以後有禘之名而與夾無别惟周以后稷為始祖以帝嚳為所自出之帝而太廟之中原無帝嚳之位故夾祭不及帝嚳至禘祭時乃特設帝嚳之位以稷配焉行於後代不能盡合故宋神宗面諭廷臣議罷禘禮明洪武初御史答祿與權請舉褅祭衆議亦以為不必行詔從其議至嘉靖中乃立虛位祀皇初祖帝而以太祖配享事屬不經禮亦旋罷洪惟我國家受天顯命世德相承自肇祖原皇帝以前列祖徽猷炳載國史非漢唐宋明所可比擬方定鼎之初追上四祖尊稱以肇祖原皇帝始基王迹故立廟崇祀自肇祖始夫太廟之中以受命之君為太祖允宜特尊者也我太祖髙皇帝功德隆盛與天無極自當為太廟萬世之祖上而推所自出則締造之業肇祖為最著今太廟祭禮四孟分祭於前殿後殿以各伸其尊嵗暮祫享於前殿以同將其敬一嵗之中自肇祖以下屢申裸獻仁孝誠敬已無不極五年一禘之祭不必舉行祀典關係重大李時謙請行禘祭又謂設虗位以祀不晰古制不諳國史所請應無庸議襲五經博士議題為懇賜轉請題襲以沐聖恩以昭盛典事臣等議得宋儒朱熹祖籍徽州之婺源以父松官於閩遂居閩之建安熹長子孰之後世居建安守熹之墓次子野之後還居婺源守熹祖墓故熹之裔有閩徽二派明實録開載景泰六年以孰之後梴為五經博士主建安祀嘉靖二年照建安例以野之後墅為五經博士主婺源祀原有博士二員我朝順治十二年臣部覆准朱煌襲五經博士於婺源縣奉祀在案今據福建巡撫張仲舉會同總督興永朝題稱有建安原襲博士朱之雋于順治九年曽起文赴部因病旋卒而其子金鉉又經早亡時其孫瀠尚在幼稚致稽請襲至康熙十九年瀠始具呈申請叠經移查駁復志乘宗圖悉相符合朱瀠實係閩派應襲之人等語仰惟皇上崇奬先儒廣厲正學以朱熹有功經傳特於徽閩二處各賜御書扁額褒崇之典踰於往代熹十八世嫡孫瀠既經該督撫查明具題應准承襲五經博士以奉建安祀事恭候命下臣部轉行吏部察例給劄可也建述聖廟議題為述聖未有專廟懇敕鼎建以隆祀典事臣等竊考子思子從祀孔子廟自宋大觀二年始至端平初升入十哲祀於堂上咸淳初同曽子升入顔孟之列是為四配而顔子廟初建於兖在唐開元二十七年嗣建於曲阜在元泰定三年孟子廟建於鄒縣在宋景祐四年曽子廟建於嘉祥縣志稱創始無考至明正統以後屢經修葺惟子思子向未建有專廟元元貞初因鄒縣舊有子思講堂遂建子思祠後改稱書院明正德元年始以衍聖公次子世襲五經博士奉鄒縣書院祀事而曲阜之廟祀缺焉今博士孔育埏疏稱數千年之缺略留待今日乞照顔曽孟三賢祀典一體立廟廟基即在闕里孔廟西北隅其建廟之資自行區處應如所請倣顔曽孟三廟規制建立子思子廟春秋致祭載諸祀典至於疏請敕撰碑文御書扁額用以昭示來兹應俟廟宇報竣到部之日臣部恭請睿裁修御製文集議該臣等詳考經史自古帝王制作煥然可紀者莫著於詩書嗣後西漢文最近古故史稱孝文詔令有三代遺風而刋鏤成集則自武帝始唐太宗以下四宗宋太宗以下六宗各有御製集而神宗又别有御筆手詔若干卷隋唐書宋史具載篇目明則太祖太宗宣宗諸帝皆有集而今所傳太祖御集刋本則洪武中奉敕鏤板以行者也至於編次刋校事宜考宋真宗天禧四年從著作佐郎張仲尹等請以新編御集詔宰相冦凖參政李迪參詳學士楊億錢惟演等注釋刋成摹印頒賜明初翰林學士樂韶鳯侍讀學士宋濓等編録太祖文集五卷詔制敕諭序記詩歌諸體俱備且言續有制作當復編為後集洪武七年學士承旨詹同等固請鋟梓以貽聖子神孫詔許之刋成誠意伯劉基起居注郭傳為之序而濓亦恭題於集後歷代刋刻御集典例昭然欽惟皇上聖德神功卓越千古道統治法兼總百王而猶日御講筵典學不倦時攄睿思發揮理道逈出諸臣意表間以手詔申誡羣下辭旨深厚同符典謨萬幾之餘留情制作或發為文章或形諸篇什外廷諸臣不獲盡窺聖製而於御書卷冊頒賜臣下者幸得竊覩萬一無不歎誦欽仰以天章睿藻為歷代帝王所未及今臣等集議允宜刋刻頒布用昭典冊之極觀示文明之盛事伏乞皇上俯俞科臣之請簡發御製諸文敕下臣衙門鳩工鋟梓頒示天下流徽億祀臣等亦得依日月末光附名不朽可勝榮幸其刋刻事宜恭候命下之日另行請旨停止封禪等議該臣等議得詞臣曹禾疏稱祀典國之大事三五以來無不以成功告于上帝封禪書及班固諸儒言泰山五嶽之長神靈所聚因高崇天謂之封就廣增地謂之禪刻石紀號甚盛典也逮秦漢唐宋有事岱宗者勞民費財失對越之意後世遂不敢申明其禮不知因名山升中與天相見其為典禮至尊至重又黃帝上元甲子貞元運㑹由是封巒勒成漢武帝不得其時則以十一月甲子朔冬至應之而數千年之景運適協於今日功成治定之後皇上以精一執中為奉若上帝之命不可不報山川百神之助不可不答運世之本開基之功不可不紀宜勿憚登陟亟議告成考漢唐儀注行之簡易等語伏考封禪之說不著于經司馬遷封禪書乃引管仲古封禪七十二家之說梁著作佐郎許懋極言其妄綱目是之至於甲子紀嵗始於黃帝其為上元甲子則史無明文即管仲言黃帝封禪亦未指其年為甲子之年也又按書傳舜至岱宗燔柴祀天原非封禪唐虞三代以前實無登封故事可考其史鑑所紀則有秦始皇漢武帝光武唐高宗武后明皇宋真宗行封禪禮所紀禮儀則有築壇設壝及玊策玉牒玉簡金匱金繩金泥之制需費甚繁且禮不合于經雖從簡易亦於義無當仰惟皇上聖德布昭神謀默運內除苞蘖外靖鯨鯢文教覃敷武功赫濯巍巍蕩蕩直與堯舜比隆而皇上敬天凝命至誠感神無一事不與天意相流通無一時不與天心相陟降則所以仰答神明茂膺休祉者固無所不極其盛矣比者三逆蕩平已遣官告祭郊廟社稷嶽瀆海鎮諸神臺灣歸順又專告郊廟社稷一應典禮俱經舉行封禪告成之禮無庸議又科臣王承祖疏請倣虞帝之制巡幸東方察閭閻之利病問風俗之厚薄設祭方嶽以祈年豐禱雨澤又東嶽密邇孔里御輦所屆觀其車服禮器亦千古盛事等語伏考一嵗之內遍巡四嶽此三代以前巡省諸侯之禮自設郡縣以後未有行者舜之燔柴原因巡狩行告至禮其望秩山川是因祭天而望祭東方之山川非專祭泰山之神也我皇上鑾輿巡歷凡所至之地輒詢考吏治延訪輿情或訓飭官方或特加蠲賑無非省方問俗勤民重農至意其祭岱祈年並禱雨澤之事非禮典所載應無庸議至歷代帝王詣孔里始于漢髙帝後則漢明帝章帝安帝北魏孝文帝唐髙宗明皇後周太祖宋真宗皆以經過魯地展祀未有專詣闕里故事我皇上博綜經學宏闡心傳重道崇文千古莫並其東巡特祀闕里應候睿裁疏內又言封禪之事秦皇漢武不過耀德張功後世鄙焉臣等已于曹禾疏內議覆無庸另議纂修國史議該臣等㑹議得歷代史書其體有二自春秋列國史以及後代時政記起居注日厯皆用編年之體自司馬遷史記以及歷代史書並撰次當代國史皆用紀表志傳之體考之往籍宰臣書榻前議論之辭則有時政記史臣紀柱下見聞之實則有起居注類而次之則為日厯日厯始於唐而宋因之唐㑹昌中命每嵗末以時政記並起居注付史館宋太平興國中詔參政李昉記録時政每季送史館乾道中又命每旬取所修時政記與三省録進聖語同付日厯所此前代用編年之體修本朝之史者也漢明帝時班固奉詔撰光武本紀及列傳嗣後每朝增修並稱漢紀魏晉以後設有專掌國史之官唐顯慶中修貞觀以前國史肅宗以後每朝增修宋景德間因編太祖太宗正史命取兩朝日厯時政記起居注及諸司文字並臣下行狀付史館編成帝紀志傳天聖以後亦每朝增修此前代用紀表志傳之體修本朝之史者也至明惟洪武初曽纂日厯萬厯中撰正史未久輒罷夫修史之難難於徵信耳目近則聞見不淆討論詳則紀載得實以當代之臣修當代之史始足信今傳後仰惟皇上聖德神功超軼百代大經大法炳若日星今御製集見經編校各館所纂政治典訓平定三逆方略及大清會典俱將次告竣詔諭制敕具在內閣章疏批答具在六曹且起居注之設又與前代不同凡聽政時皇上親決萬幾面諭羣下時政之要悉得記載是聖猷宸訓固已散著典冊但原委本末尚未彚萃成書誠倣日厯體例編年記載則世則世法無一不明備矣至於列聖創垂光昭天壤皇上至孝覲揚於太祖高皇帝太宗文皇帝實録特敕儒臣重修親加酌定世祖章皇帝實録呈進睿覽逐一批閲而三祖聖訓又經告成以此編輯正史分撰紀表志傳事蹟實為具備即有應搜採編入者及時裒集亦信而有徵應如臺臣所請舉行其一切應行事宜統候命下交與內閣翰林院逐一詳議具題可也與張秋紹論孝經書按漢藝文志載孝經古孔氏一篇師古注云庶人章分為二曽子敢問章為三乂多一章凡二十二章後載孝經一篇十八章注長孫氏江氏后氏翼氏四家又云四家及張禹傳之各自名家經文皆同惟孔氏壁中古文為異夫既言經文皆同則長孫氏不應獨有閨門一章明矣惟隋志云孝經為河間人顔芝所藏芝子貞出之凡十八章而長孫氏江翁后蒼翼奉張禹皆名其學又有古文孝經與古文尚書同出而長孫有閨門一章其餘經文大較相似又衍出三章並前合為二十二章孔安國為之傳至劉向典校經籍以顔本比古文除其繁惑以十八章為定有鄭氏注夫所謂長孫氏名其學者指今文十八章言也而下文則云長孫有閨門一章似乎今文亦有閨門章者不知此一章果在十八章內耶否耶長孫氏既有閨門一章何以江后翼張四家又獨缺此一章也隋志復云安國之本亡于梁亂至隋祕書監王劭訪得孔傳送至河間劉炫因述其議疏講于人間遂著令與鄭氏並立儒者皆云炫自作之非孔舊文而袐府又先無其書夫漢志載長孫氏說二篇止存篇目未明指所說有閨門一章在內矧梁亂以後袐府已無安國舊本炫所出古文一時皆疑為僞作無可參考則漢長孫氏獨有閨門一章之說亦不知作隋志者何所依據而為此語也至於唐㑹要載劉炫請行孔廢鄭司馬貞駁之雖以閨門之義為近俗之語非宣尼正說然亦仍請鄭孔俱行及後奉詔鄭仍舊行而孔注亦不廢則謂貞獨削去閨門一章以為明皇諱者不能無疑矣明吕介孺作孝經或問直斷之曰閨門一章古文有今文無非司馬貞削之也貞固專主今文今文原無貞何嘗削之乎且明皇亦合孔鄭兼行豈明皇不自諱而貞代諱之乎其言至為明切特隋書所云長孫有閨門一章者宜更加考證大抵從前諸說雖各有異同而所謂今文分十九章及劉向以十九章為定之說書無明文終覺未安幸再一酌之河源考江淮漢皆發源于中國之山獨河在西域經數折而後入中國其經行之地時隱時見時伏入地中時出於地上水勢紆折漫衍而道里又逺在荒服莫能親履其境故歷代窮其源者戛戛乎難之夫禹導河止自積石積石者河之所經而非其源也漢張騫使西域度玉門言有二水合流一出葱嶺一出于闐滙入鹽澤潛行地下者千里至積石而再出則視禹貢所紀為已逺矣然而葱嶺于闐皆河之所分流而亦非其源也唐薛元鼎使吐蕃云得河源於穆穆哩石山史稱其說多迂怪未足為據元至元間遣都實專求河源凡四閲月至鄂端諾爾之地有泉百餘澄泓散演若沉若浮不可逼視履高下瞰燦如列星是即所謂星宿海者其地在吐蕃朵甘斯西鄙居中國之西南河之源發於此而尚未名之為黃河也自西而東羣流奔走滙為巨浸始名黃河然其流尚清人可徑涉又越數日而水始渾濁又數折而徑行大雪山是即所云崑崙山者崑崙距星宿不啻千有餘里則直以崑崙為河源者猶未可為定論矣越崑崙東北流而至禹貢所云積石越積石至蘭州而入中國之境約略計之凡四千五百餘里然則山海經所謂崑崙去嵩山五萬里者其說不猶幾於誕歟今所傳河源志乃元學士潘昻霄所撰昻霄得之都實之家其說似可信夫河在中國之左性屬陽而勢徑北地泉少當水落時河身逼束未至為害秋漲則諸水盡奔入河而並河州郡遂受河患順河之性使自達于海猶且不時衝決如前史所記載況欲折之使南以為濟漕之用斤斤於一清口爭強弱其不遺東南以昏墊之憂者幾希矣然而今日之患又不在河強淮弱而在河淮分流悍不相顧而河不為我用此言治河者所以蒿目而深憂也有志經世者溯河之源思河之流而務所以安其瀾而疏其勢庶幾其有救乎建藏經閣說慈水雲溪山廣福寺僧劍礱謀建藏經閣于寺南而令其徒名其言者白足走數千里募金于輦上貴人余聞而為之說曰夫釋氏之有藏經猶吾儒之有十三經二十一史也今之士子自入鄉孰守一經窮年矻矻而卒有白首紛如之歎至于十三經二十一史無力者既不能蓄有力而能蓄者復鮮蓄而能讀者又加鮮焉昔司馬君實作資治通鑑成惟王勝之閲至終編餘則讀未竟已缺伸思卧蘇子瞻常嘆昔之君子見書之難今之學者有書而不讀嗚呼此後生末學之通患也況乎學校之教既弛典學之官不復以購書為事所謂尊經閣者徒見其頽垣壞壁欹側于荒榛蔓草之中初未必經史百家之書盡具于是又何怪乎生徒之錮耳蔽目而日流于面墻也乎其言事浮屠之學而具大願力建閣請藏慨然仔肩是其志固有過于吾徒者也張文貞集卷三
