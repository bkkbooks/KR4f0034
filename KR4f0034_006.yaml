body:
  text: 張文貞集卷六大學士張玉書撰跋御書卷後康熙四十一年夏五月皇上既頒御書數百幅分賜在廷諸臣而御前所存者尚積數千幅之多十二月十二日召臣玉書臣鴻緒偕內直臣廷敬臣杜訥臣升於南書房公同排類以備宣賜臣等仰惟皇上總攬萬幾躬親裁决未嘗刻晷少斁政務偶暇即披覽經史發為鴻文雅什無不超絶今古而又精研書法自晉唐以迄近代凡屬能書之家悉皆虛懷臨倣而經緯在手變化從心揮毫獨運包舉衆美所臨舊蹟視原本嘗百倍過之非天縱生知兼以遜志時敏之學安能臻此臣等瞻仰之下欽服欣忭恭請鈎摹勒石垂示永久聖心冲抑未即俞允臣等固請再三伏䝉皇上頒發黃樹子賦臨董其昌書一卷神采煥爛結搆精警無法不偹無體不該實董其昌所未能到兹勒石既竟星日光華照耀萬世臣等拜手稽首敬跋數語於卷末以志榮慶跋安徽布政使張四教御書額卷後康熙三十有八年皇上南巡江淮周歷吳㑹宏恩濊澤霑濡黎庶四月既望車駕入江寧自將軍總督以下悉被上尊珍膳之賜而御書淵鍳齊石刻及耕織圖惟大臣得而有之至於宸翰題額尤鄭重不以輕豫題額字義皆兼褒美訓勉之㫖往往如化工賦物各肖其人臣玉書忝與扈從獲覯盛事於時安徽布政使臣四教䝉賜綾幅大書四字曰忠信之長臣悚息瞻仰竊歎聖心之取義大而垂訓遠也春秋傳曰忠德之正也信德之固也又曰忠信禮之器也子太叔之告子産以忠信之長慈惠之師並舉以相朂豈非為民牧者德以基之禮以植之忠信結于中斯慈惠被于物其本末之序固有不容紊歟布政使臣自官江南數載于兹以廉潔飭身以正直率屬羔羊素絲之節孚于遠邇蓋揆諸忠信之義無愧辭焉自兹仰承天藻益孳孳焉務實政而不怠則於賜額之意先之以褒美而重之以訓勉者庶幾其始終克副矣乎今布政使臣裝潢宸翰與淵鍳齊帖耕織圖並尊奉齊閣非獨朝夕自勵且以垂示子孫卷既成屬臣玉書跋識歲月于卷末謹拜手稽首書而識之跋查學士御書卷臣玉書偹員禁近嘗獲侍御案恭覩皇上親灑宸翰長箋短楮立竟數十幅而隨筆所至無法不備兹於山莊清暇用各家楷法書唐人應制詩十律每書一家輒曲肖其神理而結搆精警腕力變化為振古所未有於時講官侍講學士臣升方與扈從上特恩優賜臣升裝潢成帙出示臣等伏惟皇上以神聖生知篤好學問自總理機務以及時文書法罔不研深探微造詣至極良由天縱精神運行不息乃克臻此睿製天行至健金石同壽臣三復斯語頌為至言學士臣拜御墨之昭回兼睿辭之炳焕異寶所萃榮光燭天凡屬儒臣孰不欣仰臣敢敬書末以志盛事跋馬相國御書卷大學士馬公敡歷中外三十餘年而入政府眷倚為一時之冠歲庚辰四月皇上親灑宸翰題休容二字賜公公裝潢巨軸尊藏篋衍惟謹越二年臣玉書來京師公出以示臣伏覩御書神力搏捖古鬱蒼徑如彛鼎球圖光氣不可逼視誠希世之至寶也至于休容二字為古今相臣之極則先儒大學疏解謂其心寬平廣大淡然無營粹然至正故能容天下懷才抱德之士使各效其職以為國家之用而貽福利于無窮雖古伊傅周召之賢無以加此公之在政府也集思廣益求善如不及嘗言人臣起自下僚非積有才望不能膺聖主之知也業已洊躋大位而復矜才恃能沾沾與庶司百職爭勝何為者哉玉書每三復此語嘆公寬平廣大淡然粹然之意真可不愧古人而皇上之褒許期望於公者惟公能仰稱上㫖以為一代之宗臣無疑矣謹拜瞻聖藻附言卷末且幸朝夕隨公之後亦以自勵焉跋陶𣙜使御書卷仰惟皇上天縱聖神留精翰墨雲章奎畫超軼古今而聖懷淵冲自晉唐以來諸臣遺跡無不刻意規橅其蘇軾米芾趙孟俯董其昌書臨者尤多神力卷舒隨筆變化視原本常百倍過之此卷臨米芾書五言律詩一首乃己卯南巡時賜內務府掌儀司員外郎臣陶柱者庚辰秋員外𣙜關維揚出以示臣玉書拜手敬觀驚喜竟日體結之精警蹲鋒之峭徑氣韻之蒼欎風骨之翔舉使米芾親見必且俯首嘆絶員外何幸獲兹異寶玉書向在政地見員外出入禁闥歷有年所小心恪謹久而益勤用是上邀特達之知以小臣而拜宸翰于行幄真殊遇也繼自今朝夕瞻仰敬思咫尺不違之義以勉圖報稱則令名寵錫克垂於有永不亦休歟書瑞隱先生卷後家大人自通籍後與若矦先生訂交于京師及今三十年矣書與先生弟翼侯同舉順治辛丑進士而翼侯從弟望侯亦以是科中副車與余同出西藪田先生之門越六年先伯兄禮存與望侯同舉康熙丁未進士又越五年壬子家弟仕可與先生公子履吉同舉孝廉于京兆兩家契分不啻膠漆以余聞若侯先生為少司冦及長西臺日課諸子讀律一條遇有疑獄令諸子各以意平反期合律而後已士大夫家以經術教子弟者當以先生為法嵗乙卯翼侯用治行第一由德安令膺內召既至都門出所藏尊人瑞隱先生手澤示書家庭訓勉之辭觸物感懷之什意深㫖厚溢于楮墨且以左腕作書古質清徑令人肅然斂容以是益嘆公家世澤之長所由來者遠矣昔陸渭南極稱范巨川家訓謂為人祖父者盡如范氏之先人為人子孫者能盡如巨川世其有不興者乎吾於翼侯之藏此卷也亦云書袁節婦傳後余同官馬子甸臣為袁節婦傅引程嬰公孫杵臼事為喻夫史稱杵臼死于十五年之前程嬰死于十五年之後等死而難易殊者為孤在也以存孤之大義責婦則為節婦者待其孤既立成人續袁氏之祀然後以死自明報夫子於地下庶幾無憾嗚呼死生之際人所難言當其初念激發庸夫販豎無不可殺身成仁少一却顧而愛名節之心不敵其計生死之心古今忠臣孝子為之不克終者皆轉念敗之也節婦之死也其舅姑止之其家人止之乳哺之稚子依依襁褓假令節婦慕存孤之名欲强為其難以姑緩旦夕之死恐更遲十餘年日久事移徘徊瞻戀又將借孤之成立以為口實此時既不能為嬰又并不得為杵臼或曰人人皆杵臼其如孤何曰有嬰然後杵臼可為也無嬰則杵臼必彊為其難者下宮之難大索孤于宮中事迫矣嬰死誰與救孤者嬰之不死非天下後世之臣子所得借口也况孤立而嬰旋死乎節婦之言曰我非忍負生者也撫遺孤有舅姑伯叔在我獲死所矣向自誓必死以殉無庸苟活以負死者從容就義百折莫挽死生難易之際權之審矣嗚呼此尚得以匹夫匹婦之諒少之也乎天下有所遇不幸如節婦苟不至於棄其孤者寧以死為正可也余因讀節婦傳而特申其說書卓氏傳經堂集後卓子火傳建祠於塘栖里第奉其先入齊左車珂月三先生而名其堂曰傳經海內文章之士皆以卓之子孫世守侍郎忠貞公之教以克紹其先烈為能不愧於傳經之義爭為詩文以紀之越數年裒成一帙嗚呼靖難之際一時忠臣烈士以守經蹈義而死者指不可勝屈乃其傳與不傳則亦有幸不幸焉余族高祖仲敬府君諱德當明建文時用大臣薦授都督府斷事首上遵祖訓謹用舍安宗藩興教化詰戎兵五策比朝議削藩弱封復抗疏言分封以屏王室即地稍踰制宜裁之以禮奈何以細人上變輒動搖宗室復謁齊尚書泰謂今日宜用踐更法嵗簡遼寧燕谷護衛精鋭軍以偹邉順命則已不則移師蹙之未晚與忠貞公請徙燕封以絶禍本之議略同及燕師起伏闕門上書以漢吳王濞唐李茂貞事為言謂無使造膝近臣踵􅏯錯杜讓能之禍未幾以户科源士犒盛庸兵于東昌戰敗被執責燕王以大義亂刃交下死之後以陳歿不入逆籍族得全而世亦卒無知者夫建文死事諸臣身罹極刑戮及三黨宜族姓靡有孑遺而其子孫率多顯者自方正學及齊黃諸公皆有後則其他可知已忠貞公與有滅門之慘其遺孤得脫史不載其事而今卓氏之盛蟬聨不絶如此嗚呼此豈人力也哉余家幸未遘禍閲今三百年氏族漸蕃不可謂非祖宗忠孝積纍之報而仲敬公死綏遺事日久湮沒家大人屬王君于一為傳始著聞于世讀傳經堂集留連久之敬書末柬且以志吾愧焉跋蔣崙園位思堂記後崙園蔣君初以孝廉知博平縣擢入為户部郎久之出守吉安遷山東鹽法轉運使未任而卒余與君交二十餘年竊覩君遇事明敏善斷毅然有為所至蔚著聲績可謂侃侃克舉其職者也及展兹卷見君題吉安郡署之額曰位思且自為之記以年少時放達真率未講明於修已治人之學痛自針砭君之治郡於是為有本而余深愧知君之未盡矣夫人心之有思瞬息萬變日出而不窮欲强禁力禦使伏而不動譬制逸馬遏决川其為奔潰益甚易曰何思何慮非不思也能不越於其位則日用酬酢皆得艮背止所之道而無復憧憧往來之擾故雖動而益靜子産之告子太叔也曰政如農功日夜思之思其始而成其終朝夕而行之行無越思如農之有畔則其過鮮矣畔言次也即位之義也無越思即不出位之義也子産之言政實有合于易象而君之名是堂豈不真知為政之本矣乎岐巖為君之兄子藏弆遺翰不啻拱璧今岐巖方以才望分巡江西家訓相承治行當後先輝映余三復太息為跋卷尾而歸之並以志吾屬望之意焉跋燕文貴草堂圖己亥秋豫遁延陵有持破卷易粟者展之宋燕待詔所擬草堂圖也昔盧徵君鴻在開元時嘗賜隱居服官為營草堂其所居之室號寧極鴻嘗自圖以見志宋廣川跋云其本嘗在假成式家當時號山林勝絶不知逮今存否高希中嘗出此圖考之古本則有樾館而無寧極又景物增多致多繁碎此後人追想勝概而浪為之也燕待詔擬此圖數十年後李伯時臨一本又數十年後林彥祥臨伯時所臨一本而彥祥自書其首則云草堂樾館二紙亡之久矣是其存者八耳觀此則鴻本在宋已不及見見者皆臨本即臨本亦不能全矣小米曾為石瑩中跋彥祥臨本尤足據又王方慶于毗陵得伯時畫十志與彥祥臨本人物大小不同余家藏本與此卷亦如之卷中枕桃二字遍閲諸書俱各異同大抵古人畫入妙境寫之非一家觀者相其神駿毋拘形似間可也亟以粟易之重加裝飾俟識者鍳定焉跋侍講田公詩卷此吾師侍講先生遺蹟也先生詩格清古雋永曠懷高寄出入韋岑之間書法亦遒健無近今習氣此卷所載皆初入史館時作年甫二十餘遽切故園松竹之思非具善慧夙因安能擺落俗情妙解禪理如此而人歌人哭一篇竟成詩䜟尤可痛也三復吟諷不禁隕涕敬識數語于卷末惟湘老昆仲什襲藏之跋宋漫堂珍藏董文敏字冊董文敏筆札妙天下同時士大夫家藏弆者必多距今七八十年而殘箋齾翰絶不易購漫堂先生得此數劄珍同拱璧宜矣文敏書體兼衆妙而用顔法者為最工此冊隨筆所至若不經意細按之結搆精密于跌蕩瀏灕中具有凌厲徑挺之概當從爭坐位脫化得之先生鍳賞稱當代第一亦謂鄙言略見門庭否也跋笪江上字江上先生築室鬱岡抗跡世外日以圖史翰墨自娛楷法全體晉人行草出入于唐宋名賢間自闢門徑二十年以來海內人士訪購寸縑尺楮珍同拱璧吾甥興宗獨得所臨華陽隱居帖素箋十幅以所言皆修真餌芝之事因張諸屏以為吾姊壽一展誦間朱陽之館玉律之砂倣佛如覯其為祝嘏也多矣以視世俗乞取諛詞相誇詡者何啻霄壤哉駕幸江寧紀恩碑記康熙三十八年春正月皇上軫念淮陽水患下詔南巡二月車駕臨淮境親履河堤周覽形勢以修築方略指授河臣又特命截漕發糶賑恤被災州縣嗣是濟江而南遍歷吳會蠲逋賦減商課廣進取之額沛矜恤之仁德音屢布恩澤至厚夏四月己酉駕入江寧軍民數百萬歡迎夾道頌聲徹於行在越翼日庚戌傳諭內閣明洪武為一代創業之君朕前南巡二次俱特行祭祀並親至陵寢禮奠今巡幸至此當仍往親祭著大學士等議奏欽此大學士臣伊桑阿阿蘭泰張玉書言前者乘輿兩幸江寧已親至明陵酹酒兼遣大臣致祭今請專命大臣不必更煩車駕奏入得㫖洪武乃英雄奮起建功立業之主不可與他君竝朕當躬往致奠其祭文著撰擬進覽比翰林院撰進祭文復䝉御筆親加改定頒發太常壬子遣兵部尚書兼管太常寺事席爾達詣明太祖陵質明致祭而上即以是日率諸王羣臣躬至陵寶城前拜奠三爵如前禮既出駕過明故宮徘徊止輦見荆棘載路且有成麥畦者慨嘆久之越二日甲寅御書治隆唐宋四大字遣侍衛馬武海青等捧示諸臣曰此御筆為明陵題殿額者明日早命郡王率大學士伊桑阿阿蘭泰張玉書同往行禮安奉殿內於是諸臣環跪瞻仰無不感誦歎服臣玉書奏曰自古帝王未聞躬祀前代陵寢者聖駕三至明太祖陵親行奠禮兹又特書殿額以示優隆盛德懿典允光千古且治隆唐宋四字於明太祖創垂功業至為確切一經宸翰褒題而史書遂有定論臣等不勝欣仰之至是日又傳諭曰朕昨往奠洪武陵寢見牆垣復多傾圮可交與江蘇巡撫宋犖織造郎中曺寅㑹同修理朕御書治隆唐宋四大字交與織造曺寅製扁懸置殿上並行勒石以垂永逺欽此乙卯昧爽郡王率大學士及巡撫等具儀恭捧御書扁額安奉明陵殿內行禮而退一時在省文武官吏與闔城父老子弟環堵聚觀僉謂鑾輿三幸江南不獨黎元比屋被澤即山川百神亦罔不欣悅而加禮明陵尤屬曠典大聖人行事真足超軼百代臣等幸生唐虞之世又得親見堯舜之君帝德巍蕩如天難名惟有仰祝聖壽無疆爾於是臣玉書拜手紀事而翰林臣倪某恭書勒石賜遊暢春園玉泉山記四月初四日辛未上御暢春園內淡寧居大學士伊某等以折本請旨畢上傳大學士伊某阿某王某張某尚書庫某馬某索某圖某沙某班某左都御史沙某侍郎常某席某朱某安某滿某學士德某常某同進暢春園看花從淡寧居右邊入至淵鑒齊前沿河堤上列坐賜飯畢諸臣縱觀巖壑花光水色互相映帶園外諸山歷歷環拱如屏障上御船繞淵鑒齊而下命諸臣從岸上隨船行諸臣過橋向西北行一路目不給賞至花深處是時丁香盛開共數千樹逺近爛漫上登岸命諸臣隨行遇名勝處輒親賜指示諸臣得一一見所未見遊畢回至淵鍳齊前謝恩而出是日上隨諭諸臣玉泉山邇日景物正佳初六日早再來同遊初六日癸酉早上御玉泉山靜明園諸臣俱集從園西門入園在山麓環山為界林木蓊鬱結搆精雅池臺亭館初無人工雕飾而因高就下曲折奇勝入者幾不能辨東西徑路攀躋而上歷山腰諸洞直至山頂眺望西山諸勝上傳諭諸臣俱乘船回各家人役皆携襆被先至西直門伺候諸臣出至園門外謝恩皆稱臣等生平經歷山水勝槩從未得如此耳目開滌心神怡曠真天作地成以貽皇上䝉恩賜遊實千古未有之幸上遂登舟留大船二隻一賜親王乘坐一令諸臣並載并差員前往啓閘沿途稻田村舍鳥魚翔泳宛然江鄉風景而郊原豐縟氣象又為過之諸臣至西直門登岸莫不踴躍歡欣慶聖世泰交之盛自卷阿遊歌以後曠世僅見云賜遊化育溝後苑記康熙四十七年五月十八日駕至化育溝行宮扈從內大臣各給房五間皆倚山為璧草木蓊翳具有幽致臣初與扈從亦分給焉二十二日有㫖命同內大臣纛章京一等侍衛及衆翰林官遊觀後苑從東掖門北行緣路皆菜畦蔬圃內地諸蔬悉具而野花雜卉錯出于其間其北靣則灤河之水引入小河中碧波澄徹可以見底魚名栁根赤者極多水至清而魚咸孳生游泳于內亦一異也苑內疊石處少絶無經營締構之迹其曲折蜿蜒坡陀高下皆因任自然輒饒幽勝山境葱鬱在萬峰環抱中而地勢又極疏曠遙矚之則邃如也平覽之則廓如也內境實罕有此勝概渡河而北為澄鑑亭又行則為霞標又左則為四面雲山復過一河則為宛在亭皆有御題扁額是日上御宛在亭東西座為皇子亭旁左三間諸滿臣列坐于內右三間則臣與諸翰林坐焉賜食四盒凡十數器俱異常膳又從御前撤賜口外百合一碗極甘美乳調雉羮亦平生所未食又特賜臣麵食一器令携回寓舍皆珍品也其音樂則升平雅奏與外廷逈别諸臣宴賞盡歡午餘方罷臣與翰林諸臣同至直廬謝恩隨又賜金蓮花一瓶是特移種于口外者鮮妍可愛與五臺山所産無異他省諸山未之見也賜遊哈喇和屯後苑記五月二十四日駕自化育溝移蹕哈喇和屯哈喇和屯䝉古所謂烏城也有御製碑文在敕建穹覽寺內二十七日有㫖命同滿大臣等遊觀後苑從西旁門入經一大軒額曰松壑清越登山至一佛寺為慈雲大士閣有藏經在焉佛像及供器皆與外製者不同出閣經一軒曰泉蘿幽映渡浮橋北行橋下為灤水從西來分為支河引入苑內河中魚至多又行一徑至行殿前面山臨流山石嶙峋聳削上建二亭即所謂小金山者時同翰林諸臣于殿旁選石而坐賜有蒲席坐墊少頃賜食五器各飽飫御饌饌畢渡橋登山命內侍導行時上遙望諭曰可隨意遍觀勿拘形迹因歷覽前後二亭前一亭淺深規制俱與金山之留雲亭仿佛亭聨曰丹地平陵霽夕月懸高閣靈池不鑿雨時雲起澄潭可以想見勝概後一小亭絶類金山吞海亭且相望一大石在河中流與善財石無别此小金山所由名也臣徘徊久之江天風景宛然在目因對諸臣言不意身在塞外復遊故山真人生之希遇也諸臣皆相顧感歎非聖恩安能至此既下循長堤而行觀金蓮花種植凡數畝色正黃彌望奇英煥爛自壓諸花之上其他野卉不知名者不可勝紀回至行殿前內侍導從殿左行所歷多佳勝渡浮橋而南至一别殿曰寄雲涵碧四面皆垂簾曠覽無際所列異花最盛轉至水次登舟絶灤水而渡伊蘇河水水中有大洲上有軒額曰煙月清真聨曰山林依石瀨溪谷潤清波去軒數十武有亭曰積翠聨曰垂釣有深意望山多逺情南有小亭曰碧玉鬖自此登舟復渡至灤水乃登岸同翰林諸臣至直廬謝恩賜遊熱河後苑記六月二日駕至熱河行宫十一日有㫖命同滿大臣等遊觀後苑由正門入向東北行至山崖有殿三楹額曰萬壑松風聨云雲卷千峯色泉和萬籟吟歷石磴數十層紆折而下右有八角亭可垂釣過橋循長堤行時上在亭中顧謂臣等曰此堤形勢有類靈芝蓋長堤綿亘蜿蜒至中道别出一支分為三沱各踞勝境實與芝相類也其東則雲山罨畫西則皇子讀書之所直行里許至駐蹕之地正門額曰澄波疊翠門外居中設御榻眺覽曠逺千巖萬壑俱在指顧間入門少西為延薰山館聨云雲移溪樹侵書幌風送巖泉潤墨池後有佛堂額曰水芳巖秀聫云自有山川開北極天然風景勝西湖旁有樓額曰雲帆月舫聨云疑乘畫棹來天上欲挂輕帆入鏡中轉至御座正殿前羣花列植極多異種繡毬五本分五色目中所未見也對面有臺曰一片雲於是臺上設音樂滿諸臣坐于東廊臣偕翰林諸臣坐西廊小榭內設木榻既宴賜食數器又特賜御膳野雞羮一器及午宴罷羣起謝恩出遂登舟泛湖湖之極空曠處與西湖仿佛其清幽澄潔之勝則西湖不及也岸有喬木數株近侍云此皆奉上命所留隨樹築堤蒼翠交映而古幹更具屈蟠之勢舟中遙望勝概不可殫述有逺岸縈流極其浩渺者有巖回川抱極其明秀者萬樹攢緑丹樓如霞謂之畫境可謂之詩境亦可而詩與畫遜真境逺矣湖東岸一閘溫泉水從此入登岸則有荷池數畝上有凉殿殿右有亭為曲水流觴之地額曰蘋香沜聨曰雙澗常流月千峯自合雲逺近泉聲皆隨地勢曲折疏導而得之循湖水數折復至初乘舟處登岸渡橋由舊道而出此苑中東北一路勝概也至二十八日復奉命再遊則尋西北之勝從東掖門北行仍經萬壑松風由長堤至澄波疊翠時從正門行直過雲帆月舫循廊下行至一片雲處仍坐西廊房賜食觀樂復特賜御案羮湯食畢而起傳諭荷花盛開可同往觀之登舟過藏舟塢對望隔一堤湖光空明無際所謂雙湖夾鏡者於此地見之湖西蓮甚盛內有一種色至鮮艷者從敖漢部落得其種花與葉俱浮水面倒影湖中最稱竒麗其他或逺或近或數叢或散布清芬環匝真巨觀也登岸地勢平衍有田疇有林木過小橋數折沿山趾而行山巔蒼藤古蘚不知幾百年物比至關口關以外為獅子峪關踞嶺上是為西嶺關下一軒額曰濠濮間想有二聨一曰窗間樹色連山净户外嵐光帶水明一曰野靜山氣斂林踈風露長坐憩數刻真覺别有天地非人間也其山後榛子峪松樹峪不及往而返南行則為龍王廟又南則迤邐石徑雜以叢卉春月梨花甚繁稱一時之盛勝山行約十數里坡陀委折時斷時續異境天成回至長橋石磯而西北一路之勝皆仿佛得其梗概矣復乘舟指西掖門登岸偕于岸旁謝恩所謂十六景者一曰澄波疊翠則御座正門也一曰芝徑雲堤則長堤也一曰長虹飲練則長橋也一曰暖溜暄波則溫泉所從入也一曰雙湖夾鏡則兩湖隔堤處也一曰萬壑松風則入門山崖之殿也一曰曲水荷香則流觴處也一曰西嶺晨霞則關口西嶺也一曰錘峯落照則逺望苑西一峯也一曰芳渚臨流即石磴旁之小亭也一曰南山積雪則苑南一帶山也一曰金蓮映日則西岸所見金蓮數畝是也一曰梨花伴月則春月梨花極盛處也一曰鶯囀喬木則堤畔所有喬木數株是也一曰石磯觀魚則石磯隨處可垂釣者也一曰甫田叢樾則田疇林木極茂盛處也宇內山林無此竒麗宇內園亭無此𢎞曠先後布置皆由聖心指㸃而成未成之時人不知其絶勝既成之後則皆以為不可易矣大抵順其自然行所無事因地之勢度土之宜而以人事區畫于其間經理天下無異道也遊遼東千頂山記康熙二十一年歲在壬戌海宇削平慶典具舉春三月車駕至盛京告成功於列祖三陵畢謁巡涖邊塞特敕扈蹕部院諸臣留都祗候臣玉書叨與侍從自興京奉命返轡時日休暇將遍歷州邑諏訪舊聞㑹積雨中阻不獲逺涉遼陽城南五十里為千頂山迤邐盤互夙擅竒勝望後十日持襆被杖䇿以行比過遼城獲覩太祖高皇帝駐師築壘據河克敵之遺蹟又延問故老得年八十以上者二人指述舊事尤詳越宿冒雨入山既至風日開霽恣覽縱陟往返凡八日山多竒峰巑岏稠疊不可指屈故名千頂僧寺最著者五曰祖越龍泉中㑹大安香巗志無紀載或曰唐貞觀中征高麗曽駐軍於此語多附㑹據元皇慶中直學士陳景元撰僧雪庵塔記言僧自醫巫閭駐錫大安後移居鴨緑江復還香巖具有異蹟今香巖寺西有雪庵塔而諸山所傳名勝亦往往以雪庵著則五寺舊址雖不可考而其創建在元以前興起在皇慶以後亦可信已夫遼陽為國家肇基重地陵宮相望百有餘里此山蟺蜒瑰異嫓之往代當在東都瀍澗西京霸杜之間而關塞遼逺輪蹄罕及致使靈峰鷲嶺鬱而不彰臣玊書來遊來觀欣歎希覯隨跡所至用志梗概山不勝紀仍以五寺繫焉循遼城而南里許山色凝碧籬落類江左至八里村有梨數百株雨後吹白如雪踰石門度七嶺東南行為湯泉泉近濁可滌不可飲也入山經邢崖徑路逼仄萬峰回互鳥鳴樹底雜卉蓊翳梨最盛彌漫溪谷七八里不絶過南塔有官亭遺址勝國時將吏宴遊休暇之地又數武至祖越寺寺環山而構靣俯背倚左右拱揖高輒數百仞巒岩洞石名各肖形有神人仙佛蓮月盂鉢螺髻獅象之屬惜無髙人勝流持擇評品雖稱名近鄙仍而不變也由寺東緣磴而上脫帽杖藜盤礴沙礫數百步得巨石石形如丸圍徑以丈許兀踞峰頂凌虛聳特不欹不仄石上為松坡為石佛崕為羅漢洞洞對峙曰振衣岡磨崕大書蒼潤可愛名氏已蕪蝕略見倣佛而已又里許歷危磴數百級至巔鑿壁為斗室顔曰無梁昔有老僧精梵律者常棲宿其地他僧處之或觸鬼物或虎嘯於側中夜惴栗輒携軍持而下僧浩然云自祖越折而西可五百步兩崖夾峙劃然如門既入泉流潨激泠泠如操石琴溯流而上一徑盤紆古木間植達龍泉寺聞粥鼓聲與泉聲應而軥輈鳥語雜㳫其中泉出寺後彌勒峰峰左有石洞方幅數尺珠光噴湧穿澗而溢寺僧截木承之刳腹類竹引入牖下有若懸溜凡祖越所見西北諸峯皆在寺東峰勢詭異險幻正側殊狀遊者心目駭蕩不諦視不能辨也寺延袤僅數畝其築室架壑皆依山偃仰有清越環映之致故山徑峭窄而取境特竒寺為故相國范文肅公舊遊地其子忠貞公所書字存藏經閣中寺僧寶而藏之出以示客結構嚴冷如見其人龍泉距中㑹不十里山徑曠衍林隩暢蔚虎跡交錯竟日無行人晨興循龍泉東麓折而南有牝鹿十數注坂徐下僧曰此鹿就飲溪澗水耳畋獵罕至故與人狎然時墮虎口至中㑹寺寺前為水閣方廣半畝夏秋之交霪潦演溢九峪之水滙注于下閣因是得名其盛時水石交映禽鳴魚沫頗極登臨瞻眺之勝今閣久廢僅存石址而水勢亦湮塞尋所謂九峪水故道無識其源流者可為太息中㑹在五寺為簡寂禪宇剝落無復舊觀僧耻若遼陽人有學行築室數楹書史盈案龍泉西南諸山皆倚室東隅而松苔峰西峙與粥魚庵故址相望嵐氣環匝視靜而聼逺坐移時窅然深也出中㑹行十里許草樹藂密溪流鏘然水穿石中時露時伏是為大安寺山址又里許徑路盤紆下馬拾級而上行五百餘步徑漸平復騎距寺半里許奇峯疊嶂聳出雲表如立如踞如拱如戴孤挺峭厲率去地數千尺寺枕山之中前俯後仰萬象盤鬱入寺憩五峰丈室閣鈴松韻時發異響坐久之邀兩僧導遊人授一藤杖循百佛堂過薛庵至瓔珞峰峰突兀無梯膝行而上有泉出石旁如盎既下入萬松林逶迤里許隱蔽日月野卉數十本色丹而妍錯互于古松之隂幽麗特甚自此山益竒徑益逼沙礫雜糅積葉盈數尺怪石怒攫下視無際心悚然而危乃令兩僧前挈後掖䇿杖其中同行七人穿叢莽排朽株纍纍然趾背之相錯也行十餘里至羅漢洞洞深五六丈懸崕後阻蘚壁對峙有明嘉靖中華學士察題石出洞口折而西遙望石穴如牖為雲封洞背雲封過馬蹄㠗當衆山之中南緬通明北俯中㑹若襟帶然又百餘步經石門渡嶺天風乍起山木盡號仰睇仙人臺一峯斗絶空際疑不可即循磴道徐上約數十尋至臺趾左深潭右絶壁環顧諸山盡在肘腋之下臺上布石枰柳柳州記仙奕山庶幾似之而其矗立萬仞之巔崚嶒竒詭飛鳥垂翼虎豹却顧海內諸山所罕覯也此峰居大安中㑹香巗之間山脉之所薈萃故遊大安者指為盡境折而下則去香巗為近于時夕陽在山隂氣慘肅不及還大安遂尋香巗而西距仙人臺二百步有徑東南行孤峰旁突為觀音閣閣久廢而其地特勝衆山環列蒼靄畢㑹蔚然巨觀又東為夾峰元僧雪庵栖息之地峰下為洞洞口正黑傾亞不能措足手捫一穴僅容膝兩石離立橫木其中背石履木下見深塹側身而入攀穴而出極山行之險甫出穴復對立一峰架木為梁濶僅踰尺引絙乃度夾峰之名以此峰頂有巨石有古屋有斷碑峰外道絶仍觸險出洞口歷鸚鵡石雨花臺循錦繡坡至香巗日已暝矣僧言深夜常聞虎啼繞佛閣數匝而去遂墐户就宿曉起捫石碑得元直學士陳景元撰雪庵塔記碑覆土中百餘年掘土得之苔蘚瘢胝雜以塵垢字畫漫漶不可辨强起衆僧鈎剔滌除纎翳盡去所刓缺者才七八字文載雪庵始末甚詳字體亦遒潤諸寺碑版之文此居第一由山後循舊徑度嶺又尋别峰東過雙井撫朝陽寺碣折入松林經大安而返千頂勝概以大安為最而山徑竒特實在香巗大安交㑹之介以道出諸山之背邃奧深隱故多見側勢登覽者憚其僻遠往往避險而就夷皆未能窮極兹山之勝者也蠲免儀真縣坍江田糧碑記方伯鶴鳴慕公奉特簡開藩東南利興弊滌蠲煩釋苛閲數年而大江南北百城頌德異口同聲咸紀述公績以志不朽而儀真縣則有蠲除坍江田糧一事其為利溥而貽福逺莫有過焉者也禹貢荆揚之域濵江卑溼故厥土塗泥揚州田居九等而荆次之今則三吳稅重甲天下矣漢唐以後論田賦者多有資江灌溉之利而未及坍田之害意者江與河異性河决難制而江流有常縱有坍沒未甚為民厲故史不悉載歟百餘年以來凡江流所經之地民田被坍者一歲數告然而郡縣有司格之者十九大吏格之者十七其得悉陳民隱不壅上聞者抑已鮮矣儀真縣濵江田自國初歷嵗坍沒計上中下八十六頃二十五畝有竒應除免額課六百五十七兩有竒里民失業流離委瑣至鬻妻孥以辧國賦前鳳陽巡撫張公兩為疏請户部以全書既定不便更張為辭至康熙四年清丈田畝儀真縣丈增田一百餘頃以抵坍額尚多贏羡於是里民復具牒力控謂缺額有抵上不虧國課而下可拯沉葘計無便於此者而前令某某猶且難之至八年知縣汪君時泰始慨然請於府司府循故事覆核至再復具里民牒狀上訴既允咨部矣遷延兩載仍庋閣不行迄我慕公涖事伊始汪君具册籍申請如前公聞而惄然傷之於時百姓濡毛焦髮恨不能斯須脫於焚溺然而催科為急民命為緩實不敢必公之遽為請豁而部議之遽從公請也乃未幾忽聞所請已得俞㫖盡蠲田坍應輸糧若干兩以新增抵舊額里民驚喜出于望外於是嘆天下事務在力行而已踵因循之弊襲拘牽之說雖身秉化權而功德不能及於一物漢人所云三公徒治簿書而無惻怛豈弟之心誠痛之也今夫有田始有賦田汨於江而欲督民輸課此功令之所深斥而諸有司甘心虐民泄泄然以秦越人相視者母亦謂司計者主贏而不主絀非鈎考詳核不能已於詰問於是文移往復吏更數手時歷數載猶豫不决而害獨中於小民惟公視民疾苦痛若切膚方縣牒甫上即白於巡撫馬公列其事入告而部議以公之重卒無齟齬議上即報可曽不數月而二十年之痗心疾首隱忍負痛者一旦渙然以釋事之成敗遲速繫乎人如此仁則生勇誠能格天其公之謂歟公之造福德於吳人也非一事矣蘇松浮糧積困日甚公頃者特疏未允廟堂之意或姑俟異日安知乘間補牘不復轉圜於俄頃乎此則兩郡百世之利而非僅一鄉一井之食公福也已余特牽連及之以致吳人頌禱之意云蕪湖關碑記聖天子御㝢三紀而邉冦削平中外清晏薄海以內舟車駢㳫幾於行萬里不持寸兵含生樂業之象三代而後所僅見也而聖心軫念民依既賜田租復拯商困屢下詔㫖飭關政以通商惠民猶恐司𣙜者專遣諸散僚未盡稱職乃輒簡用內府近臣往督其事如蕪湖一關夙稱江左重地康熙三十七年上遴選在廷才望特命侍講學士郎公為監督而以禮曺覺羅塞君佐之公與塞君感激知遇甫下車即協心力釐革諸積弊越半載而逺近被德頌聲溢于衢路三十八年夏四月車駕南巡至江寧余忝與扈從見兩江商民上蕪關治狀具言監督臣􅋵履之潔政績之清近今罕覯上深加褒異比公朝謁行在遂御書松風蘭露四字賜公蓋隱然以潔清之義特示優奬且將用蕪關風厲諸榷使也一時扈蹕諸大臣咸頌聖明知人善任而以公克稱任使為難余辱交于公久退而詢公涖關之詳公遜謝不敏乃衆商民之辭則有徵矣謂蕪邑城臨大江而關署適當其衝賈舶銜尾雲集往往以風濤震蕩不測為患惟公持大體滌煩苛絶濫征禁抑勒凡民間日用所需與夫升斗尺寸所入例不應𣙜者悉以與民而舟行阻滯之弊息至若黔蜀兩粵江楚之區楩楠杞梓豫章之材歷叢篁深溪蔽江而下其取之也至勞而運之也至艱自司𣙜者不察乃有丈量留難到瀂供億之纍兼以疾風斷纜越關加罰之苦公臨關親閲無稽時無溢費而且官稅未敷者為之權宜酌劑私負未償者為之轉移勸輸所以培商本恤商害者無所不至設以公之法懸之通都著為令甲豈獨一時之利自今以往實百世賴之余聞之而不禁愾然嘆也在昔周官以九職斂財賄而關市山澤之賦居其二商之有稅昉自古昔初未為厲民而或因稅以階之厲者非法之不善奉法者過耳頃復仰奉德音減除歲入贏羡之數則繼此為𣙜使者其辦賦為益輕倘能循公已試之轍恪守焉而不變於以通商惠民寧有既乎聞者皆曰請書之以勸來者遂不辭而書為記東臯記朱子駿文將歸雲陽之東臯揖余言别曰東臯距城東不一牛鳴地余偕伯兄肇基築室其間奉吾母以娛老子盍為我記之余叩其勝延袤凡十畝圍以高楓長槐環以曲阜依阜為池編竹為徑循徑而入有石門門以內植卉數十本長廊繞池分南北焉南四面皆水橫欹石橋橋畔有舫左植桂右植蘭蕙環池蒔荷置一亭俯之額曰清娛北三面岡為城列柏如拱為古柏堂堂側為攬勝閣憑閣而望則南浦諸勝隃對几席由堂而左有阜高下偃仰勢若斷嶺嶺半置片石亭由亭迤折而下叢篠翠隂仰不見日最深處為萬竹軒面方池黛蓄膏淳窅窱澄映池旁築危樓高數十尺以榆柳䕃之顔以木未凡所為堂榭陂池不礱不斫非有世俗鏤繪綺麗怪木詭石之供聊適吾意而已余聞而俯仰太息因謂朱子曰三十年以來東南園林山水之勝浸淫絶響矣舊家世族既獮剃於風凋木謝之後而兵燹頻仍大獄數起即所稱薦紳華膴與閭左稍自封殖者常岌岌乎懷抱蔓之憂何暇及宴娛遊賞事耶比歲海烽寖熄而連營重鎮參錯櫛比於西津北固之間地方大吏一意以清淨休養疲癃庶幾承平漸覩則異時園林山水之勝亦以次修葺而東臯其權輿也矣嗚呼廢興成毁相尋無已每見閥閲之家祖父之遺書杯棬鮮能傳及三世而况區區土木竹石乎西都士大夫名園相望而未幾廢為荆棘平泉莊成愀然身後無窮之慮而後嗣不守卒為達人所笑人世滄桑之感豈獨在兵革耶東臯簡朴蕭散自然幽勝且其地僻處城東偏不當車馬騷驛之衝肇基駿文兄弟友讓同修閒居奉母之樂而不汲汲於仕進園朴而完地靜而邃人穆而和是三者皆可久之道而朱子有焉昔歐陽文忠公記海陵許氏南園盛稱其一門孝悌化及鄉人而且屬望其子孫力行而不怠吾於東臯亦云張文貞集卷六
