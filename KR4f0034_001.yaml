body:
  text: 張文貞集巻一大學士張玉書撰南苑賦皇清御字體隂叶陽作京燕都六合殷昌闢九筵而覲萬國象髙闕於天閶鬱彼御苑肇啟朱方延袤百六十里亘以馳道繚以周牆匪有雕文釦砌金璧飾璫與夫珍禽異獸羅弋於絶域怪木詭石輸輦夫八方葢先皇帝經營天下十有八載常恐一物踰度泰而弗康也今天子斥奢靡崇儉約以纉以述嗣盛徳而益光固陋如臣溷跡中祕擬雅合頌是惟臣職欲美作述之形容媿未窺夫萬一繄金墉之萬雉敞南囿之逶迤配勾陳以拱極奠坤軸而居離陸澤擬夫瀚海芳樹爛其葳㽔入紅門而四睇儼蓬島之遐躋其東則離宫洞啟丹甍雲矗畫檻凝香朱扉曜旭霽景麗乎扶桑朝暾映乎若木其西則金鋪交映玉題爭輝扶疎堤栁夾䕃宫槐藹叢芳之如織矚昭陽之乍開于是徼道綺錯嚴更列署海户雲屯警昏戒曙崢嶸井幹迂迴輦路林薄村籬含烟宿霧亦有琳宫梵刹夕磬晨鐘灌樷掩鬱精舍斜通聿丹青之相望實斥逺之而不崇其中則有山南白鹿塞北黄羊韝鷹臂鶻狡兎驚獐昏鴉夜啄翠羽朝翔義合乎靈囿制陋乎長楊他若黄鸚鵡獻自闗隴白靈烏貢自江鄉或却之而使勿進或畜之而不侈為祥也至於大谷之梨烏椑之柹弱枝之棗房陵之李繁容麗藻敷條布蕋産不一名彌阜被沚繽繽乎郁郁乎皆其可薦於寢園而充乎嘉旨者焉爾其源泉灌注陂池交屬既玉蝀之連雲亦晴光之如縠牽青藻之紛披散蘘荷之芳馥遊鱗泳沫以沿波鳬雁羣飛而侣浴于時土膏潤則百卉滋榮金風起斯嚴霜戒肅景物屬四序以遷移惟俛仰常豁乎心目若夫晾鷹雄築凌雲際天揭焉中峙瀏覽連綿居庸拱夫左輔碣石倚乎東偏鑾軨玉輅㑹乗時以戾止則輿徒羽騎咸合遝而駢闐猗歟休哉方今海㝢清平泰階寧謐天子鋭意萬幾留情史策箴宵衣儆旰食重田功息民力曽勿事乎遊覽猶時儆夫盤逸間稽古制詔舉獮苖爰駕赤驎揚青鑣朱竿耀日絳節回颷箕張翼布結罝列矛鷹揚貔虎之儔競矜雄而角智中黄賁育之士待窮穴以探巢爾乃鳴鉦鐸滌貪饕馭勿詭遇射勿剪毛殺勿盡物騁勿殫勞良用討軍實訓仁儉而非區區視捷足為超乗較獲多為功髙也庶幾乎埓于古之蒐岐而狩敖于斯時也文教浹武功樹濊澤旁流英華布濩方且躋一世于春臺奠蒸黎於樂土樅周室之鼔鐘追虞廷之干羽簪筆微臣將詠由庚頌華黍美斯干歌湛露祝聖徳之日升月恒而豈徒夸乎相如子雲之賦璿璣玉衡賦臣聞惟天垂象斗籥轉夫三辰惟聖乗乾皇極符乎五紀欲法運行之不僭應觀緯度之有恒粤攷天體常貞表儀各異自容成治厯始綜甲子以紀年迄羲和授時爰察璣衡以齊政翳古法之推步實後人之權輿顧代逺時更禮湮器失宣夜有其名而無其制周髀有其説而無其傳即求璿玉之懿規亦至嬴秦而散佚洛下閎師其遺意聿製渾儀耿壽昌倣其成模復更銅象張衡定儀體於八尺以漏水轉圜錢樂㕘圖籙於諸家用新儀測景李淳風三重之法晷刻精詳僧一行黄道之儀盈虧悉驗地輪地足至張思訓而益増簡儀仰儀惟郭守敬為加密摠此為璣為衡之制厥有遞増遞減之名葢古昔步日占星肇神竒於百代而後世分宫起舍較簡易於前人聿自興朝兼綜舊法欽惟皇上性符造化徳洽神明紹二帝之心傳答天斯敬備百王之彜憲格帝惟誠參贊成能雨暘協應厯經屢驗器益加詳信乎指掌坤乾户牖象緯契神機於咫尺綿玉燭於永久豈特斤斤備保章之專官循司天之故典巳哉兹者紘網羣才駢羅闕下抽毫命賦授札掞天誠以究極隂陽斯學有根本精研象數則語無浮夸天人應感之原理氣盈虛之故務縷陳夫奥義必洞晰于淵微臣忝侍禁林欣逢休運漫述拘墟之見聊攄窺管之詞蕪陋自慚空疎滋懼賦曰仰乾坤之昭融周寰宇而黙運成嵗功于靈樞燭人事以垂訓遐覽古初隂陽軌順五精呈符三光朗潤誕受圖于榮河爰協筩于時令嗣在髙陽八風叶應載洎帝嚳五官司正中星辨于伊耆七曜齊于帝舜于稽虞制曰璣曰衡璣設象以環映衡窺璣而中横睠密緯之粲列雖銖黍之畢程飾夜光以測度既規圓而體精琢良玉以為管亦外澤而中瑩古法云亡星官失術越有渾儀是纂是述準尺寸以經營傳璣衡之髣髴其為體也六合外圍辰游内設指二軸以直距燭低昂于毫末其為用也分天脊以立極跨地平而定隅持南北之兩端激機輪如轉樞若夫日躔黄道與赤為界半入其中半出其外晷長至而牽牛是經景短至而東井斯届辨婁角于春秋實二分之交㑹此日行之軌陽舒而隂殺者也月行九道黄道則一周列四維隨方易色經其南為朱經其西為白經其東為青經其北為墨分内外而錯居并中道為九則此月行之軌陽消而隂息者也至於驗五緯之凌歴分贏縮于步躔惟金水之附日常一歳而周天火再嵗而秉令木一終而司權填中央以主福閲二十八嵗而一遷其間順逆留伏循環無端伏行則急留行則延順厯而東行則合逆軌而西行則偏此五星之度有常道亦有變愆者也大抵日月之行以天為輻星緯之運以日為轂天左旋而常贏日麗天而差縮天視日為有餘日規天為不足積經嵗以為期斯日㑹天而來復繄太隂之行緩按躔次而可推計一日之所退常十三度而有竒月一周而交㑹實日速而月遲惟星官之步厯謂進度為難稽指逆數以握算若右旋其易窺倘折衷于至當實左旋其不移夫天度有常觀象斯在天命難諶惟徳克配昔者聖人之答幽明序五行也晝考乎日氣協純陽象以修政積精于剛垂離照于庶事振遐覽于八荒夕考乎月體含純隂象以修德退密洗心既内庭之式序亦宵衣之是箴爾乃啓春令于東陸屬重華而為木溥仁澤以噓枯配青陽以覆育秩夏令于南訛屬熒惑而為火敷禮教以牖民範羣䝉之偏頗涼風既至太白司金象秋令以義正肆賞善而罰淫嚴霜乍隕辰星司水象冬令以智臨爰植綱而置紀令行季夏中德為土四星迭運填不易矩堅大信如金石捷令甲于風雨于是乎有治溝洫設瀦防疏川谷謹闗梁之水政有司烜爟頒禁律改國火救時疾之火政有戢淫邪嚴五刑誅暴慢厲五兵之金政有掌薪蒸禁林麓司器用慎儲蓄之木政有辨物産課樹藝定土圭度地勢之土政凡以觀文察變協序撫辰或災沴之偶告即修救以薦馨雖禮詳于三代實道啓于虞廷觀于命九官分庶職儆天工協羣力罔非察惠逆于神人相璣衡而因革此所謂欽若之淵源歴千聖而同徳也天祚聖皇丕膺休命衍箕疇行夏正格神明盡物性握苞符以建極召箕畢而環應惟睿慮之璣衡不假器而垂鏡于時天門肅穆泰階清平儼衆星環拱而仰紫極之威神焉百職受成四海陶冶譬二十八宿之森列而司九州之分野焉朝視政以勤民夜考經而省憲兩曜之旁矚無垠而宰之以至健也軫旱潦以渙號宣幽滯而達情五緯之代更遞旺而總之以好生也繼自今協炁旁流嘉生蕃殖大澤沾濡聲靈允塞固不必連珠合璧之祥五福庶徵之集然後知郅隆臻於三五而天人接於呼吸也已典學勤政頌有序康熙十二年三月六日皇上命翰林院掌院學士臣傅達禮熊賜履集侍讀學士以下官同試於翰林院以觀心術學問復命越日各錄所為詩文以進臣伏聽惶汗退竊自念臣經術淺薄行能無似濫竽侍從預修國史服官十三年曽無寸長微善仰禆聖治萬分之一間一操筆學為詩文黭鄙牽率不足上塵睿覽伏覩皇上懋紹鴻休纘承丕緒乾綱在御百度畢張數年以來諸大典禮若郊壇升配廟享告䖍釋奠崇師山陵展孝嵗下蠲租之詔時沛解網之仁耕藉田而親履郊原講武事而躬擐甲胄良法美政次第舉行而又昧爽御門面決幾務虛懐下問樂受盡言檢寶籙則奉若球圖輯羣書則旁資蒐討啟經函於祕殿設記注於螭頭宣召儒臣日親講幄猗歟休哉帝咨王儆不是過矣夫勤政者大化之權輿典學者立政之樞紐我皇上豐功駿業媺不勝書惟兹二端實為根本昔董仲舒獻䇿於漢帝事在力行魏徵進説於唐宗縷陳十漸臣竊惟皇上日新盛徳久道化成將益光列聖之謨烈而躋斯世於唐虞三代之隆區區漢唐之主無足稱也爰不揣固陋拜手稽首而獻頌曰皇清耆定垂三十年仁風鬯被中外嬉恬惟皇叶靈受祜于天九有式廓厚澤允緜赫赫大業祖宗興之奄有方夏世祖成之我皇纘緒𢎞此丕基光燭四表寰宇樂胥纉緒維何聖不自聖勉勉我皇典學勤政有抑其儀有覺其行旰食勵精建中表正聿追懿軌肇啟講筵左圖右史載討載研崇正黜邪道炳星日于羮于牆寤寐飲食日監匪逺昭事聿勤三辰洽契丕薦馨聞雨露汪濊湛恩斯普惠兹元元曰繩前武旱潦頻仍惟帝曰咨田租嵗賜粒彼載饑四門是闢昌言是式止輦和顔用旌厥直晰晰庭燎委懐詢謀展采錯事協贊大猷勉勉我皇功徳懋止區㝢乂安亦既覯止曰安曰乂慶浹道豐鴻功爍徳緝熙昭融若陟修塗瞻言百里晉日乾行慎終如始若登髙山絶巘是躋凌嵩履岱虞肩唐隨進徳伊何存誠主敬執競自强凝承休命成功伊何所其無逸肴核仁義斟酌道徳運行渾元霑潤毫芒雖邇不泄雖逺不忘昭哉嗣服純嘏有常小臣作頌敬獻廟堂聖駕詣明太祖陵頌有序皇帝聖神文武羣生在宥御極二十有三載徳威燀赫仁恩誕敷化流海表聲馳域外顧時巡求莫嵗及三輔惟東南賦繁役重之地未涖玉趾頻軫睿懐秋九月辛夘徳音既渙六龍斯御肇省方於山左旋問俗於江南歌舞載塗扶攜望幸比至江寧循視風土以明太祖陵宅鍾山之麓咨命具儀吉蠲展奠冬十一月癸亥法駕詣陵及門降輦既入升自右階入殿行三跪九叩禮既興從殿後入神路門所司設薌几於昇仙橋侍臣奉爵上親酹酒三仍拜如前周環覽觀撫繚垣傾圯林木翦敗申誡司香宦寺及奉陵人户守䕶勿怠越日復降諭旨追美明太祖混一區宇之功肇造基業之盛飭地方官吏嚴督軍民禁遏樵牧春秋時享務肅將祀事仍傳勅諸大吏以時修治惟謹於戯自唐以後凡前代陵寢所在輒命有司典祀宋藝祖下詔修葺史書遂侈為美談兹以當代萬乗之尊特詣勝國山陵親致拜奠禮文隆渥踰於常祀是乃千古盛徳之舉在昔帝王未有行者行之自今日始於時垂白之叟含哺之氓罔不感仰聖仁至於流涕臣書方以銜恤抵廣陵䝉恩召見於御舸之側退而見大學士臣明珠王熙翰林臣常書朱瑪泰髙士竒具為臣言相與歎誦久之臣自念舊史官也且備員典禮敬錄懿媺傳信無窮臣之職也安可無紀臣竊惟國家加禮勝國其度越前代者多矣世祖章皇帝定鼎之初即設明諸帝守陵人户太祖陵户凡四十人我皇上纘承休徳復屢廑詔旨命加守護比年臣叨侍講幄備記聖政明藩王墓被盜掘發法司議獄坐盜發常人墳塜律上曰明藩王不應與常人等命改坐又以章奏斥明為廢明非是誡嗣後勿復稱此皆我皇上淵識大度以忠厚化導天下至意自有書契以來所僅見謹牽連書之用詔來禩俾知大聖人行事迥絶今古如此不揣弇鄙繫以頌詞辭曰惟聖御㝢光鏡八荒經文緯武揖虞追唐苞蘖既翦烝民胥宅絶島樹郡洪流帖席懐柔秩祀靡神弗通鑾輿時邁百靈景從澤如春敷氣靄朝燠所過賜租經行問俗東瞻喬嶽南溯大河斾臨江左衢祝壤歌綺麗舊都六朝遺趾蜿蜒明陵鍾阜是倚繄明太祖功徳顯融翕受衆策芟鋤羣雄政成惟明令肅惟㫁卜年三百規模丕煥吁嗟弓劒於兹永藏惟我國恩嵗祀有常翠華至止明禋肅戒萬乗執謙歛容致拜于以酹之清酟玉罍自堂徂寢顧瞻徘徊丸丸松栢樵蘇宜屏爰召守臣天語申儆式滌蕪廢式遏踐蹂靈爽是棲維護必周猗歟聖仁加禮異代至徳如天神人並戴粤討墳索古莫與京我皇至徳遹流駿聲拜手矢頌禮臣之職史冊永垂萬䙫欽式馬襄武公崇祀名宦頌國家既定鼎燕都齊魯晉豫次第嚮順大江以南瀕海諸郡邑或負其險逺嘯聚跳梁潛匿山谷所在多有于時和碩豫親王方總六師駐金陵部署諸將勦撫兼用惟京口實首奉正朔而四境伏莽未靖衆心危疑一夕數驚王曰吁誰能為天子安此土者僉曰非總戎馬公不可王乃謂公曰訛言繁興久當自戢毋養亂母激變君其奉天子命往撫之公受命以順治二年八月駐鎮京口既至宣布徳意明白信順反側滌慮兆姓胥悦京口之人倚公之師如長城信公之令如四時畏公之威如風雷沐公之恩如膏雨疾痛呻吟喜有攸訴忠信克遂室家以完奉職輸賦無有後先踰年江浙既定八閩猶梗化有詔命公偕禁旅聲討去之日鄉之大夫士率耆老而謀曰公實生我徳不可忘乃建祠于大江之濱而爼豆之嵗祀不懈公既將師入閩乗勝攻拔十數城不旬月八郡悉平以功進提督授侯爵駐閩者十有餘年而鄭逆抗拒海上時䦨入内地為患康熙初元公與蕃臣分兵勦金門厦門諸島賊竄伏臺灣明年公統水師深入烏沙援兵不繼孤軍與賊遌㑹颶風作王師三百人殱焉公徇節而卒事聞朝廷震悼追封一等侯世襲罔替謚襄武訃至京口鄉之大夫士率耆老相聚而哭于公之祠今天子御極之三十八年襲一等侯乾菴公公長子也佩大將軍印開幕府于京口威惠並施軍民輯睦閲一載郡之人拜大將軍之賜因益念公遺愛在人于是羣博士弟子復詢于鄉大夫謀于耆老曰公昔總戎于此非徒全我之身寧我之家也當羽檄交馳戎馬倥偬之際公尊禮儒者肅清學校絃歌之聲不絶于里巷至今父老猶能稱道之是非崇祀學宫無以光顯偉烈儀刑後人矧事久論定義所必舉乃請于督撫及視學使者皆報曰宜遂以康熙三十九年八月四日大將軍衮舄具儀親奉先公之主崇祀於郡學之名宦祠軍民遮道聚觀嘆為盛事禮既成郡之人咸願有述爰合詞而為頌曰維我國家恭承天命臣服中夏四國表正金陵僭號屢迪弗聽阻隔聲教螳奮豕競帝簡親藩天討用張爰總六師虎躍龍驤赤麾蔽日組甲耀霜鋤逆樹順孰抗顔行維時京口實首輸誠草竊間作羣言沸騰鳥亂而翔獸駭而奔王命我公來拯斯人公既至止置腹推心誅止其魁善良歡忻潤之父老當衢忭舞潤之婦女比屋笑語若渴遇漿若饑得哺若寒挾纊若旱獲雨昔無完衣今歌五袴昔鮮桑麻今稱樂土公真仁者去殺勝殘我有父子恃公以完我有室家賴公以安既骨而肉既危而存既死而生實公之仁公之致命逺在七閩愛我潤人英爽實憑公之哲嗣秉節斯域兩世濟美甘棠再植服從新政益懐舊徳奉祀黌宫以光典則肅肅豆籩神兮來格鉅典告成其儀不忒用垂奕禩鐫之金石允矣前猷為後人式進太宗文皇帝實錄表伏以帝治𢎞開肇啟無疆之烈聖人善述聿揚丕顯之謨大業炳於中天儀刑如覩隆猷垂於百代典冊為昭必慎編摹方成信史欽惟體天興國𢎞徳彰武寛温仁聖睿孝隆道顯功文皇帝天錫智勇性備中和奠山河社稷之安集禮樂車書之盛仁恩淪于率土義問訖於遐陬奮天討于西陲藩部咸共玉帛耀神威于東海島人悉隸版圖錦城凌水之師王靈丕赫杏岫松山之捷廟筭無遺締造邦家成高皇未竟之志勵精政事答上天垂祐之心列八幟而筦軍符設六曹而分衆職詔忠良以獻替勅獄訟以寛仁學校蔚興農桑用勸至誠服物大度容人視臣僚如腹心上下聨為一體合滿漢如臂指中外何啻一家十七載創業艱難邇安逺服億萬禩貽謀悠逺綱舉目張在御則天下歸仁升遐斯萬方哀痛懿軌傳之可久鴻猷美不勝書洪惟皇帝陛下峻徳克明孝思維則登生民于仁夀躋世道于升恒以經天緯地之才兼靖亂除殘之武大經大法允符二帝三王是訓是行茂紹祖功宗徳獨念文廟一朝實録曽經章皇帝申命重修未告成書特開史局命監修總裁纂修盡蒐石室之編博討琅函之祕敷揚徳媺務本末之畢該纂述訓辭期精微之具悉事有關於憲典雖細不遺法既備乎勸懲繄繁必録凡屬用人行政之標準與夫保邦制治之規模咸燦著于日星俾永貽為龜鑑屢經讐勘遂歴嵗時恭成太宗文皇帝實錄合目錄凡例滿洲䝉古漢人名若干巻繕寫進呈臣等恭際昌期同膺盛典學慚倚相獲覩昭代之藏書才遜胥臣幸聞本朝之故事止攄蠡測管窺之見嘗嘆繪天賦海之難俯竭寸衷用資乙覽伏願慎修思永主善為師覲家法于羮牆益光前烈闡心傳於簡冊式裕後昆臣等無任瞻天仰聖激切屏營之至謹奉表隨進以聞擬上命開館纂修世祖章皇帝實錄羣臣謝表康熙六年伏以聖啟聖而垂謨方䇿與球圖並重治師治以紹烈舊章偕星日俱輝掖左分曹萃羣才於館苑禁中給札董成帙以嵗時誦綸誥者知覲光揚烈之方殷預校讐者嘆繪天賦海之不易書垂百世道炳千秋臣等誠惶誠恐稽首頓首上言竊惟王者卜世卜年開創裕守成之業嗣主肯堂肯構明述兼聖作之功舜協堯文繼統即以繼道啟承禹服傳子不異傳賢風愆訓比盤銘湯孫是凜几杖箴同官誥姬序永承帝紀肇始于馬遷非僅一朝國史漢書續成于班氏亦從舊籍網羅葢分左右以注起居昉自古昔而繫年月以為實錄起自蕭梁嗣是代有成編不免人滋異論宗尚書者曰宜多隠惡法春秋者曰必須直辭輯當代之書較之筆削前人其體原别載目前之事比於是非往轍其勢倍難敘昌宗誘證元忠呉競被銜于執政紀貞元横開宫市韓愈受嫉于宦官誣謗宣仁賴紹興中之命官刋定諱言遜國歎永樂初之開局重修其他耳食傳訛難以枚舉自非心術持正誰為折衷重用丁寧庶裨乙覽兹葢伏遇皇帝陛下奉三主鼎乗六御乾玉冊金書崇奉兩宫之懿號黄琮蒼璧合告三后以升禋業已繼序不忘丕承無缺獨是太祖太宗之寶籙巳為文子文孫之典刑而中原定鼎之規未遑編次斯卜世貽謀之善急待闡揚洪惟世祖章皇帝受命而撫萬邦奠基以成一統學宗湯武聖敬格于天人孝嫓虞周睿慮嚴于郊禘語文徳則梯山航海之衆重譯來朝紀武功則水西日南之鄉指戈皈命召諸臣而入對午朝清問時殷憫庶獄之非辜一嵗詔書屢下最闗心者用人行政之大計至隠念者水旱盜賊之頻仍億萬載宗社無疆總厪宵旰十八年綢繆未雨坐致昇平聖謨美不勝書國乗久而能述爰開史局特簡儒臣盡出秘編用資旁引始崇徳癸未之秋仲早知天命攸歸訖順治辛丑之春正永痛人心遏密八年前功歸負扆而議禮制度曽不敢以闇奸八年後柄握宸衷而夕側朝嬰原不妨于獨斷推之柱下仗前之語誰非創業垂統之謨大兵則書大沴則書大爵賞則書須發凡以起例所見異辭所聞異辭所傳聞異辭務存信而闕疑參訂責在總裁編輯司存分纂臣等丹心素矢青管懐慚夙事先皇憶侍天顔于南海西苑新隨朝列頻檢舊章于庶府諸司龍馭雖遙燕貽如昨讀彌留之一詔不知涕泗何從仰靈爽于在天但覺涓埃無補開編者此日儼如覩雲漢之章授札者幾人敢不慎丹青之筆伏願克明峻徳永言孝思螭頭設記注之官鰲禁啟經筵之幄念終始典于學時披商説之篇於緝煕單厥心允協周成之徳儼在廷之陟降不必追弓劒于橋山守良法為箕裘非徒奉衣冠于原廟庶幾祖功宗徳垂世則世法之休而帝治王猷頌如升如恒之盛矣張文貞集巻一
