body:
  text: 張文貞集卷十一大學士張玉書撰誥授通奉大夫巡撫貴州兼理湖北川東地方提督軍務都察院右副都御史個菴王公墓志銘康熙乙丑丙寅間王公個菴以兵部武庫郎出知吾郡鎮江府事時余方伏處堊廬杜門屛跡而輒聞父老之稱述公政績者無虛日曰某弊革矣某蠧除矣某雜派停矣某被戍兵凌敓者事得直矣曾不踰嵗令行禁止肅然以清而公乃修葺學宫創興義孰日講求教民禮讓之道以庶幾古人漸摩風俗之意而初不見治郡之繁夫京口旗民錯居素稱難治支給月餉尤太守之専責先是領餉于藩司而藩司不以時給往往衆口歡呶禁之弗戢甚有藉辭告貸恣行要挾者公至郡力言於上官有請輒應給發無稽時子是驕兵悍卒皆屛氣帖息莫敢有後言比余在政地與文靖公同奏事上顧問玉書知府王燕居官如何即奏守甚清才亦能任事民皆感之上為首肯既退而文靖公謂余曰僕方與公共事公獨不避嫌耶余曰君父之前不敢不以實對也時聖明已深察公賢未幾即擢任江蘇按察司使案牘繁賾江蘇為最公聽讞無一留獄律例所在不敢以意毫髮重輕屬吏奉公指凡所上初招獄辭亦無敢以他請苛比骩法行私者七郡之獄稱平甲戌夏晉湖廣布政司使是時楚省方行鼓鑄藩司董其役而宿弊叢集官鑄之外奸鑄倍增因而榆莢綖環十不當一上下官吏漁獵於中莫肯摘發其事者公抗顔白督撫謂武昌錢殽雜已極勢必不行錢滯不行則上下交困非立罷不可條其事上之楚鑄乃罷其他收支抑勒輸納重耗諸弊悉明示釐革州縣奏銷額費嵗派取于民間者亦嚴諭禁絶有費即身任之閲四載湖北藩庫無銖黍浮冒虛詭之病皆公力也嵗戊寅特㫖授都察院右副都御史巡撫貴州公念黔省處萬山之瘠地荒而俗敝非力行教養無以廣生聚而興德化因具疏言全黔荒田十居三四屢諭墾闢而民不輒應蓋墾經數載然後收穫所入薄不足輸稅故人懷觀望倘悉依減則寬以六年未有不鼓舞爭赴者賦雖減重就輕田則易荒成熟是于國稅原無損也又言聖朝誕敷文教徼外苖猓靡不嚮化而黔省師儒之官尚多未備各州縣衛有初未立學宫者有有學無官而附試他郡者請依滇南故事通省建學設官文武童一視小學收録廪貢亦舉行如例則人心感奮教澤自濡奏上俱如所請苗人掠劫事所時有而有司處分特重公言諸苖供辦徭賦非野苗可比特一旦負罪而竄入叢篁深箐難以立禽倘即議有司降黜去官則人才可惜且罰既重諱盜者必多請依常例限年追緝庶盜可捕而民生益安章下九卿廷議亦從公言而公又時頒條教飭州縣官吏無縱奸人詐索土司以啓爭端尤得拊循苗人根本之至計鎮寧州民曹邦傑妻張夫亡從死法不應旌公力為之請謂地介荒服節烈罕聞張氏敦篤倫常實可矜憫伏冀破格表一婦之完貞以勵全黔之風節上特恩許之四方咸傳誦焉公于邊地民生吏治悉心籌畫以次見之設施越三載勞瘁倍至忽感疾咯血盈盂遂以乞骸章上一時制府提閫僉言撫臣正已率屬吏畏民懷一人之去留實係巖疆之休戚隨有㫖命供職如舊衆皆慰悅公力疾視事復二載有餘而痰嗽轉劇四十二年秋更申前請詔乃允致仕去黔之日逺近軍民苖猓遮道拜送見公形容癯瘠輒相顧泣下公亦為灑涕以别蓋遺愛至今不忘也宛平王氏族望鼎盛世德相承余于文靖公志中書之詳矣公顯考太子太保禮部尚書文貞公諱崇簡以子文靖公熙貴加贈太子太傅保和殿大學士妣梁夫人纍贈一品夫人生母周夫人以公貴贈淑人文貞公生六子長即文靖公次湖廣桃源令槱次巡撫浙江副都御史然次金衢道參議照次即公諱燕字子喜個菴其號也又次則公同母弟刑部員外郎默公兄弟友愛至篤自黔中還時員外君方僑寓金陵因往就醫居半載始入京師時文靖公初逝公見余深嘆同氣六人存者僅半惟余兄弟之戚亦與公同相對太息者久之余忝辱公世講公在黔中數千里致書締姻好因以杭州守第五弟女許字于公子克慎公嘗欲携令子就婚于杭並省兄中丞公于官署乃此願未遂一夕疾作竟致不起可深痛哉公卒以康熙四十七年七月十二日距生順治九年十月七日享年僅五十有七元配張夫人利津知縣諱文熿女繼袁夫人巡撫山東工部尚書諡清獻諱懋功女子七人克寬前卒張夫人出克慎克修及幼子如玖袁夫人出如珽如圭如璋側室出女九人孫二人希曾守曾公長于詩前後集若干卷奏牘之文條鬯剴切皆公所手定公事業彪炳惠澤在人而立身行己無愧無怍所獨惜者未登大年耳而公亦何憾焉兹以四十八年十二月某日卜葬宛平縣骨香山社之新阡克慎奉袁夫人命來乞余銘不敢辭銘曰文貞文靖艱哉纘武英姿懋紹不藉華膴初守京峴百榖膏雨屹屹崇祠大江之滸平刑于吳核賦于楚黔山際天遄往開府農耨蒿萊士藝榛莽椎髻者苗亦歌且舞引疾言旋如嬰失乳遺澤未沫如日長煦史册大書名莫與伍爰勒碑版貽示來許誥授光祿大夫內祕書院學士張佳公墓志余為史官時今侍御賽君方官中翰屬余叙其先公所為北海集余自惟晚學後進得挂名于公文字中以為生平之幸及今二十餘年矣賽君復以公墓石之文鄭重相屬蓋公之初葬在都城北之關西莊繼兩夫人祔葬改葬于城外之宋公莊復以地勢卑濕改葬于盧溝橋西之太平橋先達巨公傳志之文載公之行事者備矣余更何贅辭惟掇取諸公所叙録有關于公建樹之大節者序而志之並以志改葬之嵗是則賽君之所以顯其親于有永者也按公姓張佳氏諱鄂貌圖字麟閣遇羲其號也自始祖以下世居長白山鄂莫和索洛之地遞傳至曾祖諱瓜喇始遷輝發祖諱代廕布祿又遷葉赫南地名張尼和樂居焉父諱吳巴泰母覺羅氏及公貴曾祖祖考皆贈光祿大夫妣皆贈一品夫人公體貌魁傑屹如嶽峙幼善騎射稍長即嗜經史恭遇太祖髙皇帝肇基東京嚮用英俊之士公輒講求文武大略以冀為國家異日之用每搆一編研索窮日夜久之才譽蔚起太宗文皇帝崇德改元益尚儒術嵗戊寅拔公一等秀才賜布帛時召見講譯書史辛巳初設制科公應舉居第一賜頂帶選入內院校譯㑹典順治元年冬世祖章皇帝入關定鼎公與扈從旋授祕書院侍讀奉命編纂兩朝實録書成賚白金文綺又譯通鑑及詩禮二經于凡草木鳥獸之名器物象數之實考辨精核能補箋疏所未逮公博洽載籍兼通兵家言諳習韜略廟堂知公才能以經術贊軍務于是大師所至皆命公偕行流冦李自成既從一片石潰奔餘黨直趨關中公從和碩豫親王師追擊于潼關大破之遂平陜洛嗣江南兩浙以次削平屢用謀策制勝公之功為多優詔褒美特加錫賚三年從征南大將軍多羅貝勒征閩說降其巨帥鄭芝龍事聞賜文綺八良馬二四年從和碩鄭親王征川湖所嚮底定辰沅九溪十二土司暨生苗猺獠悉先後受撫八年師還進宏文院侍讀學士兩遇覃恩授通議大夫加拖沙喇哈番又加拜他喇布勒哈番是年秋充順天考試官取士七十人後多至顯官十年進內祕書院學士復從和碩安親王出塞征喀爾喀部落收服其衆十一年以閩海梗化復從鄭親王世子率師進討黃梧來降修築漳泉郡縣凡十四城而濱海諸路以安十四年覃恩纍進光祿大夫加一級明年改中和殿學士兼禮部侍郎仍帶加一級又從多羅信郡王進取雲貴深入其阻百蠻皆就撫自此海宇一統朝廷盛德無所不震叠矣十八年復改內祕書院學士是年秋班師道感寒疾以十二月二日卒于天津之楊村年四十有八上震悼遣官諭祭賜金五百兩造葬廕二子入監讀書長即今侍御賽圖由內閣中書歷中書科掌印中書改監察御史次賽良今官三等侍衛公當國之初以著作謨議為一代文臣領袖而自入關以後馳驅兵間者十有餘年歷秦楚江浙甌閩滇黔萬餘里蠻烟瘴霧之區叢篁深箐之域無所不經躍馬涖陳摧堅折鋭之事無所不預戰守攻取擒縱勦撫之機宜無所不備行間飛書馳檄以及箋表露布皆磨盾立辦而又以其餘力登臨覽觀感時物紀風土錯載于篇什詠歎之內如所遺北海集其什伯之一二也而生平建樹之鴻駿亦略見于此矣誥贈奉政大夫內宏文院侍讀田公墓志銘太學生田子惟冀與其弟孝廉惟兖持其王父贈大夫行述泣而白于余曰先侍讀之易簀也有墜言焉曰吾死而不克葬吾父無以逃于公羊子過時之誅小子識之速營葬以竟吾志葬則志墓之文必乞之髙陽夫子夫子知吾之欲歸而以預修國史未逮也惟冀等敢以先人之命請蓋贈大夫之殁距侍讀之殁十有五年矣丙午丁未間侍讀嘗欲以歸葬具牒乞假㑹召入史館不果庶幾國史之竣則酬所願焉不謂其遽逝也按田先世居固安縣張華村東捍社系逺不可考前明永樂間有諱旺者以軍功為遼東東寧衛掌印指揮同知子孫世襲遂家于遼五傳諱鉞居次不當襲用經營起家巨萬鉞生大成為邑庠生大成生養民貢入太學前明萬厯中歷仕至兖州府魯藩護衛經歷卒于官葬城東南自是家于兖經歷三子長生璧襲世職次即贈大夫諱生蘭字馨野年十六經歷筮仕日照縣簿隨入關性嗜讀書經歷為延山左知名士蘇君某相君某與公日相鏃礪公氣益鋭文益奇二君皆遜謝以為不及後二君相繼成進士而公因僑寓不得應試迄無所成就經歷既即世家計中落生璧以襲職宦逰于外十餘年未嘗一至兖旅舍環堵食指日衆一切悉公經紀之公與生璧異母璧母為白太孺人公母為陳太孺人公善事兩母色養備至白疾篤公親侍湯藥目不交睫者月餘及卒喪祭盡禮撫兄子如己子推甘讓肥幼而育長而教卒無倦色前明末盜賊蜂起公孤踪客寄不遑寧處于是裹衣南徙展轉于淮隂秦郵廣陵之間所至不數月覺有變旋復他去既去而其地輒往往多故以故人咸服公之智而又嘆公盛德食報雖坎壈百折而能自脫于難也繼遷江寧適當鼎革之㑹王師南下羣不逞之徒乘亂伺釁日尋戈矛以修復私怨豪帥馬某所𨽻士卒素不馴一時爭欲甘心而公有鄊人某亦𨽻馬戲下一夕携其家數十口奔詣公避害公納焉或持械大呼于門曰速出之可免禍不則汝家立虀粉矣公曰彼雖非張儉我獨不能為孔文舉耶不聽諸亡賴亦稍稍散去比事定絶口不復言蓋公平生行事仗義負氣大率如此嵗丙戌復自江寧卜居廣陵杜門課讀以纍葉未竟之志朂諸子辛卯侍讀舉順天鄊試壬辰㑹試中式聞捷且喜且悲曰恨不及吾父見之侍讀未及與大廷之對趣歸省覲公相見益喜未幾疾作疾既革猶強起叩陳太孺人寢門問安顧謂侍讀曰汝曹善慰白頭之心則吾死瞑目矣越一日遂卒公生于前明萬厯丙申十二月初五日卒于皇清順治壬辰七月初九日年五十有五嗚呼俗之敝也家庭骨月或相背負若行路而况其為門以外乎公孝友篤行至老不衰如鄊人避難一事存活數十口呼吸之命于危疑臲卼之中豈非太史公所云天下之隂德宜享祀十世者乎三十年以來衣冠氏族轉而為欒盈之敗若敖之餒者比比皆是而公藏仁賫後歷久益昌侍讀既貴且顯而諸子若孫方踵起未艾是亦可以觀天道矣配孫氏文學諱某公女敕封太安人子三人長即侍讀麟戊戌二甲進士歷官編修司業內宏文院侍讀娶孫氏次彲廩例監生娶劉氏次騶太學生聘翁氏孫五人長惟冀廪例監生娶劉氏次惟兖癸卯舉人娶劉氏次惟徐郡庠生未聘次惟揚聘范氏次惟荆聘蕭氏女孫三人曾孫三人長之譽次之雋次之髦以某年某月某日葬于某原銘曰京兆望族厥生偉人肇遷自東寢跡廣陵食貧躓險歷困益亨天嗇爾遇惟德永存枝豐蕚跗實䕃本根語曰不於其躬則於其子孫爰作斯銘用表君之墓門文學李君暨周孺人墓志銘棗強文學李先生殁後三十年其子公旋名履祥與余同舉順治十八年進士又八年先生原配周孺人沒康熙九年春公旋遣使持狀來長安屬余為祔葬銘且曰祥不幸八嵗喪父時兩兄涉訟于外幾不克襄大事賴母氏營葬縣棺而封不設碑繂今吾母又棄藐孤逝矣卜某月某日啓先大人壙奉吾母祔焉乞吾子為文以藏識幽官感且不朽余聞之少不誄長又學殖荒落愳不能為先生導揚德􅍇于萬一因重違千里寓書之意不敢辭謹損益來狀而為之志按狀先生諱維聰字足臨先世江南之句容人前明洪武間有軍功而御賜粗喇李者來棗強家焉遂為棗強巨姓數傳至文林郎南城兵馬副指揮省吾公是為先生父先生生而器宇凝重自幼無子弟之過弱冠括羽鏃礪肆力於經史不為老生俗儒剽竊塗塈之學尤嗜讀班氏書故其為文雄渾灝演卓然成家既補弟子員旋食餼試輒髙等四方文學知名之士絡繹訂縞帶交其所辨論皆經世大略凡古今地理官制河漕錢榖與夫武備之強弱設防之要害無不涵肆穿貫如數一二時太史楊崑阜梅長公兩先生負海內人倫之望重交遊慎許可先生親執經其門兩先生深器重馬屢試棘闈不得志而去之泊如性至孝省吾公司南城偶遘疾先生聞之兩日夜馳數百里至京邸親侍藥餌疾愈而後返嗣遭兩艱哀毁盡禮篤念宗誼族有嫠婦無所歸厚遺之衣食貧不能自贍者鬻周孺人簪珥給之其他姻睦戚黨大抵類是夫世衰俗薄重利而輕義劉孝標所謂不費半菽落一毛而坐視三黨之困窮者比比皆是而先生以一諸生勉強好施老而不倦豈非所稱古道篤行之君子歟晚年構五一亭于舍南百武許蒔花藝行嵗時偕二三執友浮白吟嘯率以為常曰人生天地間須令造化生意與自家意思盎然太虛中耳嗚呼是可以知先生之學矣先生沒而家難起內侮外訌磨牙吞噬有如沸羮長公次公奔走牒訴無寧日餘孤㷀㷀襁褓閲十年而後家難少息凡此十年中食荼集蓼搘拄門戶不至有尺寸中落者皆周孺人力也孺人為故城文學純吾公女大司馬衛陽公女孫年十七于歸先生廟見後攻苦操作力以世俗女子貴倨之習為閨門戒尊章繼逝相夫子經營喪葬先生沒日夜督課季子涕泣語之曰而父力學不逢年今已矣終父之志是在小子辛丑公旋成進士孺人怡然色喜曰未亡人可報夫子于地下矣公旋以選人需次家食侍養者八年孺人惓惓以家世清白為訓卒之前夕猶諈諉教戒夜分不寐及旦竟無疾而逝年八十有九嗚呼當前明之末季吏道雜流品淆矣脂韋訿潝之徒皆得掇拾青紫以先生藴道抱德身負不羈之材而鬱鬱終老曾不得少見設施于世歷今四十年曩之碌碌負乘者已與腐草同萎而一孀嫠撫八嵗兒讀書成進士遭遇盛時異日將光大先人未竟之業以垂不朽顯晦遲速之故可為三嘆也已先生生于前明萬厯庚辰十一月十四日卒于大清康熙戊申十二月十一日男三人長某次某次即履祥辛丑進士候選知縣銘曰滹沱清漪恆嶽巉巗篤生真儒外韜中完淑人作配母儀克全塗墉終畝朂哉象賢積德流慶片石永傳松影在地白雲在天誥授奉政大夫分守口北道山西布政使司參議蓼庵袁公墓志銘自國家以才能課吏治於是內外大小吏皆務矜才鬻能為踴躍於功名之道而老成明練守正不阿鑿然欲以經術飾吏事者其功名顧反居後此有志經世之士所不禁扼攬嘆息者也曩日諸曹郎爭用奔走結納以洊踞津要之路少參袁公蓼庵時為工部郎中獨有清直聲大司空掌雷傅公深器重之未幾以例出為陜西甘山道僉事公既出而資望在公後者輒相繼登臺省班行中咸為公稱惜而公處之恬如也及今踰十年甫一轉官復得邉地乃未及一載遽以疾卒不獲大竟其用豈不痛哉初公以乙未成進士筮仕陜之乾州乾當兵燹之餘民俗滋敝公至一意拊循不數年流移者皆復業丁酉分校拔知名士六人庚子擢工部屯田司員外明年晉虞衡司郎中公討論掌故諳習部務胥吏斂手不敢牟毫末之利當是時滇閩間饋餉旁午㑹山陵大工經費益不繼詔直省正賦外每畝暫增課一分用佐急需公職司焚帛曰民困極矣寸縑尺縷皆閭閻膏血也力清乾沒省金錢巨萬他所裁抑類是既至甘甘為河西重鎮戍防之地西海諸部覬覦大草灘比嵗闌入牧馬者不絶復遣使請割灘地蓄志叵測康熙九年朝命兵部侍郎科公爾往偕提督張公勇度地畫界張公持議堅爭者不能奪大草灘卒得不與而左右贊畫之者公之力也公與張公交歡無間時參預密謀自畫界以後西海部人不敢復窺張掖邉境肅然甘州距西寧鎮千有餘里往嵗協餉西寧負載轉輸蹄踵交道甘人苦之公力請得罷主客兵待哺數千人公悉心持籌軍得宿飽庚戌詔簡監司具才望者入為卿二直省合格者才十人公名列牘中未及用辛亥升口北道參議口北地確田蕪民貧而賦重前人怵於考成謾稱嵗輸如額而逋課纍積幾以千計其粟儲于倉者歷嵗侵漁耗蝕不可算數非按籍核實無以釐宿蠧顧欲求垢索瘢則失察之罪先坐大吏大吏聞公言皆陽韙而隂阻之公擘畫盤錯憊心罷精申旦不寐居數月食日益損㑹閲工口外為炎熇所中疾大作旋具牒乞休比得俞㫖而公已不起公未嘗自雕琢為才能而其始終勤事如此嗚呼如公者真可謂國之勞臣者歟公諱州佐字左之號秋水蓼庵其别號也袁系出漢司徒安代有聞人宋南渡後占籍㑹稽數傳為柱南公負異才杖策遊燕為某大將軍揖客生二子長諱紹元為迪功佐郎纍贈奉政大夫是為公父贈大夫偕弟紹寵携資客遊濟上遂家焉生五子公其季也公生九嵗而孤母周太宜人復早逝公刻自鏃礪専精制舉業舉故明崇禎己卯鄉試為孝廉多奇節甲申避亂㑹稽世祖章皇帝既平中原復携家還濟壬辰就髙苑縣諭鄰邑士爭從之遊乙未禮闈家大人與分校實得公卷秉燭擊節謂他日當以經術名世今言驗矣余與公稱世講常北面事公公亦以幼弟畜每相對語輒娓娓竟日在甘州入覲者再為余言邉塞要害戰備守禦狀原委顜然謂邉地土狹農稀宜用開中法分河東鹽引三之一輸粟河西以資軍食又宜簡練鄊勇拔置卒伍可不待召募而坐收精鋭千餘人公之言未及效而公不可復作矣胸中儲偫經術矻矻白首不獨當世無深知公者而天亦若厄之可悲也已所著有孝經注解植香齊詩集奉天志餘四雋等書行世生前明萬厯丙午三月十五日卒大清康熙壬子十一月十四日年六十有七配童氏誥封宜人子三顯祚庠生顯祐顯祺俱幼撫養子顯經公族甥也憫其孤字之女二一適魯一適胡先公卒孫三麟獬豹女孫一顯祚既扶公喪歸以公同年孝廉鄭君與僑所為狀謁銘于余余辱知公者不敢辭因撰次公行事而為之銘曰世風訿潝波流弚靡礧砢郎潜履道如砥隂揫陽煦邉陲肅清巖關插天公功與京量才百斛甫試八九讀書充宇藏仁賫後仕逾一紀斂無遺資我哀我友銘無愧辭誥授光祿大夫工部侍郎費茂公墓志余嘗翻閲國史伏見祖宗朝鷹揚戮力之士項背相望雖當偏禆之寄其建樹已不愧為名將而况久歷行間戰功可一一指數者乎至於武績既茂而又洊登卿二以清勤盡職為國家耆舊大臣則尤前史所不能多覯者也工部侍郎費茂公諱某長白山東巴海人公父贈光祿公諱某當太祖髙皇帝龍興之初即以其族自巴海來歸越三載嵗在甲辰而生公于興京之赫門村公天性孝友方五六齡時母夫人為製新衣公見諸兄無衣新者輒不肯服比及十嵗事親敬長儼若成人且頴敏嗜學習滿書數月即貫通文義稍長勇毅過人精騎射嘗以公事逺出忽聞父病篤單騎遄返夜行灌莽中馬傷足僵卧公仰天號泣曰得見吾父即死無恨奈無馬何不移時馬起竟馳歸侍疾三日而贈公逝人以為至孝所感越數月又遭母喪哀毁幾滅性比喪禮既畢遂鋭意立功名以成父志初從征旅順奪幟登城為一軍冠大帥以一等功牌豫之公曰余雖先登尚有貫藍甲者在余前安可冒也辭讓再三而自居二等大帥以下皆嘆異焉取安珠山時敵軍大集公率步軍爭先力戰大敗之守錦州南山城敵衆夜襲我軍戰却之城得以完奉使黑龍江收祁勒里國有招徠功取明寧逺城衝鋒前進被鎗箭傷入關之役率漢兵與流冦戰大破賊兵昌平州遇敵突入敵圍被重傷猶手殱二人生擒三人而還嗣取寶坻通州皆有功順治元年特命管佐領事從饒餘郡王征山東有取勞山功又從和碩豫親王追擊流冦至潼關率先破賊馬軍功居一等豫親王轉斾江南公復在軍中拔蘇州城時敵將黃蜚合四總兵軍力拒城南公以四十騎大敗之盡獲其戰艦鎗炮旗纛蘇州既克蜚等復縱火攻城焚橋凡三至皆敗之自入關以後大小約百餘戰身中一等傷者以十數計創瘢鱗次幾無完膚而鋭氣未嘗少挫方本朝初克遼東罹法網者甚衆公所至安撫善良多所全活師行數十年自臨陳誅戮外從未殺一不辜俘纍得更生者所在皆是蓋公生平仁心為質如此又素性廉潔從下江南江西浙閩東粵諸路皆兼領戶工兩部事軍中所獲金貝玉貨幣大帥一委之公公悉具冊登載無銖黍絲粒為私用者一軍稱服師旋擢工部郎中朝廷知公有守賜良田七頃居第一區嗣是修郊壇樂器儀仗及南苑行宫兩賜金幣朝服督造永陵工成加拖沙喇哈番郊配禮成加拜他喇布勒哈番天下一統又加一拖沙喇哈番順治十六年進盛京工部侍郎福陵前渾河環繞時以漲溢衝損紅門屢遣官督修不就公至董築大堤成永無水患康熙六年覃恩授光祿大夫又數嵗引年致政十一年聖駕東巡錫宴大政殿念公為三朝老臣特召近御座以金巵酒賜之並賚冠帶狐裘鞾刀諸物公每痛兩尊人早逝愾聞僾見追慕不忘遼陽收復後即訪善丹青者指授繪像以祀于家廟祖父母則刻木主奉焉嵗時朔望及春秋節序必躬親展奠年踰七十而禮敬不衰兄弟十人諸兄皆先公卒惟第六兄尚存公事之甚恭田宅服食車馬僕從悉推以與之遇恩廕不與已子而與兄子公山第某兄子索泰少孤公撫育成人教以讀書成乙未進士殿試第一甲三人公上念髙曾世有隂德而譜牒殘缺恐年嵗久昭穆益紊遂手輯家譜垂于奕世又撰務本家訓一書宗族中貧者衣食之孤寡者收養之無後者春秋祭之至今子孫猶遵行勿替康熙十六年病篤令諸子立侍榻前勉以忠孝以三月八日坦然而逝年七十有四嗚呼史稱鄧髙密功髙於諸將而修整閨門教養子孫皆可以為後世法如公之才兼文武內行篤謹以此嫓美前賢何多讓焉子五人英山內務府營造司郎中荆山太常寺卿青山盛京禮部贊禮官名山筆帖式天保壬午副榜孫十五人興德興保俱候補筆帖式德音丙子舉人內閣撰文中書德玉都察院筆帖式德鄰明玉亮德德新俱候補筆帖式祁蘭保貢生筆帖式德容生員明德宏德鄂紳德琛永貞俱業儒余與奉常公及中書君交久兹奉常公命撰次公懿行勒於貞石不敢辭因据原傳書其事之大者以示後人處士鳬盟申君墓志銘嗚呼是為廣平處士鳬盟申君之墓君端愍公長子也方順治壬辰癸巳間世祖章皇帝以節義風厲天下詔諸司體訪前明死節諸臣將特舉表忠封墓之典於是諸司以故太僕寺寺丞申某名聞者章六七上顧流傳錯互聞見異辭或誤列太僕為自縊君聞之慮異日承訛襲舛無以徵信史乃從泥淖徒跣千里赴京師麻衣絰帶痛哭都市具述其先人王恭厰投井自盡狀柏鄊魏公貞庵時在諌垣業具疏白其事㑹君至而其言益信所司既核實遂䝉特恩諭祭賜墓田易名端愍一時輦下士大夫髙君孝行爭折節與訂交余之獲交于君亦自此始君既歸杜門奉母手父遺書且讀且泣所與遊者同里張命士雞澤殷伯巖仲泓兄弟伯巖仕為令君遺詩以耦耕招之伯巖隨棄官還君自髫齓即嗜為詩吐納百氏不名一家而音節頓挫沉鬱激昂一以少陵為師其所以師少陵者悲愈咷嘯無一不曲肖而非世俗掇拾字句以求形似者所可比也丙申後持襆被為山水之遊余寓書于君曰蘇門孫徵君今之程伯子也君壤地相接盍一往質之君至百泉以弟子禮謁徵君徵君瞿然改容劇談信宿君自是獲聞天人性命之㫖遂不復為詩比余侍養里居徵君遺余書謂廣平天資明敏入道甚易行將易浣花而蓮溪矣蓋君自謁蘇門以後所造駸駸日上嘗語人曰主靜不如主敬敬自靜也又曰破得利字方能入門破得驕字方能入道又論朱陸異同謂朱由大路遲而穩陸由便徑捷而危其見理明而趨嚮正如此君少時才氣迅發人多畏避之晚年器宇嚴重規言而矩行如水之有坊帛之有幅始而憚君者繼皆傾心折服卒之前夕猶召友語至夜分晨興閲姚江集復詣兩弟所極論省察克治之學㑹聞客至遄歸忽一仆而逝康熙十六年六月六日也距生前明萬厯四十七年十一月三十日年五十有九嗚呼蘇門既沒續其傳者無人今君逝而吾道為益孤矣余初聞君訃即為詩哭君深以哲人既喪吾道未興為憾閲兩月而君弟孝廉觀仲太史隨叔以君行略謁銘于余余與君交誼之切如此何忍不銘按狀君先世為晉之絳人明初掖縣令庸始遷廣平八傳而至贈考功郎諱化是為君祖贈考功生端愍公諱佳𦙍前明辛未進士歷仕至太僕寺寺丞妣靳封安人君諱涵光字孚孟一字和孟鳬盟其號也生而天資頴異能文章年十五補邑庠生端愍公敡歷中外君侍養時為獨多既奉端愍諱遂絶意仕進以母命浮沉博士弟子中非其志也嵗庚子詔舉孝行有司欲以君應君固辭有司不能奪辛丑貢入成均君投牒儀部謝病歸戊申詔㫖訪用隱逸魏公貞庵雅意屬君君復上書力辭魏公咨嗟而止君出處之際侃侃中程如此著文四卷聰山詩八卷荆園小語說杜性習圖義利說行于世嗚呼方端愍公之殉國也太夫人垂白在堂仲叔兩孤幼未成立公從容蹈義一語不及于私良以身後之事有君在耳惟君孝友篤摯喪葬盡禮朂兩弟讀書取科第知名于時而自以潔修粹行見端愍公于九原之下是父是子天實隂相之以視彼佌佌蓛蓛幸生苟祿之徒不一傳而聲華銷歇者豈直相徑庭已哉君娶盧氏天啓甲子舉人愜𦙍女子二䪻頵皆君五十後所生䪻聘侍御寧公爾講女女二一適貢監生李竒瑗一字劉徵陽以某年某月某日葬君某鄉某原銘曰溯源自姜别為申繇晉宅洺鐘哲人嶽嶽端愍國藎臣成仁取義式後昆處士守道甘賤貧嘯歌白首堅松筠晚節益涉濂洛津鑄顔者誰惟蘇門大節廪廪小物勤道不絶物羞同塵世衰俗敝微言泯倚君力柱狂瀾翻少微一昔星芒昏沒者已矣生沾巾銘君墓石垂重淵千載不滅真氣存副都統一等阿思哈哈畨又一拖沙喇哈畨巴圖魯路公墓志銘國家自創造大業以迄耆定中原所謂熊羆戮力之臣載在史冊者不可勝指其功建名立而白首令終者固已聲施不朽若身經數十戰卒授命於疆圉鋒鏑之間自以獲死所而無憾豈不尤可重歟副都統一等阿思哈哈番路公以康熙十七年殁於洞庭九馬嘴之陳詔豫祭葬進世秩榮哀之禮悉備蓋公為祖宗朝從龍舊臣能以盡瘁報國故廟堂之上特加優恤以奬其忠嗚呼偉矣公姓納喇氏諱路什滿洲人束髮從戎以驍勇自喜崇德中大師入山東之兖州公在行間率先登城拔之因賜名巴圖魯授三等阿達哈哈番順治初元隨王師入山海關擊流冦二十萬衆一敗之于一片石再敗之于慶都以功進二等阿達哈哈番嗣流冦潰遁而西鄜延一路所至皆賊公偕副都統阿公喇善邀擊綏德敗兵大破之又偕參領舒公里渾擊延安步賊七戰七克㑹賊一隻虎兵犯陳公徒步提戈急刺復大破之九公山之後偵知李自成賊壘所在偕纛章京蘇公拜進薄其營擊走僞劉侯獲自成妻子自成由此窮蹙走死于時張獻忠據蜀久不下公奉命隨王師入川親擊對敵兵者二同衆軍合擊賊兵者三或以騎卒或以步軍所向無不摧敗順治十六年大師征滇黔公之功在十萬﨑山者獨多僞總兵羅大順等樹柵列鎗炮分兵拒戰多者三萬餘少或萬餘或五千餘人公偕纛章京鄂公訥副都統噶公褚哈鼓衆迎擊連破數營敵大潰順治十七年彚叙功績公先以覃恩歷一等阿達哈哈番進三等阿思哈哈畨至是以纍功進二等阿思哈哈番康熙初公年已六十用老成宿望同學士雷公虎至廣東察濱海地定界而還是時遭時承平謂不復有事兵革逮十三年三逆煽亂禁旅四征不庭公喟然歎曰王師在野其以我為識塗老馬可乎遂隨貝勒師入楚十七年秋以偏師取湘隂至洞庭湖之九馬嘴風大作倉卒避風于緑林灘舟膠賊兵突出以鳥鎗環擊舟盡碎公猶奮勇發矢石擊殺賊十數人力竭被傷而卒七月二十八日事也康熙二十五年追録死事進一等阿思哈哈番又一拖沙喇哈番世襲不替公老于兵間遇徑敵大戰二十有餘合無失利者乃一旦身入于坎窞如此論者深惜公以名將戰殁而又謂公志在滅賊正如漢新息侯壺頭之困適遂其馬革裹尸還葬之素願而不必為公悲也嗚呼國家有軍旅之事而盡得如公者不以死生利害易慮何冦賊之不殄哉公之卒距生庚戌嵗得年六十有九葬以康熙二十二年某月日元配某氏繼配覺羅氏喀喇氏贈封俱夫人子二人長布納海襲世秩由一等侍衛官協領覺羅夫人出次偏武三等侍衛喀喇夫人出孫郎圖泰必圖盧海布納海出納善納禪偏武出偏君雅嗜文學素未與豫交一日踵門折節屬為文勒公墓石至勤且懇余愧不能揚公之風烈而重違偏君之意不敢辭也因件繫公功績而系之以銘曰擐甲登陴公之職克敵死綏公之志愍綸追恤當寧恩大書特書青史事少壯戎行經白首追奔逐北萬餘里湘濱忽殞英雄悲波沸長疑怒决眥穹窿賜冢髙祈連雙卧麒麟安且止金書鐵劵貽爾嗣忠臣有後永帶礪右春坊右庶子公亮尹君墓志國家設立太學萃滿洲英雋之士比德藝而教之三十年於兹矣漢士子分科入仕由國學進用者十之二三而已滿洲人才蔚起當開制科時間一就試于有司其他自公卿世胄以及白屋寒畯未有不入太學而得奮跡為士大夫者今屈指三事大僚偉然負當代名臣碩輔之望其筮仕皆自國子生始則官祭酒司業者陶育八旗之人才以備國家異日任使之用其責不綦重矣乎余承乏西廂僅三月時滿司業為公亮尹公竊覩公遇事警敏課督有程六館官胥咸共奉其條教兩祭酒亦折節委聽焉蓋公自官國雍歷十餘載凡規制之沿革禮教之廢興士習之良窳材質之髙下熟識於胸中如數黑白故久而益勤其職前後為是官者未有能及公之盛者也公諱某公亮其字也世為滿洲人性嗜學研精經史丙夜不輟以文學知名于時順治八年由國子生擢內祕書院檢討晉編修未幾從和碩敬謹親王軍赴湖南緣事罷職十一年補內院七品筆帖式哈畨十二年復以譯文詿誤罷職閲數月補內官監七品筆帖式旋升他赤哈哈番十三年罷內官監十五年補吏部考功司他赤哈哈番康熙元年晉考功司主事時故總河都御史王公光裕為御史奉命察浙江海道公偕行分察寧波一路寬嚴得宜至今人爭述之六年晉司業八年車駕幸太學參考故事修橫經坐講之禮公講尚書堯典首節音吐琅琅左右皆竦聽閲日以大典成賜衣一襲功令八旗官學諸生業成者嵗咨吏部以次試職公力絶請寄一以才藝學行為衡品隲嚴核凡所奬拔皆得人公之教寬和樂易諸生有所陳說務使盡其意不合者以理抑之無疾言忤色故人皆愧服十七年升右春坊庶子復與余為同官時校譯講義公脫藁至再既疾猶不釋手蓋公歷官精勤所至侃侃稱職如此而聲跡顯著尤在為司業時故余述之為詳公天性淡泊衣食無華侈喜賙人急宗族交遊有貧不能自振者輒捐資為之助比及公殁三黨之人撫棺而哭者莫不盡哀公生于某年某月某日卒于康熙十九年某月某日某時享年若干父某贈某母某氏繼母某氏俱誥封恭人公事繼母盡孝中外無間言娶他他喇氏佐領額公特禮女誥封淑人子二人長某娶內閣學士兼禮部侍郎薩公海女繼娶刑部郎中希公福女俱敕贈孺人又娶某氏長史佐領鄂公洛女次幼女三人長適户部筆帖式加一級南璽次適吏部文選司郎中佐領陶羅次適三等侍衛薩爾詹敕授文林郎翰林院檢討申君墓志銘嗚呼余今日執筆而銘隨叔之墓此歐陽子所謂惟聲與淚獨出余臆者也隨叔長於余四嵗方順治庚子隨叔初舉孝廉從其伯兄鳬盟寓居京師時則今徐宫贊健庵盛禮部珍示為人文領袖召集四方知名士宴飲城西館舍得十有九人鳬盟最長余與隨叔最少酒半計孝廉甫草議論蜂起談諧閒作隨叔毅然以莊語折之而罷隨叔與人交踈中介氣不隨俗俯仰自應制舉時已然余一見即心韙其為人此余與隨叔定交之始也明年辛丑同舉進士又同與館選相得益歡越一載隨叔丁母靳太安人艱去及服除授檢討又與余同入史局預修兩朝實録晨夕不間者六年余伯兄禮存以春秋舉丁未進士實出隨叔之門余不敢復以輩行遇隨叔而隨叔之遇余如故也康熙十一年實録成各賜白金表裏加俸一級隨叔旋引疾歸歸十餘年每書問至必稱疾今年春余有扈從之役遇隨叔仲兄孝廉觀仲于道倉卒片語謂隨叔病甚劇比余還自留都而隨叔之訃已聞於京師數月矣冬十一月觀仲屬其甥庶常路子庭彥持狀謁余謂日月有期乞志其墓嗚呼志隨叔者莫余宜也不敢辭隨叔諱涵昐姓申氏申之先居山西之絳自掖縣令某始遷于平干九傳為端愍公諱佳𦙍前明崇禎辛未進士仕至太僕寺少卿生三子隨叔其季也生有異質動止莊栗寡嬉戲幼隨端愍公在官舍口授之書輒成誦端愍既殉國難鳬盟觀仲屏居隱約隨叔九嵗方入孰而讀書明敏數年即穿穴五經為文蒼莽灝汗有先民大家之風既登第海內士子誦其文奉為金科玉條至今不廢詩承鳬盟指授以少陵為宗而馳騁於近代空同大復諸家雖時出俊語絶無纎靡妍麗之態間仿李西涯樂府為詠史詩百餘首竒變激宕具有史法可與西涯並驅假歸後詩益工雅自矜慎故流傳者絶少在史館時即奮志讀史以職務間之未果里居多暇自署程課閲三嵗而二十一史畢擇其中忠孝節烈有關世教者薈萃成編而斷以已意曰通鑑評語他若時代之盛衰政治之理亂人才之消長議論之得失又别彚為一集平居落穆少言笑及與人辨論古今抵掌數千年事如在目前聽者皆驚伏而退其所為碑版記序之文高古疏豁歸於簡潔嘗曰文尚體要一泛濫則河漢無極矣其學古有得持議謹嚴如此頃者史局肇開英雋輻輳隨叔淹雅博洽在晉胥臣楚倚相之間而又深得班范歐陽為文之法使之裁量是非斟酌進退則勝國一代之史可以速就隨叔之不得與於勝國之史也豈非史事之不幸耶故學士喇文敏公為院長一日入奏屈指詞林人物舉隨叔姓名以對文敏不輕許可昔同修國史知隨叔深故奏對及之隨叔勞勩在國史其得疾亦在史館時為多初章廟實録分月編次出于衆手首尾多衡决余助隨叔次第讐校芟汰繁復補葺闕遺凡兩易藁始免前後錯忤之患如是者三載每散直常至日晡脫藁未幾㑹有㫖重修文廟實録悉力鉤纂又復嵗餘而其勞益甚隨叔與余素羸弱當是時年壯氣鋭勇於職業寒暑飢渴一不以介意疾病伏於中不暇顧也今余苟幸無恙而精力向衰視十五年以前不逮逺甚隨叔纒綿抱疴時作時止卒至不起或者見隨叔喜賔客嗜酒劇談夜分不輟謂失養生之宜而病所由召實不繫此夫壯者有時而衰衰者有時而老雖養生家不能免獨以國家有用之才當未衰之年賫志早沒使當世不獲見其實用此余所不能不重悼惜於斯人者也隨叔生于前明崇禎十一年九月其卒以康熙二十一年正月晦日年四十有五所著有西齊詩文集若干卷評語二卷廣平府志二十卷元配張氏贈孺人繼配鄭氏封孺人子三人顒預頡皆諸生力學有文顒娶秦氏進士秦君璟女繼娶張氏李氏預娶楊氏廣西按察使楊君晙女頡娶冀氏工部尚書冀公如錫女女四人長適冀公長男廪生植次許聘奉化知縣張君奎升男允元次許聘監察御史寧公爾講男倬次幼俱鄭孺人出孫男一居郢預出孫女二顒出者一預出者一銘曰喬松峩峩頓萎隰阿干將鍔鍔弗試盤錯吁嗟哲人衷通履淳塵壒朱紫肴核圖史忠臣有孤宜昌厥家華星若揭宵露中折孝友為畬十世用鋤銘石幽竁永貽後裔張文貞集卷十一
