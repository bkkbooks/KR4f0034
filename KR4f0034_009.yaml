body:
  text: 張文貞集卷九大學士張玉書撰擬勒石拖諾山恭紀聖武神功之碑皇帝受天景命撫有四海東西極日之出入罔不稱臣奉朔修職貢惟謹而厄魯特噶爾丹獨自越于生成覆載之外狂逞搆釁以上干天罰於是皇帝赫然震怒以康熙三十五年春定議聲討上親總六師從中路入命領侍衛內大臣伯費揚古為撫逺大將軍㑹陜西將軍舒書博濟孫思克從西路入截擊賊後而盛京黑龍江寧古塔諸路則各厲兵以須用備䇿應二月癸丑以師期昭告天地宗社在京幾務悉屬留守綜理焉丙辰車駕發京師皇子侍戎行者咸分管軍事師出獨石口跋履沙磧踰喀倫經拖陵渡克魯倫河賊懼遁追奔逐北直抵拖諾山凡歷程三千里五月戊辰旋師而西路大軍即以是日邀擊賊兵賊大潰散以二十餘年久習戰鬬橫行塞外之徑寇天戈之所指甫七十日一舉而草剃禽獮之成功之速制勝之竒古所未有臣玉書幸與扈從獲覩盛事紀實勒銘以垂信永久是惟臣職謹按厄魯特與喀爾喀同屬奉貢之國彼此交郤致興兵革喀爾喀七旗皆潰叩邊請內附而噶爾丹修怨不己輒恣攻劫抗悖諭旨蔑棄誓言自闌入克魯倫河脅掠納木查爾托音遂逼處土喇克魯倫交近之地虐我使臣擾我邊境煽惑我諸外藩蒙古肆惡極矣假使及今不早事撲滅勢必滋異日西北緣邊之患方二十九年秋皇上曾用密策誘噶爾丹至烏瀾布通距京師僅七百里爾時衆軍合力奮擊可使隻輪不返顧乘輿未親涖軍致賊得以詭遁皇上深念狡冦叵測不以天威臨之弗克剪刈所由廷臣交章乞留而宸衷內斷決計親征職是故也出師以後經行兩月屢遣諜潜往偵賊至五月朔師次拖陵始知賊尚伏克魯倫河上大悅命八旗及前鋒火器緑旗䝉古諸營兵畢㑹圖示陳法紀律加嚴旟旐之盛士馬之衆彌山溢谷綿亘數十里外藩君長無不相顧駭怖而噶爾丹方謂道阻水涸大師必不能猝至比聖恩曲宥賊俘命隨我使臣賫敕㫖告以至尊親臨趣令嚮順猶曰皇帝不安坐中國能飛瀚海耶及登髙阜瞭視天子旌麾乃大驚且謂與烏瀾布通之師異甚顧懼罪不敢面縛乞降竟棄克魯倫河指土喇河而遁克魯倫河為塞外巨浸水草豐蔚足資戰守上初意賊欲拒戰必據河前一夕飭軍中擐甲戒嚴且密授諸將方略既至顧謂侍臣曰賊懦怯不知據此河其無能為明矣亟統軍追之約賫而行越二日至克勒和朔賊所棄氊廬鎧甲釜甑之屬不絶於道又二日至拖諾山俘獲生口言賊晨夜倉皇奔迸今當越土喇河于是上諭諸大臣謂西路大軍刻期抵土喇必己躡賊後賊雖遁亦無復之今所急餽餉耳當旋師經畫兩路軍食越日下令上統中路大軍還而特遣領侍衛內大臣馬思哈為平北大將軍將精鋭逼之于時噶爾丹方從土喇竄走至昭木多適與西路軍遇大將軍費揚古偕孫思克督諸將迎擊自未迄酉俘斬數千追擊三十里略獲子女及牲畜軍仗填委山積噶爾丹僅以殘騎跳身遁夫當用兵之始皇上即定計遣西路軍先入比師既載道降手諭至費揚古軍中馳問師期者使命不絶時或疑荒塞曠邈恐遮道擊賊未可必得至是乃歎睿謀周悉不啻坐照萬里然非皇上躬統大軍直逼賊壘安知狡謀詭計不更從他道奔軼是賊之潰敗于西師乃中路大兵扼賊之吭挈而付諸西路將士使其尾擊而殱滅之者也猗歟盛矣昔史稱遐陬為荒服謂來服荒忽無常時至時去故歷代成功北塞者絶少又稱沙磧千里冬風如割夏風如焚人跡罕有至者兹以師徒數十萬鐵騎颷馳深入無人之境如行內地自始出以至旋師膚功克奏無一困􅉵何古難而今易耶仰惟皇上除暴救民之念至殷且切師中往返十旬觸冒寒暑躬歷勤勞日御一餐飲惟濁水沙陀嶺坂且騎且步每有羣下不能堪者上怡然處之最優恤者軍士最慎惜者馬力最早計者轉輸最厪念者水草賙給衣廩頒賚廏駟而軍心悅矣風雪必謹飼秣必時而馬力紓矣中路之轉餉多方協挽而軍無匱食西師之饑疲適資冦糧而士得宿飽大漠之區不毛之土兼以氷雪凝沍之時素無井泉而泉忽溢涌素無茂草而草皆叢生師行所至每獲非常靈異之助此豈人力所能致哉天祐之矣在易之大有上九曰自天祐之吉無不利孔子曰祐者助也天之所助者順也人之所助者信也惟我皇上北征一舉順天而孚人斯天意與聖心兩相符合山川百神莫不協應臣敬撰銘詩留示奕祀使知我皇上布昭聖武綿國家億萬世靈長之祚者無非奉天道以行王事三代而下無足嫓儷銘曰惟天丕覆春生秋肅化彌宇宙惟聖法天仁育義正道洽垓埏聖恩浩穰重譯畢至莫敢不來享聖威如霆四征弗譓莫敢不來庭蠢爾狡冦僻處窮荒肆擾邊堠悖天虐氓蔑誓拒命洊啓逆萌相彼狂嘻恩不可懷德不可結度彼凶謀如虺斯螫如苖有蟊天子曰吁蔓草易滋豫其亟圖之師難遙制克敵在機豫其親涖之乃籌軍幄諸路並馳或犄或角乃刻師期中夏畢㑹勿疾勿遲乃命轉粟載輸載挽勿憚皸瘃乃命度泉載浚載鑿罔避深堅乃治道途乃設郵驛我軍用蘇乃置斥堠乃謹羅偵敵情斯售廟謀備矣明誓六師所向迅鷙昭告神祗以禡以軷百靈咸熙爰建旌斿爰搜卒乘爰飭戈矛前茅戾止中權鋭止後徑厲止虎旅嘽嘽捷若風雨奮若羽翰軍聲烈烈翦彼梟林轢彼鼠穴彼昏實愚謂兹沙磧泉涸草枯王師不撓有相自天馬騰士飽彼昏實蠢既覩王師駭自天降卷甲而逋宵遁如騖棄及乳雛西師洸洸逺涉瀚海注矢天狼狼奔甫届軍鋒大鏖移時立敗俘乃甲兵籍乃軍械飼乃牽牲幕庭犂矣賊衆擕矣斯授首期矣旌門獻捷衆聲若雷宸謨悉協天子曰俞自兹邊鄙庶無後虞絶塞無垠縱橫掃蕩不逾七旬邊沙如壘建威銷萌何翅萬里維山迤逶式名拖諾黃鉞是麾于兹停蹕于兹振旅允宜紀實我皇決勝衆議勿淆羣疑勿聽我皇握樞效順則撫搆逆則誅威以仁行謀以智神功以斷成肆殊方重譯歷世千億永覩兹石擬勒石狼居胥山恭紀聖武神功之碑國家誕膺景祚纍葉熙洽皇帝以文武聖神之德式廓歷代未𨽻版圖之疆宇薄海內外翕然同風獨厄魯特噶爾丹負固不率命為邊境患皇上三臨絶漠聲罪致討浹嵗之內盡離散其黨與而蹙凶渠以就天殛威震流沙功越千古惟狼居胥為御蹕視師之地先後用兵機宜應勒銘兹山垂示奕祀臣末學弇陋不能頌揚盛美顧扈從日久分宜紀載謹據所見聞縷述萬一按厄魯特噶爾丹乃西北塞外一巨寇也其先世本元之牧𨽻後漸强盛有四部落之衆噶爾丹初依達賴喇嘛為僧未幾遁還自戕殺其骨肉吞併四部落洊逞虐於鄰境䝉古其迤西回人若撒馬喇罕哈薩克牙爾勤土魯畨哈密之屬千有二百餘城皆漢西域城郭諸國地噶爾丹悉劫而敓之最後與喀爾喀爭郤破降其七旗數十萬衆虐焰益張及喀爾喀台吉汗等窘迫內附噶爾丹竟追入我近邊自烏爾㑹直抵烏瀾布通外託索仇雪憤之辭內藏窺伺中原之意惟聖心早燭其奸故遣師迎擊具有成算時右翼軍失地利致賊遁走自兹六年皇上厪念邊務未嘗一日弛備康熙三十五年春噶爾丹闌入我土喇克魯倫河上曰此滅寇之機不可失也顧前事具在非朕親總六師則寇終不克滅而國威無由以伸於是決䇿親征不參衆議二月癸丑師行自中路入遣大將軍費揚古與將軍博濟孫思克等由西路遮賊後且預刻㑹師之期五月上身先諸將從克魯倫追擊逼賊渡土喇適與西路軍遇遂大破之於昭木多俘獲人口牲畜谷量山積噶爾丹雖跳身遁而勢窮力殫滅亡之形已決是大駕親征之舉一出塞而使賊軍盡潰者此也噶爾丹卷甲西竄假息於枯倫百爾齊爾等地至九月上復統軍出邊抵歸化城乘氷濟河駐蹕於鄂爾多斯宣示威德厄魯特台吉寨桑人衆自拔來歸者次第恩養並加祿秩噶爾丹窺我屯聚餘糧遣其親信丹濟喇來劫我軍擊走之賊益困無所得食因令格壘沽英寨桑詭辭歸命上雖寬恩許之而心察其詐治軍益嚴令諸將士秣馬雲中以俟春舉且預調肅州大軍駐卜隆吉爾遏截要害以斷賊奔赴乞援之路是大駕親征之舉再出塞而使賊勢日蹙者此也三十六年二月上涖雲中陳師鞠旅詔諸軍取道塞外駕巡行緣邊州郡歷山川深峻之險經古五原榆溪濟河至寧夏於時諸軍畢㑹鐵騎雲集上熟籌軍食令人持糗粻足支四月又置遞轉粟待於境上以濟旋師經畫既畢駕循賀蘭山出塞進次狼居胥山麓上親御旌門簡閲士馬召諸將指示方略命㑹大將軍費揚古師于郭多里並進摉討是時噶爾丹震讋天威遁匿於阿察阿穆塔台之地比聞其子色不騰巴爾朱爾為哈密回人所俘又青海衆台吉舊稱姻戚今皆奉表輸誠於我而西畨諦巴向與彼唇齒相倚頃亦恐懼謝罪噶爾丹方進退失路復聞車駕已出朔方知鈇鉞在即天怒人怨無地幸存遂以閏月十三日仰藥自殺餘衆潰散幕廷悉空四月丙辰上始乘舟遵大河而還又越月丹濟喇復率潰散之衆從哈密來歸是大駕親征之舉三出塞而使賊無遺類者此也兹者武功告成中外欣悅而當誓師之始廷臣交章勸沮不無回惑惟我皇上毅然興師謂臨大事非斷不可夫歷代致師邊塞罕覩成績皇上睿斷不疑以此寇為必可殄滅而卒能制勝不爽毫髮何廟略之神若是此非臣下私智所能測也聖人舉事動合天心用兵機宜務乘時㑹方喀爾喀之內嚮也固知逆寇狡謀必將借詞搆釁顧古帝王興滅繼絶之仁持危扶傾之義未有逺人叩關求附不加收恤者則拯其困厄而拊慰安全之所以合天心者至矣烏瀾布通之役詔勿遣師窮追仍降諭旨導以改圖貢市永安生理去年春師已壓境復屢敕喻以禍福及賊既敗遁又德音誕布趣令嚮順好生宥罪之意至勤且􅈤所以合天心者至矣噶爾丹怙終不悛殘害族類毒痡生靈罪不容逭師行討逆止為中外元元圖休息彌後患之計而初非利其一土一民為我中國尺寸之用所以合天心者至矣鑾輿三駕自寒徂著踐不毛之地而草忽茁生鑿荒漠之區而泉忽溢湧觀於百靈協應而上天之默佑蓋益有明驗焉至於仁義之師所嚮必克倘非睿謀適與時㑹則成功猶未若斯之速也我國家士卒精强什伯往代比年以來聖躬親加訓練人爭效用自噶爾丹俶擾邊塞諸將士無不奮志敵愾北征既捷賊大挫不能復振其部衆盡懷異心而族屬尤多怨望不及是時早圖撲滅恐遲則殘喘苟延尋復滋蔓乘彼衆叛親離之際亟行除惡務盡之誅機㑹適符殱鋤可預決矣且夫衆口臆說不無回惑者不過以大漠荒邈致疑於懸軍深入之難而我皇上洞察賊情明悉地勢雖踪跡靡定而謂彼住牧必依水草飄舉必以夏秋往來動止自有恆所夫是以坐籌帷幄而如目覩其山川險易之形警蹕邊庭而如遍歷其出沒經行之境六軍分道而皆扼其要衝偏師設伏而適遏其歸路我軍方壯彼力已衰遂致滅亡不煩折矢此皆宸衷操萬全之幾握必勝之算然後能順天乘時毅然行事而有斷必成如此自獯鬻玁狁胸奴突厥以來歷代征伐之事事備在史册以今視古相懸何啻百倍哉自兹以往含齒戴髮無一不臣之人西陲朔漠無一不賔之國邊塵不聳關門晏閉誠振古之所未有一時百官羣黎咸環闕頌至治而我皇上辭顯號而不居軫民依而益切宗社太平有道之長實賴聖心敬天勤民綿於有永臣謹拜手稽首詮次本末而系之以銘曰聖人在宥函宇帡幪丕洽文德載揚武功文以撫衆武以鋤凶稂莠既刈良苖斯豐緬彼朔漠狡冦窟處昔共職貢世寧厥土自絶於天躪我邊圉聚若鳥獸散若風雨我皇覆露德音頻仍悔罪內嚮庶汝用矜厥心不懲神人怨憎皇赫斯怒撻伐是膺乃總貔貅躬親韎䪒直馳中堅預扼歸路困獸猶鬬窮猿卒仆賊勢大摧罔敢枝梧粵自北遁卷甲西奔收合餘燼或伏或蹲食盡而饑逋竄孔繁皇命亟擊芟枿鋤根鑾鈴冬狩減御約齎豐州之北大河之西降人踵至羣醜內攜執迷者滅炳若燭犀爰及早春三臨朔塞羌來歸俘鶚鷇就逮爰飭我旅爰敵我愾軍鋒兩道鐵駟千隊烈烈神武先聲載塗洊逼靈朔載張威弧賊悔噬臍賊懼切膚一夕自斃訖就天誅惟皇濯征時經一載出入萬里洪河瀚海捷書馳聞軍心樂愷欣仰睿謨績嫓因壘睿謨維何蚤設三覆紘網恢張莫敢潰走如鳥在笯如狖在囿以縱以擒神機蕩寇方師始出整斾建旟九重經畫儲峙百需㕓無輟市田無算車過師十萬如行康衢今軍旋歸馬騰士飽片甲不頓斥堠無擾日晶月熒氣翳迅掃蠻戎羌氐悉遵王道聖心仁愛鋭意止戈一視中外力拯痏疴各謹爾職各寧爾家皇則錫福自邇訖遐繄我藩臣四十九部環塞族居時邁式序既翦蜂螳既殛䝟貐尚協乃心載瞻我武嶽嶽狼胥史册著聞神威遐暢親駐六軍惟天時佑惟神助欣磨崖深刻用昭大勳大勳告成皇益布德地博天崇生民允殖聖神文武惟帝時克于萬斯年祚永無極二等伯諡忠直宜公墓碑國家之有重臣猶九廟之有宗器巨室之有棟梁也其用之也非一日之報則其蓄之也亦非一日之積宋蘇文忠銘張文定之墓謂仁宗在位四十餘年搜攬天下豪傑既自以為股肱心膂而又留為三世子孫百年之用余嘗讀其文以為知言伏覩祖宗朝英傑景附際㑹風雲長養培護傳之纍葉更有度越前代萬萬者如二等伯宜公其尤著者也公諱爾登滿洲人父至勇公額一都巴圖魯以開國勳配食太廟公生而明敏才識絶人自幼嫺習武略天命中筮仕為禆將太宗文皇帝素亷知公才益見任用授三等阿思哈哈畨㑹他軍詿誤落職崇德中大師再略明都公在行間與敵軍遇敵軍逆戰者千餘人公率徑卒三千人擊之敵敗走盡獲其馬匹有諜者言明總兵祖大壽偕太監髙某分兵二千潜襲我軍時我軍用步卒設伏以待敵逡巡不前公乃將四十騎紆道誘敵且戰且却敵兵遂遇伏公與伏兵合力奮擊大敗之錦州之役公率多爾機蝦等將右翼時敵衆我寡諸將相顧眙愕莫敢進擊公觸刃先登與敵共戰四合皆敗之公勇力冠諸軍而其潜機制敵應變如神尤為諸老臣宿將所難故所至皆獲勝崇德六年以功授原職世祖章皇帝既定燕京推恩勳舊晉一等阿思哈哈畨郊祀禮成覃恩在廷諸臣以公父至勇公有世勛特晉公三等精竒尼哈畨嗣兩遇尊號禮成復由三等伯晉封二等伯世襲不替今上御極之二年六月以疾卒於位朝廷聞之震悼遣官諭祭恩賚有加易名忠直年六十有八夫史稱召公畢公為周室元老歷事文武成康四世而其壽考皆逾百齡以我公方之則始襄締造之功繼贊太平之業巋然四世之老矣而躬親矢石久歷戎行武功之茂視畢召二公猶且過之獨是康强白首雖不為無年而論者竊以未登期頥為公未盡之憾嗚呼以至勇為父以忠直為子其為不朽豈復可以年齒論哉公生子一人早卒孫噶篤襲封二等伯為內大臣護軍統領噶公將樹石于公墓道而乞文于余余不能悉公行事特援據舊聞述其梗概聊以志我國家人才之盛云爾銘曰天翊景運英傑駿奔奕葉光裕厥有世臣赫赫忠直偉略絶人克紹至勇益大厥聲龍韜豹略拏風躍雲斬關剃寇佐命作京遺孽未熄提戈四征應手斷骯前無堅城丹書鐵劵上賞是膺白首耆艾允矣國楨人雖云亡令名永存勒兹片石百祀有徴內國史院大學士蘇公墓碑公諱納海滿洲人生而魁梧竒偉自幼負文武大略筮仕為和碩睿親王護衛屢從征伐戮力效謀一時老臣宿將皆遜謝以為不及世祖章皇帝素亷知公名謂公才可以侍左右贊密勿不宜僅煩以摧鋒陷陳之事於是特簡內宏文院學士纍遇覃恩授拜他喇布勒哈畨復晉吏部右侍郎兼管副都統事其典銓也和而介直而不苛其佐都統也肅而溫簡而有制以故人無識不識咸心折焉㑹他事詿誤解任未幾先皇帝惜公才召還禁近復授內國史院學士旋充經筵講官嗣加禮部左侍郎改中和殿學士又以年勞加太子少保升工部尚書尋轉兵部尚書公贊理日久譽望日隆恭遇皇上登極倚任老成簡求碩輔遂拜內國史院大學士康熙二年以原銜出管户部尚書事釐奸剔穢宿弊為之一清五年以撥地為枋政者所銜遂至不祿焉八年皇上躬親大政深恤沈寃優詔復公官易名襄愍仍遣官致祭立碑于墓道嗚呼先皇帝與我皇上之知公者可謂深矣公之所以報主知者亦可謂忠且盡矣而使白首耆艾公忠骨鯁之臣訖不克長佐國家太平之治此朝野所欷歔太息而致痛於百身莫贖者而公之名則已垂竹帛流青史矣死生禍福曾何足為公輕重也哉鎮守西安將軍三等精竒尼哈畨傅公墓碑公諱喀禪滿洲人雄毅多大略自幼以樹勳立名自任崇德間筮仕為壯大旋襲父職授一等阿達哈哈畨兼管佐領未幾出理部務為工部理事官復調户部及世祖章皇帝命將入關驅除流寇公身履戎行有𠞰寇功加一拖沙喇哈畨順治三年以才品擢授鎮守西安等處將軍屢遇覃恩歷晉一等阿思哈哈畨五年回冦據邊境煽亂甘肅兩鎮同日被陷勢猖獗莫能禦公親提軍馳擊賊渠郭真君劉文秉以騎步兵二千迎敵大敗之斬真君於軍生擒文秉時賊軍猶踞甘州城公率大軍圍城數匝以待其自困久之賊潜引兵欲突圍出遮擊之兩戰兩克遂拔甘州嗣圍河州城賊以騎兵二千餘閒道來援公馳斬其將王大宏餘黨奔潰河州就撫并招納涼州一路降衆由是西寧一路帖然無邊燧之警矣今上御極之二年以西山賊首郝搖旗等嵗久負固命三省㑹師合𠞰公以宿將指麾諸軍口授方略一鼓而進盡殱賊巢生擒搖旗及袁宗第等招降僞將七千餘人房竹遂定以功超拜三等精竒尼哈畨鎮西安如故康熙七年具疏自陳老疾上篤念將軍勞苦俯俞其請越明年三月草七日竟以病逝年六十有三朝廷特遣大鴻臚臨喪諭祭蓋異數也嗚呼公之在行間者三十餘年而鎮關中者二十有三年從來大將專閫建旄之久未有若斯之盛者也而躬冒矢石戰必勝攻必克竒勳偉伐屢見叠書且刁斗嚴明市肆案堵師行所至民不知兵還朝之日秦人扶老擕幼垂涕遮道以送公者不啻千百計古稱制軍之道曰仁曰勇公實備之嗚呼豈非所謂鷹揚虎旅之才應國家景運而奮興者乎以將軍非常之烈膺三朝不次倚用之恩亦真可以無愧也矣余特詮次大略勒石墓道庶幾後之觀者知所景仰其詳具在國史不能縷述也護軍統領鄂公墓碑護軍統領鄂公以康熙十四年乙卯從大師西征越二年丁已以疾卒于秦州軍訃聞朝廷軫悼不忍使良將之沒于王事者久暴露于外也命以骸骨歸葬于是公子博君奉公喪葬于西直門外西北郊之白塔庵而持所為狀來請余銘余與博君交有素不敢辭因據狀而為之志按公姓鄂氏諱齊里滿洲世胄也祖某父某世祖章皇帝初入關公年甫弱冠即與從龍之列嗣後才譽益顯簡置侍衛每遇戰陳輒執蝥弧先登騰機思之役和碩德豫親王師行百日略地四千餘里俘獲無算行間諸將皆極一時之選而公其一也繼偕禁旅定雲中之變又隨和碩英親王靖羣盜之竊發晉地者又從征東粵有克敵功授佐領世襲不替公既嫺于戰略尤以威望為諸將吏所讋服於是朝廷欲倚公之重彈治都㑹特擢侍郎巡視西城一時輦下奸宄斂跡未幾王師入滇公又在行陳師還又入西曹以平允著聲蓋公之才兼資文武如此康熙初年升授參領國家承平十餘年矣方欲寢兵息獄與諸老臣宿將講恬嬉之樂忽嵗甲寅滇黔搆禍蔓延三秦大將軍統師西討復命公為護軍統領公至以計克延安又率精鋭攻拔綏德賊聞公名輒股栗軍次平涼躬冒矢石屢挫賊鋒王繼貞敗困武州王屏藩却走天水公之功為獨多大將軍雅重公咨訪軍事委任如左右手乃積勞遘疾竟致不起康熙十六年十二月二十二日也距公生天聰庚午十二月二十一日享年四十有八余昔預修國史稔覩公纍勳積伐疑公為白首耆舊及公卒而年甫及艾何樹功之蚤也今公之名已垂不朽而公滅寇朝食之志抑而未伸不及偕諸將士獻俘飲至以告成功于宗社寧不痛哉配關氏纍封夫人子二長即博君靈安次撻拉馬俱太學生候補某官哲嗣繼武以竟公未竟之業公可以無憾矣爰系之銘曰天生我公棟梁倚重孝斯作忠謀以兼勇川渟嶽峙夙荷殊寵斬將搴旗風馳電悚星殞于西一軍號踊沒而猶視敵為震恐大蒸酬功祁連象冡勒功豐碑韓范接踵誥贈通議大夫包衣大傅公墓碑國家受命溥將人才蔚起一時文武重臣樹功伐於不朽者固已接踵相望而禁闥之中後先奔奏其職為至親其地為至近非得通敏持重有幹濟之才者不能勝任無憾以余所聞通議大夫包衣大傅公出入內廷克舉厥職洵足與諸舊臣卓然嫓美青史者也公姓某氏滿洲人世有令德考贈奉政大夫拖沙喇哈畨品級包衣大諱賈妣某氏公生而天姿英邁識量閎逺髫齡動止不凡為族䣊所器重既壯而胸具經緯所至事集人多稱之世祖章皇帝察知公才拔置禁掖授物林大秩與壯大同公筮仕即以勤慎著聞每有任使輒當上指未幾擢包衣大秩視拖沙喇哈畨包衣大之職前代所未有自乘輿服御以及飲食日用之節出入起居罔不綜理蓋如周禮職內職嵗掌舍掌次籩人幂人諸事總於天官之屬者包衣大皆得領之任繁責重與外朝逈異公感激自奮力矢精白以期報稱內庭事無巨細凡經公指畫悉中程度以纍勞增秩視拜他喇布勒哈畨公位望日隆名譽日起而奉職益謙抑自下以故人爭仰公之德而聖眷亦終始不衰詩所云溫恭朝夕執事有恪其公之謂歟天性篤孝事親先意承志就養無方贈大夫既即世於所行事終身無改素好施豫扶危拯困惟力是視姻戚有貧乏者委曲賙恤之無倦容至於守已以正遇物以誠視國事如身事自少壯登朝以迄於白首未嘗一事或渝此人情之所甚難而公處之若素是真不可及矣公生於某年某月某日卒於某年某月某日子五人長舒祿內務府慶豐司員外郎次阿哈占拖沙喇哈畨二等侍衛壯大次薩哈連內廷供奉次佛內務府營造司郎中佐領兼管護軍參領次費揚古亦內廷供奉公諸子咸繼公官禁近才品行誼不減於公受上眷遇甚渥屢被覃恩文階武職先後追贈公至通議大夫繼自今以往諸子晉陟名卿而諸孫將復繩繩嗣美則所以慰公於九原而光大公之遺緒者夫寧有艾歟康熙某年某月某日公之子奉公喪葬於某鄉某原既葬之某年將勒石墓道以傳示不朽而屬文於余余辱交於參領公得悉公生平梗槩謹據所聞詮次書之辭雖弗文而事皆核實用俾後之人知所景仰焉甘肅總兵佐領陳公墓碑公諱伯通字魁吾世為三韓望族起家署章京太宗朝升佐領屢從征伐如攻朝鮮服䝉古克錦州下松山拔大淩河此國家開拓疆土戡定中原時也諸將士有事兹役者功輒稱最而公身在行間所至著績視諸將士功獨多迄世祖章皇帝入關建鼎窮追逋冦公復從王師長驅逐北大破賊於潼關關中既定旋拜西安留守未幾孟公喬芳持節督秦時河西五鎮初下計非得素有威望負文武大略者領重兵鎮之不可雅意屬公即拜疏請授公甘肅總戎已得命矣㑹江西有叛將之變羽檄乞援甚急公奉調馳往竟未赴甘比至江右叛賊金聲桓業連陷數郡逆焰方熾公與諸路兵協力㑹𠞰未數月賊平振旅還京師一時論大將制勝克敵才者咸交口推轂公不日將再秉旄鉞以出而公自念束髮從征披堅執鋭者三十餘年戰必克攻必勝蓋君之靈社稷之福也今老矣且善疾不能復任金革遂引年乞休閲再嵗以病卒嗚呼古稱勇將易儒將難才將易仁將難以余聞公精騎射武略絶人顧嗜書史在軍中手不釋卷秉燭吟覽嘗至丙夜時擬之杜征南又性仁慈凡有俘獲輒矜釋之曰此一時誤罹賊網耳縱之令自新皆朝廷赤子也所俘衆感泣叩首而去公以百戰成大功而其在軍不肯妄殺一人如此夫不妄殺人者必有後今公之子孫先後躋貴顯繩繩繼繼益大公之家聲不可謂非天道也子六人長養忠京口固山大能紹公志讀書明大義折節與人交人咸德之次某次某孫長嘉善佐領次嘉猷太常寺少卿次內閣撰文中書舍人亦以文學稱俱養忠出公墓在某鄉某原奉常將立碑墓道以垂不朽而乞文於余余不能悉公行事為述其梗槩以見公之積善餘慶而陳氏之福蓋未有艾云誥授光祿大夫護軍統領兼佐領世襲拖沙喇哈畨柯公神道碑玉書承乏總修國史歷覩本朝創業以來英賢佐命事不絶書自配食廟廷數公而外其豐功偉伐彪炳於史策者實較往代為獨盛其有身歷四朝戰績燀赫而始終一節徑挺不撓者如護軍統領柯公真卓然名臣之冠冕也公諱柯爾崑其先建州靈椿里人髙祖業世曾祖德錫在勝國時皆以都督同知總領建州等衛祖翰於國初歸命纍官侍從大臣父紹兹以佐領為大貝勒府總管公生有異相目光若朗星聲如虓虎年始齔蹻健異常兒太祖髙皇帝見而異之即命侍從出入禁闥者數年為大貝勒三等護衛武力絶倫能開十餘石弓太宗皇帝定䝉古平朝鮮入大同公皆在行間多所擒馘以功授前鋒護衛睿親王鄭親王更畨圍明錦州公從鄭親王軍以設伏計誘屢敗敵兵松山之戰洪承疇祖大壽合兵十餘萬悉鋭迎擊公身先陷陳連斃敵數十騎復大破之從英郡王駐杏山敵騎數千自寧逺擊我哨騎公追殺至連山馬傷徒步奪敵馬乘之遂敗敵兵從饒裕郡王觀兵于明北畿山東一路歷有敗敵功河西務之戰敵將恃勇持滿向公公發矢貫其肘意欲生得之于馬背相持久忽馬逸俱墮潞河敵長身猛力扼公兜鍪事幾殆而公于水中曵其足竟就擒師還以功授佐領兼兵部職方郎中順治甲申春王師入山海關與流賊兵二十萬遇於一片石公在軍中偕蘇公爾度率所轄兵協力破賊既定燕京復從英親王軍追賊于慶都又偕葉公臣克太原偕蘇公拜哈公寧阿連破賊二營賊軍潰亂遂大破之以功授世襲拜他喇布勒哈加一拖沙喇哈畨仍辦部務未幾從肅親王入漢中與賀珍兵數萬遇公同覺羅巴公哈納超乘而入大破珍漢中既平從入川擊獻賊至西充之鳳皇坡與獻忠兵遇同巴公及阿公爾真蘇公拜擊殺獻忠殱其餘黨全蜀底定加授三等阿達哈哈畨旋解部務為前鋒參領兼佐領太祖配天禮成以勳舊纍勞進二等阿達哈哈畨公之未還軍也公父總管公卒既還始聞之公痛不欲生徒跣至墓次血淚交迸廬於墓所者百餘日復從鄭親王平楚公力疾行兩月甫愈既至楚湖南北賊多奔竄惟衡寶偏沅未下尚書阿公哈尼堪以别將赴沅公為前鋒破武岡賊兵八千人斬其總兵一人時前鋒參領白爾赫圖馬傷陷敵身被數創公突入奪賊騎與乘以身翼之左右射敵不敢近所向披靡有永厯督師何騰蛟者方據湘潭移師攻之忽聞敵兵夜遁公偵之疑有伏兵俟大軍畢至自率三十騎先入而伏兵盡發矢如飛蝗公下軍拔民舍門栅為盾鼓勇急擊火軍繼之遂拔湘潭獲騰蛟又從順承郡王自道州赴龍虎關破敵數萬以功進一等阿達哈哈畨兼官如故嗣以慈闈尊號禮成又兼一拖沙喇哈畨世襲不替順治九年李定國方據衡州為亂公復從敬謹郡王師征衡州定國列巨象為陳象背坐健卒數人執火器淬鋒以毒中者立斃公與前鋒參領西伯臣遇敵於隘象連尾而至公曰象非矢石可摧惟鼻稍脆吾當與公協力射之西公矢先發象躑躅悲鳴仍復前進公後發直洞其鼻象負痛遂走御者不能止賊衆遂亂大軍繼至破之追奔數十里時王統中軍聞前鋒勝遂輕騎疾行全軍皆後而賊兵伏深箐中伺王至猝發王遂中傷而薨公出入重圍中者三求王遺骸獲焉奉還衡州祭殮如禮是時衆軍銜痛次骨公偕貝勒羅託都統圖賴等激厲諸將士疾趨寶慶遇孫可望于岔口賊兵號數十萬我師僅成列然人皆殊死戰可望據山巔遙謂公曰勇則勇矣奈衆寡不敵何公奮呼直入聲震巖谷可望懼而退賊兵大潰湖南遂平貝勒羅託等具疏奏凱學士邵泰親賫以行而以盜賊充斥令公偕前鋒十六人為衛疏中諱王戰歿事未聞於公也比至京師學士入奏久之始召公入公第云王薨事已載本內臣所知與學士同及師將還世祖皇帝悉聞王陳歿始末怒師行之辱國而奏辭之多誑也詔貝勒以下皆逮問命議政王貝勒大臣㑹勘于午門世祖御樓臨決焉時鄭親王詰責公辭甚厲公言衡州之役以先鋒前驅王之致陷初未目覩及王既薨乃透重圍求王體骨捷書所載絶不與聞及學士入內未經同奏故云所知與學士同今諸臣具在可共質也豈敢自蹈誑君之咎王曰人言靈椿里人行僞而言詐誠然公大恚捽縲索于地鬚髯畢張厲聲言曰臣自齠齔侍太祖髙皇帝稍長事太宗文皇帝俱以氣節自厲效死行陳二十餘年今奏事不明死自吾分王奈何以衊語坐人罪因指邵泰等曰爾等竟結舌無一語耶時世祖察公詞氣憤激謂左右曰陷此黑面參領者端由邵泰耳遂命侍衛羣擊邵泰幾殆及具獄議公革職籍沒為官奴詔止奪世職仍留原官居久之護軍統領闕人廷推章三上未允一日駕幸南海子召諸議政王大臣齊集傳㫖護軍統領朝廷重臣舊制悉下廷議蓋慎之也兹屢舉不及柯爾崑豈以其不工俯仰故耶朕深知其人可膺此職於是諸王大臣咸引咎遂以特旨授公閲嵗餘復命為參贊大臣從王師取黔中師至鎮逺聞雲南賊中內亂馬進忠獨守貴州兼程急入進忠望風走遂平貴陽而賊將白文選出七星關踞黃平州信郡王方戒期入滇待命公將騎兵五千人與副都統馬爾賽偕擊之公以黃平居萬山中未易猝拔乃分遣爾賽誘賊甫接戰即佯敗走俟文選兵大出繞其後擊之遂拔黃平文選竄走而全黔底定師還深被奬遇未幾扈從房山步獵忽以中熱眩暈而仆駕馳至仆所用諸老臣言以徑尺氷置胸次移時熱氣勃發始蘇聖心大慰公從昏瞶中聞天語亟强起謝固止之令肩輿還旬餘疾愈詣南苑謝世祖嘉勞良久顧左右曰忠勇篤誠如柯爾崑者始可以為大臣矣前奪世職非其罪也比嵗暮有㫖許寃抑者所在具陳意屬公乃甫及獻嵗聞宫車旋晏駕矣竟不果行方世廟大漸時公露處宫門外者數日比及上賔號痛不欲生遂成痼疾自是常卧病不視事盛京以東都山紅螺山宿有巨寇義州佃甲有亡命走兩山以圖自活者將軍請𠞰除之朝命公往公力疾行次寧逺謂監軍等曰寧逺為兩京衝要賊無一騎扼守何言狂逞耶倘遽進𠞰恐濫及無辜於是選精甲數百結小隊偃旗衷甲乘夜趨義州收捕佃甲皆束手就縛訊之皆迫於所司侵漁依伐木丁壯自保無他謀也分别奏聞付之司冦全活以數千計既歸復移疾不出詔遣醫診視久之疾漸平而湖廣興房間有茅麓山賊為亂賊固流寇之餘黨所謂十三家者是也自闖獻潰敗其黨先後入滇依永厯而賊一隻虎李來亨賀珍袁宗第諸人從其將堵應錫奔走于楚粵間逮楚粵滇黔先後蕩定永厯已亡乃復挾明宗室朱盛蒗者招集無賴日事鈔掠竄入興房諸縣依茅麓山為巢穴而推李來亨為盜魁楚督臣董學禮等屢戰敗績康熙二年朝命㑹師合𠞰廷推都統慕禮裊為將軍而公與都統大學士圖海副之公等既至荆州則川湖河南督撫提鎮各遣所屬健將徑旅來㑹遂從夷陵進師分軍七道以一軍護輜重以兩軍遏外援以左右翼兩軍絶旁鈔而公自率五千人為前隊慕公將中軍前鋒總領賴公塔則為遊騎往來馳擊前隊始發賊巨萬從深箐出中軍及兩翼兵掩擊破之進至茅麓山慕公乘勝直入公力止不從為賊所襲慕公大悔公曰當為將軍解之部署諸將分守泛地自以二千五百人登山據險賊出過半遊騎兵衝擊大敗之陳斬賀珍等四人時李來亨獨全軍先道公曰此賊老于行陳恐夜襲我不備乃聲言縱馬擇水草休息密下令軍中候進止日暮置兵伏溪谷間偵賊至夜半來亨果率衆萬餘襲總督李國英營伏發大敗之越數日築營上望坪以斷賊路登茅麓山絶頂奪賊壘以駐我師賊兵數千列火器礌石拒戰公統兵徐進嘗敵别遣賴塔等繞賊後擊敗其軍又于石坪新寨南峯山屢有斬馘逼至談家寨賊衆萬餘人迎敵流矢傷僞侯李嗣名賊將金騰雲賊大敗不敢復出公曰語云困獸猶鬬況賊尚萬餘逼之則殊死出我所傷多矣曷若深溝髙壘斷其餉道扼其要衝不出旬月可不勞而坐收賊衆于是賊糧盡援絶賊首李來亨自經死賊將髙必正等百餘人自縛率萬餘衆詣軍門乞降公簡閲降人得徑卒數百屬分𨽻各營其老弱子女數萬令各賫輜重散處各州郡悉縱為民師還以功授拖沙喇哈畨世襲罔替公復引疾居于家聞上幸永平詔諸王等並從公蹶然起趨政府請從許之同賴公塔總領圍事有王府護衛誤入圍中者言者謂諸王慢玩所致公同賴公奏違例入圍舊有常罰諸王隨圍先行護衛等誤入王等不及知乞寬諸王之罰控御不嚴咎在臣等時皆以公言為得大體云比還賜天間良馬二十匹本旗都統闕人當軸者意屬公公峻拒之而止家人力諫公曰不為身計獨不為子孫計耶公曰是乃所以為子孫計也越嵗而當軸者敗乃服公先見云康熙七年皇上躬親大政公奮志欲矢報效而困卧不能視事八年十一月二十日遂以疾終訃聞朝廷震悼賜葬祭如例公孝友一庶弟親愛倍至二兄子視若所生故公歿終身悲慕焉元配耿氏繼佛氏學士納山女贈封俱一品夫人生子二人長即盛京刑部侍郎巢可託次莫洛洪襲世職官護衛女一人適一等侍衛雷戚孫四人長爾璊次丕次璊次幼其年十二月朔葬廣渠門外迤東五里賜地户部員外郎納喇君神道碑方順治甲午乙未間天子鋭意文治嚮用甲科一時滿漢射䇿之士咸爭自鏃礪以得與于制舉為榮而其時登進士第者亦往往負盛名躋顯秩蓋國家樂育涵濡之久而人才之應㑹而連茹者有如此其盛也户部員外郎納喇君以文學政事聞于朝列余未及訂縞帶交每以為愧既卒之明年君之弟侍讀公察庫以墓石之文屬余余不敢辭按君姓納喇諱噶爾噶圖世居耶黑祖某父噶爾麻石君生而魁梧偉岸稍長慷慨有大略性嗜書史博綜旁覽每考證一事必鈎索其原委本末如蘇子瞻讀書法嗣聞功令開滿洲制科踴躍自奮曰朝廷張八紘以網士而甘廢棄為科目外人可乎俯首為制舉義禀經酌雅儼然埓于老生宿儒甲午鄉試登賢書乙未成進士起家兵部他赤哈哈畨未幾晉職方司主事當是時滇黔楚粵之間方有事兵革其他山陬海澨小醜竊發者又不時見告親藩宿將重鎮相望一切進止機宜或羽書奏請下所司區畫或廟算未決詔樞臣詳酌方略君雖為主政而識議侃侃擘肌中理能時佐司馬之不逮比奏入輒當上㫖次第允行以故諸曹郎皆引重焉康熙八年晉户部貴州司員外郎司所專核者諸路關榷之政也自甲辰乙已以後關政屢變始遣分司繼歸有司繼又視稅額多寡酌遣六曺郎及地方官分攝其事閲一嵗上其數于户部部核殿最輒以額外竒羡為稱職受兹任者竭澤取盈君獨語諸同官曰𣙜稅贏民氣削矣與其剝民而益稅毋寧抑稅以利民是後諸路考核咸得其平君胸次包孕今古洞達大體故其立言斷事不同于斗筲筐篋之智悻悻自見者如此方六年春君業以才品遷户部矣㑹枋政者修郤興大獄君坐同族牽連廢錮迄天子躬親大政奉詔復職始得再官户部以覃恩加一級君感念朝廷燭幽拔滯之仁冀早夜竭心力以圖報塞天少假以年則其魁名碩實當益加赫奕而卒止于此是則可悲也已君生于天聰九年某月某日卒于康熙九年七月某日年三十有八子二人長郎圖次石俱廕生以某年某月某日葬君于某原銘曰繄惟耶黑族蕃且昌歸命真龍益衍厥祥掇拾科第丕振前光郎署奮跡鵠峙鳯翔口贊軍樞手畫帑藏弗忝乃職惟才則良哲人云萎吾道之傷鑽石埋辭用示不忘誥授通議大夫奉天府府尹前工部右侍郎萬含金公神道碑國家受命七十餘載文教誕敷武功赫濯中外臣鄰罔不恪共砥礪以贊至治而豐鎬望族纍葉濟美者尤光炳史冊如奉天府府尹萬含金公其最著者也公以門廕入仕歷官有聲凡八遷而至工部侍郎及詿誤左官又四遷而為京兆尹甫一載遘疾而卒余為學士時曾與公同官知公為深公子瀚等將葬公鐵嶺之陽以祔先兆持狀乞文於余余不敢以不敏辭按狀公諱世鑑字萬含其先世居臨濠有官于遼者遂占籍鐵嶺祖諱玉和當太祖髙皇帝龍飛之際攀附鱗翼仕至禮部尚書授一等阿思哈哈畨世襲豐功偉烈具在國史祖母宿氏周氏俱封一品夫人父諱維城仕至兵部左侍郎兼副都統母郎氏封一品夫人侍郎子六人公居第五少秉粹姿卓犖不羣既長好讀書諸子百家無不博涉尤精於天官家言康熙六年授刑部他赤哈哈畨持論斷事逈越於衆以是顯名十年遷通政使司知事十二年典銓者知公才特請于朝進文選司員外郎不激不隨銓政釐舉十六年出權天津關稅事竣吏抱牘進曰此額外餘羡也公喟然曰國家設關雖云抑末然商賈困􅉵已極司𣙜者不能利民而忍自利耶悉以歸度支十七年五月進刑部郎中閲一載獄無寃民而朝廷稔聞公𣙜關之政以公才宜居要職遂擢江南道監察御史㑹地震公條上五事具言陰陽災沴由人事怨鬱于下而後天變感應于上今大小臣工不可謂不上負朝廷下負生靈矣仰請乾斷勸善懲惡以弭天變十九年上以內閣官屬職司文翰召諸曹郎試滿漢學士于廷公得優擢授內閣侍讀學士二十一年七月進學士兼禮部侍郎公外若木訥而遇事陳奏辨理晰微深中窽綮上時顧而頷之十一月纂修太宗文皇帝實録成恩賜表裏加俸一級十二月授工部右侍郎是時海氛雖靖而遷界之禁未弛民多失業二十二年有詔分遣大臣巡歷海疆察其地之可以畀民者悉與展復舊境公偕副都御史雅公赴江浙同地方大吏遍閲沿海形勢因嘆海濵餘黎凋瘵日甚假使結桴而漁亦何至觸冒禁網而顧令坐困若是遂奏復溫台寧三郡界外民田九十餘頃鹽田七萬四千七百畝有竒要害地應設防者仍分兵戍守其餘一切奏罷以省冗食自是棄田盡墾營制亦定民生安堵僉以為子孫百世之利二十三年以管理錢法牽連被議左遷光祿寺少卿久之轉大理寺丞太僕寺少卿二十七年四月擢奉天府府尹十月遇覃恩授通議大夫留都旗民錯處習尚漸澆公察利弊咨疾苦勤拊循嚴教誡不鈎距而奸無不聞不市惠而澤無不渥匝嵗之內都人戴之如慈父母顧勞苦積鬱結轖于中忽食次疾作竟不起康熙二十八年五月二十六日也距生順治四年十一月初七日享年僅四十有三公生平以氣節自許不肯詭隨徇俗每大廷集議意有不合輒用兩議上請事主以誠交友以信接士以謙御下以禮雖忌者亦傾心折服而持已亷潔尤出天性尹京時一屬吏鄉産茶親賫餽公溫語慰謝之固請終不受其人歎息而去比卒家無餘儲不能具含斂戚友咸悲感致賻而遼之士民奔走號泣如喪私親所在醵錢設像爭為祠以祀公嗚呼使天不靳以年俾得竟其用其所設施當益焜耀而竟止于此是可悼也元配張氏總督福建兵部尚書諱朝璘女繼白氏總督三省兵部尚書諱秉貞女俱贈封淑人又繼克爾德氏兵部掌印郎中諱卜書庫女封淑人子二長瀚次淳女一適廣東雷亷道僉事藺公諱一元子候補筆帖式梓銘曰醫閭峩峩遼水湯湯篤生碩哲實為國光崇論閎議在廷侃侃惟義是非或舒或卷為民請命有害必除苟利于物遑恤乃軀無負於國無忝所生為清白吏克保令名惟遼之左枌榆舊壤公之來也膏澤是仰惠則露濡威則霜肅公之逝也言歸不復窀穸其魄箕尾其神松楸蓊鬱百世如新文華殿大學士户部尚書掌翰林院事徐公神道碑公以康熙三十年閏七月庚辰終於崑山里第今年癸酉十二月某日卜葬公於某原唯是墓道之碑所以鐫勒功德者公伯兄司寇公以書來屬余謂余實與公遊最習不可以無辭余謝不敏久之乃為叙曰公諱元文字公肅别號立齊九世祖諱良自常熟遷崑山家焉有諱申者明𢎞治間官刑部主事因言壽寧侯事杖謫湖州府推官申之曾孫諱應聘萬歷癸丑進士歷官太僕少卿公曾祖也祖諱永美萬厯乙卯副貢父諱開法恩貢生皆以公貴贈資政大夫經筵講官都察院左都御史其後又以伯兄推恩皆贈至刑部尚書公兄弟四人而公行第三與伯兄司寇仲兄中允年相次家孰講論友愛秩如敦尚行誼厭時俗骫骳倡興古學一時海內知名之士莫不傾慕爭相依歸者順治甲午舉鄉試已亥進士第一人傳臚畢世祖召見乾清門諭以特簡之意還啓太皇太后曰今嵗得一佳狀元賜冠帶蟒服裘靴視舊典有加明日公率諸進士謝恩世祖為御殿百官陪列鴻臚讀表前此未有也除官翰林院修撰數被宣召嘗從幸南苑賜乘御馬命學士折公納庫為執鞚公辭以館師不敢乃改使侍衛又常晚對便殿夜分賜饌世祖問從者得無飢乎即使侍衛賜之食公賦詩紀恩一日同諸詞臣入見命撰孚齊說孚齊世祖所讀書處也公文成世祖獨覽之稱善而命刻行之一日擕公至僧忞蕉園方丈問以釋氏書公謝不習世祖亦不强之語曰此人大有見解狀元朕所親拔此朕一門生也忞及左右皆稽首賀及世祖賔天公哭臨獨哀嵗以國諱日齊居蔬食慘戚者終其身今上嗣位㑹江南奏銷案起坐罣誤謫鑾儀衛經歷逾四年事白復職假歸丁外艱己酉起補國史院修撰升祕書院侍讀陜西鄉試主考明年遷國子監祭酒充經筵講官公音吐宏亮閒雅方重進講稱㫖自是每遇經筵必命公講至登政府猶然公之在成均也慨學校廢弛毅然以師道自任疏請准順治間例令直省督學臣選拔諸生文行兼優者及復鄉試副榜貢生並起送入監以為如此則辟雍多經明行修之士而入粟之士亦將有所興起得㫖下部議行復請廣監生中式之額且力陳輸納之不可者有四章下所司納例自河工外得一切停止為祭酒四年學政大飭後公在西臺上語閣臣徐某為祭酒規條嚴肅滿洲子弟不率教者必加撻責至今猶畏之後來那得如此人其為上見思如此十三年甲寅進內閣學士兼禮部侍郎充太宗實録副總裁乙卯四月改翰林院掌院學士兼官如故尋充日講官起居注癸丑教習庶吉士中允方讀書史館公辭不許而特免中允教習公日與桐城今宗伯張公進講宏德殿敷陳凱切奉命屬諸詞臣分撰綱目講義公手自裁定及進呈疏有云伏祈聖聰時留省覽以此啓益睿知以此振厲精神則得之臣工之講論者淺而得之夙夜之體驗者深得之片言之㑹悟者微而得之一心之運用者大其隨事獻規發於誠愛多此類也丙辰充孝經衍義總裁武闈正主考是科武闈主考止改用二人值車駕方出封㫖留閣中曰朕自與一好主考及發視乃公也尋丁內艱歸已未二月服未禫特召監修明史學士充監修非故事也秋赴闕力辭不允因疏請購遺書徴遺獻舉堪纂修者七人部議不允上特從之時未有學士闕上特改內閣學士項景襄為兵部侍郎而用公公在內閣遇事敢言不肯媕婀隨俗上下九卿㑹推江西按察使有舉張仲舉者御史唐朝彛力言仲舉在閩無善狀科道公疏劾朝彛副都御史李仙根給事中李宗孔不願署名遂并勘之部議當兩人降級朝彛革職上曰此處分太過公奏㑹推本欲公之廷論今科道公疏必不許一人不列名者恐後來妄有抨擊隨聲附和流毒何窮上曰然當免處分公曰凡言免者謂有罪而聖恩獨寬之也臣以為三臣實未有罪聖㫖但云不必處分則所全多矣上然之言官有請遣大臣巡方者公曰巡方向遣御史以有內臺彈壓耳今遣大臣若妄作威福適足為地方之害上是其言罷不遣公感激上遇益思自披瀝每隨閣臣於上前陳奏上每問必具言本末務達已意乃止尤留意刑獄當秋決抱牘具陳所宜決宜留者及他所條對甚悉上多從焉超拜都察院左都御史入謝乾清門近待傳上語褒嘉且述講筵之勞賜御書墨蹟三又傳諭朕久不作書頃試筆得鳶飛魚躍四大字并以賜卿公頓首謝尋復充經筵講官值滇南將定公疏陳善後之宜以為與逆同惡者業許自新宜明布恩㫖悉為湔除應補職者量與換補緑旗職銜願補伍者量行撥補緑旗闕伍其他一槩散遣為民分道安插於事體為便又言滇南閩越所在橫罹藩虐占奪民利害政干紀宜及初定之辰申飭禁止在粵東者五曰鹽埠之害曰渡稅之害曰總店之害曰市舶之害曰漁課之害在閩地者四曰鹽稅之害曰報船之害曰冒擾驛夫之害曰牙行渡稅之害在滇南者四曰勳莊之害曰圈田之害曰礦厰之害曰兵多之害俱下九卿㑹議初御史劉安國請察隱占田畝州縣利其升敘多揑報纍民公力言其弊謂名為加糧實耗糧户名為清弊實長弊源臣訪得山西蒲縣本貧瘠前令揑報𣲖賠乃至庠生王命新曹大朋各賣其子女而廩生賈松年竟自鬻於平陽軍營夫婦執役又聞山東棲霞縣民亦因賠纍多致失業督撫既共欺妄於前須為之掩覆於後請明諭以從前之弊但行檢舉不復苛求若始終掩覆科罪有加上命確議以聞公謂安民在于察吏而察吏當自大吏始故條列督撫四弊特紏福建督臣姚啓聖諸不法事啓聖故縱恣至是得㫖惶恐上疏待罪得免又疏論課吏事定例凡捐納授官復職州縣到任三年後稱職者題升不稱職者參處是凡捐納之人分别具題皆當以三年為限今各督撫題參者概未之見至有受任四五年而紏舉不及莫能辨其賢不肖者謂非督撫之容徇不可也臣以為宜依限分别去留即行聞奏不得姑留不論不議之人以誤民生而滋奸弊又如户部條例道府以下捐銀者三年後免其具題照常升轉臣以為稱職非可捐納而得也嵗貢一項所謂正途自開捐納生員之例今日納生員明日即納嵗貢名則清流實多銅臭猶且自詡正途臣以為正途非可捐納而得也總之捐納事例皆屬一時權宜臣願於收復滇南之日即賜明㫖概輟不行則聖政一新而人心可以大快矣公自為祭酒時屢以捐納為言至是益切云雲南平告捷肆赦人情歡豫公獨上疏曰皇上睿謨逺慮決勝萬里數年以來諸叛削平古者聖人作易於泰之方盛即致艱貞之訓而豐豫既濟諸卦垂誡尤切臣愚惟願皇上於景運方新之㑹倍切堯咨舜警之心日慎一日以成保泰之治兼諭大小臣工乘此治定功成相與洗心滌慮毗贊大業如政體宜講也不妨詳考舊章國用宜節也不宜過加綜核行一事必謀逺久勿狃目前之淺圖為百姓必留有餘務培國家之元氣至於振紀綱以崇大體核名實以課吏功崇清議以定國是厲亷恥以正人心端教化以固治本抑營競以警官邪敦節儉以厚風俗正名分以絶奸萌並當今急務願存震動恪恭之意力去因循苟且之習天下幸甚疏將上有以太直為言者公不顧也嘗劾浙江副都統髙國相藐法害民得㫖察審又劾兩淮巡鹽御史堪泰罷之二十二年春大計時藩臬舉卓異者太多公上言舊例藩臬入覲雖許條奏地方事宜然僅由通政司投遞引見一次辭朝即行於述職之實猶為未盡請令面奏皇上親加咨訪庶可知其才具之優劣并以見督撫所舉當否上是公言至日親御乾清門科道官侍班通政司引藩臬官以次面奏著為令明年有詔藩臬勿舉卓異自公掌計典門不通謁常語人曰當考察時直省大吏皆長跪堂下自陳履歷其嚴重如此使少有所私豈不內愧于心耶舊例八旗漢軍文職官員任漢闕者丁憂任旗闕者不得丁憂又滿洲任督撫藩臬者俱守制如禮而京朝官三月後即出供職公謂宜一體丁憂以崇孝道且言外官丁憂候代之非並申士庶居喪釋服從吉之禁皆報可劾候補御史蕭鳴鳯居喪狎妓久不回旗坐革職提問是年冬㑹推湖北按察使連舉山東人上疑之問舉者為誰或以公對公默不與辨遂鐫三級解任將歸有詔留公專領史局故事監修官不與編纂公以置史局五年書尚未就乃取各儒臣所著紀傳手自排纂通懷商榷丹黃常至夜分遂繕寫紀傳若干卷進呈上因問纂修事宜公條對甚悉上注視公良久既而開館纂修一統志曰此事須徐家兄弟為之於是公久為副總裁二十七年二月尚書公自左都御史遷刑部上難其代久之不補七月復還公故官兄弟相代受職人咸以為榮入臺一月四上疏一申敕臺網舊例漢御史設有建言牌以次輪傳牌到逾半月必有建白今請如例舉行一論以白糖鹿皮興販臺灣為失國體一論吏部知府闕多吏部挨延不補一劾兩淮巡鹽御史陶式玉貪墨事多施行而式玉竟抵罪十二月遷尚書刑部旋改户部四月之間驟歷三遷人知上意將大用公矣公以户部吏胥為天下奸藪乃嚴立條約各衙門文到日錢糧應核算者即與核算應放支者即與放支一不假手吏胥公蒞事精敏操守清潔滿漢司皆懾服吏奸益無措手又諭十四司有事應說堂者須滿漢同時說堂便相商榷斥逐各衙門役滿書吏即召募試補部中數十年積弊一時肅清奉命與滿洲大臣清理刑獄定例死罪減等者安插內地前此輒發遣烏龍江多不能存活公請仍照舊例發遣冀推廣上恩上可其奏二十八年五月拜文華殿大學士公以在部振刷方有次第即詣乾清門力辭上不允尋命兼掌翰林院事充政治典訓平定三逆方略一統志總裁官二十九年春公前所薦用御史李時謙條對失㫖自引咎降二級留任時謙得不坐公素無病自留任史局殫精纂輯氣數逆微喘及入閣領翰林機務殷繁未四鼓趨朝退即入院夜深猶不得寤坐是精力益減性剛不能自挫屈忍辱苟安欲引退者數矣㑹兩江總督有疏劾公公具疏辨力求去上允公以原官致仕即日辭朝輕舟沿河下臨清𣙜關者𨽻卒數十人登舟大索雖夫人舟中醬瓿之屬無不發視僅得圖書若干卷及光祿饌金三百兩而已皆嘖嘖嘆清官不置是時公方倚舷作述歸賦以自廣然不堪摧辱氣益逆上喀血久不止歸不終嵗竟卒年五十八嵗公受知世祖章皇帝始釋褐年少耳便有天下為己任之意及遭今上委畀之重誓捐軀命蹇蹇竭忠不為利害禍福毫髮計兩總內臺凡事關八旗者人多畏避囁嚅公必持之益力將軍馬哈達以民間多匿逃人請自勾攝不移有司公曰如此則以窩逃為名輾轉折害民將不堪滿大臣曰當令將軍㑹同督撫行之公曰如此則仍將軍為政若令督撫㑹同將軍猶可上以公言為是極言京師奸民窩販民間兒女官吏用印預給空契之弊乞令正印官將本人親驗明白然後給契如此則窮民不致終罹陷穽八旗家人投水自縊刑部報聞者一嵗中及千人公請下部議詳驗其有傷㾗及一家中前後積至三人者酌定處分府部院寺筆帖式近三千人求開例捐納典州縣公不可大臣難之公曰諸公既不以為然吾當獨為一議不以相纍也卒從公議而罷其以京察大計處分者規欲還職議亦不行既罷議侍郎項景襄留揖公曰微公則選人無復入仕之望矣晚年官逾貴常戚戚如有憂者聞一正人進或朝廷行一善政則喜形于色人率以是覘之內行修潔苞苴問遺之使無及門者遇家人嚴整退食之暇匡坐讀書而已積書萬卷皆手自校讐卷帙率精好喜與後進常若不及與客議論古今終日無狎言侮色而門無雜賔晏如也處尚書中允伯仲間雖極盡和愛之道然恆以道義相規切故其兄弟皆致通顯而海內之推重者以其文章風節不以其門閥之貴重也撫季弟某於弱齡陸氏姊亡養其子經逺為己子俱有成名從父官汀州推官公往迎其喪時有願奉二千金求一見者公曰吾以叔父喪來而受金可乎卒不往公年才弱冠巍科起家承兩朝知遇可謂盛矣而中間數經憂患或起或仆終預大政退不旋踵公嘗自言吾在機密未得稍展反不能發舒如户部時至於謡諑橫搆齎志長往維皇上知公之深明良之遇千載一時而同朝士大夫未嘗不嘆其賢而惜其年之未究也悲夫公所為詩文有漢魏風致集若干卷藏于家元配湯誥封夫人子二樹聲太學生樹本舉人孫一德符銘曰於維章皇執道之紀天網聿張濟濟多士有美徐公翩然其來聲中宫徴鳴時雍熙揚歷兩朝斯文杓柄掌內外制芒寒色正公司成均名流雲集席間函丈教條斯立乃長西臺不振于威不顧其私秉德不回暨暨其容詻詻其辨紏違斥邪百辟為憲道有屈伸既張而弛史局之監爰自承㫖皇曰公退無以公歸五年鉛槧闡幽顯微帝紀繕寫臣某恭進天顔溫霽載承明問曰朕亞相唯女克諧弟與兄代邦之榮懷浹嵗三遷秋官司農唯彼司農弊政是叢攘之剔之狐鼠屏迹釐之革之百廢其易帝嘉乃績其遂弼豫朝士相賀民慶于閭厥猷未展遽自引退宸眷躊躇久而後遂蹇修忍詬自古所嘆公遭明聖非久考槃天不憗遺而以公殞年不稱德痛寧可忍豈其剛彊抑有未忘哲人之萎流星煌煌遺愛在人歷時論定篆石于墓恭候後命張文貞集卷九
