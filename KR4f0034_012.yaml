body:
  text: 張文貞集卷十二大學士張玉書撰海寧陳仲升墓志銘東南世家舊族以科名文章德業著聞于時者海昌之陳為最盛陳之先齊髙傒後也自宋修撰文端公世英始由汴入浙數傳至諒遷海寧諒生榮始䝉母姓以陳為氏至明萬厯間由贈尚書風山公而下簪纓相望不絶有不發于身者其子若孫輒躋通顯蓋百餘年于兹先生諱之閶字仲升别字希亮風山之曾孫也風山之子四人次為貴州參政諱與相參政子五人最少為贈兵馬指揮諱元成是為先生之父先生幼失怙事毋顔太安人至孝束髮受書刻自淬厲既補邑諸生文譽籍甚順治二年以明經入國雍時國家方不次用人朝士大夫皆屬先生留京師以需仕進先生顧念兵燹甫定太安人未遑寧處亟歸與兄近思暨弟始升僦居奉母日攻舉子業數試有司不遇遂棄去曰吾父第五之名不減諸伯父吾寧以一第重耶後以恩例題授兵馬正指揮且請貤封所以曲承太安人之志也先生性儉約樂施豫常節縮衣食以為振貧恤困之需如施贈賑粟給槥掩胔收流移贖鬻子諸事見義必為無已怨亦無諾責又倡議自春至夏東作方始凡農家以物投質者概不責息里閈咸頌義焉生平立身制行以不欺人已為本精研通書西銘皇極經世諸書尋繹至理試諸日用私居危坐竟日倦不跛倚暑不岸幘與人交無少長敬禮如一遇事剖决是非言曲而中聞者皆恱服夫士君子學無原本則行無根柢行誼之不修樂善之不篤而欲其忠厚惻怛之意油然以生者鮮矣先生不為煦煦之仁孑孑之義踐履篤實強恕力行故施德而不近名如此先儒有言一命之士苟心存于利物則于世必有所濟由先生行事觀之雖匹夫可為也又奚俟于一命哉先生之生以明萬厯戊午十一月二十二日卒以康熙二十一年三月十三日年六十有五配沈氏敕封安人先生艱于舉子年六十告于家廟以近思先生次子詵為嗣詵壬子舉人授中書科中書舍人御試擢吏科給事中孫六人世俊貢生世儼世仁俱庠生世倌世侃俱幼詵居諫垣一載以沈安人春秋髙乞養瀕行顧余言曰詵幸邀國恩歸里將毋而竊痛先君子未逮一日之養也兹將營葬秦駐塢之原願得一言勒諸墓石以慰先君子于地下余獲交于陳氏者三世矣給事居京師數相過從宫諭謝浮給事兄也又與余同舉于辛丑知先生事為詳遂詮次來狀而為之銘曰髙閎奕奕槐棘參錯獨抱遺經志不隕穫肴仁核義白首弗渝黽勉好施井里霑濡如玉韞輝德豐遇嗇厥嗣熾昌令聞無極我銘貞石貽信後昆堂耶斧耶百世永存敕封文林郎户科給事中勿齊孫公墓志曩余遊泰岱經歷下入京師取道般陽距郭十里許有村屋叢深蓊翳山環水互目不能窮其際既而髙侍郎念東唐檢討濟武相遇于城隅精舍因指所過為勿齊孫先生居第且曰先生年逾七十方瞳白髮履健而齒完望之若神仙中人余聞而太息以行急不及造先生之廬為恨越數年先生長公樹百擢諫垣余與樹百為同年友晨夕相過從具知先生飲食起居無恙今年春哀問忽至班行聞者無不相顧隕涕樹百歸數月將以九月某日卜葬于某鄉某原遣使乞墓石之文于余不敢辭因就所為狀損益之而為之志按狀先生諱克己字禮寰勿齊其號也世居棗强自明初徙淄川代有聞人先生父諱某幼嗜莊列諸書曠達不喜仕進先生生而器質凝重既長惇篤尚大節孝弟力田以養親志家人米鹽凌雜之事悉區畫中理母夫人性嚴重先生奉事惟謹間被譴訶則容益婉色益愈既遭兩艱哀毁骨立家計雖中落而營度奠祭窀穸惟力是視察弟意欲析箸擇田廬之善者推豫之弟不習治生久而益匱復引與同居贍給衣廪教其諸子以有成從兄弟三人貧不自振曲護之俾無失業其友愛如此樹百之初舉進士也先生無喜色曰作吏甚難吾方謂憂自兹始耳筮仕得揚之寶應㑹淮水大漲繼以風雨堤盡决居人廬舍汨水中者數十里相望樹百請于上官權宜賑恤民賴以蘇先生時從里中至官舍顧謂樹百曰向云作吏難今言驗矣然不曠職若此復何憂樹百以治行異等召赴京師過家遘疾先生曰叔敖毋知叔敖不死汝賑活人衆不足抵殺蛇德耶疾既愈又曰異日為言官宜利國家勿輕彈劾康熙十九年樹百補户科給事中念秦人轉餉餽粟之艱首請蠲免額稅詔從其言先生聞之欣然色動明年樹百典閩試又寓書以識拔單寒為務既蕆事得人稱最是冬遇覃恩先生受封如子官樹百長身玉立風裁嶽嶽不屑詭隨從人而先生之教以道律身以公報國父子間家庭燕語造次不離乎是此樹百立朝直聲所由翕然聞于中外者歟先生素不稱疾甲子元日顧謂諸子弟曰余年八十有一陽九之數極矣未知來嵗存殁聚散復當如何越日乘肩輿循覽舊遊地幾遍又越三日諸子弟方侍側忽氣息微喘灑然而逝康熙二十三年正月五日也夫白首耆艾束身修行之士在鄉為祭酒在國為老成人雖身不見用而風流宏長足以亷頑立懦惇本而厚俗况未竟之志施于其子其澤寧有艾乎是可云不朽也已元配安氏贈孺人繼張氏封孺人子二長即樹百名蕙辛丑進士户科掌印給事中娶韓氏贈孺人繼趙氏封孺人次藥候選州同知娶張氏女一適庠生王觀政俱張孺人出孫二一斯鉦聘庠生韓靜闕誥授朝議大夫浙江分巡寧紹道按察使司僉事陳君墓志銘國家用一人則思盡其才以收任事之效乃嚮用方始而中道闋折曾不克展其措施之什一此有志用世者所以感憤扼腕歎惜者也陳君諱光祖字順侯為刑部郎時與余交每與言洞肌擘理指畫事之原委甚悉及余長西曹君已遷户部有述君平反姚李爭産之獄者李利姚之産强聘其女比姚訟之急則獻其産于權要以求勝君獨持不可卒正李罪余益歎君之才可以寄大任逮出而分巡寧紹甫及六月竟遘疾不起是則可悲也矣按狀陳先世居上虞明正統中始遷㑹稽君祖諱應瑞由丹徒丞入仕某王府某官遂占籍大興考諱宏儒順治甲午領武鄉薦逰粵西以才為制府所知召署督標參將兼攝富川縣事比疏請實授未拜命而卒後以君貴贈奉直大夫刑部江西司員外郎方奉直之入粵也君甫冠奉直為君娶于王而後行君挈幼弟及女弟依王氏以居兩姓並釡而炊十餘年無間言亦近世所罕見君念奉直負竒氣無所成就刻志讀書思以科名顯癸邜舉順天鄉試連上公車不第將省覲入富川而奉直訃至急迎喪歸京師服闋謁選康熙十七年授內閣中書又二年遷刑部廣西司主事明年進江西司員外參定律例又明年遷户部陜西司郎中同修㑹典㑹廣西布政使奏大吏侵冒軍餉十餘萬計詔遣曹郎亷慎有幹略者按其事君往鞫驗得實籍其數以聞聲譽籍甚道拜浙江按察使僉事分巡寧紹道既至剔蠧鋤强具有次第而海關初設所以參酌課額為商民利者尤溥時舟山已𨽻版籍顧灌莽未刜幾成廢土君觸駭浪相視島嶴形勝曰此江浙之屏障而閩粵之聲援也非築陴樹壘不足以壯戍守上議諸大吏聞者韙之後越數年詔繕城堞駐重鎮且建邑置吏以撫綏新附人咸服君之先見云君涖事僅半歲而所建樹卓犖如此甚矣君之勇于任事而克勤于其官也康熙二十四年正月二十一日以積勞卒于官舍年僅四十有五配王氏纍封恭人以二十九年五月二日卒年四十有六恭人有淑德方君在京師賔客雜還恭人治中饋惟謹君殁有棄置如路人者恭人日夜朂幼子成立每言及輒為垂涕君初欲歸越未果恭人獨奉君喪並君祖考喪皆反葬㑹稽城東賀家池新阡以成君志令子範卜以康熙三十年十一月日奉恭人喪祔葬亦成恭人之志也子二人長佶庠生早卒娶羅氏順慶知府京之女次即範候選府同知娶陶氏戊辰進士元淳之女女三一適候選知縣王英謀一字太學生胡衣德一未字孫一文謨幼範出範將自京師東歸乞銘于余銘曰少而履約長而守雌厲志入仕擇義而為目營四海不受紲羈材未究試忽壅厥施所至樹績歿有遺思魂兮歸來墨食在兹誥授奉政大夫太僕寺少卿荆湖楊公墓志銘太僕少卿荆門楊公以康熙己巳夏四月請假旋里行甫三日而卒其子育健等扶櫬以歸越五旬同里翰林檢討胡君謁余曰太僕喪歸卜葬且有日若徼大惠豫之志若銘太僕死且不朽余與太僕同舉進士是時太僕年甫二十有四揚歷中外至今官方將冀其大用而太僕遽遘疾已矣是可悲也余雅知太僕生平于其幽宫之石安可以不文辭于是核實而謹志之据狀公諱佐國字于常號荆湖先世居江西有諱植者徙居荆門州之後港遂𨽻籍焉五傳而至庠生煥斗字兆麟公父也中己卯副榜未仕用子貴誥贈奉政大夫毋唐贈宜人奉政公生三子而太僕居長仲佐治早卒季佐慶太僕早慧讀書目數行下受經里中知名士萬璧正弱冠補郡諸生順治庚子偕璧正舉于鄉辛丑成進士知陜西之咸寧縣當是時公以少年筮仕為令慨然欲以功名自見遇事剸割案無滯牘上官以為能㑹大兵雲集軍需旁午羽檄至守倉卒屬令夕至則旦以應旦至則日中以應守大倚任之而公又時時察地方興革便宜奏記大中丞杭公凡所條列輒報可于是杭公偕制府阿公交章以治行卓異聞于朝論者僉以為允壬子鄉試分校庶常王君吉相浙江布政使馬君如龍泰寧令王君篤祐皆所識拔士也尋知商州商為秦蜀孔道大將軍開幕府州民供億良苦公下車即以均徭役為先務酌贏劑縮人無怨咨以是軍興奏辦常為諸路最暇則嚴保甲勸農桑修廟學養老課士以次興舉越二年商大治乙邜擢刑部四川司員外郎壬戌廣西補行鄉試公奉命充主考得人視陜尤盛復命進禮部精膳郎中時萊陽沙公為宗伯余承乏佐部務晨夕與共事相倚如左右手膳司事稍簡而公孳孳討論掌故連類穿貫凡郊廟朝饗以及選舉賓貢諸務無不綜考其源流而辨晰其異同曰沗為禮官不敢不周知也廣東驛鹽巡道闕人公以賢能拜命往語家人曰昔晉吳隱之為廣州刺史賦貪泉以自勵比其反也妻劉取沈香一片隱之命投諸江唐李勉節度嶺南以亷謹率屬舟行摉從人所畜投之水曰毋令隱之笑我今驛鹽職固易稱所重者清操耳及至勾稽簡核􅊏毫悉歸公帑吏唯抱牘而已公餘猶雒誦課子研經校史丹鉛錯互丙夜篝燈達曙雅好士士秀而文者資以薪粲為開𨗳指授多所成就攝臬篆者再遇疑獄輒愀然有憂色所平反甚衆比內擢京卿粵人遮道攀轅百里外猶有拏舟㑹送者戊辰春以需次暫還荆門明年二月補鴻臚寺少卿未幾轉光祿遷通政司右參議尋擢太僕寺少卿以邸舍湫濕中腰股不能視事旋請休沐歸士大夫咸謂太僕年始服官政其疾在肢體藥當愈愈且還職而太僕竟以是疾終也悲夫太僕內行甚篤仲遺子孤拊而誨之訖于成立課季學嚴而有法宗族鄰里有緩急解槖􅋔救之唯恐後持論嶄嶄不阿徇其于佛老之徒辭而闢之斷如也嗚呼古人之重質行將以有為也充太僕之學可以大有為其行事之可見者未宜止此不幸限于年然即此亦可無愧于古人矣公生前明崇禎十一年戊寅十月初八日卒于康熙二十八年己巳四月二十六日享年五十有二歷膺覃恩誥授奉政大夫元配萬氏贈宜人繼娶唐氏封宜人子四人長育健唐宜人出荆州府長陽縣學廪生娶嚴氏次育元側室李氏出州庠生聘張氏次育厚側室周氏出聘萬氏次育真唐宜人出幼未聘女二人長適庠生徐某次適太學生田萟瑜俱萬宜人出育健等將以某年月日葬公于某山向余既志其行而復綴之以銘曰山嶒嶒蒼以矗也泉渟渟冽以澓也藏于斯楊太僕也豆俎馨年世卜也勒兹銘貞地軸也宜爾子孫綏百福也誥授通議大夫內閣學士兼禮部侍郎加一級田公墓志銘公諱喜􅀢字子湄一字望西先世居山西之豐州後徙馬邑越數世而公之髙祖諱彭中明成化進士官陜西布政使田氏乃大顯曾祖諱世芳太谷縣教諭祖諱嘉種考諱大稔以公貴俱贈如公官公年十九舉于鄉越十年以順治辛丑成進士改庶吉士丁外艱服除補原官授祕書院檢討充丁未㑹試同考官纂修世祖章皇帝實録成加一級升國子監司業司經局洗馬充兩朝聖訓纂修官以閣臣薦升左春坊左庶子翰林院侍講學士轉侍讀學士奉命充政治典訓纂修官日講官起居注進詹事府少詹事內閣學士兼禮部侍郎丁內艱服除補原官以病請假明年卒于家公少負才名自初登第列官于朝三十餘年皆以文章人品上結主知在史館校讎編纂所任獨多上雅重文學嘗親試諸臣定甲乙惟公所撰著屢當上㫖瀛臺泛舟柏梁高宴賡歌頌述詞林傳為美談而公掞藻抒華深荷嘉許文綺彩幣之賜至再至三被恩亦最渥公感激知遇恪謹自持分校禮闈所得皆寒畯秀拔之士溧陽史君鶴齡其尤著者也教國子生日有課月有程孳孳以通經學古相鼓勵凡經奬進提掖後皆為顯人性簡靜不隨俯仰既參機務尤砥清節門無私謁上于入奏時每特加眷注以老成凝重可以畀大任而惜乎止于此也居家以孝友稱太夫人壽期頥而殁公年已六十矣猶為孺子泣撫孤姪子女六人婚嫁皆以禮又捐金修馬邑城周恤黨序之貧乏贖鄉里之鬻身不能歸者數人其仁而及物類此生某年某月日卒于某年某月日年六十有三娶符氏繼娶羅氏皆先公卒子四人邵植例監生邵茁拔貢生官學教習邵栗邵秀女三人一適廪生劉杲一適戊辰進士梧州府同知馮壅一適太學生霍焞孫男二人公卒後二年㑹車駕西征過馬邑士民環跪郭外上停轡問孰為田學士喜􅀢之子時諸子皆在班次各以名對詔邵茁乘騎隨行問爾父葬否爾等生産如何讀書如何邵茁一一陳奏上咨嘆久之乃遣還夫以侍臣身歿之後聖恩惓注優及其後人儼如家人父子可不謂曠世希遇矣乎兹邵植兄弟將以某年月日葬公于某原以余與公同年同官且親見乘輿臨問之事也來請銘銘曰維田氏著馬邑顯于公文有立三十年官禁密位不滿德無所施後千斯年徵刻辭誥授奉直大夫翰林院侍讀學士顧太公墓志銘康熙二十九年春余與伊在侍郎同官禮部聞其一門以內五世聚順嘆為海內衣冠盛事一日訃自南至余驚往問故則伊在噭然而悲曰嗚呼何天降禍之酷也吾父事王毋至孝今年王毋唐八十有七齡矣不幸遘疾不起比入殮吾父慿棺躃踊長號失聲聲盡而氣隨絶嗚呼自朝及夕兩羅大戚不孝孤曾不得親視飯含逮今踰月而始承凶問于數千里外真罪通于天矣時余偕吳門諸君相顧隕涕為考据舊聞酌行兩喪之禮以紓伊在之哀伊在歸期年卜葬奉直先生日月有期矣屬為文志墓余無以辭也按狀顧氏世為吳人明初有以軍功授錦衣千户者因並占北籍先生祖諱應奎有隱德考諱諟明以國學生藴負經濟從倪鴻寶黃石齊諸公游生二子長即先生諱元朗字開一雪嵋其號也性警敏讀書數行俱下甫冠即有聲諸生間舉順治丙戌副榜庚子肄業國雍㑹功令以上舍生為官學教習先生首與其選講習督課嚴而有序凡經先生指授皆摳衣奉席有應對進退周旋孫讓之節嵗乙酉伊在以北籍舉京兆先生遂不復應制舉雖官學事竣需次為令亦非先生志也杜門雒誦益肆力于經史曰讀書不手録無益篝燈細楷充溢篋衍于易春秋皆有纂述尤究心禮書所著有三禮集解大㫖以朱子與吕東萊商訂三禮篇次未及成書晚年編校儀禮經傳復與初論少異而喪祭二禮則屬黃勉齊成之其規模次第悉仍朱子所授自是禮書之義類始秩然具有條貫而他經傳及諸書講說禮文者朱子初欲編集别為一書後皆以類採入且深取杜氏通典五禮諸議並欲以後世之禮附載禮書之後蓋編類主于存古而存古之意又期于今可施行非疏通證明縷析而穿貫之無以適于世用先生博稽旁採裒古今諸家論說彚注于傳記之下以偹參考是集解之作即朱子編集經傳欲附載後世禮制以彚成一書之微旨也其雜著則有燕遊草吟碧集俱藏于家伊在官翰林十六年屢遇覃恩纍封先生奉直大夫翰林院侍讀學士先生淡泊寡營公府召集足跡罕至湯潛庵撫吳稱先生如雲中之鶴可望而不可近其推重如此竊嘗謂先生行履髙潔學問淹雅以是吳中先輩當在王履吉湯子重諸公之間而天性篤摯動止以禮卒能死于孝為尤可傳也先生之殁在康熙二十九年庚午二月二日距生甲子正月年六十有七葬以某年某月某日墓在某鄉之原配陶氏誥封宜人文學景文公女子五人長汧即伊在癸丑進士由庶吉士歷官禮部右侍郎兼翰林院學士次沅例監生次溥貢生官學教習次浤例監生娶皆舊族次澧幼女三人一適侯選州同茅秉忠前卒一適例監生孟亮寅一適庠生李鏌孫四人楷仁丁邜舉人植義監生俱汧出乘智溥出柟讓浤出孫女五人曾孫一人文渙楷仁出曾孫女三人銘曰吳有碩儒人倫矜式幽巖白屋遊觀道域厥嗣既昌遂戢乃翼獨抱遺經以纂以述薅刈繁蕪穿穴閫閾擇禮而蹈如車須軾壽母在堂耋齡已陟嬰兒嬉戲篤老彌力臨喪長號一慟斯踣竟殞厥身至性靡匹我銘新阡大書深刻式告來者敬兹孝德誥授光祿大夫少傅兼太子太傅昭武將軍提督江南總兵官三等阿達哈哈畨諡敏壯楊公墓志銘昭武將軍少保兼太子太保提督江南楊公以康熙二十九年十月甲申卒于位年七十有四訃聞天子震悼命所司議恤議諡既上詔加贈少傅兼太子太傅易名敏壯祭葬如制而碑版之文特命翰林掌院事桐城張公撰進榮恩偹禮踰于常格何其渥也惟公自束髮承祖父之烈從事軍旅當世祖章皇帝入關定鼎公年未三十即以武略知名于時歷官四十餘年身經數十戰所向輒克比為大帥而威望益重以功名終非才與福并不克有此嗚呼豈偶然之故哉楊之先世居揚州之寶應縣崇儉鄉勝國時有以軍功授後屯衛指揮使者遂為義州人公諱捷字元凱曾祖諱子隆祖諱應元皆襲世職父諱國棟以軍功歷升義州城守參將加副總兵母趙氏義州圍急自經死曾祖以下皆贈少保如公官妣皆贈夫人而公之叔父國楨國柱兄振並用邉將立功國柱振又先後死事稱名臣此公之世次也公明末依洪文襄為偏將國初以材勇擢山西撫標逰擊歷宣大督標中軍副將九江總兵官加右都督以平嶺南功進左都督提督江西加太子少保調山東江南福建加少保兼太子太保昭武將軍授三等阿達哈哈畨復調江南此公之官秩也方順治五年春公以副將統精鋭赴粵㑹金聲桓叛兩江騷動公留軍討逆與固山額真談公泰㑹師恢復彭澤湖口九江南康諸郡諸大帥見公驍勇大竒之遂題鎮九江明年逆賊授首江西平至十年秋復統九江鎮兵入粵克潮州十一年冬征閩駐師漳浦其城為賊毁修築之十六年春奉命提督江西是夏海寇犯江寧詔公同江南左路兵相機撲勦事平仍駐瓜州轄廬鳯淮揚諸汛康熙元年正月移節山東㑹于七溝亂登萊幾不守公偕禁旅摉剪賊黨又以登沂二鎮分轄諸路兵畫地戍防羣盜始戢駐東省凡十二年詔移江南甫受事而三逆變作浙溫台陷勢張甚有議設䝉古兵于松江者公不可曰閩逆易與耳不日即成擒矣至十六年閩逆已殄而海氛助虐者尚熾特命公入閩提督水陸軍務公至簡閲士卒疾救漳泉屬邑之被賊者察諸鎮中惟黃福寧大來敢戰可任乃親帥鎮兵㑹禁旅合攻惠安拔其城賊踞洛陽橋北斷橋以拒官軍公隂遣竒兵襲毁賊營出橋南賊腹背受敵遂潰泉州圍解而水師鎮協又先奉公密令于外洋牽賊勢至是犁沉賊舟殱勦甚衆漳州賊請撫衆議持兩端公登赤嶺望賊壘整暇謂此款我師也决計進軍皆敗走公以水陸勢難兼顧屢控辭水師至十八年始拜昭武將軍命專提陸師勦逆十九年賊屯漸山立十九寨公以計建七營擊破之遂復海澄自是僞將接踵歸附即遣為鄉𨗳用三路攻克厦門雖臺灣未下而賊豎已膽落不復支矣公在行間兩載觸冒瘴霧抗疏乞身而廟堂深悉閩地蒸濕與公病非宜已先有還鎮江表之命公既至雲間念舟山猶被賊踞為江浙隱憂咨制府于清端公同浙兵㑹搗賊巢略定其地于是設鎮置縣弛海禁焉公之逺謀制勝多在籌海而閩海既靖則吳越千餘里帖然無復烽燧之警故公之功平閩為尤烈也嵗當甲子天子修時巡之典自岱宗達于江淮公迎駕淮北恩禮殊異越五載乘輿再狩公迎覲如初而慰勞之殷賚豫之盛視昔有加時余亦沗扈從嘗與公並騎行竊覩公顧盼矍鑠冠劍甚偉及沿江而下公獨乘小艇擕兩健卒宴坐于驚風白浪之中一時豐鎬舊勳咸指目歎羡余因舉昔人詩所云精神如破貝州時者謂公庶幾似之乃甫閲一載而公遽逝是可哀也已公之既疾革也召諸孫侍側口授遺疏惓惓以修海塘築寶山城復邉海沙船及沠支軍食為言蓋公所至之地有利必興有弊必革兵民無岐視而尤務施德澤于民易簀之頃志存體國語不及私以視古大臣之用心寧有愧哉公內行淳偹撫孤嫠振貧困事至周悉載余前撰柏夫人志中兹不偹書夫人塔山參將諱永培女公元配也纍封一品夫人子三人皆以廕起家懋緒陜西布政使司參議分守潼關道次懋紹雲南武定府知府柏夫人出次懋綸河南按察司僉事分巡大名道先公兩月卒側室黃出娶皆右族孫六人長鑄次文鐸俱國學生次錡次文孫懋紹出次鉞國學生次鎮俱懋綸出孫女七人曾孫女二人懋緒懋紹將奉公喪以康熙三十一年九月辛巳葬六合縣某山之麓以余知公深屬為志特纂公行事之大者而叙録之如此銘曰穆如其容大河喬嶽淵然其器金鎔玉琢手提鵲印口畫軍機若觿解結如犀燭微繄昔東南天戈所指兩江百粵覩公遺壘閩嶠焰虐長鯨鬐張聿剪羣醜用綏海疆迄還舊履作屏江表貔貅桓桓虎臣矯矯南巡迎謁帝親勞軍蕃錫燕飲式渥且殷吁嗟老成允倚坐鎮將星倐隕殊恩弗靳天章崇奬賜塋巋然貽厥孫子世澤永綿禮部精膳清吏司郎中董園李君墓志銘康熙三十年正月戊申禮部精膳司郎中董園李君以疾卒于里第明年十一月庚申子司務廷徵卜葬君于某鄉某里之原先期屬余志墓余與君偕舉順治辛丑而未同曺署不能悉君行事左通政鄢陵常公為余言君制行篤誠居官勤恪敏于學達于當世之務不為矯激詭異之行而卓然有以自振于流俗是不可無傳于後余謹損益所為狀而叙之按君諱孔嘉字仲淑號董園世居河間之景州高曾以上務農力穡而未有顯人祖考諱繼賢始以儒著考諱化龍益奮其學于孤貧之中弱冠為諸生以博洽聞生三子皆有文譽君其仲也君誕之夕有緋衣入夢之祥幼禀異質讀書數行俱下年十三學使者金沙吳公履中竒其才拔以冠多士中順治辛卯鄉試辛丑舉于禮部康熙甲辰成進士需次十二年授內閣撰文中書舍人得以文章著作見于館閣居八年遷户部雲南司主事典山東甲子鄉試得士最盛督右翼興平倉京城八倉夙名弊藪狡獪黠吏相倚為囊槖以隂牟私利而司庾者輒用失察坐纍君至窮極其根株立置數人于法著為潔令而奸無所容尚書科公稱以為能進江西司員外郎君勾考所司賦籍盈絀欲奏除南昌府屬浮糧之為民害者草已具而格于衆議不果行然猶力豁灾傷逋缺及軍興時有司供億無名之費蓋立心平恕寬厚往往類此使君得行其志其為利于民生吏道豈特一州一郡之食其德焉已哉遷禮部為精膳司郎中以諳習典制為同寮所重㑹集議孝莊文皇后喪禮本朝無故事可考而史册所載復多未合君為參酌定議繁約中禮宗伯深倚任焉旋以積勤中疾請急歸逾年病益增劇遂不起距生前戊辰五月享年六十有四君天性孝友平居竭誠奉養執兩喪盡哀葬祭悉依古禮撫弟之孤子廷亮如己出廷亮通判衡州卒于官君哭之過時而悲其賙恤三黨黽勉不倦奬掖後進俾為聞人尤為人所難著經世書籌倉管見司庾草清暉堂集各若干卷配李氏封安人子一即廷徵刑部司務女二一適國學生曹懷袒一適庠生劉相協孫男五肇昌考授州同覲曾監生出嗣紹曾殤麟曾模曾俱幼曾孫二添慶衍慶俱肇曾出銘曰猗歟廣川董相之里明道正誼百世興起英俊挺生鬱若豐芑回翔郎曹砥節自矢如淵斯渟如嶽斯峙膏潤弗究典型頓委根深葉沃令嗣趾美我銘幽竁竊附惇史誥授光祿大夫太子太傅加太子太師禮部尚書保和殿大學士諡文端公墓志銘太子太師保和殿大學士寶坻杜公在政府十有四年豫告歸里越十年為康熙辛未春秋八十有一以六月八日薨于里第遺表至天子知公已逝不待有司陳奏即降旨褒憫諭祭加等葬如制及禮臣以易名典請又召九卿等詢公立身服官本末僉言故大學士某持已正直奉職清勤有古大臣風上以諸臣言是豫諡曰文端比詞臣撰賜碑文進又仰厪睿裁增易至再寵恤之渥為近代所未有公性沉默寡言笑奏對之頃應聲而出不茍為異同方逆寇初殄國家將按行誅罰衆議未决公侃侃陳于御前辭氣激切上嘗述其語以示近臣謂能斷大事夫大臣致政日久且已身沒而天子追憶其言論風采咨嗟嘉歎不置非始終一節以忠誠上結主知何以致此初玉書待罪記注夙欽公行誼及為學士復侍公于政府比承乏從閣臣後方欲就公考質故事以奉為典型而公逝矣公子員外郎恭俊既以其年二月葬公梁城所之東原而以墓碑屬余銘余不能辭也謹按狀公諱立德字純一號敬修先世居鎮江之金壇縣明初諱敬者以靖難功授梁城所千户遂為通州寶坻縣人公舉前癸未進士順治二年世祖章皇帝定鼎燕京訪求遺彥宋文康公巡撫順天薦補中書科中書舍人尋考選户科給事中明年典浙省試稱得人錢塘黃文僖公與焉纍遷吏科都給事中公以開國規模宜崇尚經術而固結海內新附之心尤在寬恤民力使人皆樂業于是疏請開講筵端政本而繼以蠲荒稅禁加𣲖皆有禆于治理內擢太常寺少卿以井研胡公薦超拜工部侍郎未幾調兵部畿輔水奉詔分賑大名全活者甚衆還奏稱旨復調吏部㑹丁父憂去以在兵部時詿誤鐫秩一級補太僕寺卿轉大理尋為刑部侍郎越兩年加太子少保晉刑部尚書公斷獄平恕凡讞重辟屢易藁而後定即罪既當猶必求其可生之路或引輕比上請世祖章皇帝深知公明慎奏輒報可嵗辛丑皇上御極倚任老成以公歷著聲績調户部尚書公以錢糧分𨽻部寺條緒凌雜吏得因緣為奸定議總歸户部考成公私稱便康熙三年典㑹試是科改試䇿論得沈珩等百五十人冬調吏部丙午丁未之間銓法多所更變賴公秉法不撓均平酌劑仕路無壅滯焉八年四月曲沃衛文清公致政拜公內國史院大學士時天子初親大政庶績允釐公一意奉公恪守先帝成憲諸所施設務力持政體肅紀綱而要旨歸于和平惇大是年乾清宫成擇日臨御欽天監奏吉神在某方不宜從中門入公言紫微帝星所在諸吉神無不拱向皇上遷正新宫應從中門入監臣所奏非是上從公言明年改內三院為殿閣公為保和殿大學士兼禮部尚書十二年復典㑹試得韓菼等百五十人文體自是一變甲寅以後三逆相繼煽亂于時廟堂之上命將遣師常决計于俄頃之際或密授方略或宣諭招徠贊䇿草制悉閣臣是任惟公與李文勤公馮文毅公同時居政府實協心力以參機務而又從容整暇絶不示喜慍之色以故數年間羽書旁午而中外人心晏然若處無事十七年春天子方振興文教命羣臣引薦文學之士偹顧問公舉召宿曹溶等八人以應一日上顧閣臣謂在廷諸臣誰堪大用者公隨面疏數人比退或訝公不稍引嫌公曰自筮仕至今日惟此心不欺可邀聖鑒他非所計也十八年自陳請罷秋地震復請罷皆溫旨慰留二十年冬忽遘疾不能視事㑹滇逆蕩平將降德音加恩肆赦上以公未與議命玉書持詔欵就示公于邸第問所損益公頓首言皇上天地父母之心纎細具備臣愚更何臆議既還奏詔書始下明年正月上以武功耆定宴廷臣于內殿賦柏梁體詩因公在告特撤御筵上尊手詔賜公曰卿弼亮老臣久任機密端醇恪共勤慎素著兹海宇蕩平時當令序內殿賜宴羣臣念卿臥疾不克同此歡宴特遣中使慰問賜以醴饌卿其加餐珍攝以副朕惓惓至意至五月公疏乞致政詞益懇上不得已允公請詔給驛遣官護行比出國門復賜御製五言律詩一章及御書心經怡情洛社圖章以示優異二十六年冬太皇太后升遐公以明年春奔赴哭臨與馮文毅公同陛見上恐公不任拜起命學士張公英扶掖而行慰勞倍至既出復頒賜綺幣公自謝政後至是凡六年矣瀕行過余邸舍追述昔年共事之誼曰惟公知我握手繾綣若重有所屬者今日得據所見聞執筆書公隧道之石豈公之意固在是耶夫公立朝垂四十載枋政日久國家大典禮政事多屬公釐定若總裁實録聖訓玉牒相視山陵以及清理刑獄測驗厯法無一不與前後錫賚御書卷軸並黑狐紫貂金幣鞍馬嘉魚蓮藕之屬無一不偹主臣交得恩禮有終蓋至公而稱極盛而公之所以結主知膺殊遇者大抵清挺特立而不市矯激之名平易近人而不容依附之迹異時士大夫嘗以黨論相齟齬矣而公皭然而不滓門生故吏非不充斥朝列而公坦然而不私公之在位也不名一善及其釋位而去也人皆惄然以思今公既歿而天下屈指大人長德為一時模楷者必以公為首嗚呼此公所為不可及歟曾祖諱仁祖諱朝先父諱守禮皆以公貴贈如公官妣皆一品夫人元配王氏贈一品夫人先公卒後夫人王氏今尚在子男四人恭著副榜貢生次恭瑢恩廕生皆早卒次恭俊候補員外郎次恭瑃例監生女二一適吏部尚書張公士甄一適户部郎中李君其凝餘詳志中不載銘曰天翊景運宗臣篤生嶽嶽文端允為國楨頎然長身規言矩步穆如其容不吐不茹曰作耳目公才獨優勗乃忠順入告謀猷晉長秋官惟刑是恤片言平反五教用弼爰領度支九府就理爰陟統均八枋具舉有位式叙乃正台階尹實佐鼎說資和梅洊歷巖廊四十餘載赤心奉公白首靡改芒寒色正孤標絶倫陽煦春溫復與物親騶虞不殺威鳯不搏國有老成亷頑敦薄帝眷良弼重若蓍龜密語造膝决用不疑公屢引年遲久乃許宸章昭回以榮餞祖謝傅東山裴公緑野譬則景星光燭區夏惟公則壽宜躋期頥梁木忽折胡不愸遺哲人云亡帝心震悼哀誄載頒隆文示報朝堂集議易名孔嘉勑營堂斧東潞之涯掩靄松楸嶕嶢兆域妥宅于兹慶流無極誥授光祿大夫三等公䝉古都統佐領諾公墓志銘公諱諾敏姓馬氏世籍滿洲人太子太傅都統公吏部尚書中和殿大學士文襄圖公之子也母覺羅氏繼母胡祿氏贈封俱一品夫人祖諱穆哈達曾祖諱噶哈納皆以文襄公貴贈如其官妣皆贈夫人公生而器宇凝重外莊而內和稍長秉文襄公教練習庶務具有經緯筮仕三等侍衛歷進一等為壯大又為宜都額真夙夜在公克勤職業康熙十三年滇逆煽亂王師四征不庭公以署副都統偕大軍入楚進取滇黔在行間凡八載至二十年滇逆平班師在道㑹文襄公自漢中師旋以疾卒于京師里第上念公父子皆勤王事而文襄大功甫就遽爾殞逝又遲公不即至為軫惻者久之乃特詔公乘傳遄返公聞命見星而奔比届窀穸之期達于喪次黽勉營葬盡禮盡哀既襄事補散秩大臣是年襲封三等公仍管佐領適護軍統領闕人又命公兼領其事于時中外輯寧干戈載戢惟公通達治理助流聖天子德化遂以二十三年夏拜公刑部尚書獄無小大悉凖情傅律期于允協一時論讞稱平閲二載調禮部尚書以修明禮制興起文教為務諸所設施皆崇尚惇大而不事苛細論者謂得政體二十六年兵部以䝉古都統闕請上以職任至重難其人命公輟部務理之公任都統七載恭謹律身寬容御下所屬咸敬服廟堂倚毗方切忽遘危疾竟不起時康熙三十二年四月初三日也距生順治二年三月六日享年四十有九訃聞上為震悼詔所司豫恤如制配李氏贈一品夫人繼配王氏封一品夫人子五長馬爾賽襲三等公管佐領次馬爾濟馬禮德馬林阿馬禮善將以公卒之明年二月某日葬公于某原而屬余銘公墓石余不敢辭當文襄公在政府余方為史官辱知獨深常以文字見屬及待罪為學士始識公後承乏禮刑二部未得與公共事而皆承公之後每覩公在部時行事輒奉以為模楷夫國家纍葉作人股肱心膂之佐炳耀于史册而父子相繼為宗臣者亦不可多覯惟文襄公順治中為司寇素著直聲而公復以司寇稱平允文襄公為都統以德望威容服物而公復以久任都統克紹前人之休詩有之式是百辟纘戎祖考又曰君子有穀詒孫子其公之謂歟謹序次官爵政績而系之銘曰粵若豐芑挺生人英桓桓文襄腹心干城繄公象賢矢竭忠藎宿衛禁廬乃心祗慎誓師而出鷙擊隼翔張皇天討綏靖我疆錫命上公益攄偉略煦如春陽蘇彼甲拆臯陶淑問伯夷寅清明刑典禮蔚聞駿聲既歷上卿還統禁旅克贊謨謀兼資文武方叔顯允召虎旬宣出入將相惟公比肩年甫及艾忽罹凶閔芝草朝萎台星夜隕前徽丕紹後緒允貽矧有令嗣世德日滋鬱鬱松楸嶽嶽馬鬛銘無愧辭永留奕葉誥授光祿大夫吏部尚書文華殿大學士拖沙喇哈畨諡文襄李公墓志銘康熙三十三年冬十一月二日文華殿大學士武定李公薨于里第訃聞天子眷念勞臣輟朝軫悼詔所司議飾終之典賜祭賜葬悉從優渥比易名奏上特豫文襄本朝文臣自洪南安以後稱文襄者至公而再見一時中外翕然以為允協云公舉順治四年進士起家浙金華府推官居五年郡無滯獄以治最入為刑部主事歷進郎中㑹六部裁啓心郎屬公總理十四司覆奏事宜聲譽大起十五年擢監察御史明年出按山西甫半載墨吏皆解綬康熙初視兩浙鹽課力蘇商困在臺十餘載數上封事如慎重票擬甄别督撫嚴核郡守皆有關治體典內外計屏絶私弊丰裁凛然九年八月內升支四品俸仍掌河南道事十一年超拜都察院左副都御史抗疏陳時事謂文法太密等于束濕緝盜無術纍及失主吏治民生胥受其病識者韙之是年冬擢吏部侍郎十二年夏命以兵部侍郎總督浙江軍務涖事甫兩月而滇逆變作十三年春請亟增額兵用資勦禦踰月閩逆告變公隨檄諸路將士分守要害遣副將王廷梅薛受益等力堵仙霞關又請調江南滿漢官兵駐二省交界並發江西重兵守鉛山玉山以壯聲援因㑹疏懇給官兵行糧軍士皆感奮是時逆賊盡鋭聚湖清日謀窺犯公偕平南將軍賴公塔率滿兵千人緑旗兵二千人並所募健勇五百人以五月自杭趨衢州七月賊軍數萬攻衢我軍衆寡不敵公同平南將軍以大義激勵將士進擊于坑西炮聲震地流丸如雨左右請少避公不可曰今日之事以兵勝敗為吾死生可稍怯耶諸將鼓勇直入一可當百賊遂却顧賊黨羽方熾溫處金嚴各屬所在煽亂公雖以計招降僞將韓斌王得功生擒賊首汪磐繆國英等而兵單勢分難以支持十五年夏公遂建議直搗仙霞關為摧堅制勝之䇿部議令公條上進取機宜公言進取之路不在溫處而在三衢今逆賊徑卒悉萃于此此賊一破則諸賊必皆駭亂迸散雖僞將馬九玉朱懷德等抗拒河西大溪灘而江山常山之間有間道可襲我軍進擊使賊首尾受敵河西孤壘安能獨完故擊之便時和碩康親王軍駐金華公力請至衢八月合軍克大溪灘復江山縣馬九玉猶冀繞道奪仙霞關而諸軍已受公密檄急據關口夾擊賊將金應虎等窮蹙迎降大師遂入閩閩逆既平而餘孽竄伏山谷間者尚繁公復請江南江西㑹師協勦踰年浙東及徽饒廣信諸郡以次底定捷聞進秩兵部尚書加正一品公念賊平之後事之最急者無如蠲免賑恤疏請豁金衢嚴溫處五郡十六年以前額賦部議持不允公上言恤民以固邦本裕賦以資國用兩者並重然必使有可生之民而後有可征之賦浙東被賊蹂躪饑寒交迫使非急豫蠲豁則舊逋既闕新逋愈積即日黜一官于事無濟且蠲此不可復征之賦俾民得休飬生息以供將來之稅正所以為國家財賦計也詔從公言貧民陷賊中來歸者公悉為區畫衣廪又設糜于通衢賑往來饑民一百二十二萬有竒流移之人盡復故土方事之殷也羽檄旁午人情惶懼東南數千里惟恃公一人以為安危孤軍扼險搘拄三載卒使浙水以西無匹馬觭輪擾于境上則皆公守三衢力也假若三衢無公吳越之民幾不能一夕安枕而公之功豈不偉且烈哉公以文臣身擐甲胄冒矢石大小一百四十餘戰所向克捷雖行間宿將皆遜謝不如而部議叙録僅及十之一二前後招降文武僞員六千二百有竒賊兵一十六萬五千五百有竒中樞叙武職加至二十九等銓曹叙有司亦如之獨以督臣轄全省不叙再奉諭旨乃酌加三級久之追論溫州擒斬逆賊及大溪灘曹平關破賊功授公拖沙喇哈畨襲一次或有頌公保障著勛酬庸典重公瞿然曰凡此叙録皆出特恩雖胙土之榮無以或過且叨冒世職與洪南安比尤非所敢望公之勞而不伐有古大臣風矣二十一年秋以事平還杭州冬召入為兵部尚書公久于兵間在部一切措注悉中機要二十三年進吏部飭諸吏坐曹聽行文書無得與銓事宿弊一清明年夏患癰詔遣御醫診視頒尚方藥物既愈以老疾請優旨慰留二十五年復請詞益切不允是年秋命以吏部尚書入為文華殿大學士辦理機務明年春致政歸二十七年乘輿南巡過德州公迎謁道左天語詢問曰卿筋力尚健能乘騎至此耶賜上尊玉粒慰勞倍至里居凡七載泊然無嗜惟以書史自娛卧病數日遂逝距生前壬戌八月十八日年七十有三公初在言路以謇諤聞彈劾貴要絶無鯁避既督兩浙則沉毅持大體不輕言笑而批答案牘能曲盡物情入管部務嶽嶽無所詭隨每國家有大議片言擘畫確不可易中外揚歷四十年以精勤奉職以誠恪事主以天下善人君子得行其志為愈快嘗言士大夫有名節易全名節難如公之立身服官始終一節真可云粹然無疵者矣以擬昔韓范司馬之倫其奚愧歟公諱之芳號鄴園先世自直𨽻棗强遷武定曾祖諱鮮祖諱登雲考諱才望皆以公貴纍贈光祿大夫吏部尚書曾祖妣康氏任氏祖妣蕭氏妣季氏俱纍贈一品夫人元配胡氏封恭人贈一品夫人繼張氏封一品夫人生四子長鍾麟筮仕嶽州府同知夏逢龍之亂有守城功升廣東潮州府知府次攀麟候選行人司司副早卒胡夫人出次容麟廪膳生次宜麟候選通判側室出娶皆名族女二人長適候選京職王爾梅次適廪膳生馮雲勷胡夫人出孫男十四人鍾麟出者十人壽泓壽浵壽滬壽湜壽潢壽沅壽湘壽演壽潮壽淞攀麟出者四人壽澄壽淳壽溥壽滋曾孫男二人本篤本厚壽泓出公從子甡麟舉丁丑進士館選時上詢知家世遂擢入庶常聖心眷公之深殁而不忘聞者皆為感涕鍾麟將以康熙三十六年九月初五日奉葬東原塋兆以某為年家子屬為銘誼不敢辭謹據狀次第行實而系以銘曰嶽鍾元氣公生應期持憲于朝正色侃辭咨命制府鎮東南陲三蘖相挻詿誤蒸黎七閩震鄰阻險以窺屹然一身天子倚毗遮扼要害危疆是搘摧厥凶鋒用濟我師掃蕩廓清海邦載釐百戰之勛勒于鼎彛召還廟廊以式庶司典樞典銓爰秉國維投老巖壑優游自怡出入將相黃髮羽儀韓琦隕星傅說乘箕偉烈不朽銘石永垂誥授奉政大夫提督浙江學政按察司僉事崔公壙銘聞喜子髙崔先生既沒之三年其孤端等寓書京師以銘壙之文屬余謂余辱交于先生久庶幾知先生者余不敢辭嗚呼銓曹握天下人才進退之柄提學使者握一省人才進退之柄二者均國家治本所繫不得其人以任之未有不卒至于僨轅折軸者也我朝三十年來任斯職者接踵相望而兼歷者蓋寡故事吏部郎無遷轉他曹及秩滿升監司郡守之事其以例嵗出為監司者又往往不能為學使蓋吏部郎之歷他曹復出為學使皆自吏部與五曹郎一例遷轉始子髙先生兼歷二秩實勝厥任惜乎天厄其年而使其業卒未竟也方癸卯冬先生之以晉州守入銓司也家大人適以假滿再入吏部典選事先生至相倚如左右手時銓法紛更惟先生議與家大人合每銓補一人更定一例必執舊典與持異議者諈諉辨論不少屈如品級考之更定供卯法之初行其間謬戾錯忤多所牽制先生皆力持之俾不失國家大體而後已功令重懸賞格招徠乞降之人閩越間投誠至者歲無虛日先生曰髙爵厚祿以待降臣廟堂之仁也顧其仕籍既無可鈎考而降者自署官秩輒稱三事大僚高者得驟躋監司其次亦不失為郡佐朝廷名器可若是其濫耶于是嚴核符牒譏察印劄僞冒者肅然一清是時柏鄉魏公實為冢宰先生為公及門髙第公嘗以二程遺書手屬先生校訂其以理學經濟期先生者甚厚既官銓曹為之長益相推重意欲屬先生典選顧格于例不得行乙巳竟遷户部浙江司郎中時家大人業以例出為河南學使先生每相與郵書砥礪慨然共期以關閩濂洛之學以庶幾不負魏公區區一己之出入軒輊固非所論也未幾遭外艱去戊申復補户部廣東司郎中乙酉典四川鄉試庚戌出為浙江提學道僉事先生自念禀持古道不能隨事骫骳間詢家大人在中州事益慨然三嘆以謂得行其志之難或曰昔崆峒滄溟皆負海內盛名出為學使惟公勗之先生曰崆峒以諫謫起江右失歡俞中丞鄭方伯幾中于禍滄溟在陜西與殷中丞爭文移不得竟拂衣去某之迂拙倍甚于是其能免乎雖然謹守繩墨砥礪亷隅可自盡者此而已矣其他何計焉既至浙頒示條約申飭月課修繕學校以浙東諸郡為冒籍托足之地首試台嚴杜冒濫嚴較課不數月宿弊悉除自督撫大吏以下皆翕然稱之比至苕溪勞瘁遘疾食格格不下咽矣猶强起竣事而病益不支越旬日遂卒浙士民聞者無不咨嗟隕涕先生諱爾仰字子髙世居聞喜縣南邱村曾祖永寧祖東曾父贈奉直大夫直𨽻晉州知州俊母馮太宜人先生之學以明理盡性為宗自幼游元修成公之門得其指授沉酣于性理大全諸書明體達用措諸行事事奉直公及馮宜人盡孝事其兄盡悌遇族黨子姓有恩戊子舉孝亷㑹土寇竊發身至賊庭以至誠動之遂降其衆筮仕晉州勸學墾荒訓鄉勇停贖鍰治行為畿輔第一在户曹主粵東展界之議開復粵諸生逋糧者百四十餘人得脫于罪生平行誼指不勝屈孝感熊先生志之詳矣兹不復贅特節舉在銓曹與為學使時事此二秩者既為國家人才根本之地而先生理學經濟悉見端于此且書從家大人後聞之尤詳故不禁覼縷述之嗚呼先生真無愧于古之清修直節介然不易其操者歟先生生于前明天啓五年十一月二十七日卒于康熙十年六月初一日年四十有七以某年月日葬于某原配李氏封宜人子六人長端次靖己酉舉人次章次毅次集賢銘曰繄先生行淳偹植孝友寡求忮師道立經術粹年不永德無愧名千仭視百世辛亥卒壬子肂誥封一品夫人李母瞿太夫人墓志銘太夫人姓瞿氏贈兵部尚書李公之繼配而吏部尚書武英殿大學士容齊先生之母也太夫人就養京師者二十餘年以康熙三十二年夏六月十一日卒于邸舍享年八十有一事聞上為動容嗟悼命滿漢學士二人賫茶酒賜奠于几筵八月先生將奉喪南下趨詣暢春園奏辭因言臣母畢生勤儉偹嘗荼蓼不自揣量仰冀宸翰一字之褒臣母殁且不朽越二日上大書貞松堂額並臨松雪老人書一幅命學士戴公通頒賜苫次先生跪捧涕零再疏陳謝乃行比歲以來御書賚豫臣下至為珍重太夫人獨荷特恩榮竉被及身後豈非偹德完福為海內士大夫家所僅覯歟太夫人逺祖諱能明建文時以軍功授廬州都指揮使遂世為廬之合肥人年十八歸贈尚書時尊章在堂佐元配張太夫人左右奉養問起居視寒燠羮湯滫瀡手自調劑既退執衣裳織紉之役不懈益䖍族䣊翕然稱孝㑹明末流寇掠江淮合肥城被圍者七晝夜人心惶駭于時先生方在妊太夫人經紀家事如常時或訝問之曰遇賊即死何懼為賊退之日先生始生又七年寇大至城陷贈尚書偕太夫人挈先生出走展轉于瓜步京口鍚山吳閶之間僦居稍定太夫人即口授先生書無虛日贈尚書初為諸生有大志以脫父厄不得已就世職為守戎非其意也太夫人嘗謂先生曰遭時多艱門祚漸衰興宗之寄屬望在子先生每述此語嗚咽流涕順治戊戌先生成進士官史館太夫人猶撡作如故歲辛丑張太夫人殁贈尚書告于家廟立太夫人為繼室太夫人撫張所生女及他庶出子女悉同已出有就婚别郡者必親往迎娶婚嫁既畢來都門先生洊被宸眷侍講幄十餘年之間由內閣學士出理部務歷長工刑兵三部晉典銓衡簡入政府先生每遷一官太夫人輒正色相勗謂當亂離時自分必死豈意至今日今日䝉此皆國恩也務勉圖報稱先生凛凛奉母訓惟謹太夫人體素健先生又先意承志不使一切憂鬱之事聞于太夫人故平生無疾疢亦不親藥物至三十一年冬倐患咯血先生延醫視藥寢處太夫人臥側者凡六閲月而太夫人每至昧爽輒促先生起入直無曠閣務彌留之日先生方奏事忽心動遄歸太夫人一握而逝蓋所以教先生砥礪職業者沒齒如一日也性喜施豫廬郡歲比不登太夫人出囷穀數千斛存活甚衆姻戚中有貧乏者尤三施不倦遇祁寒盛暑則庀衣裘湯藥以給行路在京師亦然前年冬十二月太夫人稱八十觴都城耆民數百人爭持羊酒踵門為壽及既殁里巷婦子聞者無不悲哀失聲此皆往事之所未有盛德感人實而可信是宜偹書子三人長即容齊先生天馥戊戌進士改庶吉士歷官吏部尚書武英殿大學士次天䭲候補主事陳宜人出次天馟福建泉州府通判蕭安人出女三人一適太學生廷欐太夫人出一適千總賈爾祺張太夫人出一適太學生王景陳宜人出孫七人先生出者二孚青己未進士翰林院編修孚倉歲貢生孚彤孚蔚天䭲出孚絳孚紺孚皓天馟出曾孫三人俱孚青出先生既奉喪歸即以其年冬十二月十有三日祔葬太夫人于蜀山贈尚書墓而寓書京師屬為銘玉書自入史館即與先生共事今閲三十年矣復同在政地得聞太夫人懿德之詳宜志墓者莫余若也謹詮本末而繫以銘曰猗歟賢母誕育碩輔幼遭艱虞歷險茹苦既長而教蔚成大儒升華館閣聿贊謀謨台躔朗曜丕顯母德庶幾百齡式報罔極靈萱乍萎蓼莪銜悲天聽上徹奎章載垂貞松千尺䕃被堂斧黃髮摧心劈踊負土堊廬冢側燕巢于林語傳在昔事聞自今是母是子允協圖史諸孫嶷嶷慶詒趾美我銘幽隧鐫石不磷車過必式永詔後人誥封太恭人田母張太君墓志銘余與中丞田公綸霞同舉進士既官京師以文章德業相砥礪每浹旬輒一過從因聞太恭人張苦節懿行讀書明大義為昔女傳中所僅見綸霞自為中翰及視學江南十餘年間未嘗一日不侍養官舍嗣從湖北參議入為鴻臚寺卿特擢僉都御史填撫三吳太恭人適在里第綸霞不以踰常格拜官為喜而以得遂迎養為樂踰年由吳入黔又不以邊徼萬里為逺道失意而以不得晨夕視寢膳為憂撫黔四載問安之使歲凡數至而太恭人忽以微疾逝此綸霞所以見星遄奔不禁噭然而悲也歟今卜康熙三十一年春祔葬贈大夫蓼菴先生之墓而寓書屬銘于余余誼不敢辭按狀太恭人生世族父處士禎教以禮法既歸于田修婦職惟謹順治壬辰贈大夫舉進士明年知浙之麗水縣甫半載以中暑疾不起太恭人撿括户稅支納之數手自籍記㑹攝事者至留難更代則上其籍于守按之不爽銖黍守大驚異遂趣扶櫬歸于時綸霞及兩弟皆幼內難外釁層見錯出太恭人一力搘拄卒莫敢侮每夜分以絡繹督諸孤誦讀既罷輒相持以泣比綸霞與雨來先後登第太恭人乃辴然色喜而持儉履約不愆于素所訓勉皆立身守官之道綸霞歷仕二十餘年以清節聞在黔日有苖帥被甲伏道左曰夙仰公威德願一識公近前叩首而去其善政服物如此皆太恭人之教也太恭人博涉載籍遺諸子書證据經史粲然成文年七十里䣊欲為壽戒諸子止之其書尤傳于世詞曰按禮婦人無夫者稱未亡人凡吉凶之事不與亦不為主名故春秋書紀履緰來逆女公羊傳曰紀有母乎曰有有則何以不稱母母不通也何休注曰婦人無外事所以逺别也後世禮意漸失始有登堂拜母之事戰國時嚴仲子自觴聶政母前且進百金為壽蓋任俠好交之流有所求而然豈禮當如是耶吾自汝父殁于官擕持幼弱數千里歸櫬三十年來闔門辟績以禮自持幸而汝曹皆得成立四被恩命養我餘年而此中嘗切隱痛每當歲時膢臘兒女滿前輒怦怦心動念汝父之不及見今一旦賔客填門羊酒相望為未亡人稱慶未亡人尚可以言慶耶三十年吉凶之事不與而今更强我為主名其可謂之禮乎導我以非禮不足為我慶適增悲怛耳且汝曹中外薄宦偶一入里門無一善及人而儼然受鄉先生及諸父老之捧觴拜跽未亡人益罪戾是懼矣汝曹偹官于朝宜曉大體其詳思禮意為我先事而婉辭之事遂止夫世教衰而閨門之禮闕焉弗講嚬笑之不謹威儀之不攝馴至蕩間軼矩流為喪德敗俗而蔑有底止太恭人守婦人無外事之訓而以叔季登堂拜母為非此當世士大夫所未深諳者而太恭人兢兢辨之非讀書明大義安能若是信乎其足為天下賢母矣太恭人之卒以康熙辛未六月十六日距生乙卯享年七十有七子三人長雯即綸霞甲辰進士歷官僉都御史巡撫貴州次需即雨來己未進士官翰林編修自綸霞撫吳即請急里居奉母次霖拔貢生女一人孫八人女孫二人曾孫二人銘曰惟齊之田世澤昌遹有賢母長鍾祥弱齡茹荼心䀌傷諸孤對泣如寒螿矯矯徑翮爭翺翔建牙珥筆名並揚守禮不懈母德臧教勤戒佚追敬姜庇乃後嗣休無疆夫子之宫永偕藏誥封太宜人李母董太君墓志銘康熙四十二年正月草八日廣西布政使李公之母董太夫人以疾卒于家先是去年八月太夫人有疾方伯聞之即日白于督撫乞歸侍養至五六請巡撫蕭公察其誠疏于朝章未下所司即得㫖俞允于是方伯以十一月自西粵遄行明年正月抵家奉湯藥閲三日而太夫人卒殯殮如禮二月車駕南巡過德州方伯迎謁道左荷天語詢問具陳䝉恩允歸得母子相見狀上為惻然動容方伯退而銜感泣下時某沗與扈從親炙其事至是方伯寓書于余曰某月某日將啓先大夫憲副公之兆奉太夫人合葬敢請銘謹按來狀太夫人姓董氏德州人祖某父某有隱德年十九歸憲副公初公元配宋夫人生子浹而卒繼趙夫人又卒聞太夫人賢曰是必能母吾子既歸果以慈聞子浹登賢書成進士太夫人力也憲副公起家孝亷筮仕故城知縣調豐縣攝碭山縣事遷兵馬指揮歷工部營繕司主事虞衡司員外郎屯田司郎中擢廣西兵備副使所至有政績方伯齒尚稚未能記憶也比長太夫人時時言之因謹識不忘憲副卒後十四年方伯以本省解首成丙辰進士官庶常又三年授編修又九年特簡知臨江府太夫人喜曰可以終爾父之志矣日督家人治廢圃植蔬茹曰吾兒為清白吏日用不以煩民也時大盜曾翕糾黨肆掠于江上翕購二利刃柄置鐵環常著手腕枕臥㑹守乘夜率健卒往捕翕驚起持刃拒鬬健卒擊折其臂乃就擒太夫人曰此爾父治碭時捕賊方略也清江蠧胥倚收稅作奸立置諸法平其稅太夫人曰此爾父治故城時清地丁法也一切措拄悉以憲副為程合則色喜否則正辭以示誡以故臨江之政赫然聞于輦下實太夫人之教為多在郡九年㑹有㫖命各省大吏舉所屬治行亷能者傳車詣闕江西撫臣以臨江守應詔因得奉太夫人便道歸里門其後轉運兩浙旬宣粵西太夫人皆不欲行方伯决意歸養太夫人力止之曰我老尚善飯兒正宜報國勿以我為念也至是既得請晝夜行七十餘日而歸適當太夫人疾篤彌留之際以視昔賢齧指心動而精感萬里者寧有愧歟蓼莪之詩有言民莫不穀我獨不卒說者謂孝子行役痛親歿而不及見也今方伯朝奏上而夕報可雖未獲長侍膝下然猶及啓手足親含斂以免于蓼莪之悲則方伯之孝實以上格天心而聖天子推恩恤下之仁尤凡屬臣子所不禁欷歔感激而隕涕者也自憲副殁後太夫人齊居素服不飲酒不聽音樂以終其身平居雍雍怡怡而閨門以內嚴肅有家法卒之日內外孫曾男女凡八十餘人皆在側嗚呼其可謂壽考令終者矣太夫人生于某年某月某日卒于某年某月某日年八十有四憲副官工部時覃恩封宜人後以子貴封太宜人子三人浹丙戌進士早卒濤廣西布政使司布政司潤早卒女一人孫男八人曾孫男十九人𤣥孫六人銘曰有子而孝從母之教母曰汝父汝其克效當官砥職為時名臣不遺其親用乞乃身皇曰俞哉永錫爾類萬里歸來式遄其至生養死葬孝道始終勒詞幽石揚于無窮磬山天隱禪師塔銘聖人御㝢宏敷至教既已表章六經示生民以日用飲食而釋氏之書足以覺愚頑而牖良善者亦往往並存不廢師其學者有能精修戒行奮然自拔于流俗之外則尤盛世崇奬所不靳也康熙己卯春淮揚水溢至尊念切民依特事巡省比旋軫濟江駐蹕金山之江天寺于時住持僧法乳超樂奏對稱㫖偹䝉殊遇因表進磬山天隱語録若干卷言磬山故僧圓修為臨濟三十一世孫乃天童圓悟之同法弟大覺普濟傳法之師而臣僧超樂之曾祖行也天童語録䝉世祖章皇帝敕賜入藏圓修語録未經續入臣僧不勝拳拳越日傳㫖准入藏超樂率衆僧合掌稽首而退玉書與髙詹事士竒同與扈從親見其事深嘆釋氏弟子能不忘其師傳而磬山身殁六十餘年遭際聖恩俾其言得傳于後真千古之希遇也閲數月法乳偕僧夢菴校刻語録成以塔銘屬余余不能辭爰据大覺所為傳及僧箬菴紀載行實而銓次之禪師諱圓修字天隱宜興閔氏子天性頴敏孩稚時出望井邑忽覺真空現前不可名狀稍長鬻蔬供母至年二十遂茹素而一逐世緣妄念時作每默誦小人閒居為不善章則念起隨滅後遇講師闡楞嚴經義至一切衆生不知常住真心用諸妄想故有輪轉因猛念生死志求出世時聞幻有傳公住龍池為臨濟正宗欣然往謁之傳示以狗子無佛性語歸而力參至廢寢食母感其道念誠懇即命于龍池出家初參趙州語無所得繼參未生前本來面目偶閲楞嚴見佛咄阿難云此非汝心豁然有悟與童年出望井邑所見境象無異㑹傳北遊復掩關誓願精進一日于靜中聞驢鳴猛省從此披覽公案勢如破竹比出關偕天童謁傳于都下問歷歷孤明時如何傳曰待至此境更與汝道遂一喝而起傳曰汝尚起緣心耶拂袖徑出詣五臺與靜淵妙峯諸尊宿扣擊纍月還入都適傳臥疾自念法門事大未盡澄明中夜詣傳跪請指授語久之傳瞿然起坐曰汝既如是吾亦如是即下拜授衣拂焉及傳還龍池示寂為經紀喪葬畢獨持一鉢深入荆溪之磬山于氷巖雪窖中誅茅結宇與飢禽野獸為伍十五年如一日四方衲子聞風麇至于是磬山之名翕然震于海內浙西報恩寺延請主法席始以老疾辭繼欲廣龍池之傳曵杖以赴棲金車峯下升堂闡法不騁機辨不矜慧智以平實心示平實義使學人積久自悟此其宗㫖也居一年謝世實明崇禎乙亥九月二十二日距生萬厯乙亥世壽六十有一僧臘闕十有七初厝報恩寺左後二十餘年大覺迎厝于宜興海㑹乃建塔焉嗣法髙弟五人曰林臯豫玉林琇箬菴問山茨際印中綬皆一時法門龍象而玉林則應世祖皇帝欽召即所謂大覺普濟禪師者也嗚呼釋教之傳惟臨濟稱盛天童磬山同出龍池之門而天童高明廣大磬山沉潛篤實溯其得力各有同中之異若乃清苦刻厲與昔日之老屋敗椽滿床雪霰者後先相證則以磬山上續臨濟一燈不尤為善繼善述矣乎其事跡詳載傳與行録兹特舉其大要而系之以銘曰粵鏡釋乘宗風湛然天隱修老滹沱正傳承嗣龍池創址石磬磬聲冷冷羣聾式聽結茅為巢梯不可攀傳衣五子聲震人寰偉矣大覺昔被天眷師傳伊阿遹聞追歎今皇時邁停蹕江天勑允編録梵策永延繩繩紹緒孫復有子滹水源長沿流不止惟真破妄惟正息厖我述銘語勒之塔幢磬山峩峩荆溪洌洌聲色既空寧有生滅張文貞集卷十二
