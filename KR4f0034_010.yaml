body:
  text: 張文貞集巻十大學士張玉書撰誥授光禄大夫勇略將軍搃督雲貴兵部尚書兼都察院右副都御史世襲一等精竒尼哈畨諡襄忠趙公墓誌銘康熈三十六年三月四日光禄大夫勇略將軍趙公以疾薨于寧夏里第時車駕方西征聞奏震悼比從横城口濟河下諭内閣部院諸臣勇畧將軍趙良棟為國家宣力奮庸厥功甚茂倐以疾逝朕深憫焉兹師抵朔方道經其門欲令皇子臨視奠醊可集議以聞于是臣玉書偕諸臣言皇子親臨臣下之䘮曠代希有將軍臣良棟膺兹異數豈獨一家之私榮凡百臣工無不感激隕涕明日次寧夏皇子臨䘮舉哀賜奠如禮閏月復頒諭祭文遣大臣致祭其子道臣宏爕中書臣宏煜先後詣行在謝恩上皆召見撫慰之又數月允禮臣請以例予祭𦵏賜諡襄忠嗣搃戎宏燦歸自黄巗乃卜冬十二月日𦵏公于城西二十里某原而乞銘墓石于余余辱交公久素悉公歴官制軍忠勇大節與其生平慷慨質直強毅不撓之氣嘗私竊嘆羡以以為古名將所不及而聖天子推心置腹眷倚之重以及自始迄終恩禮之隆尤足以奬勵功勲為勞臣白首効忠者之勸余雖不敏敢不據所見聞摭拾其梗概而叙次之公字擎之號西華先世自陕西綏徳衛遷居安邊逮公官寧夏因家焉故今為寧夏鎮人曽祖某祖某父某官海州參將皆贈如公官曾祖妣某氏祖妣某氏妣某氏皆贈一品夫人公少工舉子業顧倜儻有大志不屑束縳章句遂杖策從戎順治二年隨和碩英親王師入闗中受知于制府孟公喬芳署潼闗守備從征賀珍武大定等賊又從定寧夏叛兵之變因署其地屯田水利都司四年領兵平河西囘亂又單騎擒肅州偽搃兵丁國棟擢補髙臺遊擊十三年王師入滇以雲貴督標副將從征隴納諸苗康熈元年積功授都督僉事充雲南廣羅搃兵官是時吳三桂專制滇南所補官吏詔部臣不得掣肘于是三桂調公貴州比喇鎮令進𠞰水西公方丁外艱力辭不許四年水西平乃聽終制三桂中藏叵測以牢籠人才為務惟公先㡬之哲不為所用云八年補大同加左都督十一年調天津明年冬滇逆變作四方叛賊蠭起寜夏亂兵刼殺其主帥勢甚猖獗十五年春特命公提督寜夏馳傳往鎮撫之公見上詞氣激慷請移家口居京師得一意辦賊上壯其言隨命賜第公至鎮集將佐宣布德意捕斬首亂四人餘不問邊境遂安公駐朔方四載念關中粗定而漢南巴蜀猶阻聲教自請率部卒五千獨當一路進取漢興恢復蜀地詔下軍前諸大臣集議僉言大軍宜分興安棧道八堵山小川子四路並進需兵五萬人公曰兵貴精不貴多也自將五千人指八堵山徑入十月破宻樹關取徽州復略陽分遣禆將趨陽平闗覘賊虚實仍條上調兵運餉事宜請兩路收川報可特授公勇畧將軍十九年正月朔公師臨白水壩與賊夾江而陣江流湍湧無舟楫將士有難色公怒誓於軍曰視我馬策所指敢後者斬擐甲躍馬浮江而渡一軍皆渡賊駭愕奔潰追擊之于青山石硤溝歴舊州明月江屢戰捷甫十日遂抵成都先鋒奪門入公下令母剽掠整軍登陴市肆晏如在城偽官及逆兵數千人疑懼不自安公悉以迎降奏釋衆皆感悦越數日奮威將軍王公進寶亦報保寜之捷東西川以次收復事聞天子降溫旨勞軍以御書題額及弓矢櫜鞬名馬之屬先後頒賜甚渥是時湖南粤西方併力進師規取雲南上念巖疆綏靖制府需人非得謀勇素著操履潔清兼資文武大畧者不克勝任遂授公兵部尚書兼都察院副都御史總督雲貴將軍如故而以公之子宏燦為寜夏總兵官隨軍進𠞰自收蜀以後苞蘖尚繁公經營一載反側者始定二十年三月追𠞰逆渠胡國柱于觀音巖十丈孔五月破闗山象嶺渡瀘江七月復取建昌乘勝渡金沙江九月乃入滇時楚粤之兵已圍滇省城數月顧持久不能㧞公周視壁壘謂結營遼逺賊得畨息法當移軍逼之選入川精鋭五千親冐矢石取玉皇閣進逼新橋賊方據橋扼守復以計從上流濟師晝夜力攻凡八日而城下逆賊踞滇日久私歛充牣一時諸將雲集多志在攘掠惟公飭所部卒勿以一騎入城既奏凱即懇請陛見移師曲靖以待命嗣後黷貨者纍纍致敗而公獨皭然無滓其逺識確守卓然有古大臣風烈焉公于時已年踰六十上念公久勞於外特允入朝二十一年冬授鑾儀衛使踰年請疾歸里二十七年以國恤㑹𦵏詣闕下三十年厄魯特噶爾丹蠢動邊塞大軍駐朔方詔公以在籍老臣預議軍事三十三年禁旅出塞公偕行指畫地勢兼以私財佐軍既還復詔入朝明年追論前功特加一等精竒尼哈畨世襲是年秋就醫江南賜御舟給驛三十五年復召入朝時上决䇿統師北征諮邊事甚悉公因疾不果從比及師旋遂賜歸明年西征上方欲就詢公于里第而公竟不及待嗚呼是可悲也公結髪事戎行五十餘年大小戰數百未嘗敗衂御下嚴而有恩觸法者雖小必罰有才畧堪任者抗疏引薦常自偏禆積至大帥軍中甘苦與共一飲食不以自私入蜀之役裹糧渉險轉戰七千餘里而士卒咸樂為盡死無一怨言其能結士心如此故所向有功性伉直同事多不相下功成以後惎間者日衆惟上知公深嘗格衆議曲賜維䕶自蕩平三逆以来閲十五年矣復厪詔㫖鋪陳本末於平蜀嘉倡進之謀於克滇奬亷潔之操于是公之勞績久而益明而其行履卓犖無疵亦得較然備著于國史是公之得全其身與得全其名皆上恩也百世而下聞之猶為感奮太息而况于公乎而况公之子若孫乎是用偹書以示来裔公生于明天啟元年十月距薨得年七十有七配郭氏繼配李氏白氏贈封俱一品夫人子五人長宏燦以左都督充浙江黄巖等處搃兵官次宏爕御史宏煜内閣中書宏煒宏熺尚㓜女三人長適庚子舉人強振猷次適候推副將郁起雋次適一等侯江南提督張雲翼孫六人公治家如治軍閨門嚴肅儼若公府諸子屏息侍立無敢有跛倚之容以是總戎憲副所至有政聲中書君亦明敏練達皆仰荷宸眷云銘曰天翊景運篤生人傑桓桓趙公威武維烈早嵗杖䇿從王于征手執蝥弧目無堅城爰制中權爰總戎律嚴明有威卒伍整宻三秦叛亂將驕卒狂風馳飈驅迅掃欃槍巴蜀如焚滇黔如惔獨提孤軍鼓行而南銜枚宵濟莫敢齟齬直入蜀郛前歌後舞蠶叢既定揚旌渡瀘環城三匝拉朽摧枯賊首朝授降幡夜竪氛祲盪滌復我疆土凡此大功帝曰爾庸事紀簡冊銘勒鼎鐘大官授膳尚衣賜服彤弓盧矢驊騮驪騄公之来朝天子燕喜公之既歸天子拊髀國有大事爰詢爰謀公徐一言等于圖球公之材武如羆如虎公之智畧如風如雨公之精誠如火弗滅公之勁直如鐡靡折持其孤忠以報一人白首不挫厥聲齗齗惟天子明奨乃勲勞生有殊恩殁有厚褒以勞定國以死勤事主聖臣忠近古莫二歴觀載籍如公不朽納銘幽宫垂示永久秦海翁墓誌銘梁溪秦海翁先生以孝友篤行為東南人倫模楷者五十餘年年八十有五無疾而逝子孫曽𤣥環哭於帷堂内外者凡九十有六人以人世夀考福澤而論可不謂極盛矣乎長公宫諭對巖先生出嗣降服而創痛益深既持服之三月將偕諸弟奉䘮𦵏唐灣山之新阡而告期于余且屬為銘余惟過時不能𦵏與不及時而渇𦵏皆公羊之所譏也三月而襄事必誠必信勿之有悔宫諭深于禮矣余於宫諭稱詞林後進而先生又素所仰止銘奚敢辭按狀先生諱徳藻字以新海翁其號也系出宋淮海太虚公之後太虛子湛為常州倅因家於常閲十傳而徙無錫之胡埭遂為無錫人入明累葉通顯嘉靖癸丑進士巡撫湖廣右副都御史諱燿為曽祖考太學生諱仲錫則顯考也妣金壇于孺人褒甫公之女子三人先生居次生而孝友天植髫年侍父疾即能盡抑搔扶掖之節父殁祖父母在堂拭涕問寢退至苫次則兄弟相向痛哭以為常及執祖父母䘮泣血居廬與三年䘮等曰吾以終父志也事伯叔父如父叔父之齒少于先生二十嵗側行却立白首不渝伯兄殁無子應宫諭為後先生不欲獨有兄産遂以季弟之子並嗣族黨稱焉淮海公祠嵗時薦享先生主之至日少長畢㑹隠然寓睦宗收族之義挺秀堂者十世相傳之居也一夕燬于火先生傾囷粟以鼎新之寄暢園為中丞舊築海内所稱秦園者也嵗久蕪廢且割為僧舎先生獨力修復悉還舊觀其他累世遺構皆次第完葺以無墮先人之業此先生繼述之大節也素性和易不樂聞人過邑有胥吏以僉役累先生事覺坐杖先生召其人予之金以慰之宫諭之被詿誤也族姑居他邑詭寄户籍而有逋賦遂波及焉先生恐罪連姑之幼子竟不置辨以是宫諭沉淪林泉者十有餘年其遇人篤厚有恩如此甲寅以後宫諭奉詔贊楚軍㑹廷舉博學復入翰苑直講筵比嵗歸里先生顧而色喜曰吾老矣願諸子之皆侍側也平生故交則錢十峯張菰川為道義性命之友縱論經史觴詠不輟一時推為耆英車駕巡江南幸寄暢園者凡四先生率子姓伏謁道左上親問年齒注視久之己卯夏復即園中御書二額以賜遭遇之隆士大夫所罕覯也夫世際休明聖天子就問髙年優禮耆碩所以維風教之意甚厚如先生内行淳備息深而視下或僅視為一門聚順及為善鄉井之常不知抑詩有言夙興夜寐灑掃庭内初無髙世絶俗之事而武公之稱睿聖以此則先生之孝友篤行卓然為人心風俗所繫不亦至明且著矣乎先生生萬厯丁巳二月四日由明經封文林郎翰林院庶吉士卒以皇清康熈辛巳五月七日𦵏以是年八月下澣六日啓元配侯孺人兆合焉孺人為明户部主事澹泉公女室中霤災曽手舁翁柩以脱於火人稱為孝婦子五人長即宫諭松齡順治乙未進士歴官日講官起居注左春坊諭徳兼翰林院修撰出繼贈庶吉士以時君後次松期嵗貢生蒙城縣訓導改翰林院孔目松喬松如松虬俱例監生松如任廣東吳川縣知縣松虬前卒女四人一適國學生侯麟然餘俱殤孫二十三人松齡出者六松期出者五松喬出者三松如出者五松虬出者四孫女十六人曽孫二十六人曽孫女二十五人𤣥孫一人𤣥孫女二人婚娶皆名族銘曰吁嗟先生秉質清淑道勝而腴貌恭而肅堂搆師儉閨門敦睦喬木十圍藏書百軸天光下臨旁燭巖谷煌煌賜額寵踰車服先生之孝倣古收族先生之澤式貽有榖存順殁寧幽竁是卜我勒銘詩龍灣之麓誥授光禄大夫巡撫江西都察院右副都御史馬公墓誌銘公姓馬氏諱如龍字見五其先河南人明洪武中有以軍功衛延安者子孫家焉故今為陕西綏徳州人曽祖某祖某父某皆以公貴贈如公官曽祖妣陳氏祖妣劉氏任氏妣某氏皆贈一品夫人公生而孤育於伯父光稷事伯父如父於兄弟友愛備至讀書不事章句慷慨有大畧方貧約時于榆林道中得遺金百兩義不忍取候其主至悉付之嵗壬子舉于鄉出葉忠節公之門時逆藩煽亂餘黨蔓延于綏賊朱龍將㓂城城中恟懼公授兵登陴援桴誓衆及朝廷命大師至為設攻守方畧城賴以完主者嘉其功事聞即命公守綏公以桑梓固辭而才名蔚起未幾改守灤州灤俗悍而多盗旗弁債帥持吏短長公鋤奸蘇良豪右歛手州有民殺人而埋其屍四十餘年矣公一夕宿逆旅恍惚有人訴寃掘其地得白骨詢之土人云此屋已十易主窮詰最初一人遂吐實立寘于法昌平衛民有父子被殺者莫知主名郡守以公材使治之公于道逢白馬少年云殺人者叔也公至其地詢民旁有張劉二姓張即其子之中表叔也訊之不承令私跡之二人相語曰誰謂馬公察者易欺耳即執之一訊而服於是數州之民皆頌公以為神陞户部江西司員外郎轉刑部山東司郎中時蔚州魏公為司㓂真定梁公為司農而公與于清端公相善且聲望相埒也故二公深噐之以薦𣙜北新關洗手將事宿弊盡革秩將滿㑹天大寒公下令弛關禁譏察之外不收錙銖于是商民往来無税者一月謳吟之聲徹于南北事竣擢杭州知府其治如治灤而加惠焉杭民稱貸于軍營期滿不能償則以子女為質因沒入之公白于將軍請核其子母虚實令悉持劵來官為代償一日盡給之無留者軍得實惠而民免驅廹之苦至今尸祝焉嵗在己巳六飛南巡供張儲偫應時立辦民不知擾天子知公亷且材以為可大用也即超拜浙江按察使公奉命感激竭力稱報平反庶獄多所全活海㓂潘三者假貿易聨絡隣境欲謀不逞公宻偵得實白制府設䇿擒之殱其首從六人牽連者七十餘人赦不問西興渡船貪利重載遇風多溺死公立禁船無過三十人違者罰無赦至今錢塘江無漂沒者其仁而有威皆此類也踰年進本省布政使命下之日民大欣悦當是時今總河遂寧張公實為巡撫公自益刻厲故事屬吏有嵗餽公悉禁絶之康熈二十九年紹興大水公私赤立莫可存濟公檄十一郡合輸米二萬餘石按户賑給曰是踰于嵗餽多矣葢公仁心為質知所緩急輕重期以權宜活民而非於已有毫髪私也于是公政績日著天子特簡公都察院右副都御史巡撫江西公既至時其柔剛與民休息仿白鹿洞遺法建書院以教士之秀者嚴溺女之禁分給常平倉羡米以使無告者有所養雪廬山白石庵僧寃獄脱無辜者三命再疏請罷追轉漕脚耗永甦官民之困朞年以後人安吏輯環數千里之境皆曰我公以嚴明亷幹聞天下今優游無為不動聲色而事以大治洵乎一張一弛公之才無施而不可也己夘春車駕以視河南巡既還公奉詔陛見上奨勞再三御書老成清望堂額以寵其歸時淮揚荐饑上命公設法救濟公以西江連嵗豐穣救灾恤隣道也遂倡僚屬捐米十萬移賑之淮揚之民戴上之仁食公之賜歌詠功徳溢于三呉公之拊循愛養以其餘及於隣封又如此方公之守杭也以争寃獄與當事有隙後其人倉卒遇事舉重貲託公及事定還之封識宛然其人媿謝欲以千金為夀不屑也其始至江西也屬吏有不飭者將按之誓潔已自効及公陛見其人縱恣如故公再至復自戢葢公之生平亷以律己而寛于責人急于豪強而緩于小弱故自起書生至秉節鉞所在有聲蹟又能以功名終皆以此也公性澹泊無聲色之好禄入所餘周及三黨州之文廟圯興修之役獨力任之平居好奬人之善門生故吏成就者衆公所推轂後多為顯人居江西屢疏乞罷俞㫖慰留康熈四十年辛巳十二月以疾卒于官夀七十有五夫人劉氏贈一品夫人繼配劉氏封一品夫人子二益丙子科舉人豫庚辰科進士女五人孫男二人國鑑國鎮俱太學生孫女一人婚嫁皆世族孝亷兄弟將以四十一年六月𦵏公于某鄉某原屬京兆錢公問銘於余徃余在班行接公言論風采嘗嘆為偉人後奉使至杭握手於舟中具悉治杭之政比扈蹕再至復見公及公鎮撫西江而不相見者十餘年矣前年公入朝余方在丙舎聞精力甚健今余甫入國門而忽承公訃且執筆以志墓石能無嘅焉三嘆矣乎公生平行誼政績不可縷指謹掲其大者書之遂為之銘銘曰朅朅馬公發跡武功式遏㓂亂帝嘉其忠威能行仁亷以生明摘奸紏伏其頌如神在越十年不名一錢蘇商恵民利及舟船西江之政以時弛張恩随波流長淮湯湯公之來朝錫賚孔多公之歸矣人用浹和老成清望大哉王言生榮死哀作則于垣維公初終功在民社我作銘詩告後來者予告光禄大夫少傅兼太子太傅保和殿大學士兼禮部尚書諡文靖王公墓誌銘宛平王公在政府二十年而予告又二年而薨於里第時車駕方南巡聞訃震悼命賜䘏如制及還京詔皇子率大學士馬公偕禁近諸臣臨公䘮且奉諭㫖王行三叩禮舉哀奠酹不循常格葢自四十餘年以來世祖章皇帝舊臣先後徂謝惟愸遺公之一老皇上篤念老成耆徳故恩禮獨厚於是玉書偕同官及九卿大僚合詞陳謝而一時在廷諸臣及閭巷聚觀者無不欷歔感誦至於泣下比閣中擬諡上請特予文靖諡法寛樂令終曰靖本朝未有諡者亦可謂象公惟肖矣公㓜穎異成童時即舉四書孝經疑義質問於塾師年十九舉順治三年丙戌鄉試明年成進士改庶吉士授檢討翰林官兼習滿書者多不能精詣奥窔公天資高踰年而學成世祖屢試稱最随陞國子監司業未㡬進左春坊中允纂脩順治大訓十一年進司經局洗馬召入南苑校譯大學衍義及勸善書十二年進右春坊諭徳明年初開講筵充日講官進左庶子每日直講命坐十四年春進宏文院侍講學士充經筵講官尋進宏文院學士時文貞公方任國史院學士世祖諭曰父子同官古今所少以爾誠恪特加此恩明年主武㑹試調翰林院掌院學士兼禮部侍郎十六年教習戊戌己亥兩科庶吉士十七年考滿加禮部尚書文貞公方長禮部父子同部尚書海内以為榮十八年元日世祖不豫公日請安於御榻前初六日漏三下召入養心殿諭曰朕勢將不起爾可詳聼朕命撰詔書公匍伏飲泣筆不能下世祖令抑悲痛即榻前起草公拭涕書一條進恐聖躬過勞奏於乾清門下撰擬凡三次進呈至初七日薄暮繕畢而世祖即以是夜上賔公偕顧命諸大臣入哭一痛㡬絶至於面奉憑几之言有事闗國家大計與諸大臣再三宻議而後决者公終身不以語人雖子弟莫得而傳也十二月以尚書管禮部左侍郎事康熙五年擢都察院左都御史公侃侃舉職知無不言於時一嵗賦入半耗于兵餉而雲南閩廣三藩所駐之地尤甚公首陳裁兵節餉之議謂滇黔業已蕩平兵額急宜汰減詔下所司議省額餉百餘萬又言江楚諸路王公將軍提鎮自置官商漁奪民利宜嚴飭禁革官吏捐輸名出私槖實取自民間宜一切報罷招民百家得授縣令不肖奸人往往借資為市宜改給散秩凡所條上皆深得治體㑹天旱金星書見公言先帝御極有年諸曺政務皆經斟酌盡善數年以來變易成憲者多矣法屢變則弊叢生今皇上當勵精圖治之始法祖所以敬天請勑各衙門詳察見行事例有因變法而滋弊者悉遵舊制更正於是酌復數十事中外稱便七年進工部尚書督理宫殿大工屢著勞績十二年轉兵部尚書是年議撤三藩十二月吳三桂反雲南日赴内廷議用兵機宜十三年二月宻疏請誅逆子應熊言逆賊三桂負國深恩肆虐滇黔流毒楚蜀散布偽劄煽惑人心今大兵己抵荆南元憝旦夕授首獨是逆子應熊素憑勢位黨羽衆多擅利散財蓄養亡命匪類依附實繁有徒應熊既被覊守而流言繁興訛傳不止奸謀百出未易周防大㓂在外大惡在内若不早斷恐滋後患請速正法傳首湖南四川以寒老賊之膽以絶羣奸之望以激厲三軍之心章下議政王貝勒大臣九卿科道㑹議應熊旋伏法方滇黔之初告變也一夕京城内外所在火起尋有偽朱三之獄捕繋數百人掠治不得主名皆應熊及其黨惡為之三桂自恃鴟張之勢又以其子方尚主朝廷必不殺以為之招及應熊誅三桂驚悸發疾竟以是死人皆韙公之能聲大義云十七年居文貞公憂二十年服闋冬雲南平明年五月即家授保和殿大學士兼禮部尚書於時逆氛初靖民生甫離兵革公與勒公明公及李文勤公同在政府務以和平寛大宣上徳意罷權宜之令停加征之額遵奉詔書次第興革有應奏請舉行者悉陳於上前無隠時玉書為學士親奉公教㫖者一年至二十九年公與伊文端阿文清及真定梁公在閣玉書以後進入贊機務朝夕追從復八年有餘中間合肥李文定亦共事二載一堂以内事應商㩁悉心折衷始終無一疾言忤色有如昔人所云推車子者故以玉書之謭陋亦幸獲無過焉竊覩公立朝本末不沽名不市恩不植黨援不持意見更事熟則於四方得失利病無不周知歴諸曺久則於國家典制沿革無不洞悉每論事闕廷指畫可否具有經緯聞者咸斂容欽服公博覽強記手㸃二十一史能随事舉述大義而絶不以該洽自矜撰擬文字屬同官具藁㸃定一二字深中事理詩清麗不事藻縟闡明理學而亦不排擊二氏之教其造詣益宏且逺矣公素引嫌不欲與試事戊辰㑹試特命為正考官取沈廷文等百五十人甚愜人望其他大典禮如耕藉大閲陪祀闕里大制作如纂修玉牒實錄典訓方畧一統志監修國史明史公無一不與元日元夕偕滿舊臣進爵御前侍宴殿内俱出自特恩至暢春園靜明園賞花泛舟賜㳺賜食則玉書皆得隨公之後叨遇盛事者也三十一年公以足疾請告温㫖報曰卿効力年久自世祖章皇帝時簡侍禁廷恪恭盡職朕屢加擢用洊進綸扉夙夜殫心勤勞自勵今先帝舊臣俱已凋謝惟卿獨在班列雖精力就衰而老成練逹之臣常侍左右殊有禆益著勉自調攝照舊供職不必求罷嗣後章三上慰留如初至四十年夏疾大作上於行在賜寳露禁藥九月又申前請乃許致仕比奏謝特加少傳是冬遣侍衞賫賜帑幣上珍明年上元節賜讌於家四月遣侍衞持手諭一道賜於榻前諭曰卿耆年舊徳歴官最久自去嵗告病在家朕無日不注念老臣也邇來九卿皆求扁額字對想卿身雖在告心未嘗一日不在朝中故特書扁一靣對一聨臨米芾書一幅賜卿卿其勉強餐食輔以醫藥以慰朕不忘舊臣之至意仍傳諭病少愈朕尚欲一見故公遺疏言冀臣病之再甦許瞻天之有日紀聖恩也前後頒賫宸翰十餘幅賜堂額三今年上元節復賜讌於家公猶強起進一匕箸越四日疾忽劇至二十七日遂薨距生天聰二年戊辰七月八日享年七十有六公服官五十餘年名成身退善全終始視司馬文正之在洛下韓忠獻之在相州庶幾似之而身依天闕恩禮獨隆則前人所未及也公諱熈字子雍一字胥庭先世居任邱髙祖贈宫保公龍始著宛平籍曽祖鏜祖愛明本生祖爵俱以文貞公貴贈光禄大夫太子太保禮部尚書公貴加贈曾祖祖如公官文貞公諱崇簡歴官光禄大夫太子太保禮部尚書公為大學士加太子太傅亦贈如公官曽祖妣某氏祖妣張氏焦氏妣梁氏俱贈一品夫人公年十二梁夫人病篤禱於天願减算以益母夀文貞公捐館公年踰五十矣號泣如孺子顔書屋曰慕齋天性篤孝如此兄弟六人友愛無間布政使然金衢守道照皆以公推廕起家者也元配金氏繼劉氏俱贈一品夫人繼董氏封一品夫人子六人克善雲南驛鹽道僉事側室朱宜人出前卒次克勤幼卒次克昌刑部河南司郎中董夫人出克宏嵗貢生候選主事克承克賡俱幼側室出女十人廕生章維貞河南按察使胡介祉衍聖公子孔傳鐸監生顧寧緯其婿也餘俱幼孫五人景曽庚辰進士翰林院庶吉士克善出纘曾嵗貢生候選主事企曾式曾則曾俱克昌出克昌等將以十一月十九日葬公於畏吾村之祖塋而屬玉書銘於墓石公與先大夫同舉丁亥進士玉書又夙附門墻之末晩在政地復知公深誼不敢辭乃節錄韓慕廬宗伯所為狀而叙次之銘曰巍巍王公惟帝之弼夾輔兩朝其徳克一文章琬琰謀謨蓍龜𨗳揚玉几宻贊彤帷内表百僚外靖三蘖刑清兵偃逺安邇恱五十餘年敬慎篤誠相業房杜家聲韋平帝眷舊勞曰予元老番番黄髮茀禄夀考老成在列蔚為國華固請引退養疴於家手勑慰存中使問疾庶幾霍然扶掖造膝台曜乍掩䘮我功宗寵被異數用章殊庸罷舂輟相都人爭誄徳盛令終此惟臣軌世濟厥美有穀永貽殁而不朽勒此銘辭覺羅洛君墓誌銘君諱某字謙齋世居長白山之沾河祖諱唐柱官建昌城守尉考諱石圖以五品官管顯親王府事督滸墅闗生子二君其長子也君少補滿學生員由吏部筆帖式授禮部宣讀官轉户部四川司主事出理滇黔兵餉以薦陞兵部車駕司員外郎加三級復以薦陞工部都水司掌印郎中奉命督西新闗監理臨清磚厰後以估計䕶城河工料去職君為人勤敏㢘辨歴官所至有聲其為户部也故事刑部及督部司軍流罪人皆由户部四川司發遣而吏多留難有淹係至經旬者君令到日即發囹圄為空各省籍没家産具冊達部奸胥輙深文咨駁借以牟利君立法禁之宿弊遂革其理兵餉也由楚之常徳水運至偏橋衞陸運至平越黄絲驛道逺而險役夫多逃竄大兵屯貴陽饑不能前君以厚直僦蠻苖為後夫晝夜轉輸十二日達貴陽一軍懽呼士氣遂倍時内閣學士佛公倫侍郎金公鋐以大臣督餉屬酒相勞曰㣲君幾誤大事其為兵部也值駕幸盛京緣途驛騎皆取辦於君無稽遲者佐尚書薩公賑河東饑察核浮冒經畫有方災黎盡沾惠其𣙜西新也禁侵漁絶需索商民皆感恱而吏無所容其奸蓋君政績之可紀者如此天子以君為才嘗不用部議特用君或已别用人矣復更命君徃人皆謂之宜而同官亦莫之忌也君性孝友母歿時年尚少哀毁不欲生父卒亦如之事繼母如親母鄉黨之貧之者周之無所吝教諸子嚴而有法子檢討君讀書成名奉使不辱皆君之教也君生于天聰八年五月十二日卒于康熙四十二年六月六日年六十有九祖考以君貴皆贈通議大夫祖妣妣皆淑人娶塔他剌氏封淑人子四人長阿金日講官起居注輸林院檢討次阿保早卒次徳芳次徳馨孫男六人女一人檢討余辛未所得士也將葬來請銘遂為之銘曰維才之宜維用之時不昌其施有後之貽後千斯年視此刻辭誥授光禄大夫内閣學士兼禮部侍郎愚菴李公墓誌銘公諱應廌字柱三一字愚菴其先自海東桃園遷青州之日照今為日照人曾祖某廩生祖某鞏昌府學教授父某順治辛邜科舉人厯任江西浮梁縣知縣自曾祖已下以公貴皆封贈如公官妣皆一品夫人浮梁公生子八人公其次公少有文名讀書過目輙成誦丙午舉於鄉署天泉學正造就人才為多汪公文漪亦親問業經指授焉丙辰成進士改庶吉士授編修纂修明史己未同考㑹試得人稱盛歴春坊洗馬以康熙三十闕年督順天學政既嵗滿公明之譽蔚起天子以公為才復留任三載蓋公之典學政也絶苞苴嚴請託釐正文體振拔寒滯又請置學田以資贍養增弟子員額以廣進取一時人士無不鼓舞嚮學而公又引近諸生反復開導以讀書為文之法于是人知研窮經史為有用之學而文氣亦駸駸復古公起家詞臣政事無可表見而京畿首善之地學校教化之本公能懃懃懇懇殫心力於此亦可以見才識宏逺體用兼備之大畧矣還朝進庶子特授太常寺少卿旋陞内閣學士兼禮部侍郎越數月以事罷歸公為人凝重有風骨不苟訾笑其在上前時有顧問輙應聲而對無所紓囘班行中持議尤侃然亦以此齟齬不合於世不得至於大用論者惜之公性純孝事浮梁公敬養交至歸田時浮梁公年踰八十公年亦五十餘矣而先意承志猶有嬰兒之色兄弟友愛尤篤叔季早世撫其孤不啻已出他若族屬之貧窶者無不衣食也姻黨之于我養于我殯者無不周恤也嵗饑出囤粟減價以糶或捐于公以待有司之賑凡義之所在無不力也嗚呼晩近士大夫以功名為急而畧於内行父子兄弟間多有慚徳其于宗族鄉黨視若秦越人然惟公孝友肫篤施於家以及於國而一以至誠行之豈不可謂鉅人長徳卓然為世所倚頼者乎三十五年春車駕北征公在籍輸財助軍復親轉粟塞外以濟軍食跋渉數千里不辭勞悴比蕩平錄功復公官踰年奉命分脩永定河復改修南河公親巡畚築屢厯寒暑猶憶四十年冬余過髙堰遇公于周橋時公立風雪中董工作甚力余與公握手相勞苦者久之又二年而公乃告竣事奉優詔還籍仍晉二階公以久勞遘疾復遭浮梁公䘮老而致毁未幾遂不起生某年月日卒某年月日年六十有六配梁氏封一品夫人子男五人某嵗貢生某太學生某順天己卯舉人某某太學生孫男八人孫女七人婚娶皆舊族公既卒之三年諸孤卜葬於聚奎山之陽司業黄君崑圃持狀來請銘公自官翰林與余交久黄君則公所拔士也述公里居事尤詳爰損益來狀而為之銘曰叅預機務官不卑年踰指使夀不虧樹人如穀勤斯葘或芸或耔終如茨建章栢梁杗棟資材已見用未究施惟孝而友為世師永貽不朽鐫銘辭誥授光禄大夫捴督浙江福建等處地方軍務兼理糧餉兵部尚書都察院右副都御史瑞圖劉公墓誌銘康熙四十七年夏六月前浙閩捴制兵部尚書寳坻劉公年八十終於里第越一月公長子湖廣巡撫右副都御史玉伯先生聞䘮釋官歸庀大事寢苫枕塊凡三閱月將以十一月之下旬奉公體魄藏于縣豐臺之舊阡欲紀公立朝居官家庭鄉黨諸大節於窆竁之石偕其季弟洒淚具書以來乞銘于余惟公鴻名偉績彪炳宇内甲寅以後當用兵之際常以大帥持節駐海濱江浙晏然得安枕席者皆公之賜玉伯先生司藩江左五載中兩遇翠華南幸經紀百務秩然有條天子稱之曰才其他緩征减耗惠政尤多是公之父子為福於桑梓者至深且厚於兹麗牲之文其何敢辭按狀公諱兆麒字瑞圖曽祖國楨父世則皆以公貴階光禄夫夫如公官曽祖妣李氏祖妣禇氏王氏妣魯氏皆一品夫人先世江南徐州人自曽祖洛臺公始卜居寳坻縣東之豐臺封光禄善徴公生二子公其季也公幼而端重寡言笑舉止如成人讀書過目即成誦為文皆有理法年十四時遇太宗文皇帝觀兵畿輔亟收人才見公異之令入官學讀書年十六隨世祖章皇帝入闗又七年詔選漢軍滿漢文藝以范文肅公為考官公名列上巻遂授翰林院編修公起家布衣為侍從感激知遇勉勵職業世祖屢幸内院見公年少敏練心喜之十年中歴進都察院啟心郎又改宗人府隨進都察院左副都御史時公年未三十而丰采整暇每奏對輙當上指人知旦暮將大用公矣順治十八年滇黔既平餘黨散入楚省安輯需人遂擢公湖廣巡撫今上即位大兵雲集征勦公料理軍需賫送芻糗公調度有方不數載而伏莽悉定䝉特恩加授工部侍郎楚人新罹兵燹公撫定噢咻寛嚴交濟仁恩被于江漢越三十餘年而玉伯先生繼官此土遺民故老猶有擁馬首問公起居者可以知公徳澤之入人深矣康熙七年擢四川捴督任事未久以裁缺囘京師而在蜀數月招徠流移綏輯凋瘵不遺餘力嗣後進秩兵部尚書加從一品仍以撫川民功也八年授浙江福建捴督時海氛未靖兩省皆稱巖疆公條上防海機宜老謀碩畫鑿鑿然洞中肯綮兩省賴之以安十二年入京陛見適當三逆叛命廷推將帥之臣皇上特用文臣三人改銜以徃公其一也初任直𨽻援𠞰提督僅一年三輔清晏改授江南崇明水師提督崇明宻邇海氛地稱險要公請自擇偏禆預儲糧餉壯我之威伺冦之隙上稱善再三悉兪所請由是坐鎮十年内地寧謐人不知兵二十三年俄羅斯犯順大兵深入征伐命于大臣中擇賢能諳練之員以掌軍事遂以公為黒龍江捴督督兵三次克奏膚功至三十一年邊塞既靖而公亦以年踰六十母老在堂拜疏乞歸優㫖俞允自是徜徉林泉遂初樂志公于功名之際可謂報國保身兩得之矣乞休後六年以致政大臣監修北河工既竣聖心嘉恱仍復公総督兵部尚書從一品玉伯在呉中迎駕時屢頒賜公尚方珍物兼問公年貌及提督海疆嵗月幾何公之上膺主眷久而彌篤真人臣之殊遇也以余攷詩書所載若方叔召虎仲山甫諸人皆入為卿尹出為牧伯無事則任旬宣有事則兼將帥未嘗不嘆文武成康之化藴釀有本故其人才之盛至于如此今觀劉公一身培養于諸生之中者太宗皇帝也歴試于侍從執法之列者世祖皇帝也用以經文緯武敭歴中外者今上之識拔也而公之才無徃不宜視昔方召山甫亦嫓美無愧自公殁而中朝故老零落殆盡求太宗朝之後人不可多得矣公孝友性成家門雍穆可為當世法生平守不欺之學上自僚友下至故交皆終身如一利人濟物之事見無不為不能盡書特書其大者嗚呼公道徳事業備人世之極盛夀躋八十而神明不衰身見子之為大官繼前業餘亦洊厯郎署待綰邑符且身後踰兩月而長孫復舉京兆公存順歿寧無復餘憾而伯玉昆弟猶必假予一言以傳信永久余益嘆仁人孝子之心之不忍自己有如此也公生於天聡三年己巳十月十九日子時終於康熙四十七年戊子六月十二日午時享年八十歴官縂督浙江福建等處地方軍務兼理糧餉兵部尚書都察院右副都御史加從一品康熙九年五月覃恩進階光禄大夫初娶陳氏繼配鈕氏贈封皆一品夫人又娶郭氏以子貴推恩貤封孺人皆先公卒與公合葬子三人長殿衡即伯玉先生也公親兄進士瑞符公季子公早年未有子承繼為嗣由一品廕生歴官巡撫湖廣都察院右副都御史娶張氏次殿璣廕生官工部員外郎先公卒娶王氏次殿章嵗貢生候選知縣娶佟氏皆郭孺人出女四人一適徽州府通判靳治齊一適候選通判梁求正餘早卒孫四人長嵩齡戊子科舉人次昌齡候選通判次永齡太學生皆殿衡出永齡嗣殿璣為後次鶴齡殿章出孫女五人曽孫一同曽曽孫女一俱嵩齡出余既櫽括來狀所載而並繫之以銘銘曰盤山之陽海波萬頃鬱鬱葱葱煙閭霧井篤生偉人直大以方年如髙宻仗䇿從王史校石渠牒編玉葉臺栢清嚴秋鷹勁捷茫茫雲夢盗弄潢池非公持節孰底定之浙水潮平閩山烽伏帝曰宗臣甲兵在腹元凱書癖叔子裘輕虓如卧虎屹若長城萬里龍沙據鞍倚樹峩峩伏波勲髙銅柱歸來私第白袷練裙皤皤黄髮感我聖君有子承恩肯堂克荷後嗣繩繩家聲永大維公令徳朝野所望巋然一柱若魯靈光天不愸遺倏焉凋䘮箕尾芒寒士林惆悵維三不朽可範可型千秋紀載史冊汗青豐臺之塋林深土厚安彼佳城是封是甃上峙雙闕下疏九原悠悠億嵗視我銘言張文貞集巻十
