body:
  text: 張文貞集卷五大學士張玉書撰吳潛昭評選制義程墨序方一科之文初出譬若穠華錯采美不勝收久之而霜降木脫録不數人人不數藝縱或閲者嗜好各别而論定之後亦所見略同則為思其所以刋落與所以久而不廢者大抵巧不如朴繁不如簡華不如實縟不如潔準理命意而緯以六經諸史唐宋大家之文辭雖方圓竒正不名一轍而精力之所融結皆不可得而磨滅也豈獨六十年之文為然等而上之亦猶是矣桐城吳君潛昭濡染家學研精制舉業二十餘年持議侃侃與余意合近偕家弟韋存讀書北固山房評選程墨畢問序於余因為述歷科源流分合之故如此而竊自嘆幸遇之早又不幸而闈牘為四方名流所許不能自匿其瑕三復兹選益不禁汗顔而縮恧也于龍河制義序龍河于先生以名進士歷諫垣躋卿二為國家心膂大臣距其習帖括應制舉時二十餘年矣而于制舉業深嗜篤好不啻饑渴之於飲食間與余論數科來文章之變抉弊擲瑕鑿鑿乎深中其膏盲而洞燭其標本顧以余為知言也者一日持所櫝舊藁若干首過余謂自通籍後藏弆不以示人今以授子子為我序之以余夙承先生緒論固知先生于文窮相極形不名一家者矣雖然自昔作者牢籠萬態馳騁百氏而精神貫注各有其用意之所在先生所以為文之意亦有可為余述者乎先生曰文章之道期于明理適用而已余之于文也嘗穿穴乎聖賢立言之㫖及宋諸儒訓釋之義研同晰異以力求其解矣既得其解稱心而言思舉所得于胸者畢達于辭而後已然而臨文踧踖有深懼焉四子之書稽實待虛與易同體今隨舉一言引致于日用參伍于政事世變之興替舉措之得失如蓍命如數計莫有遁焉者也作文者不能根極理要考證踐履而徒區區飾浮游之詞以簧鼓一世其罪與侮聖人之言等余學殖荒落牖中窺日止見一隅獨是隨目所見吐而為言不致為巵辭勦說者之所借口庶幾其無內疚矣乎余受而讀之喟然而嘆曰甚哉先生之文不為苟作者也其波瀾相推而莫知紀極者文勢之壯濶也析殿最于錙銖核去留于毫芒者文體之精潔也大雅奏而黃鐘鳴武庫開而五兵列文氣之雄傑也要其大㫖歸于明實理究實用無剩義無溢詞而止嗚呼文章之變日異而月不同變至今日稱極盛矣顧不善學者屢變而失其㫖則勢不能無弊工取側勢巧避正鋒其失支貌類渾龎精氣不屬其失膚二者之弊彼此交譏其為本原不足則一而已得先生為文之意以倡導後學變不詭正久而彌新所謂有本之言固如是歟夫先生方專精國計以經濟大業為海內所爭仰制舉業特餘緒耳然而先生之所為文明理適用之文也經術經世即于習帖括應制舉時卜之豈俗學朝榮夕萎分文章經術為二物者所可舉似也哉既卒業敬書卷端以質當世之知文者徐原一制義序國家設制舉以紘網天下士三十年矣豐水有芑生材不盡扶輿靈淑之氣磅礴而鬱積而科名文章之盛萃於一門往順治已亥立齊先生荷世祖章皇帝殊眷以第一人登第學者翕然誦法其文比于金鎔竹笵距今十年而立齊之伯兄原一復以第三人受皇上特達之遇而望益增重嗚呼何其盛也夫原一之負重望於天下者以文章不以科名自有制舉以來掇上第者踵轍相望一二巨公宿儒以髙文典册照耀館閣固已巋然喬嶽矣至於俗學師承詭合有司之繩尺獵取科第而其文亦如春華不實不待風凋木謝之後而已委頓刋落無復存者文章聲價曾以科名軒輊乎哉原一當庚子舉孝亷名震都下一時論者已竊歎其遭遇之晚乃又中更轗軻極迍邅踣頓之狀然後得第一得第而聲華烜赫儼然埓於巨公宿儒則老其才以使其文之必傳於世蓋造物之意也今原一之文具在雅自矜慎藏弆篋衍而四方踵門傳寫日凡數輩行且不脛而走海內夫亦知原一之所以為文者乎濡染古學博極羣書胸中經經緯史無所不綜貫制舉義則成𢎞以後先正大家無不銖黍稱量取材博而利用精其深造本原如此宜乎馳騁萬態牢籠百家而不同於剽耳竊目之徒過時而速敝也雖然文章根乎至性徇人而封已巵言而獵貌雖雄辨極麗亦元裕之所謂不誠無物而已原一兄弟友恭內行淳備重交游信然諾至性鬱勃發而為文章語有之仁義之人其言藹如是則原一之所以為文者矣愚嘗歎功令三歲一比士自帖括而外别無登進之路異時三事大僚悉由此出而士子猥以無本之衷不誠之學僥幸名器習為固然豈獨其文易敝且岌岌乎有世風士習之憂得篤行績學如原一兄弟後先參錯於西清東序之間以挽頺俗其有濟乎余自幼隨伯兄禮存獲交於原一立齊暨仲彥和十五年於兹今余兄弟又得追從兩公之後出入直廬而彥和客都門亦時出其文以相質余自顧淺學薄殖曾不足仰嫓公家萬一獨是明習經術砥礪行誼寧恬毋競寧質無華願與原一兄弟終始勉之使當世不徒以科名文章相夸詡庶幾無負國家知遇之恩也夫紀孟起制義序熊鍾陵先生謂豫曰前輩讀書自應童豫試時便自不苟其為文窮變極態雖小題亦鑿然可傳㫖哉斯言可為後進針砭也今世所為學者大都鹵莽滅裂取悅時俗而已傳注之書童而習之不求甚解先正大家禀經翼傳之文棄若塗羮尋聲繪影如傀儡之眩目見有獨出手眼者雖心韙其言而必曲為之說曰是不利於場屋浸染既久舉天下士子所為制舉義庸淺膚俗類出一手為主司者或不得已就所見而甄録之而士子遂相率以庸淺膚俗為功令杜子美謂詩有僞體黃山谷論字法謂近世弄筆旋繞號為草書今於文見之矣嗚呼何其陋也韓子之言曰養其根而俟其實加其膏而希其光士習之衰學無根本持苟且徼幸之心以應功令而其文亦不久而自敝夫士子委贄進身獨有文章然且以苟且徼幸為逢時之技則策名以後依阿淟涊亦約略可覩矣頃詔制科復用帖括廟堂之意重以經術望天下士宜亟得淵博湛滿倡導風氣之文出而救之孟起紀子從西清餘暇手舊稿一秩示豫豫讀之而幸吾言之有據也其所謂傳注穿貫該洽而非傭耳剽目之傳注也其所謂先正大家嚌胾吸髓而非揣籥捫燭之先正大家也夫惟大雅卓爾不羣其是之謂乎孟起與拙菴子湘諸伯仲以詩文名海內二十餘年矣拙菴子湘先後成進士孟起今始用射策登第顧於是編斤斤不忘故物以視夫朝而艾穫日中而棄其鏄銍者相去不啻什百非深造篤嗜于斯道者而能若是乎余故拭目文運之興而深歎孟起老成夙學不以苟且應功令願天下讀其文而思其學之有原本也是為序十三太史合稿序代國家以文治磨厲天下士自乙酉迄今辛丑文體凡三變方酉歲肇舉賓興令甲未布余不佞承匱典南省試務求援据六經依傍傳注以闢一代風氣嗣後士子耳目漸束準繩壬辰試士南宫余忝為二時則按理切脈讐校益嚴譬御馬者始欲其就銜橛而繼則欲其致千里也邇年來文體稱極正矣而矯枉之過趨于薄弱識者憂之夫文章與治道相表裏治有治體文有文體濟五味為羮和五聲為樂晏子之論治也理扶質以立幹文垂條而結繁陸士衡之論文也國家用制藝較士猶唐之用詩賦論運㑹則今日方在初盛乃不為燕許沈宋金舂石戛之音而流漂嘈囋曾郊寒島瘦之不逮豈所以發皇盛治哉今年新天子即位天下士適當就禮闈試豫承簡命再典厥事自惟謭鄙思仰赴聖主闢門之化凡羅而列之貢書者披文相質華實並收蓋十八年間文體三變而豫謬稱主司皆得手定其甲乙竊覩是科文嘆國家涵濡之澤深也豐水有芑生材不盡而是科則採薪積槱左掇而右拾者矣館中十三子以課業餘暇各出所為制舉藝將彚梓行世問序於余余覽而憮然曰是真所謂金華殿中人語也館閣之文海內模楷今諸子文具在雖吐情發性言各一家而其鑿鑿乎禀裁先民規步大雅者按之如出一手是不可為天下鵠乎而余更有為諸子朂者諸子以制藝弋科名特一經生帖括耳今既側密勿建梁之地一旦朝廷有大制作促召給札非博洽典故烏能倚席立辦仰稱上㫖以諸子之才如朝陽之映若木擴而充之何所不至自兹以往日馳騁子經史百家之書以一物不知比于不識甄盎之恥可也張蘧若制義序大江以南新都稱詩書文獻之國蓋黃山白嶽之麓自有宋以來多傳經明道之君子而紫陽夫子崛起其間集諸儒之大成論者以其地擬之嶧山沂水繼紫陽而起者雙湖樗庵東山三先生為之羽翼修眀而聖人之遺經始炳于星日其文學彬彬載之史氏者視他郡國莫之能及也功令取士崇尚經術要在誦法先賢而師其為人用備學古入官之選况生其鄉者哉數十年來知繼三先生而起者之必有其人也辛未余奉命校士南宫與同事諸先生矢心交警慎以蕆事暗中尋索得一呈卷含英咀華而不骩于才左徵右羽而不束于法理則折中於聖籍體則步趨於先民揚而視之溫潤以澤也抑而審之縝密以栗也意其人必大雅不羣介然特立之士也以視諸先生諸先生皆曰然乃舉以冠多士暨撤闈捧雉來謁則新都張子蘧若果魁儒名宿潛心經史守道安貧屢躓于公車而不挫其志者也張子戊午登賢書被放者四而閉户掃軌授徒以自給足不涉閾以外惟寂寂手一編思欲有所發眀以嗣續鄉之先哲而出其生平所簡練以程及門者余受而閲之大都恪守乎成𢎞大家之尺度而膏沐於六藝之芳腴原道則醇以深論事則約以達刻意匠心歸於自得無窘步焉無躍冶焉其賞心而拊節猶之往日闈中展卷時也吁張子勉乎哉自有制科以來其登甲科為舉首卓然有所樹立為世所稱道弗絶者幾何人即前眀成𢎞正嘉之際號稱得士而縷指其間德業有聞於時而選述足傳于後者必科名與人地交相重者也張子勉乎哉即張子之鄉先哲雙湖樗庵皆絀於一第東山晚而就辟而三先生之言論風采為儒者所依歸如此即有宋三百餘年以巍科起家者未易臚舉而黃裳榜試録獨傳之至今尊為天球琮璧以紫陽夫子於是科登第也張子文近乎道而績學勵行其進未可量盍以三先生為梯筏而進而私淑於一代大儒之緒言考其立德立功之本末非惟知之亦允蹈之張子其可以弗心切嚮往也哉吾願張子亟有以自勉矣賀董公序昔者成周盛時周公召公分陜東西出為二伯而其入輔王室也則周公為太傅召公為太保蓋中外脉絡聨而為一方其在外則政令德教播之民間者一皆可以自斷而無旁撓中制之患及其在內則凡五方民情土俗之宜與其利弊休戚之所在莫不灼知洞見無有壅蔽而瞀惑之者是以坐於堂皇引綱挈領而國家之規畫措置固已風行天下而無不當其後仲山甫當宣王時外領諸侯內養君德入而典司政本出而經營四方詩人述之載于大雅其職同也三代而下出入中外者雖不乏人然往往不無為偏重而貫注聫屬之道漸以微矣我朝之制由侍從至六卿御史大夫者不復出為督撫由外吏至督撫而入為卿相者亦不數數見獨於我平原董公所以用之者有異焉公起家禁林致位九列視學首善衡文南宫天子寵之者至而其職皆詞臣所序遷其任亦皆詞臣所應得也顧當用公為御史大夫又任公以江督又命公為少司馬又特授公以督漕人皆以上之用公獨破舊格為說而不知此正聖天子之以周召仲山甫待公也蓋天下才德兼備如公者不一二覯向使專用于內而不用于外則其綜敏練達張弛文武縱橫盤錯風馳電震之才無由自見專用于外而不用于內則其丰稜骨鯁强毅果特侃然正色不激不隨之德亦將有所自閟而或悵悵於學士大夫之望是故上之所以用公者外收其保釐屏翰之功而內資其耳目腹心之助蓋公之才德固無施不可而上之用公亦實有中外相維貫注聫屬之意而惟公可以當周召山甫之重故其所以破舊格而用之者如此然公既屢用之於外而今復大用之於內從此而秉鈞衡籌密勿則一代偉人之頌余又將為公述之矣臺中諸君子喜公復來言路踴躍合詞請文賀公余與公同館閣久又為吳人被公之德甚厚樂其道之大行而非一方之所私也於是乎言大司冦新城王公壽序自昔名臣耆碩樹功德于不朽者莫不兼以立言為重而其言或傳之一二世或傳之數十百世大抵因乎其人又因乎其時三光五嶽之氣蓄而後發發而當極盛之世則其人既與運㑹相表裏而其言之傳益𢎞且逺斯德與功亦兼舉而並茂焉吾今於大司冦新城王公見之公家世清貴表著東土自尚書見峯公布政使康宇公以勳名治績彪炳前史暨匡廬先生胚胎前光位不滿德名德之盛獨鍾于公公弱冠登上第起家揚州司李風流文采照耀江左嘗過江遍遊京口諸山所至輒題壁時先大夫方里居把讀公集有天才獨絶之嘆洎公官郎曹偕伯兄西樵先生並負文望一時名人傑士咸望走恐後得公一言奬藉以為榮而公亦力以倡眀古學振興大雅為已任孳孳然汲引海內後進不遺餘力于是天子素聞公名特擢詞林入直禁近洊歷臺署晋長秋官中間敷教國雍校士南省凡所題品薦拔俱名得人自通籍以至于今雖官有內外任有煩簡而無日不以文章為事平居鍵户著述旁搜逺紹每朝廷大制作大典禮多公所參定兩奉命告祭嶽瀆輶軒所過東涉嶺嶠西經秦隴山川風物各成一書故公之文往往播於歌頌刻於金石達于通都大邑流于荒陬海澨自本朝用文治六十餘年未有若此之盛者也余竊嘗謂公之學以經史為淵海以諸子百代為波瀾主于發眀風雅扶翼世教有功于後學甚大少為理官中更執法掌禁詰奸屢奏平反其至誠惻怛之懷溫柔敦厚之意藹然時見于篇什咏嘆之內有德于斯民甚厚而又遭時承平天子方嚮文學昭回之光下被四表公于其間黼黻休眀導揚美盛如臯陶之陳謨召公之矢音非若晚近能言之士戔戔以風雲月露自表異者比也所謂人與時合而立德立功與立言俱不朽者非公其誰屬哉歲八月為公七十稱慶之辰諸門下士以余與公同主辛未試事請余一言以介祝嘏余惟公人文領袖四十餘年吾先子之所敬而慕也吾何能指述萬一逡巡久之而舉不朽之說以道公之實且以為公誦昔衛武公年九十有五猶自作懿戒之詩公今年正未艾則其立言之既𢎞且逺者亦正未有已也詩曰如川之方至以莫不增惟公似之矣謹序大學士澤州陳公七十壽序國家久道化成太和翔洽六十餘年間宗工巨僚以大耋聞者史不勝紀然大都功成致政享優遊巖壑之適者居多惟近歲寶坻益都錢塘漢陽真定宛平諸公身秉鈞軸而壽踰耆年後先聖世協氣之所萃川嶽神靈之所鍾天人交應乃克乘時挺生非一朝夕所能致也今於大師相澤州陳公復見之公弱冠登朝即以文章受知于世祖皇帝洎躬親大政開今上講筵直禁幄由侍從洊歷卿二兩掌邦憲四登尚書挈持綱維表率寮宷遂進參化權弼亮左右自通籍五十年以來白首一節終始無間上之所以眷倚公者久而益深而公之所以勤勞事上者亦久而未艾君臣相得昔人謂之千載一時夫豈易事歟惟公以清挺不拔之操獨立不撓之槩益以純眀光大之氣𢎞達魁傑之才揚歷諸曹所至多有興革比入政府百司庶務無不穿貫其源流而該舉其得失則更事之熟也公政之暇博極羣書經經緯史期於適用為文根極理要一時大著作類出公手詩陶鑄百家牢籠萬有而一以少陵為歸上每覽公篇什深加激賞嘗特賜御製詩一章以示褒美比年詞館諸臣奉詔編校典籍上念非公莫可捴其成者故既參機務仍以直內廷為專職焉詩有之維嶽降神生甫及申孔子說詩比之天降時雨山川出雲曰此文武之德也書曰天壽平格言天無私壽惟平格者壽之平者坦然無私之謂也皇上壽考作人大啓無疆之厯服而公秉坦然無私之性茂樹保乂之功以助流時雨之澤天其相之矣公今年躋七十視聽不衰神明益王而又長君以詞林出佐邊郡次君以學士同侍直廬誠所謂身其康强子孫其逢吉者繼自今番番黃髮備既醉之五福而佐望天子萬年之休以視前數公功名茀祿不更有過之者歟余隨公回翔史館四十餘載又得與公後先居政地頃者兩偕扈從南歷江浙曾奉特㫖賜遊湖山留連竟日于時道傍觀者咸指目為二老而余自愧鬚眉衰白不逮公逺甚兹因公門下士之請為述公之事業本于學問壽考篤于性情而推極于川嶽之鍾靈協氣之萃應以眀元老受福之有自者如此亦庶合于大雅詩人之意也夫是為序大司農徐公六十壽序丙戌秋八月户部尚書徐公督修河工告成自江南歸京師復命趨赴行在所天子深嘉勞之錫賚逾等先是上五巡江淮指授方略河工已即叙矣至是復出睿謀開濬髙堰三埧河以工務重大特命公往監督公於是相形勢程土物議逺邇料盈縮賦職任役人樂趨事自經始至訖功凡百有十餘日堤之長以丈計之凡一萬六千六百有竒河之長以丈計之凡一萬二千六百有竒共節省帑金二十餘萬兩河流湯湯萬世永賴自古成功之速且易未有及此者公之為功於河而德於淮民也大矣公之在淮也㑹翰林掌院學士闕員上以公文章經術冠絶當代遂命公以本官兼院事廷推教習庶吉士久之難其人上度無出公右者復仍以屬公户部主天下財賦盈虛出納關國家之大計而翰林育材成德以儲公輔之器尤政理之根本公以一人兼之非公政事文學實有足以追配古人者亦安能致上之眷注篤而信任專如此也初公以庶常授撿討上試諸詞臣於內廷擢公文為第一後連七試皆第一一時警動朝野旋充講席與睢州湯公同職上已深器公駸駸嚮用矣有忌而尼之者久之乃侍講筵列坊局上愈欲試公以政事遂晉秩卿二歷副都御史工部刑部侍郎奉命巡撫河南公持憲執法平刑掌土皆有治績可傳道而河南之政為尤著河南地大物博吏多不自修飭公至一嚴苞苴餽遺之禁以身為倡召諸屬吏於庭詢其地之所出舊例官之所入與其家一歲之所需幾何裁濶狹與相準度俯仰足以自給而已外此取民間一絲粟者以白簡從事無所貸吏惴惴奉法不敢欺紿又感公之恩而幸廉之可不至於貧也於是百城之吏無有以賄敗者因是爬梳利病鋤奸蘇良勸農桑興學校輯軍旅生聚教訓三年有成民用大和河南士大夫至於小民交口以為本朝數十年來巡撫未有如公者也憶辛巳冬玉書被命召入謁上上問江南民風吏治甚悉遂問河南巡撫徐某居官如何具以實對上曰然朕亦聞之徐某起家詞林居官如此不負朕所委任矣嗣後玉書每侍上稱羣臣之賢者必曰徐某徐某云蓋公以和平正大之氣精敏練達之識敦裕博厚之體清而不激嚴而不苛察而能容溫而能斷故能周知物情洞悉人隱使人畏威懷德而樂趨之上以副一人倚毗之盛心而下以造斯民無窮之厚利然則公之所以受知於上與上之所以知公者誠三代以下所罕覯而千載之後猶有餘慕者也初公以己未分校㑹試甲子典江南試皆稱得人甲戌㑹試公為主考官所録皆瓌瑋博達之士列於臺省館閣者是科為多今公復命而歸值公六十誕降之辰其門下士等乞余一言以介壽余與公同朝久知公最深而余之子則又為公所録士也故不敢以不文辭詩有之召伯有成王心則寧又曰吉甫燕喜既多受祉公之告成而歸與召伯同而上之寵錫公者即吉甫之所以受祉者也繼自今天壽平格黃髮台背公之功名方且熾昌盛大佐天子錫福兆民余更請歌南山萬壽之詩頌公矣大司冦健菴徐公六十壽序大司冦健菴徐先生以今年仲冬二日稱六十壽時先生方豫假還崑山用宋司馬文正故事以書局自隨里居編輯於是鄉之士大夫謀所以壽先生者先生固辭諸君子乃寓書京師屬寄亭太史乞文於余且曰司冦自通籍以來二十年矣其在翰林藻黻太平潤色鴻業天下望之如景星慶雲鸞翔而鳯翽及總風紀長秋官與立齊先生左提右挈協心力以贊邦治功名之盛莫與比儷而先生尤以文章受天子知遇凡朝廷有大著作必屬撰定洎展祀得請猶召入內廷諭以史事陛辭之日復親灑宸翰賜額以寵其行古今儒臣之被主眷未有如先生之渥者也惟公共事館閣知先生深為舉先生之抗直立朝精勤奉職者質言之以侑一觴可乎余曰唯唯先生服官大節諸君子已得其實矣顧余聞之楚子木問范武子之德於趙孟趙孟曰夫子之家事治言於晉國無隱情其祝史陳信於鬼神無愧辭夫以士㑹之歆享神人光輔社稷功業至為顯懿而趙孟略而不言乃特舉其家事得無盛德感人之實有不在於昭昭之迹者乎今先生賢過士㑹而諸君子之所稱述曾未有得於趙孟之㫖竊以為未盡也寄亭作而言曰微公言諸君子固有請矣往歲吳中荐饑先生餼粟千鍾全活以萬計又倣社倉遺意歲輸數百石以備荒札復髙忠憲同善勸分之制以通有無遇有詔㫖蠲貸則私家租入悉豫而弗取而又收育遺嬰廣瘞道殣施惠犴狴衣冠之族有鬻女償官逋者率金錢給之仍擇士為配其武陵安定太原潁川諸舊族纍世淺土輒為經紀襄事其賙恤惸困如此崑學宫圯董率締搆不數月而鼎新萃子弟秀異者於學舍多方誘掖之有不克自振者為延譽汲引俾成就而後已其推奬寒畯又如此凡此數事先生與果亭立齊兩先生倡導於前而藝初章仲實均道積諸君推而行之於後仁聲義問洽於吳趨行道之人至為感激隕涕其所由來非一日之故矣余聞之喟然興曰自世教衰而睦姻任恤之誼不講士大夫居其鄉者鮮有鄭罕宋樂施而不德之風而持論者猶且以近名為口實無惑乎風俗日趨於鍥薄而莫知所底也今觀於先生行事然後歎康濟斯民膏潤庶物之道一以居鄉教家為本詩有之夙興夜寐灑掃庭內衛武公年逾九十矣而作懿戒所謂有覺德行實自庭內基之敢稱此詩以復於吳郡諸公而因以致無疆之祝於先生揆諸趙孟稱士㑹之義其亦有當焉否也大司冦運青張公壽序康熙戊子九月總河遂寧公疏報秋汛情形具言水勢雖長修坊寧謐皇上臨軒褒歎謂河臣自涖任以來殫心盡力所用河帑謹嚴眀晰絶無糜費比年兩河安晏堤岸無虞深可嘉恱又閲月特㫖召公為刑部尚書仍令舉所知以代舉朝士大夫咸頌皇上知人善任信人不疑而益服公清勤著績憂國奉公有以深信於上為不可及先是三十七年黃淮並漲黃水灌洪澤湖湖從六壩旁泄由運河入下河傷民田甚衆于時任河事者竭蹶補救糜金錢數百萬迄無成績皇上憂勞萬民特命公以正卿往督河務公既至祗承簡命日勤勞其耳目心力以籌度地形水勢每當洪濤衝波頺沙阤岸盲風暴雨之侵逼嚴霜酷日之觸冒周行巡歷必躬必親於是度土方均丈尺揣厚薄定髙下量功授職舉賢而任能凡金錢之積于公及領于官而賦于民者日程月要絲粟以上無敢冒也無敢濫也公既正已以率屬而其下亦皆祗令奉法洗手將事惟恐隕越公涖河今八年餘矣築清口挑水壩浚張福口引河修歸仁堤疏人字芒稻涇澗諸河開大通口閉仲莊閘改由楊莊新河增築五里滚壩用使淮水暢流敵黃黃水北趨不至倒灌河身寬通岸髙堤堅大漲不溢民悉免于昏墊頃又命都統孫公冢宰徐公于髙堰三壩下築堤束水復於蔣家壩濬河建閘而善後之策一屬于公凡此經畫皆斷自宸謀訓示眀切而惟公氷心强力實能恪遵指授以為德于斯民而皇上所以眷注倚毗公者遂如此其久且篤也公起家庶常揚歷中外所至有聲跡巡撫兩浙歸裝惟襆被一囊視學江南振拔寒畯公眀莫與儷及總制兩江始至之日墨吏望風解綬蓋公之生平淡泊根於天性而又見義必為獨立無倚不以禍福利害是非毁譽動其心其識見之堅定學術之直方誠有卓然大過人者倘無公之素積而欲矯飾以效公之萬一庸有當乎今公年届六十積勤之久鬢髮半蒼而神采益王方迎養太翁于官舍修承歡視膳之樂則精眀强固天實相之公門下士於公仲冬生辰謀所以壽公者而屬余一言余為偹述公功名德業有自致期頤之理而無事巵辭以為祝也惟詩有之曰維嶽降神生甫及申其誦申伯則曰登是南邦世執其功公之懿美與嵩髙之詩今古相望天子懋嘉乃庸行且入秉鈞軸以登一世于仁壽豈特南邦是式而已南山之詩曰樂只君子德音不已又曰樂只君子遐不黃耉敬請為公連類而誦之大司農人嶽王公八十壽序大司農福山王公揚歷中外三十餘年巋然負海內巨人長德之望不獨以才略幹濟為一時班行推重已也先生自庚午而後引年者再癸酉夏復抗章陳情辭甚切摯天子召見西苑詢問年齒動履甚悉既退閣臣入奏上顧書等諭曰尚書某精力尚健老成人不易得也可降優㫖慰留之于是書等同奏聖恩䔍念老成如此豈特尚書臣頂踵被德臣等聞之皆感入肌骨比命下士大夫舉手交慶嘆為盛事蓋公今年春秋稱八十矣粵自海宇承平百物充牣國家歲出歲入之數勾稽至繁而又朝廷時下寬恤之詔賜田租停漕挽豁災傷頒賑濟皆借籌于司農公晨興入署指畫口授釐晰不爽銖黍去年秦省告饑皇上惻然慈軫渙發帑金百萬多方振恤特命公偕司空沙公往視其事公銜命遄征兼旬而達秦境乘騎遍歷閭井召集其父老親詢其婦子仳離轉徙之狀算口授粟多寡必均而復人諭户曉以聖天子焦勞宵旰加惠無已之意一時更生之民無不感激流涕閲三月事竣反命以黃髮元老馳驅于炎熇烈日之際而絶無勞苦疾厲之侵非天實祐之何以得此夫德集于身則天畀之以多福公之為所蓄德以偹福者固非一朝夕之故矣起家曹郎先後幾二十載在西曹平反海州疑獄以兩議上請卒從公議歲庚申建節松威督理芻糗出入雅安沈黎鋒鏑間不遑寢處者經歲而軍興不缺於供億羌人冦松龍部署官軍克巴猪黑虎等十餘寨衆皆就撫是冬入覲念採運楠木為蜀民害特疏請罷其役䝉恩報可方是時天子雅注意公欲加嚮用比移節口北治聲益起未一載而擢入卿寺又一載而特簡開府江右受事甫五日而晉浙閩制撫府瀕行猶禽治其貪縱不法之奸而條上其事之宜興革者至今奉為潔令既涖浙閩則調劑軍民激揚官吏開誠布公植良鋤莠數月之內輿情翕然車駕之南巡也率所屬迎于檇李天語問勞至殷陪扈行在數被召見參餌幣帛珍果之賜無虛日又頒御書卷軸扁額及御製詩一章近侍傳諭以居官清正特加優賚且謂兩省事繁宜節勞加餐善自調攝先生感泣不自勝駕還京師越兩月遂拜尚書户部之命惟上知公深故眷遇如家人父子倚任如股肱心膂惟公感恩思報之切故展布四體而惟力是視精白一心而終始不渝蓋公之學在淡泊寧靜而其設施在利物濟時以此答主知即以此獲神祐其康彊逢吉白首而不衰者天相之矣書曰天壽平格豈特一身之福已哉昔文潞公在元祐初年逾八十外國使至見公于殿門却立改容曰何其壯也蘇文忠語之曰使者見其容未聞其語其綜理庶務雖精壯少年有不如其貫穿古今雖專門名家有不逮使者拱手曰真異人也方今海隅日出罔不率俾重譯之使闕下必有覩公之威容拱手嘆異者余雖不文當告以公之壽身壽世為國宗臣直如周之畢召太公逾百齡而未艾不僅與宋之潞公嫓休于史冊也矣余辱交于公久公之司屬將旅進而稱觥于堂而屬辭于余余不能縷述懿行而為舉其事之大者如此諸君子曰是可以進一觴矣遂書為序王農山先生壽序華亭農山王先生以今年九月稱八十壽長公瑁湖方奉命典三秦試次公薛澱槖筆禁近為史官季公儼齊則以御史大夫里居侍養三公之門下士謀所以壽先生者而屬辭於余曰先生齒尊德邵泊然無世俗之所嗜好獨得公文以頌述懿美庶幾可介一觴余敬謝不敏復念先大夫之執友在海內者晨星相望惟先生巨人長德巋然靈光之獨峙又瑁湖昆季辱交至篤知先生深者宜莫如書安敢辭先生與先大夫同官大行重文章敦氣誼當談宴促坐輒舉婁東吳門雲間諸公著書纘言援接後進之事以相鏃礪繼持英簜之節奉使三楚偕其地英流名宿酬倡盈篋衍而他無長物甲午分校京闈少宗伯田遜庵為舉首實出先生之門於時先生雅負文望髙郵王文通公方典銓極意引先生為銓曺郎以自助而廟堂特重直指之選㑹京庾巡視需人遂用才望命先生往爬梳宿蠧優恤轉挽條上利弊數十事八九著為令甲比報政叙勞增秩旦夕且大用顧以兩尊人春秋髙投牒乞養辭意懇惻竟得請以歸自先生歸里越今三十餘年矣側聞几閣清嚴圗史錯互蒔花治圃觴詠自適無摉巖架石窮侈極麗之觀無賓從雜遝流連聲伎之習性樂易簡直與人交推誠吐臆雖造次傾蓋有若久要讀書百卷博覽强記儲於腹笥每子弟侍側或雜舉史傳辨核疑誤或指述見聞自朝常國故以及閭巷習俗之變遷士大夫風尚之同異感今追昔裁量是非家庭燕閒品核之辭皆足垂勸戒而裨信史以故瑁湖昆季濡染家學先後擢上第蔚為名臣余與儼齊同侍講幄者六年且比鄰而居文事商略常夜分不輟嗣瑁湖入史局發凡起例多所倚藉薛澱館選余復忝一日之長相得益歡丁卯春余與儼齊從里中被召同為法官讞獄有不當大廷爭執持議輒合余復覩儼齊出入禁闥受天子知遇至渥而息深視下無失言失色於人瑁湖薛澱才望競起並執恭謹如寒素蓋先生從服官政之年優遊里舍今齒登耄耋猶修規言矩步之節宜諸子奉先生家法三命益恭久而勿替有如此其盛也余聞之謙德之柄也儉德之共也敬德之聚也三善偹而養德養身之道胥具於是然則先生之所以教諸子其即先生之謹身節用以自致康疆壽考者乎雲間先哲如徐文貞陸文定董文敏皆以盛名躋大位享大年今先生之齒業與文貞文敏埒獨壯歲遺榮疑官秩為差絀夫天道嗇於此者豐於彼余知先生壽考當與陸文定嫓美而諸子多賢既貴且顯則又直軼前賢而上之矣更二十年先生稱百歲之觴書得以猶子奉杖履祝哽噎於側是宿昔之私願與儼齊相訂於直廬者也敢書以為先生祝少宰顓菴王公六十壽序康熙壬午冬車駕駐蹕德州閣臣入奏事上顧問臣玉書曰江南氏族如吏部侍郎王某中允王某可稱世家今在朝列孰與嫓美臣奏父子叔姪兄弟相繼登朝者有之侍郎臣自其曾祖父為明閣臣以來簪纓世嗣代有聞人在朝諸臣未有與之潔盛者也上為嘉歎久之蓋少宰顓菴王公為聖心所簡在者非一日矣初任史官時校士山左最稱得人甫入宫坊即歸侍奉常先生養里居者十餘年起補贊善以才望視兩浙學政所識拔皆一時通今服古之士庚午秋復典京兆試事衆口咸翕然稱服于是天子深器公特擢內閣學士時余叨入政地每見公承㫖詢問應聲而對不疾不徐辭簡而義當上輒傾聽首肯甲戌夏户部侍郎缺人非詞臣應遷之官也上親舉公名溫諭褒美遂面奉簡命公至部適當秦省舉行事例之時日久蠧生詐僞錯出公鈎稽簡籍嚴核虛冒侵牟詭訛之弊釐剔一清越五年仍以翰林學士佐典銓事于時孝感澤州兩公先後為冢宰咸倚公協心舉職己卯庚辰間淮黃失序髙堰增築石堤繫河防至重詔用九列大臣董治其役而公與焉涖河上數月堤工具有次第旋特㫖召還此澤州既入政府安溪李公代為冢宰而尚未視事公主持部務澄叙官方準情察理務適于中事有未協即條上便宜期于疏通無滯由是衣冠傾屬有孝先巨源之譽焉夫公回翔卿二閲十有餘載海內識與不識無不兾公早躋揆席以膏潤百物而公之年則已稱六十矣在昔萬厯甲申為文肅公即家宣麻之歲時年甫服官政今歷百二十年公之聲實才望與文肅公埓而齒則加茂焉朝廷方嚮用老成欲得黃髮耆艾可畀股肱心膂者以為巖廊增重則六官之長台司之寄選賢而任微公其誰屬哉至于公立朝本末事不勝紀余辱交久知公為深大抵以羔羊素絲之􅋵盡砥節首公之誠以愛惜人才之心行正直不阿之法持已至峻而遇物則平滌弊至嚴而宅心以恕所謂通達治體卓然有古大臣風概者公真其人也夫國家中外輯寧兵革偃息惟是公卿大臣悉以公正平恕為朝廷斟酌元氣導宣雅化則舉一世而措諸仁壽之域直指掌間事耳然則公之所為壽身以壽世者其道孰有踰于此乎獻歲七日當公攬揆之辰長公幼芬太史與中允公並負詞垣盛名次公樹仙亦綽有文譽登堂奉觴賓從交錯余特為公偹述主眷之隆與世澤之盛而又進而推原於立身立朝之本於以祝期頤祝霖雨焉所以為斯世斯民慶不獨公一人慶也杜遇徐六十壽序余初入史館即奉檇李杜遇徐先生之教先生以余同舉于丁酉契分至渥嗣是三十餘年間寓直講筵洊歷部務皆與先生相先後而交益親今年十月下浣為先生六十稱壽之辰浙士大夫謂余交先生深屬余文侑觴以為桑梓慶余曰先生之享大年偹多福豈特一鄉之私慶矣乎竊願有以進也方今聖天子總攬萬幾修眀百職六官之長倚毗為尤重或擢自外臺或簡諸禁近歷試其行履才略卓然可膺大用然後畀以樞要之任先生回翔正卿者十年于兹矣初領冬官以艱去閲三載即家召起歷司冦晉司馬所至涖事精審克舉其職癸亥甲子間嘗奉命巡視海疆舟車跋涉經行萬餘里熟悉形勢險隘與夫設防制勝軍民屯墾之宜故在中樞能厯舉四方要害不啻指掌比者廟堂加意武臣諸路提鎮以次入覲先生奉揚上㫖所以奬掖鼓厲之者甚至諸武臣咸凛凛受命惟謹蓋德望足以服物如此方先生之長秋曹也于出入比附之際辨核至嚴一時奏讞皆平允得情及奉詔重修律例先生膺總校之責余亦與焉今同事者多相繼遷職去惟余與先生雖改官仍領是役先生延訪僚屬甄眀故事以唐律為原本以明季諸家箋疏為依據有三四易藁然後定一律者總仰體聖明欽恤庶獄至意而一歸于仁恕旦夕是書告竣先生之所為助流德化者其澤不益溥乎夫國家當重熙纍洽之㑹薄海內外罔敢不庭十餘年以來時和歲豐兵寢刑息為史冊所僅覯士大夫遭逢盛時惟是秉持大體崇尚忠厚弼成太和洋溢之治則于世道人心有深賴焉先生自建議巖廊以及擘畫部務不立異不苟同力去煩苛斥逺浮薄先生所可人咸被之以為榮其所不可人亦不敢以私怨良由至誠不欺之學平易正直之風感入于人者深故能使人涵濡厭飫而不自知詩有之柔亦不茹剛亦不吐真先生之謂矣昔宋杜正獻事仁宗朝以直亮忠信取重天下由樞密拜同平章事清約如寒素名業顯懿壽躋耄耋論者榮之今先生德量與正獻埒久典兵柄仿佛宋之樞府天子倚任嚮用之殷計日當入參大政而年力方盛視正獻又為過之豈非昭代休明之運篤生良弼將俾一世共食太平仁壽之福則天之佑相先生而錫以純嘏者方如暘谷之初升河流之始潤其為慶寧有艾耶諸公曰是可為先生侑一觴矣遂書為序山東巡撫王東侯壽序昔曹參為齊相延膠西蓋公問為政所宜蓋公言治道貴清靜而民自定參遵其教齊國大治嘗反覆斯言而深有味乎其㫖也當孝惠時民之去湯火而登袵席未久也參用蓋公一言而齊七十餘城若赤子之附慈母古之大臣為天子牧養元元安靜無事持大體得人心如此大中丞王公東侯撫齊之五年歲在壬午政修事和人吏安輯冬十月駕幸德州明年癸未春再舉南巡復歷齊境余皆忝與扈蹕於時長吏之官是土與士大夫之居是邦者下至黃童白叟莫不稱述公之政績亟稱其賢余因詢訪其實則知自公為政未嘗妄刑一人妄斷一獄也輕徭减賦期於富之灾祲之見告者未嘗不呼籲軫恤也其御僚屬也務成就安全之未嘗以小過輕見彈劾也未嘗輕變一法而弊已革未嘗輕動一衆而利己興其閭里之輕俠瀕海之奸宄屏息而斂跡亦未嘗摶擊立威也進六郡之髦士而教育之復白雪書院講道論德於其中未嘗以軍府盤錯而輟也未嘗為矯矯之行而自敦羔羊素絲之節未嘗樹赫赫之功而人享舊德先疇之利是以天子嘉恱奬勞再三爰書治理寬平四大字以賜公其他詩章針銘以及尚衣珍饌之屬豫賚駢蕃有加無已蓋嘗論之國家久道化成太和洋溢四海之內物靡失所皇上方宏寬大之詔錫蕩平之福則夫藩垣之佐腹心之臣謂宜廣上德通下情滌除煩苛導迎善氣而或者猶矯激以立名刻核以駭衆上負朝廷任使之意而下使百姓不得遂其生此非細故也惟公含𢎞直方敦大博厚不矜名不炫能漠然無為而四境之內數千里之地民氣和樂俗用康阜此以知公之嘉猷善政不可勝舉而寬平兩字之義足以括之惟我皇上知公之深故評公之確以此風勵有位至諄且切也詩曰樂只君子殿天子之邦樂只君子萬福攸同於公驗之矣抑聞之古之君子愛其人而恱其德則必願其壽考以享福祿于無窮南山有臺之詩是也曰樂只君子萬壽無期又曰樂只君子遐不眉壽今年春適公懸弧之辰東土之士大夫謀所以祝公而致南山之意羣相與乞言于余余惟公保釐之績既已合于古人故特舉參之相齊以為言他日參為漢相遵何約束百姓歌之曰載其清靜民以寧一蓋始終守蓋公之一言而相業遂為三代以下所稱首今公簡在帝心入為霖雨行見佐天子垂拱之治而貽一世以壽考之福吾知功名蓋與平陽比烈矣侍御曉齊鄭公六十壽序侍御曉齊鄭公以康熙丙寅歲除日稱六十壽時公方官京師而士大夫舉觴稱慶於里者趾相屬也余於公屬在姻婭知公為深為述公立朝立身梗概以為公壽可乎公之入臺班也當聖天子武功耆定式遏亂略之會一切興革事宜自詔書宣諭外時奉特㫖召廷臣集議於闕下公與同官反復辨論皆深當治體奏上輒見施行公嘗語余曰事期於有濟何必功自己立名自己成在臺五載所論列當世之務見於獨奏者什之一而見於合辭奏請者恆什之九蓋公不矜才不立異事有當否輒與同列昌言之而大㫖歸於有濟昔李文靖為相嘗言朝廷防制纎悉畢具更張一事則所傷多矣惟諸路所上利害一切報罷差用報國家耳識者以為名言劉文靖亦言宋時經變多矣所立法度不無小害但其利多耳後人不知遂欲輕改此其害所以紛紛也公之意蓋以軍興時權宜之政既已次第釐革外此則皆諸司舊章宜一切遵守小有扞格稍一增損足矣何紛更為故公之不以慷激博名髙者非不言也所見者逺而所持者大耳從來制誥之文與典謨並重本朝四十年以來臣下被恩命者多矣而文辭相襲因仍未改公曰是豈所以重王言尊綸綍乎特疏陳奏遂得俞㫖學使以衡文為職公請改用詞臣以重文教初格于議未行亡何而吳越之銜命視學者奉特㫖以詞臣往矣公所言合大體如此督京儲一載飲氷懸魚自砥甚厲而恤民惠軍務為寬大而不事苛摘曰聖明在上御下以寬屢諭羣臣用和平養萬年之福可以錙銖升斗傷盛治乎繼公者或用鍥急自見而人乃愈思公云公天性孝友念太夫人春秋髙旬月間書問不絶遇羣從推甘讓肥和易溫煦藹然以親方公少時尊人金吾先生與叔父超宗士介兩公狎主文坫闢影園以宴集四方文章聲氣之士一時名宿與公遇者僉謂在紀羣之間而公謙下自牧以父執遇之既貴而不衰以故猶子其五懋嘉及令嗣御六坦公諸君恪秉家訓規言矩步絶去髙門世祿貴介紈綺之習可不謂德盛禮恭之至者乎夫國家當昌明豫順之世元氣藴隆必得老成耆碩海涵嶽峙之人應運而出以持盈滿而戒澆薄而其當大任也類非可以捷得而驟至往往老其才以有為使少年新進喜事之臣知所取法以佐成盛治蓋天之生才國之養士與士君子之自為養三者恆相須公之自為養亦久矣今年躋六十而回翔臺署未加顯擢蓋天之眷公與國家之用公實有意老公之才而不欲其輕試過此以往則一再遷而為卿二即以黃髮之元老主持國是于細旃廣厦之上而兹之稱壽猶日之耀於扶桑方升而未有艾也趙擎之七十壽序國家受天景命奄有方夏垂四十年薄海內外靡不嚮風效順而甲寅乙卯之間滇逆負恩倡亂延及閩粵而關陜巴蜀亦遙相應和以廑廟堂西顧之憂維時勇略將軍擎之趙公以寧夏鎮兵直搗蜀險計日而平滇奏凱之後朝廷念公行間積勞不復任以兵事遂召入為鑾儀衛使未幾而公以疾乞歸越數年為歲庚午嗣君黃岩捴戎寓書京師與余曰家大人䝉國厚恩獲歸田里以養餘年今且七十矣素辱公交契願乞文為壽以博一日之歡余曰唯唯公之勞勩在國家勳名在竹帛威名在四海雖家居不當事任然在朝公卿大夫以及四方文武大吏慕公之風槩樂公之壽考者賀使且相望於道何藉鄙言為重雖然知公之悉者宜莫如余其烏可無言猶憶癸丑秋余請急過津門謁公於幕府公一見握手如平生歡余竊覩公狀貌魁岸持論慷慨音吐如鐘御下嚴而不苛三輔盜賊屏迹無桴鼓之警私心歎曰此真將軍也古稱方叔元老非公而誰而是時寰宇承平車甲釁而不用公在鎮方以經生業督課諸子諸子魚魚雅雅佩服詩書聞余至各出所為文以相是正即今捴戎君天英暨弟仲君亮公季君旭升也留連三日夕余别而南去别未數月而滇黔之變作矣朝廷遣禁旅數十萬先後環集於楚蜀之境歲發金錢百萬計饋餉相屬而諸軍皆熟視狼顧無有奮戈而前為扼吭撫背之計者訖四五載無成功公時奉命提督寧夏奮然曰賊久不滅安用武臣為雖然兵不精無以克敵而兵不練無以鼓勇於是擇其士卒驍徑者而厚撫之立之程而眀示以賞罰豐其賚饗而鼓舞其氣勢踰年而得勝兵五千乃拜表首倡入川之議己未冬十月大兵四路分入公先由秦州攻取密樹關扼賊險隘自此攫徽州搏八堵山克略陽拔陽平關渡白水壩破青川或不當正道攀崖而進以出賊後或不事舟楫浮江而濟以突賊衝或力戰數日夜不息或一晝夜潛行數百里而賊不知乘危蹈險銜枚疾驅直薄成都之郭奪門而入全蜀州郡以次就平於是乘勝渡金沙江㑹師雲南優詔特授公為兵部尚書捴督雲貴時重兵雲集滇省相持已數月賊據橋樹壘我軍不能進公至親督將士取南壩玉皇閣進逼新橋復以計從上流濟軍屢戰獲勝賊力不能支遂內潰逆雛授首滇境底定公統軍五千不及他路三分之一轉戰七千餘里出奇制勝前無留鋒復兩省之全疆除十年之逋冦史冊所紀名將何以加諸捷聞天子大悅詔録諸將功而一時議者追論建昌失守不急救為公罪竟格賞不行賴天子眀聖念倡議取蜀公實為首庸滇城既下亷潔自持諸將無出公右特詔還公舊秩頃又命樞臣條上公戰績本末加給世職而公之功遂得鋪張揚厲於廟堂之上以顯著於天下噫公雖中遭謗忌不克自明而天子知之天下知之其亦可無憾於衷也矣昔晋欲取吳以龍驤將軍王濬督益州造樓船數年為進取之計及兵行當受王渾節度濬順流而下渾邀止之不得揚帆徑造建業受孫皓降而渾恨之欲奪其功渾宗强而濬不敵嘗懷憤悶客謂之曰君侯當角巾私第口不言平吳之事即有問者第言聖王之德羣帥之力老臣何功之有此藺生所以屈亷頗也渾能無愧乎濬深謝其言今公平滇之功過於濬之滅吳而忌公者不止一渾公拂衣歸里處之恬然而當寧卒為公白之然則公之居功髙於王濬而聖天子之聰眀神武逺軼百代此國家太平之治所以垂於奕􅑤而勳貴之臣亦得長享福祿於無窮者歟夫功髙而不伐德厚而不矜退居林野而係朝寧之安危僻處邊陲而繫四海之重望蓋充國之在漢汾陽之在唐庶幾似之然則公之壽考顯榮以庇及於子孫者正未有艾也書此以復捴戎兄弟公聞之其為辴然進一觴矣乎是為序安溪李太母吳太夫人八十壽序安溪厚庵李公與余同生於壬午同起家翰林為學士交誼至篤太君吳太夫人長於吾母一歲今年春正月下浣為太夫人八十稱壽之辰余聞之不禁辴然喜也士大夫叨荷國恩致身通顯幸而大官之祿逮養其親固生人之至樂而為之親者往往以白首里居為安而不克就養於邸舍屈指二十餘年間太夫人嘗一至京師吾母雖三至而閲歲即返余與公每一過從輒起居堂上聞無恙則手額交賀陟屺瞻望之情彼此同之今日登堂慶太夫人之大年且冀錫類之德及於吾母則執爵而致辭者宜莫余若矣夫太夫人天下之賢母也于歸之始事尊章以孝聞贈侍郎先生性剛直以嫉惡過嚴為羣小所忌太夫人劑以寬容溫厚能得里䣊之和閩地山海阻險為巨冦所盤穴順治初無日不尋於鋒鏑太夫人常危困時深明忠孝大節不以患難利害稍昧于心日夜佐先生課諸子誦讀不輟而先生教公兄弟具有家法故公成進士時學至博且醇六經之文能背誦無疑滯圗書律厯象數之㫖研索如判黑白而於宋諸儒道術源流尤辨晰精切一以考亭為宗蓋學有根柢如此三逆之相繼煽亂也閩嶠道隔逺邇震驚公時居里門遣使懷蠟丸間關入告具陳賊可滅狀自是大軍深入逆氛遂平惟時太夫人身處重圍嘗述國初殱冦舊事以正言堅公報國之心以散家財激宗族鄉閭協力誓守之志蕩平以後衣冠縻爛獨公家無溜磷則太夫人克持大義朂子以成忠孝豈區區紆朱紫奉鼎鍾為念者之所可比擬乎公久侍講筵承顧問而納言佐樞皆卓有建樹天子嚮用至殷而太夫人亦時時傳語無以內顧分任職之念公仲弟已成孝亷叔季皆有聲庠序而公之子又新舉於鄉侍養有人故公不敢遽請歸省而獨嘗過余寓舍各言其私竊謂功令惟獨子許侍養以子情而論親一而已雖百子無可代者且律言父母年八十家無以次侍丁棄而之任者有罰則雖有次丁而願告養者當在所不禁第律無明文耳聖天子方以孝治天下萬一曲體人子之私凡親年八十以上欲離職侍養者聽則我二人陟屺曕望之情庶幾其可立慰也矣太夫人飲噉方健率女婢親絡綿苧至今不衰公當軸枋政更十餘年而後色養未晚余濫竽日久旦夕得歸子舍願二十年後為太夫人稱百歲之觴而吾母亦邀餘庇享有大年所謂人子之情無有已極者或天其佑相之乎銀臺宫公定庵將偕庚戌同譜諸公為太夫人壽聞余之言謂有當於太夫人之德而並可以稔公之孝思也遂書為序張文貞集卷五
