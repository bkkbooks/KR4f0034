body:
  text: 張文貞集别集類六國朝提要臣等謹案張文貞集十二卷國朝張玉書撰玉書字素存丹徒人順治辛丑進士改庶吉士官至大學士諡文貞是集不分巻帙亦無目錄其繕寫格紙板心皆有松䕃堂字盖其家藏抄本編輯未成者也首為賦二篇次為頌三篇表三篇箋六篇疏二十篇議一篇書一篇考一篇説一篇序二十八篇跋一篇記九篇紀事十篇傳一篇賛一篇䇿問十二篇紀功碑二篇墓碑六篇神道碑四篇墓誌銘三十二篇大抵皆舂容典雅渢渢乎盛世之音其拖諾山狼居胥山二碑敘述聖武神功皆為詳贍足以昭示萬世其紀平定江南事紀滅闖獻二賊事紀三路進師下雲南事紀平水西事及外國紀皆端緒詳明得諸耳聞目見足以彰開國之鴻烈紀順治間樂章及錢糧户口三篇皆足資掌故而紀陜西殉難官事一篇亦足與史傳相參他若賜遊玉泉山記賜遊化育溝後苑記賜遊喀喇河屯後苑記賜遊熱河後苑記皆足發揚太平愷樂之象其餘碑誌亦多國初將相事迹可備考核惟募疏祭文之屬收載太濫葢其後人遇稿即錄不暇持擇轉為全集之累今悉刪除而惟錄其賦頌以下諸篇釐為十二卷庶不以榛楛勿翦為將来論者所病焉乾隆四十五年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:0c5e06358c916589556b63f1590cde85bfb40103ad8ff3a38b20245b821666d1
